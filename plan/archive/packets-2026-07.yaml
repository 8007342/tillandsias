          summary: >
            Created openspec/specs/vsock-exec-authz/spec.md to govern the exec authz boundary.
            Updated pty_handler.rs to enforce an allowlist for exec commands, including project name validation for podman exec.
            Updated child_env in pty_handler.rs to inject NO_PROXY and no_proxy variables.
            Added litmus test pty-open-argv-allowlisted to verify these changes.

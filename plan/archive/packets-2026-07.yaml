      estimated_hours: 4
      outcome: >
        (a) Write a governing spec for the transparent host->guest->container exec
        authorization boundary (there is none today) and validate the project-name
        interpolated into `tillandsias-{p}-forge` against an allowlist. (b) Confirm the
        new vsock/exec code paths follow the established proxy-exemption pattern that the
        orders 116/118/119 P0s established (every direct-to-enclave-service/build/exec
        path must exempt the proxy). (c) Track the still-missing github-login->list e2e
        gate as a named follow-up.
      exit_criteria:
        - "openspec spec covers the exec authz boundary; project-name allowlist-validated"
        - "grep/litmus confirms new vsock+exec paths set the proxy exemption"
        - "github-login->list e2e gate filed as a concrete ready packet"
      events:

    - packet_id: encrypted-control-channel-research
      order: 140
      title: "Security: design an encrypted, version-bound host<->guest<->container control channel"
      status: done
      kind: research
      deliverable: plan/issues/encrypted-control-channel-research-2026-07-01.md
      depends_on: []
      pickup_role: linux
      capability_tags: [rust, security, vsock]
      estimated_hours: 4
      events:
        - type: claim
          ts: "2026-07-01T23:05:00Z"
          agent_id: "linux-yoga-fable5-20260701T2305Z"
          host: "linux"
          lease_id: "encrypted-control-channel-research-claim-1"
          expires_at: "2026-07-02T03:05:00Z"
        - type: completed
          ts: "2026-07-01T23:06:00Z"
          agent_id: "linux-yoga-fable5-20260701T2305Z"
          summary: >
            Design/threat-model/alternatives/Open-Decisions filed in the deliverable;
            operator signed off O1 = build-embedded per-release secret; all exit
            criteria met. Impl proceeds under order 141.
      outcome: >
        Operator directive: encrypt the control channel from the host tray through the
        guest tillandsias-headless (over vsock), with the SAME reusable primitive from
        headless down to the deepest podman container. Bind host<->guest binary versions
        by DERIVING the channel key from the build version (mismatched versions get
        different keys and cannot complete the handshake), and combine with an argv
        allowlist so only approved exec commands run in the innermost containers. This
        is the design of order-137's closure. Recommendation: reusable EncryptedStream<S>
        adapter wrapping any AsyncRead+AsyncWrite; Noise NNpsk0 via the `snow` crate
        (PSK gate + X25519 forward secrecy + ChaCha20-Poly1305); PSK = HKDF-SHA256 over
        release_root_secret + build_version + hop_id; failure-closed with the reserved
        Unauthorized code; argv validated post-handshake at guest and container.
      exit_criteria:
        - "Crypto primitive + Noise pattern chosen with rationale (done in packet)"
        - "Version-binding key derivation specified (HKDF over build_version + hop_id)"
        - "Both-hops layering specified (single EncryptedStream<S> adapter)"
        - "Allowlist gate integration + threat model specified"
        - "Open decisions O1-O4 enumerated with recommended defaults for operator sign-off"


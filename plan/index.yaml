    - packet_id: tray-terminal-spawn-child-reaping
      order: 385
      title: "Reap tray-spawned terminal children so Ptyxis GApplication clients stop accumulating as [ptyxis] <defunct> zombies"
      status: completed
      kind: optimization
      deliverable: crates/tillandsias-headless/src/tray/mod.rs + crates/tillandsias-headless/src/main.rs
      depends_on: []
      pickup_role: linux
      capability_tags: [tray, process-lifecycle, rust, ptyxis]
      estimated_hours: 3
      outcome: >
        Live repro 2026-07-16 (operator Silverblue host): six [ptyxis]
        <defunct> zombies all parented to `tillandsias --tray --debug`
        (PID 30010), one per terminal launch, accumulating across the
        session. Root cause: both terminal-launch sites spawn a child and
        never wait() on the std::process::Child, which does not reap on
        Drop; Ptyxis's GApplication client exits in milliseconds after
        delegating the window to the resident --gapplication-service, so
        every launch leaks a zombie. Sites: launch_in_terminal
        (tray/mod.rs:1862) and launch_forge_agent (main.rs:8955). Fix:
        one shared spawn-and-reap helper that moves the Child into a
        detached thread calling wait(); route both sites through it.
        Evidence in
        plan/issues/optimization/tray-terminal-spawn-zombie-ptyxis-stragglers-2026-07-16.md.
      exit_criteria:
        - "both launch_in_terminal (tray/mod.rs) and launch_forge_agent (main.rs) route their terminal spawn through one reaping helper; no bare .spawn()-and-drop of a terminal Child remains (source-shape guard)"
        - "behavioral test: a fast-exiting child (`/bin/true`) spawned via the helper is reaped — exit status observed, no lingering zombie — mirroring the inference_run_args_use_replace_for_idempotency house style"
        - "manual repro: after N tray terminal launch+close cycles, `pgrep -P <tray-pid> --state Z` reports 0 (was 6/session)"

      owner_host: macos
      capability_tags: [macos, podman, build, dev-loop]
      estimated_hours: 2
      outcome: >
        scripts/common.sh's wrapper-selection logic required a `podman info`
        connectivity probe to succeed before skipping the Linux-only local-
        VFS-storage wrapper (--root/--runroot/--tmpdir). Homebrew Podman on
        macOS is ALWAYS a remote-machine client and rejects those flags
        regardless of probe outcome, so on any macOS host where the probe
        failed (e.g. no Podman machine currently running), build.sh --check
        fell through to the wrapper branch and failed with a confusing
        "unknown flag: --root" instead of Podman's own actionable error.
        Fixed by having macOS unconditionally skip the local-storage wrapper
        branch. That unblocked ./build.sh --check far enough to reach real
        compilation for the FIRST TIME on this host, surfacing 2 more
        -D warnings blockers in Linux-owned crates (tillandsias-podman's
        path_is_writable/require_desktop_user_session/
        require_headless_service_account, tillandsias-headless's
        vault_service_base_url) — all the same shape: a helper whose only
        non-test caller lives inside a #[cfg(target_os = "linux")] block,
        so non-Linux builds saw it as dead/unused code. Fixed with minimal,
        platform-scoped allow attributes / a tightened cfg boundary (no
        Linux behavior change), marked PLEASE REVIEW (linux) per the
        unblock-with-NOOP convention.

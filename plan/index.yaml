      estimated_hours: 1
      outcome: >
        Found by the order-315 current-state audit and verified in-tree:
        pre-receive-hook.sh pipes changed files into `while read`, so the
        loop body runs in a subshell and its REJECTED=1 never reaches the
        parent's final check. The ledger-YAML gate (order-263 lineage:
        forge cycles pushing broken plan YAML) therefore never rejects.
        Fix with process substitution / flag file / last-command exit,
        and pin with a fixture that pushes a deliberately broken
        plan/*.yaml to a temp bare repo carrying the hook and asserts
        non-zero receive.

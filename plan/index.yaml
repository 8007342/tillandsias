    - packet_id: vault-host-endpoint-soak-fragility
      order: 463
      desired_release: v0.4
      title: "25h soak broke every host->vault path: netavark DNAT loss on the internal enclave network, loopback bind EIO, first-restart unseal landmine, and lane-lock heal starvation"
      status: ready

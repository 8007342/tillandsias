        hangs indefinitely (no output, not even podman build's own STEP 1
        line) on a network-restricted host, right after printing "Detected
        base distro: unknown". git/proxy/inference all complete their
        equivalent rebuild in ~2s under the same conditions. A raw `podman
        build` against vault's Containerfile (bypassing build-image.sh)
        reaches STEP 1 immediately and only fails later, legibly, at the
        real network-dependent `apk add` step — so the Containerfile itself
        is fine; something build-image.sh does specifically for the `vault`
        image between distro-detection and the actual podman build
        invocation blocks without a bounded timeout.
      events:
        - type: progress
          ts: "2026-07-07T05:20:00Z"
          agent_id: "linux-macuahuitl-sonnet5-20260706T2059Z"
          host: linux
          summary: >
            Additional diagnostic clue (operator confirmed genuinely online;
            the hang is not a network-absence artifact). `~/.config/containers/
            containers.conf` sets `env = ["http_proxy=http://proxy:3128", ...]`
            globally for all podman-launched processes — `proxy` is the
            in-enclave squid sidecar hostname, which only resolves from inside
            the tillandsias container network, not from the bare host. This
            explained a SEPARATE, now-resolved issue: `podman pull
            docker.io/hashicorp/vault:1.18` failed with `lookup proxy: no such
            host` until run with `http_proxy= https_proxy= HTTP_PROXY=
            HTTPS_PROXY=` cleared for that one command (succeeded once
            overridden — restored the upstream base image order 222 had
            accidentally deleted). HOWEVER: the SAME env overrides did NOT fix
            `scripts/build-image.sh vault --force`, nor a raw `podman build
            --http-proxy=false -f images/vault/Containerfile images/vault` —
            both still hang, even with the vault base now freshly pulled and
            present locally, even with proxy vars cleared at the invoking
            shell. This means the hang is NOT simply "shell-level proxy env
            leaking into the build" (that would have been fixed by the
            override) — something reads the proxy setting from
            containers.conf directly rather than from the invoking process's
            environment (podman's own containers.conf `engine.env`/
            `containers.env` is applied at the OCI/build-container level
            regardless of the host shell's env), OR the hang is unrelated to
            proxy at all and is something else entirely in podman's handling
            of the `docker.io/hashicorp/vault:1.18` FROM reference
            specifically. Left ~90 dangling `<none>:<none>` intermediate
            layers from the two hung attempts; pruned with `podman image
            prune -a -f` (2 remain, harmless, not investigated further).
            Root cause still not found — next step per exit criteria is
            `bash -x scripts/build-image.sh vault --force` to see the exact
            blocking call, now with a network-confirmed-good host and a
            present base image, which should narrow it further than my
            offline-only diagnosis.
        - type: completed
          ts: "2026-07-07T05:35:00Z"
          agent_id: "linux-macuahuitl-sonnet5-20260706T2059Z"
          host: linux
          commits: []
          summary: >
            Root cause found via `bash -x` + isolating the exact traced
            `podman build` invocation and re-running it directly (piped
            through `head` first, which gave a MISLEADING instant-hang
            reading — a broken-pipe write blocks under `--isolation chroot`
            rather than raising SIGPIPE promptly; re-running with output
            redirected to a file instead of piped showed real, if slow,
            progress). This was NEVER vault-specific: reproduced the
            identical "silent hang on a cache-miss package layer" on `git`
            too. Root cause: this sandbox's build-container network
            silently blackholes DIRECT outbound egress (no ECONNREFUSED, no
            DNS-error, just silence) when `--http-proxy=false` is set (which
            build-image.sh always sets, correctly, to avoid needing
            enclave-CA trust for SSL-bump in build containers); routing
            through the proxy instead fails FAST but for a different reason
            — `proxy` (the containers.conf-configured squid hostname) only
            resolves inside the tillandsias enclave network, not from a
            standalone `podman build` invocation. Neither path can reach the
            internet from a bare build in this sandbox. This is a sandbox/
            network-policy characteristic of THIS execution environment,
            not a Containerfile or build-image.sh logic bug — the operator's
            actual host reaches the internet fine (confirmed: direct
            `podman pull` from the host, not a build container, of all 4
            affected images succeeded once shell-level proxy env was
            cleared).
            FIXED the acute, generically-useful problem regardless of cause:
            added `_timeout_podman_build()` wrapping every `podman build`
            call site (4 total: base-image + main-image, verbose + quiet) in
            a bounded `timeout --signal=TERM --kill-after=10
            $TILLANDSIAS_BUILD_TIMEOUT_SECS` (default 1800s/30min), with a
            clear diagnostic message on timeout pointing at this finding.
            A fetch that completes fast is unaffected; a genuinely-stuck one
            now fails within a bounded, configurable window with an
            actionable message instead of hanging forever. Verified: with
            `TILLANDSIAS_BUILD_TIMEOUT_SECS=10` against a still-hanging
            scenario, failed cleanly in ~10s with the new diagnostic; with
            the default timeout and working network, git/proxy/vault/
            inference/forge all built successfully (66s/63s/66s/11s/105s).
            Also restored: `registry.fedoraproject.org/fedora-minimal:44`
            and `docker.io/library/caddy:2-alpine` (accidentally removed by
            my own interactive `podman image prune -a -f` cleanup during
            this debugging, unrelated to the selective-reset script, which
            was re-verified afterward to still correctly preserve all 4
            allowlisted bases). `./build.sh --check` green.
      exit_criteria:

    - packet_id: forge-gitconfig-quarantine-and-injection
      order: 224
      title: "Forge: quarantine host .gitconfig + inject forge-owned git config with mirror redirect at launch"
      status: completed
      kind: enhancement+bugfix
      deliverable: plan/issues/forge-gitconfig-quarantine-and-injection-2026-07-07.md
      depends_on: []
      pickup_role: linux
      owner_host: linux
      capability_tags: [rust, forge, podman, git-mirror, credential-isolation]
      estimated_hours: 4
      outcome: >
        The host's ~/.gitconfig (which the tray modifies with DNS and proxy
        config) leaks into forge containers via the source mount of ~/src/.
        While build_forge_agent_run_args (Claude/Codex/Antigravity/Maintenance)
        has credential quarantine (tmpfs overlays + GIT_CONFIG_GLOBAL), the
        OpenCode forge path (build_opencode_forge_args) has NO quarantine at
        all. Moreover, even the quarantined path leaves the forge's git config
        EMPTY at container start — requiring lib-common.sh's rewrite_origin_
        for_enclave_push to populate the insteadOf redirect at runtime via
        `git config --global`, which is too late for early git operations and
        may not work if the host .gitconfig already set conflicting values.
        Fix: (1) add credential quarantine (tmpfs + GIT_CONFIG_GLOBAL) to
        build_opencode_forge_args, (2) pre-populate a forge-owned .gitconfig
        with the mirror insteadOf redirect, safe.directory, and CA/proxy
        settings, injected via a bind-mounted file at the GIT_CONFIG_GLOBAL
        path, and (3) update lib-common.sh's rewrite_origin_for_enclave_push
        to detect the pre-injected config and skip duplicate runtime writes.

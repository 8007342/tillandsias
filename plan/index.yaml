    - packet_id: litmus-runner-command-backslash-escaping
      order: 201
      title: "Fix: litmus runner's command: extraction doesn't collapse \\\\ to \\, breaking valid-YAML regex escapes"
      status: done
      kind: enhancement
      deliverable: plan/issues/litmus-runner-command-backslash-escaping-2026-07-06.md
      depends_on: []
      pickup_role: linux
      owner_host: linux
      capability_tags: [litmus, tooling, bash, yaml]
      estimated_hours: 2
      outcome: >
        scripts/run-litmus-test.sh extracts each step's command: value with a
        bash regex over raw file bytes and only unescapes \" -> " (not \\ -> \),
        so a command: string that is valid YAML (where \\ is the only correct
        escape for a literal backslash) and passes `ruby -ryaml`/`yq` can still
        execute with an extra literal backslash at runtime — silently breaking
        any grep -E pattern needing \./\(/\) escaping, with the check just
        always reporting FAIL and no parse error anywhere to point at the cause.
        Discovered 2026-07-06 while fixing 9 litmus files in
        plan/issues/litmus-full-suite-macos-first-run-findings-2026-07-06.md;
        worked around there by avoiding backslash escapes in command: strings.
        Fix the runner itself: either collapse \\ -> \ after the \" -> "
        substitution (matches real YAML semantics), or switch command:/step
        parsing to the yq-backed path already used by yaml_get() for other
        fields when yq is available.
      events:
        - type: claim
          ts: "2026-07-06T19:40:00Z"
          agent_id: "macos-Tlatoanis-MacBook-Air-claude-20260706T1930Z"

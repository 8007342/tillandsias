    - packet_id: git-mirror-architecture-verification
      order: 69
      title: "Git mirror architecture verification — real server vs filesystem hacks"
      status: done
      kind: investigation
      deliverable: plan/issues/git-mirror-architecture-verification-2026-06-20.md
      depends_on: []
      pickup_role: "Linux mutable host with forge and git-mirror running"
      outcome: >
        Confirmed that tillandsias-git runs a real git daemon server (git://
        native protocol on port 9418) with Vault-backed HTTPS relay to GitHub
        — not a filesystem shortcut on Linux. CA certs at
        /etc/tillandsias/ca.crt are used for OUTBOUND HTTPS (Vault API + GitHub
        push), not for serving. The Windows/WSL filesystem transport does use
        a path-based insteadOf redirect (functionally akin to file://), which
        is intentional but worth documenting. All red-flag checks pass on
        Linux; forge→mirror→GitHub push relay is verified from source code.
      tasks:
        - id: git-mirror-verify/protocol-probe
          status: completed
          depends_on: []
          owned_files: []
          checkpoint_required: false
          handoff_note: >
            Probe the git mirror container's served protocol: HTTP smart protocol,
            SSH, or both. Confirm the URL scheme used by the forge's git remote.
        - id: git-mirror-verify/ca-cert-check
          status: completed
          depends_on: []
          owned_files: []
          checkpoint_required: false
          handoff_note: >
            Verify the TLS certificate presented by tillandsias-git is signed by
            the Tillandsias intermediate CA (not self-signed or absent). Use
            openssl s_client against the container's published port.
        - id: git-mirror-verify/forge-remote-check
          status: completed
          depends_on: [git-mirror-verify/protocol-probe]
          owned_files: []
          checkpoint_required: false
          handoff_note: >
            Inside a running forge shell, run `git remote -v` and confirm the
            origin URL is a network endpoint (https:// or ssh://), not file://.
            If it IS file://, that is the hack to fix.
        - id: git-mirror-verify/findings
          status: completed
          depends_on: [git-mirror-verify/protocol-probe, git-mirror-verify/ca-cert-check, git-mirror-verify/forge-remote-check]

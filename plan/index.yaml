plan_index:
  version: v1
  root: plan/
  default_status_values:
    - pending
    - ready
    - in_progress
    - blocked
    - needs_clarification
    - completed
    - obsoleted

  selection_policy:
    primary_rule: "Pick the earliest step whose status is ready."
    fallback_rule: >
      If the selected step is blocked or needs clarification, pick the next
      independent ready step instead of waiting on the blocker.
    update_rule: >
      When a step completes, update its status, write the evidence summary to
      its deliverable, checkpoint the current state to origin/linux-next, and
      then promote the next eligible pending step to ready.

  graph_policy:
    model: dag
    selection_rule: >
      Pick the earliest ready leaf task whose claimed file scope is free.
      If a leaf is claimed or overlaps a claim, skip to the next ready leaf
      rather than waiting. Dependency tails should be preferred when they unlock
      downstream work.
    claim_rule: >
      Claims are leases on file scope and graph node scope. Claims are
      idempotent by graph_node_id plus lease_id. Repeated claims must converge.
    update_rule: >
      Reapplying the same graph node update_id is a no-op. Stale updates are
      preserved as history but must not change the current canonical state.
    scratch_root: plan/localwork
    step_file_template: plan/steps/README.md

  checkpoint_policy:
    branch: linux-next
    cadence: "after every meaningful batch, before context switches, and before stopping for the day"
    allowed_state: "incomplete work is acceptable if the checkpoint is coherent"
    commit_message:
      subject: "checkpoint(<scope>): <specific progress>"
      body:
        - what changed
        - what remains incomplete
        - what was verified
        - what is blocked
        - next intended action
    push_rule: "push each checkpoint to origin/linux-next immediately after commit when possible"
    lease_note: >
      A checkpoint should be understandable after the current agent terminates;
      do not rely on the same terminal or the same agent resuming.

  steps:
    - id: wrapper-contract
      order: 0
      title: Wrapper contract and repo-local launch defaults
      status: completed
      deliverable: plan/steps/00-wrapper-contract.md
      depends_on: []
      resume_prompt: './codex "Look at ./plan.yaml and continue implementation using ./methodology.yaml"'
      outcome: >
        The repository already ships a `./codex` wrapper that defaults to the
        Tillandsias profile. Keep that contract stable, and extend it with
        repeatable noninteractive checkpoint runs for automation.
      tasks:
        - id: wrapper/repeat-loop
          status: completed
          depends_on: []
          owned_files:
            - codex
            - plan.yaml
          checkpoint_required: true
          handoff_note: "Cold-start note: the repeat loop exists and the next agent may be different."

    - id: security-substrate-closure
      order: 1
      title: Security substrate and Podman layer closure
      status: completed
      deliverable: plan/steps/01-security-substrate.md
      depends_on: [wrapper-contract]
      specs:
        - security-privacy-isolation
        - enclave-network
        - proxy-container
        - podman-container-spec
        - podman-container-handle
        - podman-orchestration
        - podman-secrets-integration
        - secrets-management
        - native-secrets-store
        - secret-rotation
        - git-mirror-service
        - inference-container
        - reverse-proxy-internal
      exit_criteria:
        - "Any stale security/substrate spec is tombstoned or marked obsolete with a replacement reference."
        - "Live specs are bound to executable litmuses or a justified minimal boundary."
        - "A narrow strict CI pass and install pass are run for the selected bundle."
      tasks:
        - id: security/podman-core
          status: completed
          depends_on: []
          owned_files:
            - openspec/specs/security-privacy-isolation/spec.md
            - openspec/specs/enclave-network/spec.md
            - openspec/specs/proxy-container/spec.md
          checkpoint_required: true
          handoff_note: "Cold-start note: security substrate is the dependency tail for browser and web work."
        - id: security/secrets-and-mirror
          status: completed
          depends_on:
            - security/podman-core
          owned_files:
            - openspec/specs/podman-secrets-integration/spec.md
            - openspec/specs/secrets-management/spec.md
            - openspec/specs/native-secrets-store/spec.md
            - openspec/specs/git-mirror-service/spec.md
          checkpoint_required: true
          handoff_note: "Cold-start note: secrets and git mirror work must remain remote-checkpoint friendly."

    - id: browser-and-web-security
      order: 2
      title: Browser isolation and secure OpenCode Web
      status: in_progress
      deliverable: plan/steps/02-browser-web.md
      depends_on: [security-substrate-closure]
      specs:
        - browser-isolation-core
        - browser-isolation-framework
        - browser-isolation-tray-integration
        - host-browser-mcp
        - host-chromium-on-demand
        - chromium-safe-variant
        - opencode-web-session-otp
        - mcp-on-demand
        - subdomain-naming-flip
        - subdomain-routing-via-reverse-proxy
      exit_criteria:
        - "Browser/session control path is coherent end-to-end."
        - "Any superseded browser/session contract is tombstoned."
      tasks:
        - id: browser/launch-path
          status: in_progress
          depends_on:
            - security-substrate-closure
          owned_files:
            - crates/tillandsias-headless/src/main.rs
            - crates/tillandsias-headless/src/tray/mod.rs
            - images/chromium/chromium-framework-launch.sh
          checkpoint_required: true
          handoff_note: "Cold-start note: the next agent may continue the launch path or hand off to the MCP bridge."
        - id: browser/mcp-bridge
          status: pending
          depends_on:
            - browser/launch-path
          owned_files:
            - crates/tillandsias-browser-mcp/src/server.rs
            - crates/tillandsias-core/src/state.rs
          checkpoint_required: true
          handoff_note: "Cold-start note: keep the MCP bridge independent from launcher-only changes."
        - id: browser/session-otp
          status: pending
          depends_on:
            - browser/launch-path
          owned_files:
            - openspec/specs/opencode-web-session-otp/spec.md
            - images/default/entrypoint-forge-opencode-web.sh
            - images/default/entrypoint-forge-opencode.sh
          checkpoint_required: true
          handoff_note: "Cold-start note: session ownership is a separate task from browser transport."
        - id: browser/legacy-session-tombstone
          status: pending
          depends_on:
            - browser/session-otp
          owned_files:
            - openspec/specs/opencode-web-session/spec.md
            - openspec/litmus-bindings.yaml
          checkpoint_required: true
          handoff_note: "Cold-start note: tombstoning is idempotent and should reference the replacement spec."

    - id: tray-runtime-and-cache
      order: 3
      title: Tray lifecycle, init path, and cache semantics
      status: pending
      deliverable: plan/steps/03-tray-runtime.md
      depends_on: [browser-and-web-security]
      specs:
        - tray-app
        - tray-ux
        - tray-minimal-ux
        - tray-progress-and-icon-states
        - tray-icon-lifecycle
        - tray-cli-coexistence
        - tray-host-control-socket
        - tray-projects-rename
        - simplified-tray-ux
        - no-terminal-flicker
        - singleton-guard
        - init-command
        - init-incremental-builds
        - forge-cache-dual
        - forge-staleness
        - overlay-mount-cache
        - tools-overlay-fast-reuse
      exit_criteria:
        - "Tray behavior is consolidated around the current runtime model."
        - "Legacy cache and UX variants are either retired or reduced to active minimal boundaries."
      tasks:
        - id: tray/icon-lifecycle
          status: pending
          depends_on:
            - browser-and-web-security
          owned_files:
            - crates/tillandsias-core/src/state.rs
            - crates/tillandsias-headless/src/tray/mod.rs
          checkpoint_required: true
          handoff_note: "Cold-start note: icon state must remain coherent across agent handoff."
        - id: tray/menu-and-ux
          status: pending
          depends_on:
            - tray/icon-lifecycle
          owned_files:
            - openspec/specs/tray-ux/spec.md
            - openspec/specs/tray-minimal-ux/spec.md
            - openspec/specs/tray-progress-and-icon-states/spec.md
          checkpoint_required: true
          handoff_note: "Cold-start note: keep tray UX minimal, explicit, and resumable."
        - id: tray/init-and-cache
          status: pending
          depends_on:
            - tray/menu-and-ux
          owned_files:
            - images/default/entrypoint.sh
            - images/default/lib-common.sh
            - scripts/install.sh
          checkpoint_required: true
          handoff_note: "Cold-start note: cache semantics should be checkpointed before they are widened."
        - id: tray/legacy-cache-tombstones
          status: pending
          depends_on:
            - tray/init-and-cache
          owned_files:
            - openspec/specs/overlay-mount-cache/spec.md
            - openspec/specs/tools-overlay-fast-reuse/spec.md
          checkpoint_required: true
          handoff_note: "Cold-start note: tombstone legacy cache paths rather than leaving them implicit."

    - id: onboarding-and-discovery
      order: 4
      title: Onboarding, discoverability, and repo bootstrap docs
      status: pending
      deliverable: plan/steps/04-onboarding-docs.md
      depends_on: [tray-runtime-and-cache]
      specs:
        - forge-welcome
        - forge-shell-tools
        - forge-environment-discoverability
        - forge-opencode-onboarding
        - default-image
        - project-bootstrap-readme
        - project-summarizers
        - remote-projects
        - gh-auth-script
      exit_criteria:
        - "The first-turn story is coherent and validator-clean."
        - "Retrofit specs are either live, bounded, or tombstoned if historical."
      tasks:
        - id: onboarding/welcome
          status: pending
          depends_on:
            - tray-runtime-and-cache
          owned_files:
            - images/default/forge-welcome.sh
            - images/default/config-overlay/mcp/project-info.sh
          checkpoint_required: true
          handoff_note: "Cold-start note: welcome output and discoverability need to remain in sync."
        - id: onboarding/shell-tools
          status: pending
          depends_on:
            - onboarding/welcome
          owned_files:
            - images/default/config-overlay/mcp/git-tools.sh
            - images/default/config-overlay/opencode/instructions/cache-discipline.md
          checkpoint_required: true
          handoff_note: "Cold-start note: shell tools should be discoverable without hidden state."
        - id: onboarding/bootstrap-docs
          status: pending
          depends_on:
            - onboarding/shell-tools
          owned_files:
            - cheatsheets/welcome/readme-discipline.md
            - docs/OPENCODE-INTEGRATION-COMPLETED.md
          checkpoint_required: true
          handoff_note: "Cold-start note: bootstrap docs should explain the flow to a different next agent."
        - id: onboarding/auth-script
          status: pending
          depends_on:
            - onboarding/bootstrap-docs
          owned_files:
            - scripts/generate-repo-key.sh
            - docs/cheatsheets/github-credential-tools.md
          checkpoint_required: true
          handoff_note: "Cold-start note: auth scripts must follow the remote-first checkpoint policy."

    - id: observability-and-diagnostics
      order: 5
      title: Observability, logging, and evidence surfaces
      status: pending
      deliverable: plan/steps/05-observability.md
      depends_on: [onboarding-and-discovery]
      specs:
        - runtime-logging
        - runtime-diagnostics
        - runtime-diagnostics-stream
        - external-logs-layer
        - observability-convergence
        - spec-traceability
        - knowledge-source-of-truth
        - clickable-trace-index
      exit_criteria:
        - "Logs, traces, and diagnostics are observable without reintroducing stale assumptions."
      tasks:
        - id: observability/runtime-logging
          status: pending
          depends_on:
            - onboarding-and-discovery
          owned_files:
            - openspec/specs/runtime-logging/spec.md
            - cheatsheets/runtime/podman-logging.md
          checkpoint_required: true
          handoff_note: "Cold-start note: logging notes must not assume the same agent will resume."
        - id: observability/diagnostics-stream
          status: pending
          depends_on:
            - observability/runtime-logging
          owned_files:
            - openspec/specs/runtime-diagnostics/spec.md
            - openspec/specs/runtime-diagnostics-stream/spec.md
          checkpoint_required: true
          handoff_note: "Cold-start note: keep stream semantics separate from logging sinks."
        - id: observability/trace-index
          status: pending
          depends_on:
            - observability/diagnostics-stream
          owned_files:
            - openspec/specs/spec-traceability/spec.md
            - docs/convergence/centicolon-dashboard.md
          checkpoint_required: true
          handoff_note: "Cold-start note: trace indices should let another agent resume without rediscovery."
        - id: observability/knowledge-source
          status: pending
          depends_on:
            - observability/trace-index
          owned_files:
            - openspec/specs/knowledge-source-of-truth/spec.md
            - openspec/specs/clickable-trace-index/spec.md
          checkpoint_required: true
          handoff_note: "Cold-start note: source-of-truth specs should be idempotent under repeated updates."

    - id: cross-platform-leftovers
      order: 6
      title: Windows and other cross-platform leftovers
      status: pending
      deliverable: plan/steps/06-cross-platform.md
      depends_on: [observability-and-diagnostics]
      specs:
        - fix-windows-image-routing
        - windows-event-logging
        - wsl-runtime
        - wsl-daemon-orchestration
        - update-system
        - versioning
        - web-image
        - zen-default-with-ollama-analysis-pool
      exit_criteria:
        - "Windows-specific drift is either retired or narrowed to a live implementation gap."
      tasks:
        - id: cross-platform/windows-routing
          status: pending
          depends_on:
            - observability-and-diagnostics
          owned_files:
            - openspec/specs/fix-windows-image-routing/spec.md
            - openspec/specs/windows-event-logging/spec.md
          checkpoint_required: true
          handoff_note: "Cold-start note: do not assume the same agent will carry the Windows tail."
        - id: cross-platform/wsl-runtime
          status: pending
          depends_on:
            - cross-platform/windows-routing
          owned_files:
            - openspec/specs/wsl-runtime/spec.md
            - openspec/specs/wsl-daemon-orchestration/spec.md
          checkpoint_required: true
          handoff_note: "Cold-start note: WSL work is a separate dependency tail from Windows routing."
        - id: cross-platform/versioning-and-image
          status: pending
          depends_on:
            - cross-platform/wsl-runtime
          owned_files:
            - openspec/specs/versioning/spec.md
            - openspec/specs/web-image/spec.md
            - openspec/specs/zen-default-with-ollama-analysis-pool/spec.md
          checkpoint_required: true
          handoff_note: "Cold-start note: keep versioning and image concerns checkpointed together if touched."

    - id: semantic-distillation-sweep
      order: 7
      title: Semantic distillation and tombstone sweep
      status: pending
      deliverable: plan/steps/07-semantic-distillation.md
      depends_on:
        - security-substrate-closure
        - browser-and-web-security
        - tray-runtime-and-cache
        - onboarding-and-discovery
        - observability-and-diagnostics
        - cross-platform-leftovers
      specs:
        - active-specs-with-empty-bindings
        - active-specs-with-historical-purpose-only
      exit_criteria:
        - "All stale specs are obsoleted or tombstoned."
        - "Only intentional implementation gaps remain active."
      tasks:
        - id: distillation/tombstone-sweep
          status: pending
          depends_on:
            - security-substrate-closure
            - browser-and-web-security
            - tray-runtime-and-cache
            - onboarding-and-discovery
            - observability-and-diagnostics
            - cross-platform-leftovers
          owned_files:
            - openspec/specs
            - methodology/event/index.yaml
          checkpoint_required: true
          handoff_note: "Cold-start note: semantic distillation should preserve tombstones and replacement refs."

    - id: implementation-gaps-backlog
      order: 8
      title: Remaining implementation gaps after spec cleanup
      status: pending
      deliverable: plan/steps/08-implementation-gaps.md
      depends_on: [semantic-distillation-sweep]
      specs:
        - remaining_active_specs
      exit_criteria:
        - "The plan switches from cleanup mode to pure implementation mode."
        - "Each remaining active spec has a concrete next patch or test task."
      tasks:
        - id: implementation-gaps/residual-backlog
          status: pending
          depends_on:
            - semantic-distillation-sweep
          owned_files:
            - plan/steps/08-implementation-gaps.md
            - plan/localwork
          checkpoint_required: true
          handoff_note: "Cold-start note: remaining work should now be implementation-first, not cleanup-first."

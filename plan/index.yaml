        be idempotent across container states (running: no-op; otherwise
        run --replace); name-collision 125 must never be Permanent. Pin
        with a unit/litmus on the ensure decision table. The
        operator-facing error rendering was GOOD (structured cause +
        argv + logs via the exit-pause trap) — keep it.

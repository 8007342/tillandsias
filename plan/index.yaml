        - "vault entrypoint classifies an unseal 400 as wrong-key (FATAL log marker) instead of dying on curl -f, and the recovery seam's log classifier is pinned against that marker"
        - "a lane launcher's shared vault lock is bounded or heal-priority exists: an exclusive ensure/heal makes progress within a bounded time while an idle lane is up"
        - "a soak litmus or fixture reproduces the DNAT-loss class (or the publish removal makes it structurally impossible)"

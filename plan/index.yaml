          commit_sha: "807a0950"
          evidence:
            - "fix(container_deps): ensure_git_login skips target node in satisfier loop"
            - "cargo test -p tillandsias-headless container_deps: 10/10 PASS"
            - "./build.sh --check: PASS"
      outcome: >
        ensure_git_login() called ensure_with(Service::GitLogin, ...) which
        calls satisfy() on every node in the dep graph including GitLogin
        itself. The RealSatisfier::satisfy(GitLogin) returns an error because
        GitLogin is a launch target, not a satisfiable prerequisite. Fix:
        iterate the topological order in ensure_git_login and skip the GitLogin
        node (satisfy only its prerequisites).
      exit_criteria:
        - "tillandsias --github-login --debug succeeds when vault and proxy are already running"
        - "cargo test -p tillandsias-headless container_deps all pass"
        - "./build.sh --check passes"


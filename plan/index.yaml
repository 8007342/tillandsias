        Two silent-dead-check traps found while fixing order 243, both in
        scripts/run-litmus-test.sh: (1) a critical_path step's exit code is
        captured but never evaluated — success is judged ONLY by
        success_pattern (when declared) or the expected_behavior heuristic, so
        a patternless step passes even when its command exits 1 (only timeout
        124 fails it); (2) the step parser only extracts single-line
        double-quoted command: values — a folded (>-) multi-line command parses
        to ZERO steps and the file fails as "Check implementation" with no
        diagnostic. Fix both fail-loud: non-zero exit without an explicit
        expectation MUST fail the step, and a critical_path entry whose
        command cannot be extracted MUST name the parse failure (file, line,
        reason) instead of the generic message. Then audit existing litmus
        files for patternless steps whose commands can exit non-zero (they are
        all currently dead checks) and for folded commands (structurally
        failing since authoring).
      exit_criteria:

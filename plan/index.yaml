    - packet_id: git-mirror-relay-fetch-before-push
      order: 413
      title: "Git mirror: relay-refs.sh must fetch upstream BEFORE pushing, not just after failure"
      status: completed
      kind: bugfix
      deliverable: images/git/relay-refs.sh
      depends_on: []
      pickup_role: linux
      owner_host: linux
      capability_tags: [git, git-mirror, relay, correctness]
      estimated_hours: 1
      desired_release: v0.5
      release_target: forge-local-experts-milestone
      outcome: >
        On a clean host with fresh OAuth tokens, `git push origin linux-next`
        from the forge was rejected with non-fast-forward. Root cause:
        relay-refs.sh does `git push --atomic` FIRST and only fetches to
        reconcile AFTER failure (line 87-106). The mirror's tracking refs
        were stale relative to GitHub because another host had pushed in the
        interval. The startup retry loop in entrypoint.sh (line 182) DOES
        fetch before pushing, but the live relay path — which handles every
        normal forge push — does not. On a clean host with valid tokens, a
        push should never fail due to stale mirror state. The fix is a
        `git fetch origin` before the `git push --atomic` in relay-refs.sh,
        gated on HTTPS upstream (git:// daemon doesn't need it). This is a
        configuration that should not require guessing.
      exit_criteria:
        - "relay-refs.sh fetches upstream before pushing when remote is HTTPS"
        - "on a clean host with fresh tokens, `git push origin linux-next` succeeds on first attempt"
        - "litmus or fixture proving relay does not reject on stale mirror state"
      events:
        - type: filed
          ts: "2026-07-18T05:30:00Z"
          agent_id: "linux-forge-opencode-20260718T0509Z"
          host: forge
          summary: >
            Observed during meta-orchestration cycle: push to mirror succeeded
            but relay to GitHub failed non-fast-forward (mirror tracking stale).
            Clean host, fresh tokens — the relay should have fetched first.
            Prior order 369 (git-mirror-pre-reconcile-impl) added reconcile
            AFTER failure but not fetch BEFORE push. The startup path
            (entrypoint.sh:182) already fetches before retry-push; the live
            relay path must do the same.
        - type: progress
          ts: "2026-07-18T05:55:00Z"
          agent_id: "linux-forge-opencode-20260718T0509Z"
          host: forge
          summary: >
            Implementation committed (b49b7776): pre-push fetch added to
            relay-refs.sh before the atomic push, using plain git fetch
            (no custom refspec) to safely update remote tracking branches.
            Post-failure reconcile also switched from dangerous
            refs/heads/*:refs/heads/* to plain git fetch. Running mirror
            container still has old code — fix takes effect on next
            container restart. Push to GitHub rejected (same stale-mirror
            class) because the fix is in the repo but not yet in the
            running container.

    - packet_id: git-mirror-relay-token-renewal
      order: 414
      title: "Git mirror: renew the mirror's AppRole vault-token before its 1h TTL, and diagnose an expired mirror token distinctly from an absent GitHub token"
      status: completed
      kind: bugfix
      deliverable: images/git/entrypoint.sh, images/git/relay-refs.sh, images/git/vault-cli.sh
      depends_on: []
      pickup_role: linux
      owner_host: linux
      capability_tags: [git, git-mirror, relay, vault, credentials, correctness]
      estimated_hours: 2
      desired_release: v0.5
      release_target: forge-local-experts-milestone
      supersedes_issue: plan/issues/blocker-git-mirror-relay-token-expiry-2026-07-18.md
      note: >
        The blocker doc that root-caused this (0f1deba9) labeled it "proposed
        order 412", but 412 was already claimed by forge-base-cli-utils-gap in
        the ledger; promoted here as 414 (next free order).
      outcome: >
        The git-mirror container's own AppRole vault-token has a 1h default TTL
        (APPROLE_TOKEN_TTL_SECS=3600) and a 24h max TTL. The shared mirror
        container outlives 1h, but nothing renewed the token, so every forge
        session past the first hour silently lost push capability: the relay's
        `vault-cli read secret/github/token` 403'd, the `2>/dev/null || true`
        swallowed it, TOKEN="", and the push was rejected as "run GitHub Login"
        — a FALSE error, because the GitHub token in Vault was valid and
        push-capable the whole time. Operators chased a credential that was
        fine. This bug hid behind the (recovered) order-413 fetch-before-push
        fix and turned unattended forge cycles past 1h into lost work.
      fix: >

      outcome: >
        build.sh:63 runs `require_podman || exit 1` unconditionally, before
        argument parsing even happens, so every invocation — including
        --check, --test, plain debug builds, --install (alone), and
        --clean/--wipe/--remove — pays a hard Podman-connectivity
        requirement none of their own work needs. Traced every Podman
        touchpoint in build.sh: every other call (dev-cache proxy setup,
        registries config, all 3 image-prune calls) already degrades
        gracefully (warn + continue); the only flag with a genuine,
        unconditional Podman need is --init. --ci/--ci-full/--release
        delegate to scripts/local-ci.sh, which already calls require_podman
        itself at the 4 specific points that need it — so the build.sh-level
        gate is redundant for those paths too, not just overly broad for the
        others. Fix: remove the top-level gate, add an explicit
        require_podman guard immediately before the --init block only, leave
        --ci/--ci-full/--release alone (already correctly self-guarded via
        local-ci.sh). This generalizes the narrower macOS-only symptom fixed
        in order 201/macos-build-check-podman-wrapper — that fix made
        require_podman itself succeed again on macOS, but any host with a
        stopped/misconfigured Podman daemon still hits this same

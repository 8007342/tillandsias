      title: "Guest image build: self-heal once from corrupt overlay store instead of permanent 125"
      status: completed
      kind: bug
      deliverable: crates/tillandsias-headless/src/main.rs
      depends_on: []
      pickup_role: linux
      capability_tags: [rust, headless, podman, image-build, robustness]
      estimated_hours: 4
      outcome: >
        Observed live 2026-07-10 (macOS overnight cycle 3, PTY debug tee +
        --exec-guest probe, no ssh): a --github-login attach's git-image
        build died with `status 125, retry Permanent` — `creating
        read-write layer ...: Stat /var/lib/containers/storage/overlay/
        <hash>/diff: no such file or directory`. The overlay store
        references a layer whose diff dir is gone (classic killed-build
        artifact — the corruption order 270 produces when a PTY close reaps
        an in-VM build). `retry Permanent` means EVERY later login/attach
        fails forever because the git image can never build; only a full
        destructive re-provision recovers. Order 270 reduces the corruption
        RATE (build survives PTY loss) but does not REPAIR an existing
        corrupt store. Fix: in the guest image-build error path, classify
        the corrupt-overlay signature (missing diff / "no such file or
        directory" on an overlay layer) and self-heal ONCE — podman system
        reset --force (or a scoped prune of the broken layer) then a single
        rebuild retry — guarded against reset loops (at most one recovery
        per build invocation). Put the destructive reset behind a trait seam
        so a unit test can pin the classify + one-shot-recovery decision
        without a real podman. Full evidence:
        plan/issues/guest-podman-overlay-corruption-no-selfheal-2026-07-10.md.
      exit_criteria:
        - "corrupt-overlay build error triggers exactly one reset+rebuild attempt, then succeeds or fails loud (unit test on the decision)"
        - "a non-corruption build failure is NOT retried (no blanket retry regression)"
        - "reset-loop guard: at most one self-heal per build invocation (unit test)"

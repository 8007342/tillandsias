    - packet_id: sidecar-containerfile-base-split-research
      order: 221
      title: "Research: would git/proxy/vault/inference benefit from a Containerfile.base + Containerfile split like default-image?"
      status: done
      kind: research
      deliverable: plan/issues/forge-image-creation-vs-firstrun-split-research-2026-07-04.md
      depends_on: []
      pickup_role: linux
      capability_tags: [research, podman, images]
      estimated_hours: 1
      outcome: >
        images/default/ splits into Containerfile.base (heavy, stable,
        rarely-changing microdnf install layer) + Containerfile (thin,
        rapidly-iterated config/entrypoint layer built FROM the base) so
        editing entrypoints/config doesn't force a full toolchain reinstall.
        Check whether images/git, images/proxy, images/vault, and
        images/inference (each currently a single monolithic Containerfile)
        would benefit from the same split. A quick audit this cycle found:
        all 4 are already small (43-82 lines), install packages via their
        native package manager in ONE RUN layer BEFORE any COPY of
        frequently-changing files (correct Podman layer-cache ordering
        already), and none has a heavy/fragile toolchain or curl/tar chain
        like the pre-split forge image did. Confirm this holds (measure
        actual rebuild times touching only entrypoint.sh vs. the package
        layer) and record a decision: split, or explicitly close as
        not-worth-it with the measured evidence.
      events:
        - type: completed
          ts: "2026-07-06T22:05:00Z"
          agent_id: "linux-macuahuitl-sonnet5-20260706T2059Z"
          host: linux
          commits: []
          summary: >
            Measured real rebuild times via the actual operator build path
            (scripts/build-image.sh <img> --force) after appending a genuine
            content change to each image's entrypoint.sh (a bare `touch`
            doesn't change content-hash and gets skipped by the script's own
            staleness check before podman build even runs — had to correct
            for that after an initial false-fast reading). Results:
            git 2.6s, proxy 2.0s, inference 1.8s — all three genuinely
            re-invoke podman build (confirmed via "Force rebuild requested"
            + a fresh content-hash tag) and still land in ~2 seconds, meaning
            Podman correctly reuses the cached apk/microdnf package-install
            layer (it sits BEFORE the changed COPY entrypoint.sh in all 3
            Containerfiles) without needing network. Decision: CONFIRMED
            NOT WORTH IT — splitting these into a Containerfile.base +

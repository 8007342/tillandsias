    - packet_id: forge-credential-guard-mirror-reachability
      order: 173
      title: "Credential guard: verify forge mirror reachability (stop ok:forge-git-mirror false-positive)"
      status: done
      kind: bug+guardrail
      deliverable: plan/issues/forge-shared-host-checkout-mirror-alias-2026-07-04.md
      depends_on: []
      pickup_role: linux
      capability_tags: [forge, git, testing, litmus, automation]
      estimated_hours: 2
      outcome: >
        scripts/check-credential-channel.sh returned ok:forge-git-mirror merely
        because TILLANDSIAS_HOST_KIND=forge was set, without verifying the mirror
        could reach the repo. That false-positive made a Codex forge cycle accrete
        a commit it could never push (the exact velocity-killer the guard exists to
        prevent). Now the forge branch probes the mirror (git ls-remote origin,
        timeout 10, fixture seam TILLANDSIAS_CRED_SKIP_MIRROR_PROBE=1); an
        unreachable mirror emits missing:no-credential-channel (rc 1) with a stderr
        reason. Two new steps in litmus:credential-channel-check-shape pin it
        (forge-unreachable-fails-closed + forge-seam-trusts-env). Distinct from the
        credential QUARANTINE (order 170), which masks host creds in the forge.
      exit_criteria:
        - "forge + unreachable mirror -> missing:no-credential-channel, rc 1 (litmus green)"
        - "forge + reachable mirror (or fixture seam) -> ok:forge-git-mirror, rc 0"
        - "existing grammar + no-channel branch litmus steps still pass"
      events:
        - type: completed
          ts: "2026-07-04T02:15:00Z"
          agent_id: "linux-yoga-fable5-20260704T0211Z"
          summary: >

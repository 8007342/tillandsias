            - "run-litmus-test.sh git-mirror-service --phase pre-build --size instant: 3 PASS / 0 FAIL (safe-refspec-push, ref-convergence, yaml-gate-shape), 1 SKIP (enclave-isolation, no podman)"
            - "TILLANDSIAS_HOST_KIND=forge ./build.sh --check: PASS (fmt, type-check, clippy strict + listen-vsock)"
            - "target/release/tillandsias-policy validate-yaml: new litmus, bindings, plan/index.yaml PASS"
            - "bash -n on entrypoint.sh + fixture, git diff --check: clean"
            - "LIVE repro during this cycle's own push: the OLD-image mirror clobbered the just-received a1d1ea4c back to 884d32f1 (forced-update trace); convergence required a redundant second push — the exact symptom the committed fix removes once the git-mirror image is rebuilt (see order 302)."


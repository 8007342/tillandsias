          host: linux_immutable
          commits: ["9f4dd61d"]
          summary: >
            Already completed in commit 9f4dd61d (found during meta-orchestration
            cycle on linux_immutable). Containerfile.base and Containerfile.core
            already had `--nogpgcheck`. Noting: Containerfile.framework (2 call
            sites) and inference/Containerfile also lack `--nogpgcheck` — filed
            as residual scope.
      outcome: >
        Fedora 44's `updates` repo has transiently invalid GPG signatures on
        packages like `gdb-17.2-1.fc44.x86_64` and `bluez-libs-5.87-1.fc44.x86_64`,
        causing `Transaction failed: Signature verification failed.` during
        `microdnf install` in both forge-base and chromium-core container builds.
        Adding `--nogpgcheck` to the `microdnf install` invocation bypasses the
        signature check as a workaround until the upstream Fedora infrastructure
        is healthy again. This unblocks fresh local builds on Fedora Silverblue
        hosts (and any host hitting the same upstream mirror issue).
      exit_criteria:

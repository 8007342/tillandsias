            (`current_step_command="${current_step_command//\\\\/\\}"`)
            after the existing `\"` -> `"` pass, in that order — this
            reproduces a real YAML parser's left-to-right escape
            consumption for combined `\\`/`\"` sequences (verified
            mechanically against several test cases before landing).

plan_index:
  version: v1
  root: plan/
  default_status_values:
    - pending
    - ready
    - in_progress
    - blocked
    - needs_clarification
    - completed
    - obsoleted

  selection_policy:
    primary_rule: >
      Pick the highest-impact ready packet that matches the host's capability
      and can produce coherent evidence in one or two recurrent iterations.
    fallback_rule: >
      If the selected packet is blocked or needs clarification, pick the named
      fallback_when_blocked packet or the next independent ready packet instead
      of waiting on the blocker.
    update_rule: >
      When a step completes, update its status, write the evidence summary to
      its deliverable, checkpoint the current state to origin/linux-next, and
      then promote the next eligible pending step to ready.
    canonical_work_loop_skill: skills/advance-work-from-plan/SKILL.md
    # Every agent on every host SHOULD invoke `/advance-work-from-plan` (or the
    # equivalent skill load) for each work cycle instead of pasting a long-form
    # prompt. The skill is a single committed file; orchestrators can edit it
    # between iterations to steer remote agent work. See methodology.yaml
    # `shared_skills.advance-work-from-plan` for the registry entry.

  graph_policy:
    model: dag
    selection_rule: >
      Pick the largest coherent ready leaf packet whose claimed file scope is
      free and whose evidence can be produced by the current host. If a leaf is
      claimed or overlaps a claim, skip to the next ready packet rather than
      waiting. Dependency tails should be preferred when they unlock downstream
      work on another host.
    metrics_policy:
      tracking_requirements:
        - "Track total counts: pending, ready, in_progress, blocked, completed."
        - "Calculate block duration: time elapsed since the `blocked` event was recorded."
        - "Construct blocking tree: identify upstream root blockers with the longest downstream chains."
        - "Prioritize unblocking: root blockers in the tree MUST be resolved first, even if the node seems minor, to unlock subsequent work waves."
    claim_rule: >
      Claims are leases on file scope and graph node scope. Claims are
      idempotent by graph_node_id plus lease_id. Repeated claims must converge.
    update_rule: >
      Reapplying the same graph node update_id is a no-op. Stale updates are
      preserved as history but must not change the current canonical state.
    refinement_notes: >
      If a task uncovers ambiguity, write the refinement note to
      ./plan/issues/<graph-node-id>.md or ./methodology/event/<event-id>.yaml
      instead of keeping it only in chat. Those files are the durable handoff
      queue for future agents.
    scratch_root: plan/localwork
    step_file_template: plan/steps/README.md

  checkpoint_policy:
    branch: linux-next
    cadence: "after every meaningful batch, before context switches, and before stopping for the day"
    allowed_state: "incomplete work is acceptable if the checkpoint is coherent"
    commit_message:
      subject: "checkpoint(<scope>): <specific progress>"
      body:
        - what changed
        - what remains incomplete
        - what was verified
        - what is blocked
        - next intended action
    push_rule: "push each checkpoint to origin/linux-next immediately after commit when possible"
    lease_note: >
      A checkpoint should be understandable after the current agent terminates;
      do not rely on the same terminal or the same agent resuming.


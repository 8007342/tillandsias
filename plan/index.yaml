    - packet_id: git-mirror-fetch-clobbers-exported-ref
      order: 301
      title: "Git mirror: prevent relay fetch from clobbering just-received exported refs"
      status: done
      kind: bug+test
      deliverable: plan/issues/git-mirror-fetch-clobbers-exported-ref-2026-07-12.md
      depends_on: []
      pickup_role: linux
      capability_tags: [git-mirror, forge, shell, litmus]
      estimated_hours: 2
      outcome: >
        The mirror config maps origin fetches directly onto refs/*, and the
        post-receive hook fetches origin after receive-pack has installed a new
        exported branch. A stale upstream branch therefore overwrites the
        just-received mirror ref before the hook relays its captured NEWSHA,
        leaving GitHub advanced and the mirror stale until an identical second
        push. Fetch upstream branches into refs/remotes/origin/*, retain an
        explicit local heads/tags refspec only for empty-mirror seeding, and pin
        push plus startup-retry convergence with an offline two-bare-repo fixture.
      exit_criteria:
        - "one push leaves the mirror and upstream advertising the same SHA"
        - "startup retry preserves and forwards a locally stranded commit"
        - "empty-mirror seeding still yields cloneable local heads and tags"
        - "litmus:git-mirror-ref-convergence reproduces push and retry cases without network or Podman"
        - "existing safe-refspec and YAML-gate litmuses remain green"

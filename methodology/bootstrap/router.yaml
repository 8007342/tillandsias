trace: spec:methodology-accountability

bootstrap_router:
  version: v0.1
  purpose: >
    Give an agent the shortest correct methodology read set for its immediate
    task. The agent MUST choose exactly one intent before editing or executing a
    nontrivial command.

  entry_rule:
    choose: exactly_one
    source: intent_options
    coverage: total
    if_multiple_fit: >
      Choose the intent that matches the requested deliverable, not every possible
      concern. If still tied, choose the earlier option in intent_order.
    if_none_fit: nil_noop_unsolved
    determinism: >
      Given the same user request, repository state, and router version, agents
      should select the same intent. Roles add context; they do not change the
      selected intent.
    intent_order:
      - code_implementation
      - bug_fix
      - test_or_automation
      - spec_authoring
      - litmus_authoring
      - cheatsheet_authoring
      - release_or_deployment
      - multi_agent_orchestration
      - documentation
      - methodology_refinement
      - unknown_capture
      - investigation_only
      - nil_noop_unsolved
  required_first_read:
      - methodology.yaml
      - methodology/bootstrap/router.yaml

  bootstrap_runbook:
    purpose: >
      Minimal entry sequence for an autonomous session. A scheduler or user may
      start the loop with "/skills bootstrap"; the agent then reads methodology.yaml,
      selects one intent, and follows the convergence loop until the highest
      residual obligation is reduced or the spec needs clarification.
    steps:
      - step: "Read methodology.yaml first."
        why: "It is the authoritative bootstrap entry point and names the router."
      - step: "Read methodology/bootstrap/router.yaml second."
        why: "It selects exactly one intent and prevents scattershot work."
      - step: "If present, read plan.yaml and plan/index.yaml next."
        why: "The repo-local plan queue is the current work graph, claim map, and checkpoint contract."
      - step: "If present, read plan/steps/README.md before any step file."
        why: "The step template defines the cold-start handoff format and idempotent update expectations."
      - step: "Read the intent-specific methodology files listed below."
        why: "This narrows context to the governing rules for the task."
      - step: "Audit the active spec against bound cheatsheets and referenced docs."
        why: "Specs are the source of intent; cheatsheets and docs validate the intent."
      - step: "Check tombstones and obsolete requirements before changing code."
        why: "Do not resurrect retired behavior or keep dead requirements alive."
      - step: "Identify the minimal failing chain."
        why: "Prefer the shortest useful sequence, such as `--ci-full`, `--install`, `--init --debug`, or `--status-check`, that reproduces the offender and emits a traceable log trail."
      - step: "Select the largest residual obligation or worst drift signal."
        why: "Prioritize minimax convergence, not easy wins."
      - step: "Make the smallest change that reduces that residual."
        why: "Minimize uncertainty while preserving verified invariants."
      - step: "Run the failing chain again, then the nearest adjacent litmus."
        why: "Validate that the change reduced drift without opening a new gap and keep the log chain intact for troubleshooting."
      - step: "If the spec is incomplete or ambiguous, refine the spec/methodology first."
        why: "Intent changes belong in spec and methodology, not ad hoc code guesses."
      - step: "Repeat until the residual plateaus or the next highest obligation changes."
        why: "Autonomy should be iterative, observable, and monotonic."

  autonomous_session_contract:
    bootstrap_command: "/skills bootstrap"
    operator_note: >
      The command is intentionally minimal. The agent should use the bootstrap
      router to expand into the smallest correct read set, then proceed with the
      convergence loop without re-deriving host configuration or intent.
    schedule_ready: true
  human_async_mode: >
    Humans may update specs asynchronously while the loop runs; the next
    scheduled session should re-read methodology.yaml and the affected specs
    before resuming work. The session should preserve the troubleshooting chain
    from `--init --debug` and `--status-check` so the next pass can continue from
    the last meaningful failure boundary.

  receipt:
    required_before_source_edits: true
    fields:
      - selected_intent
      - active_roles
      - files_read
      - governing_specs_or_traces
      - missing_or_conflicting_references
      - intended_change_scope
      - verification_plan

  intent_options:
    code_implementation:
      choose_when: "User asks to implement or change behavior."
      roles:
        - code_author
        - spec_reader
      read:
        - methodology/spec-system.yaml
        - methodology/ci.yaml
        - methodology/litmus.yaml
      done_when:
        - code_change_matches_governing_spec
        - traces_or_structured_spec_fields_updated_when_needed
        - local_verification_attempted

    bug_fix:
      choose_when: "User asks to diagnose and fix incorrect behavior."
      roles:
        - code_author
        - test_author
        - unknown_triager
      read:
        - methodology/spec-system.yaml
        - methodology/ci.yaml
        - methodology/litmus.yaml
        - methodology/event/index.yaml
      done_when:
        - root_cause_named
        - regression_or_litmus_path_considered
        - unknown_event_created_if_model_was_wrong

    test_or_automation:
      choose_when: "User asks to run, add, or repair tests, CI, scripts, or automation."
      roles:
        - test_author
        - ci_operator
      read:
        - methodology/ci.yaml
        - methodology/litmus.yaml
      done_when:
        - command_or_test_result_reported
        - failures_linked_to_spec_or_unknown

    spec_authoring:
      choose_when: "User asks to create, revise, split, archive, or validate specs."
      roles:
        - spec_author
        - evidence_curator
      read:
        - methodology/spec-system.yaml
        - methodology/litmus.yaml
        - methodology/verification.yaml
        - methodology/provenance.yaml
      done_when:
        - requirements_are_measurable
        - sources_of_truth_are_bound
        - litmus_status_is_declared

    litmus_authoring:
      choose_when: "User asks to create or refine executable decision boundaries."
      roles:
        - litmus_author
        - test_author
      read:
        - methodology/litmus.yaml
        - methodology/spec-system.yaml
        - methodology/proximity.yaml
        - openspec/litmus-bindings.yaml
      done_when:
        - positive_and_negative_signals_considered
        - spec_binding_updated_or_gap_declared

    cheatsheet_authoring:
      choose_when: "User asks to create, refresh, compact, or validate cheatsheets."
      roles:
        - cheatsheet_curator
        - evidence_curator
      read:
        - methodology/cheatsheets.yaml
        - methodology/provenance.yaml
        - methodology/spec-system.yaml
      done_when:
        - provenance_is_current_or_draft_state_is_explicit
        - spec_bindings_are_preserved

    release_or_deployment:
      choose_when: "User asks to release, version, deploy, publish, or push to prod."
      roles:
        - release_operator
        - ci_operator
      read:
        - methodology/versioning.yaml
        - methodology/verification.yaml
        - methodology/proximity.yaml
        - methodology/ci.yaml
      done_when:
        - evidence_bundle_level_named
        - centicolon_projection_requirement_checked
        - version_or_deployment_state_is_traceable

    multi_agent_orchestration:
      choose_when: "User asks to coordinate background agents or batch work."
      roles:
        - orchestrator
        - event_recorder
      read:
        - methodology/between-commits-work-discipline.yaml
        - methodology/agent-observability.yaml
        - methodology/ci.yaml
        - plan.yaml
        - plan/index.yaml
        - plan/steps/README.md
      done_when:
        - handoff_or_event_state_is_queryable
        - agent_outputs_do_not_depend_on_hidden_memory

    documentation:
      choose_when: "User asks to update docs without changing behavior or specs."
      roles:
        - doc_author
        - evidence_curator
      read:
        - methodology/spec-system.yaml
        - methodology/cheatsheets.yaml
        - methodology/provenance.yaml
      done_when:
        - docs_do_not_redefine_methodology
        - source_or_spec_links_are_current

    methodology_refinement:
      choose_when: "User asks to change the methodology itself."
      roles:
        - methodology_author
        - evidence_curator
        - math_reviewer
      read:
        - methodology/catalog.yaml
        - methodology/philosophy.yaml
        - methodology/provenance.yaml
        - methodology/math-foundations.yaml
        - methodology/proximity.yaml
        - methodology/event/index.yaml
      done_when:
        - semantics_are_preserved_or_tombstoned
        - provenance_or_math_boundary_updated_when_needed
        - bootstrap_router_stays_short

    unknown_capture:
      choose_when: "Task intent is unclear, surprising, or contradicts known methodology."
      roles:
        - unknown_triager
        - evidence_curator
      read:
        - methodology/event/index.yaml
        - methodology/provenance.yaml
        - methodology/spec-system.yaml
      done_when:
        - unknown_is_recorded_or_reclassified
        - next_distillation_target_is_named

    investigation_only:
      choose_when: "User asks for analysis, audit, review, or explanation without edits."
      roles:
        - investigator
        - evidence_curator
      read:
        - methodology/catalog.yaml
        - methodology/verification.yaml
        - methodology/provenance.yaml
      done_when:
        - findings_are_evidence_linked
        - edit_scope_is_not_started_without_new_request

    nil_noop_unsolved:
      choose_when: >
        The request is empty, impossible in the current environment, unsafe to
        execute, explicitly asks for no action, or cannot be classified after
        reading this router.
      roles:
        - unknown_triager
      read:
        - methodology/event/index.yaml
      done_when:
        - no_op_or_blocker_is_reported
        - unknown_event_created_if_the_gap_teaches_methodology_something
        - no_source_edit_performed_without_reclassification

  role_file_matrix_ref: methodology/bootstrap/roles.yaml

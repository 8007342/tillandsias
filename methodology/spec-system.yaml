
spec_system:
  version: v0.1

  philosophy:
    principle: >
      Monotonic reduction of uncertainty under verifiable constraints.
    definition: >
      A spec is a constraint system that MUST converge toward a precise, executable
      behavioral contract. Every modification MUST reduce behavioral ambiguity,
      preserve validated invariants unless superseded through the bounded uncertainty
      exception, and increase or preserve verifiability.

  modality:
    allowed:
      MUST:
        meaning: "absolute requirement; violation is failure"
      MUST_NOT:
        meaning: "absolute prohibition; violation is failure"
      SHOULD:
        meaning: "strong recommendation; deviation must be justified"
      SHOULD_NOT:
        meaning: "discouraged; deviation must be justified"
      MAY:
        meaning: "optional behavior"
    enforcement:
      - MUST_and_MUST_NOT_require_litmus_validation
      - SHOULD_requires_rationale_if_not_followed

  spec:
    id_format: "<domain>.<capability>.<intent>@<version>"
    example: "auth.login.validate-credentials@v3"
    storage: "/openspec/specs/<capability>/spec.md"

    versioning:
      rules:
        - version_bump_required_on_semantic_change
        - version_must_reference_previous
        - no_mutation_of_past_versions

    lifecycle:
      states:
        - draft: "spec being written; not yet active"
        - active: "spec is canonical and binding; code must implement"
        - deprecated: "spec is superseded; migration path provided"
        - obsolete: "spec is removed; retention window expired"
      transitions:
        - draft_to_active_requires_L1_verification
        - active_to_deprecated_requires_replacement
        - deprecated_to_obsolete_requires_sunset

    structure:
      id: string
      version: string
      status: [draft, active, deprecated, obsolete]

      requirements:
        - id: string
          statement: string
          modality: [MUST, MUST_NOT, SHOULD, SHOULD_NOT, MAY]
          measurable: boolean
          invariants_ref: list

      invariants:
        - id: string
          expression: string
          measurable: true
          immutable_after_verification: true

      bindings:
        trace:
          required: true
          format: "@trace spec:name"
        litmus:
          required: true
          tests: list
        cheatsheets:
          required: true
          refs: list

      ambiguity:
        score: integer
        allowed: 0
        detection:
          - multiple_externally_distinct_valid_behaviors
          - undefined_edge_cases
        enforcement:
          - fail_if_score_above_zero

    rules:
      - spec_ids_must_be_stable
      - version_bumps_only_on_semantic_change
      - no_orphan_specs_in_ci
      - no_cycles_in_replaces_graph

  drift_control:
    rules:
      - spec_change_must_reduce_ambiguity
      - spec_change_must_not_remove_validated_invariant_without_exception
      - spec_change_must_increase_or_preserve_verification_level
      - code_changes_must_follow_verified_spec_intent
      - spec_soundness_must_be_audited_before_code_change
    detection:
      - compare_previous_and_current_spec
      - flag_if_uncertainty_increases
    action:
      - reject_change_or_require_bounded_uncertainty_exception

  spec_to_code_workflow:
    purpose: >
      Specs are the source of intent. Code is the artifact produced by the
      intersection of active specs, validated cheatsheets, and verified API docs.
    stages:
      - stage: intent_audit
        question: "What does the active spec actually require?"
        inputs:
          - active_spec
          - spec_tombstones
          - related_cheatsheets
          - referenced_api_docs
        output: "verified intent statement"
      - stage: soundness_check
        question: "Is the spec complete, non-ambiguous, and tombstone-consistent?"
        inputs:
          - active_spec
          - methodology
          - verification_rules
        output: "soundness verdict"
      - stage: minimax_target_selection
        question: "What is the largest remaining residual obligation?"
        inputs:
          - ci_full_signal
          - litmus_failures
          - centicolon_residuals
        output: "next target"
      - stage: minimal_reduction
        question: "What is the smallest code or spec change that reduces the target?"
        inputs:
          - current_code
          - verified_intent
          - cheatsheet_idioms
        output: "candidate patch"
      - stage: revalidation
        question: "Did the patch reduce drift without introducing new uncertainty?"
        inputs:
          - same_litmus
          - adjacent_litmus
          - traceability_check
        output: "pass/fail and residual delta"

  ambiguity_detection:
    rule: >
      If two or more externally distinct behaviors satisfy all requirements and litmus
      tests, and the difference matters to users, safety, persistence, interoperability,
      or downstream contracts, the spec is behaviorally ambiguous.
    action:
      - block_spec_activation
      - require_additional_invariants
    taxonomy:
      behavioral_ambiguity: >
        Observable outcomes differ in a contract-relevant way while all tests still pass.
      implementation_latitude: >
        Internal algorithms, data structures, or performance strategies differ while
        preserving the same externally specified behavior. This is allowed.
      missing_edge_case_contract: >
        Inputs, failures, ordering, timeouts, or environment assumptions are not specified
        well enough to build a falsifiable litmus signal.
    non_ambiguity: >
      Multiple correct implementations are acceptable when they produce equivalent
      observable behavior under the spec's declared contract and evidence scope.

  bounded_uncertainty_exception:
    description: >
      A controlled path for cases where new evidence shows that a previous invariant,
      litmus test, or requirement was wrong or incomplete. This path prevents the
      monotonicity rule from forcing retention of false certainty.
    required_fields:
      issue_or_rfc: string
      affected_specs: list
      prior_invariant_or_requirement: string
      new_evidence_bundle: string
      risk_owner: string
      migration_window: string
      rollback_plan: string
    rules:
      - exception_is_temporary
      - old_truth_is_marked_superseded_not_silently_deleted
      - verification_level_may_drop_only_with_explicit_rationale
      - exit_requires_updated_litmus_trace_and_cheatsheet_bindings

  crdt_properties:
    type: "semantic_merge_with_crdt_preconditions"
    merge:
      strategy: "semantic_merge"
      rules:
        - preserve_verified_invariants
        - prefer_higher_verification_level
        - reject_conflicting_requirements
    compaction:
      rule: >
        Historical states are compressed into invariant-preserving canonical form.
    constraints:
      - no_unbounded_growth
      - no_loss_of_verified_truth
      - crdt_claim_requires_stable_ids_tombstones_deterministic_join_and_property_tests

  temporal_model:
    history_source: "git"
    behavior:
      - past_versions_are_read_only
      - agents_may_read_past_versions_for_context
      - only_latest_version_is_active_truth
    compression:
      method: "semantic_distillation"
      invariant: "current_spec_contains_all_valid_truth"

  constraints:
    - spec_complexity_must_be_less_than_code_complexity
    - all_spec_elements_must_be_machine_parsable
    - no_free_text_without_binding
    - no_requirement_without_measurement
    - specs_must_be_minimal_and_precise
    - annotations_must_be_enforced_not_advisory
    - deletion_and_compaction_must_be_automatic


philosophy:
  core_principle: >
    Monotonic reduction of uncertainty under verifiable constraints.

  system_model: >
    A closed-loop system where specs define intent, cheatsheets provide compressed knowledge,
    code implements behavior, traces provide evidence, litmus tests define decision boundaries,
    and CI enforces correctness and convergence.

  invariants:
    - cheatsheet_size_bounded: true
    - spec_stability_required: true
    - verification_claims_must_be_falsifiable: true
    - convergence_requires_stability: true
    - evidence_is_not_proof: true

  global_invariants:
    - no_behavioral_ambiguity_allowed
    - all_requirements_must_be_testable
    - all_specs_must_bind_to_litmus
    - all_specs_must_bind_to_trace
    - spec_changes_must_reduce_uncertainty_or_enter_bounded_exception
    - validated_invariants_are_stable_until_superseded_by_stronger_evidence
    - spec_is_source_of_truth_not_code
    - convergence_claims_must_cite_evidence_bundle

layers:
  - name: spec
    description: >
      Canonical, versioned, machine-verifiable definition of intent and constraints.

  - name: cheatsheet
    description: >
      Compressed, curated, adaptive knowledge cache with provenance and metrics.

  - name: code
    description: >
      Rust implementation annotated with attributes enforcing observability and traceability.

  - name: trace
    description: >
      Runtime evidence linking implementation to spec and knowledge sources.

  - name: litmus
    description: >
      Executable decision boundaries for correctness.

  - name: metrics
    description: >
      Signals derived from execution (hits, misses, verification levels).

  - name: evidence_bundle
    description: >
      Queryable set of spec versions, artifact hashes, commits, litmus runs,
      trace coverage, environment profile, and dependency locks that supports a
      convergence claim without pretending to prove absolute correctness.

  - name: provenance
    description: >
      Auditable source graph for methodology claims, specs, cheatsheets, and
      evidence bundles. Provenance records why a claim is trusted, what it depends
      on, and how it can be falsified.

  - name: unknown_event
    description: >
      Structured intake record for observations the current methodology did not
      predict. Unknown events preserve surprises until semantic distillation
      updates a durable spec, litmus, cheatsheet, trace, or methodology artifact.

  - name: proximity
    description: >
      CentiColon residual-obligation scoring. Proximity reports how much named,
      auditable correctness work remains; it is not proof of correctness.

  - name: ci
    description: >
      Global validator enforcing invariants, detecting drift, and applying selection pressure.

evidence_boundaries:
  principle: >
    Traceability, version matching, litmus success, and CRDT metadata convergence
    are evidence. They are not proof of semantic correctness by themselves.

  claim_strength:
    provenance: "artifact, spec, and commit can be linked"
    structural: "schemas, annotations, bindings, and dependency locks are valid"
    behavioral: "litmus tests exercise the claimed behavior and pass"
    operational: "runtime traces show the behavior remains stable under observed conditions"

  rule: >
    A convergence claim MUST name its highest supported claim strength and cite the
    evidence bundle that supports it.

  methodology_rule: >
    A methodology claim MUST cite a provenance claim or be treated as an explicit
    assumption until proven by external source, repository evidence, or litmus signal.

pitfalls:
  - cheatsheet_entropy_growth_without_bounds:
      description: >
        Cheatsheets expand to answer every question without being compacted,
        becoming unwieldy and losing canonical status.
      mitigation: Enforce automatic compaction, bounded size limits.

  - spec_ambiguity_causing_oscillation:
      description: >
        Behaviorally ambiguous specs permit externally meaningful differences
        that tests cannot distinguish, causing code to oscillate during refactoring.
      mitigation: Behavioral ambiguity score must be 0 before spec activation.

  - implementation_freedom_misclassified_as_ambiguity:
      description: >
        A spec can be precise while allowing multiple internal implementations.
        Treating every implementation difference as ambiguity over-constrains the
        system and blocks useful optimization.
      mitigation: >
        Distinguish behavioral ambiguity from acceptable implementation latitude.
        Only observable differences that matter to the contract require new invariants.

  - multi_api_semantic_collision_without_binding:
      description: >
        A single identifier (e.g., "read") means different things in different contexts
        (file I/O, network, database). Annotations don't disambiguate.
      mitigation: #[grounded_by] explicitly disambiguates across APIs.

  - agents_gaming_metrics:
      description: >
        Agents hardcode success to game litmus tests or cheatsheet scores,
        creating false convergence signals.
      mitigation: >
        Mutation testing, code review, and mutation analysis verify tests
        actually touch the code they claim to validate.

  - divergence_between_spec_and_code:
      description: >
        Code drifts from spec intent over time without detection because
        litmus tests pass but only exercise happy paths.
      mitigation: >
        Negative testing (failure path validation), temporal stability checks,
        repeated test runs to detect flakiness.

  - excessive_macro_complexity:
      description: >
        Procedural macros (#[trace], #[grounded_by]) become harder to understand
        than the code they annotate.
      mitigation: >
        Keep macros simple; implement complex logic in CI validators, not in macros.

  - encoding_temporal_truth_in_static_code:
      description: >
        Code embeds assumptions about time (e.g., "retry 3 times" in a loop)
        that become incorrect when conditions change.
      mitigation: >
        Distinguish deterministic logic from timing assumptions. Timeout boundaries
        are observable signals, not correctness logic.

  - turning_cheatsheet_into_general_wiki:
      description: >
        Cheatsheets expand to cover "everything nice to know" instead of
        "everything required to implement this spec."
      mitigation: >
        Bind cheatsheets to specs. Remove entries with no spec binding.
        Use spec hit/miss signals to guide expansion/compaction.

bounded_uncertainty_exception:
  purpose: >
    Discovery can legitimately reveal that a validated invariant was incomplete,
    a spec was too narrow, or a litmus test encoded a false assumption. The system
    must allow temporary uncertainty increases without normalizing drift.

  gates:
    - exception_requires_issue_or_rfc
    - affected_specs_enter_quarantine_or_draft_state
    - old_invariant_remains_visible_until_replaced
    - replacement_must_cite_stronger_evidence_bundle
    - migration_window_and_owner_are_required

  exit_criteria:
    - new_spec_has_behavioral_ambiguity_zero
    - litmus_bindings_updated_or_retired
    - traces_and_evidence_bundle_rebuilt
    - exception_record_closed_with_root_cause

final_assertion: >
  The system converges only if: (1) knowledge remains compressed and canonical,
  (2) specs remain stable and machine-verifiable, (3) every claim made in code
  is continuously validated against observed reality, and (4) litmus tests
  reproducibly verify that code satisfies its governing specs. Convergence is
  monotonic under normal operation: once achieved, divergence must become
  detectable and recoverable. When learning invalidates prior assumptions, the
  bounded uncertainty exception records and gates the temporary loss of certainty.
  When learning reveals a previously unmodeled unknown, methodology/event records
  the surprise and semantic distillation preserves the learned distinction.

event_id: methodology.event.014-ci-full-phase-split@v1
status: triaged
observed_at: "2026-05-06T00:00:00Z"
reporter: "codex"
summary: >
  The current CI loop still conflates cheap contract checks, the expensive
  build/install boundary, and the representative end-to-end stack smoke.
  Tillandsias should split the flow into explicit pre-build, post-build, and
  runtime phases so each category can be scored, reported, and tightened
  independently without hiding residual debt.

observed_signal:
  description: >
    `./build.sh --ci-full --install` currently has a single monolithic validation
    path. The user needs a cheaper pre-build gate, a single post-build smoke
    path that exercises the built artifact end-to-end, and a way to report the
    remaining runtime litmus debt without mixing it into the wrong phase.
  signal_type: "methodology"

expected_model:
  description: >
    The CI pipeline should separate:
      - pre-build litmus for command-shape and static contract claims
      - post-build smoke for one representative stack execution
      - runtime residual litmus for the expensive container-backed cases
    Each phase should emit its own visible evidence so the dashboard can show
    where convergence is improving and where runtime debt remains open.
  source_refs:
    - methodology/litmus-framework.yaml
    - methodology/litmus-centicolon-wiring.yaml
    - openspec/specs/dev-build/spec.md
    - openspec/specs/ci-release/spec.md


trace: spec:methodology-accountability

event_id: methodology.event.032-distributed-work-methodology-refresh@v1
status: distilled
observed_at: "2026-05-25T06:00:00Z"
reporter: "linux-tlatoani-fedora-claudia-cli-2026-05-25T06"
summary: >
  The 2026-05-24 multi-host development methodology (event 030) was correct
  in shape but lacked CRDT-inspired primitives needed for the level of
  concurrency seen on 2026-05-25: three hosts, multiple agents per host,
  parallel drafting collisions, dormant sibling laptops, direct-to-integration
  branch commits bypassing the platform-branch model, and an integration loop
  that needed to absorb sibling work without a central coordinator.

observed_signal:
  description: >
    Between 2026-05-24T22Z and 2026-05-25T06Z the integration loop observed:
    (a) macOS and Windows hosts independently drafting the same proposal
    amendment (D6 vs D8) within minutes of each other and having to reconcile;
    (b) macOS host committing platform-flagged work directly to linux-next
    rather than osx-next, leaving osx-next frozen since the 2026-05-24
    alignment; (c) the unix-socket control dispatcher silently dropping
    variants the vsock dispatcher handled, with no Error frame; (d) recurrent
    confusion between `macos-next` and `osx-next` as the canonical macOS
    branch name; (e) sibling laptops going dormant for hours, leaving the
    Linux workstation as the only active integrator with no protocol for
    self-paced work pickup.
  signal_type: "methodology"

expected_model:
  description: >
    Distributed multi-host, multi-agent, multi-session work needs CRDT-style
    primitives: stable IDs, append-only event history, lease+TTL claims,
    idempotent operations, commutative writes, no central coordinator.
    Plan-class state (plan/, methodology/, openspec/, cheatsheets/) needs a
    single-branch destination (linux-next) so cross-host coordination
    converges without conflict resolution. Cheatsheets need to translate the
    methodology into agent-actionable shell snippets so cold-start agents
    can self-assign work in minutes, not hours.
  source_refs:
    - methodology/multi-host-development.yaml
    - methodology/event/030-multi-host-branch-coordination.yaml


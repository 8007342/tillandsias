trace: spec:methodology-accountability

event_id: methodology.event.006-cheatsheet-frontmatter-normalization-gap@v1
status: triaged
observed_at: "2026-05-06T00:00:00Z"
reporter: "codex"
summary: >
  A non-trivial subset of cheatsheets still lacks YAML frontmatter, which
  keeps strict tier validation noisy and weakens provenance, status, and tier
  accounting for the docs that most often feed implementation work.

observed_signal:
  description: >
    `scripts/check-cheatsheet-tiers.sh --strict` reports a cluster of
    "no YAML frontmatter" warnings and a smaller set of unset tier warnings.
    These warnings are not about content quality alone; they prevent the repo
    from treating cheatsheets as measurable, queryable cache entries with
    explicit lifecycle metadata.
  signal_type: "ci"

expected_model:
  description: >
    Every cheatsheet should carry frontmatter that makes its lifecycle and
    provenance machine-readable: tags, language scope, verification dates,
    authority, status, and a tier that can be validated or inferred. Missing
    frontmatter should be treated as an actionable documentation debt bucket,
    not an unclassified warning cloud.
  source_refs:
    - methodology/cheatsheets.yaml
    - methodology/spec-system.yaml
    - cheatsheets/runtime/cheatsheet-frontmatter-spec.md


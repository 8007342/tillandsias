    The local runtime phase fails before the litmus bodies execute because the
    host cannot set up a rootless Podman namespace. The health gate should
    capture that state, attempt the documented maintenance path once, and then
    surface a transparent skip if the host remains unhealthy.
  signal_type: "ci-runtime-health"


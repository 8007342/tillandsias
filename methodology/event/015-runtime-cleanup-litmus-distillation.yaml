event_id: methodology.event.015-runtime-cleanup-litmus-distillation@v1
status: triaged
observed_at: "2026-05-07T00:00:00Z"
reporter: "codex"
summary: >
  The runtime cleanup litmus tests had become wrapper-shaped: init-log cleanup
  depended on tray shutdown language, and socket cleanup depended on an always
  running tray process plus pkill-based teardown. The cleanup contracts should
  be exercised by the actual command boundary and then measured as leftover
  state, so the tests can stay direct and the cleanup signal stays meaningful.

observed_signal:
  description: >
    `litmus:init-log-cleanup` and `litmus:socket-cleanup` were both framed
    around tray lifecycle assumptions instead of the command or stack boundary
    that actually produces the observable cleanup state.
  signal_type: "litmus"

expected_model:
  description: >
    Cleanup litmus should run the real boundary command, then assert the
    absence of residual files or sockets afterward. The test should not depend
    on a live tray process as an ambient prerequisite.

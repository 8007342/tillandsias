next_distillation_step:
  owner: "tlatoani"
  action: >
    Update the User Runtime durable artifacts to encode the narrowed model:
    Containerfiles embedded in the binary are the source of truth; first launch
    uses `podman build`; podman is the only host dependency; cached images are
    locally useful but semantically disposable. Remove or quarantine User Runtime
    language that permits embedded OCI tarballs, Nix builds, or host registries.conf
    state as image source of truth. Bind the refined requirements to litmus tests,
    traces, and CentiColon residual reasons so closure is measurable.
  target_artifact: spec

closure_criteria:
  - spec:user-runtime-lifecycle states that User Runtime image sources are embedded Containerfiles and supporting context files, not OCI tarballs or Nix definitions.
  - spec:user-runtime-lifecycle states that podman is the only required host dependency and that missing podman is a user-facing prerequisite failure, not an auto-install path.
  - spec:user-runtime-lifecycle defines local podman images as semantically ephemeral cache and requires rebuild after cache deletion without loss of durable state.
  - spec:init-command and spec:appimage-build-pipeline agree on the same embedded Containerfile manifest, extraction boundary, source hash, and version tag model.
  - spec:podman-registries-config or equivalent requirement proves User Runtime never writes or semantically depends on host `registries.conf`; any network source used by a Containerfile is fully qualified and traceable.
  - scripts/setup-podman-registries.sh is removed from any User Runtime path or explicitly scoped to Developer/Cloud Runtime with trace evidence.
  - Cheatsheets listed in `cheatsheet_refs` are revised so User Runtime documentation does not present Nix or embedded OCI tarballs as active user-launch options.
  - Litmus tests exist for podman-only dependency, embedded manifest completeness, host pristineness, first-launch idempotence, cache eviction rebuild, update rebuild, and no registry configuration mutation.
  - Runtime traces identify `runtime_model` as one of `developer`, `cloud`, or `user`, and User Runtime image events include source manifest hash, binary version, image tag, build reason, cache hit/miss, bytes downloaded when available, and registry/config dependency status.
  - The convergence dashboard reports residual CentiColon debt for each of the three runtimes separately and exposes the maximum residual runtime before aggregate score.
  - Evidence bundle cites spec hash, binary hash, embedded source manifest hash, litmus results, trace coverage, and a clean-host filesystem diff for the User Runtime path.

convergence_velocity_and_measurability_suggestions:
  - >
    Collapse User Runtime lifecycle branches into one canonical rebuild operator:
    `ensure_user_runtime_images(binary_version, embedded_manifest_hash)`. First
    launch, binary update, and cache eviction should differ only by `build_reason`.
  - >
    Add a runtime-axis obligation matrix with rows for Developer, Cloud, and User
    Runtime and columns for source_of_truth, dependency_boundary, cache_semantics,
    host_mutation_boundary, version/hash_signal, positive_litmus, negative_litmus,
    runtime_trace, and residual_cc.
  - >
    Score convergence by minimax residual across the three runtimes before
    reporting aggregate closure. This prevents a well-covered Developer Runtime
    from hiding an under-measured User Runtime launch contract.
  - >
    Make image cache behavior measurable with counters: cache_hit, cache_miss,
    rebuild_due_to_binary_version, rebuild_due_to_manifest_hash,
    rebuild_due_to_missing_image, build_bytes_downloaded_when_available,
    build_duration_ms, and host_config_writes.
  - >
    Treat any User Runtime Nix invocation, embedded OCI load, host config write,
    or dependence on unqualified registry search state as a negative litmus signal
    that reopens this event or creates a bounded uncertainty exception if the
    architecture intentionally changes.


summary: >
  User Runtime Lifecycle spec created; semantic distillation resolved the image
  source model to Containerfiles embedded in the binary, built on demand at user
  first launch with podman as the only external dependency.

observed_signal:
  description: >
    New spec `openspec/specs/user-runtime-lifecycle/spec.md` documents the complete
    lifecycle from binary installation through first launch, container caching, and
    update cycles. The prior event framed image source strategy as unresolved:
    embedded OCI image tarballs, runtime Containerfile builds, and Nix builds were
    all listed as possible User Runtime strategies.

    The distilled signal is narrower: User Runtime architecture is embedded
    Containerfiles and supporting image source files inside the binary. The user
    first-launch path extracts those sources to an ephemeral build directory and
    invokes `podman build`. The binary has zero dependencies beyond podman. User
    Runtime does not load embedded OCI tarballs and does not invoke Nix. Locally
    cached images exist only to optimize bandwidth and startup latency during
    repeated builds and launches; they are semantically ephemeral and must be
    rebuildable from the binary at any time.
  signal_type: spec

expected_model:
  description: >
    User installation yields a single binary plus the prerequisite that podman is
    available. On first launch, the binary initializes automatically, extracts its
    embedded Containerfiles and image contexts, builds versioned local images with
    podman, creates containers idempotently, and records only ephemeral metadata
    under the cache boundary. Updates and cache deletion both converge through the
    same rebuild path.

    The three-runtime model is:
    - Developer Runtime: toolbox/repository workflow that authors and validates
      Containerfiles and supporting sources.
    - Cloud Runtime: CI/release workflow that builds and validates the binary and
      embeds the Containerfile source set; it may build images for verification,
      but those images are not the User Runtime source of truth.
    - User Runtime: installed binary plus podman; builds images on demand from
      embedded Containerfiles and treats local podman images as disposable cache.
  source_refs:
    - spec:user-runtime-lifecycle
    - spec:init-command
    - spec:appimage-build-pipeline
    - spec:default-image
    - spec:podman-orchestration

distilled_distinction:
  durable_claim: >
    In User Runtime, the binary-embedded Containerfile source set is the durable
    image definition. Podman local images are cache artifacts, not release
    artifacts, not semantic state, and not proof that the runtime is initialized.
  excluded_models:
    - embedded_oci_tarballs_as_user_runtime_source_of_truth
    - nix_builds_on_user_hosts
    - registry_or_registries_conf_state_as_source_of_truth
    - host_configuration_as_initialization_state
  convergence_effect: >
    This removes a branch from the lifecycle state machine: fresh install, binary
    update, and podman cache eviction all converge through the same source-hash
    checked Containerfile build path.


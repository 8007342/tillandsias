
trace: spec:methodology-accountability

unknown_event_register:
  version: v0.1
  purpose: >
    Provide a first-class intake path for unknowns. Bounded uncertainty handles
    known invariants that new evidence invalidates; unknown events handle the
    earlier moment when the system notices "this was not predicted by the
    methodology, spec, litmus, trace, or cheatsheet."

  file_naming:
    pattern: "NN-short-slug.yaml"
    sequence: "two or three digit monotonically increasing integer per directory"
    slug: "lowercase words separated by hyphen"
    example: "001-trace-passes-but-runtime-misses.yaml"

  required_fields:
    - event_id
    - status
    - observed_at
    - reporter
    - summary
    - observed_signal
    - expected_model
    - violated_or_missing_claims
    - affected_artifacts
    - evidence_refs
    - uncertainty_delta
    - provisional_classification
    - next_distillation_step
    - closure_criteria

  status_values:
    - open
    - triaged
    - distilled
    - superseded
    - closed

  classification_values:
    - missing_spec_requirement
    - missing_litmus_signal
    - stale_or_false_cheatsheet
    - trace_without_runtime_evidence
    - methodology_claim_unproven
    - metric_gaming_or_false_score
    - environment_assumption
    - concurrency_or_merge_anomaly
    - other

  uncertainty_delta:
    meaning: >
      The local, explicit increase in uncertainty caused by the observation.
      This is not a failure by itself. It becomes drift only if it is left
      untriaged or if a prior claim remains active after contrary evidence.
    allowed_values:
      - none
      - low
      - medium
      - high
    rule: >
      Medium or high uncertainty deltas MUST either create a bounded uncertainty
      exception or update a spec, litmus test, cheatsheet, provenance claim, or
      proximity rule before closure.

  semantic_distillation:
    rule: >
      Closing an unknown event requires preserving the learned distinction in the
      smallest durable artifact that prevents recurrence.
    target_order:
      - spec_requirement_or_invariant
      - litmus_signal_or_negative_test
      - methodology_provenance_claim
      - proximity_weight_or_scoring_rule
      - cheatsheet_entry_or_source_refresh
      - code_trace_or_runtime_event_schema
    closure_must_not:
      - delete_old_context_without_tombstone
      - hide_uncertainty_by_renaming_the_event
      - close_with_no_artifact_change_unless_event_is_duplicate

  relationship_to_bounded_uncertainty:
    unknown_event: >
      Captures an unexpected observation and routes it to the correct artifact.
    bounded_uncertainty_exception: >
      Temporarily allows a verified invariant or requirement to lose certainty
      while stronger evidence replaces it.
    rule: >
      Unknown events MAY lead to bounded uncertainty exceptions. They are not the
      same artifact: unknown events are intake records; bounded uncertainty
      exceptions are gated change-control records.

  audit_queries:
    list_open: "rg -n 'status: open|status: triaged' methodology/event"
    list_high_delta: "rg -n 'uncertainty_delta: high' methodology/event"
    list_claim_failures: "rg -n 'methodology_claim_unproven' methodology/event"

  known_events:
    - file: methodology/event/001-direct-main-methodology-push.yaml
      status: distilled
      distilled_into:
        - methodology/versioning.yaml
        - methodology/proximity.yaml
        - methodology/convergence.yaml
    - file: methodology/event/002-user-runtime-lifecycle-refinement.yaml
      status: triaged
      spec_under_review: spec:user-runtime-lifecycle
      blocking_issues:
        - embedded_containerfile_user_runtime_model_not_yet_distilled_into_spec
        - host_pristineness_violated_by_registries_setup
        - cheatsheets_include_superseded_nix_or_oci_user_runtime_options
        - three_runtime_residuals_not_yet_measured_separately
    - file: methodology/event/003-cheatsheet-signal-coverage-gap.yaml
      status: triaged
      spec_under_review: spec:cheatsheets-license-tiered
      blocking_issues:
        - signal_obligation_matrix_not_yet_queryable
        - positive_and_negative_signal_classes_not_yet_distinguished
        - per_cheatsheet_signal_coverage_not_yet_visible_in_dashboard
    - file: methodology/event/004-signal-handling-harness-tombstone.yaml
      status: distilled
      spec_under_review: spec:signal-handling
      blocking_issues:
        - cargo_wrapper_integration_harness_hangs
        - compiled_binary_not_directly_exercised
        - shutdown_litmus_not_linkable_to_real_app
    - file: methodology/event/005-hot-path-blocking-policy.yaml
      status: triaged
      spec_under_review: spec:headless-mode
      blocking_issues:
        - hot_path_blocking_policy_not_yet_explicit
        - shutdown_only_waits_not_distinguished_from_hot_path
        - event_driven_runtime_policy_not_yet_codified
    - file: methodology/event/006-cheatsheet-frontmatter-normalization-gap.yaml
      status: triaged
      spec_under_review: spec:cheatsheets-license-tiered
      blocking_issues:
        - cheatsheet_frontmatter_missing_on_existing_docs
        - tier_and_provenance_metadata_not_yet_queryable_for_all_docs
        - strict_cheatsheet_validation_still_noisy
    - file: methodology/event/007-build-script-architecture-litmus-tombstone.yaml
      status: triaged
      spec_under_review: spec:build-script-architecture
      blocking_issues:
        - retired_appimage_litmus_suite_still_active
        - current_build_path_not_reflected_in_litmus_contract
        - ci_score_still_counts_obsolete_failures
    - file: methodology/event/008-active-contract-trace-sweep.yaml
      status: triaged
      spec_under_review: spec:runtime-logging
      blocking_issues:
        - live_contracts_missing_code_traces
        - stale_specs_need_distillation_or_retirement
        - trace_sweep_not_yet_complete
    - file: methodology/event/009-zero-trace-active-only.yaml
      status: distilled
      distilled_into:
        - scripts/hooks/pre-commit-openspec.sh
        - openspec/specs/appimage-build-pipeline/spec.md
        - openspec/specs/cli-bash-mode/spec.md
        - openspec/specs/cli-diagnostics/spec.md
    - file: methodology/event/010-windowed-dashboard-trends.yaml
      status: distilled
      distilled_into:
        - scripts/update-convergence-dashboard.sh
        - docs/convergence/centicolon-dashboard.md
        - docs/convergence/centicolon-dashboard.json
    - file: methodology/event/011-closed-trend-minimalism.yaml
      status: distilled
      distilled_into:
        - scripts/update-convergence-dashboard.sh
        - docs/convergence/centicolon-dashboard.md
        - docs/convergence/centicolon-dashboard.json
    - file: methodology/event/024-agentic-litmus-chain-distillation.yaml
      status: distilled
      distilled_into:
        - methodology/ci.yaml
        - methodology/litmus.yaml
        - methodology/verification.yaml
        - methodology/convergence.yaml
        - openspec/specs/spec-traceability/spec.md
        - openspec/specs/security-privacy-isolation/spec.md

trace: spec:methodology-accountability

event_id: methodology.event.005-hot-path-blocking-policy@v1
status: triaged
observed_at: "2026-05-06T00:00:00Z"
reporter: "codex"
summary: >
  The methodology did not yet state a strong, measurable policy against
  blocking in hot paths, even though Tillandsias' runtime model depends on
  event-driven, yield-returning behavior for near-zero idle overhead.

observed_signal:
  description: >
    The headless shutdown wait loop and tray/runtime discussion exposed a gap:
    the repo needs an explicit distinction between hot-path code, where blocking
    is prohibited, and bounded bootstrap/shutdown boundaries, where a blocking
    wait may be justified if it is traceable and measurable. Without that rule,
    cleanup work can accidentally normalize busy-waiting, wrapper polling, or
    other idle-noop loops that increase CPU usage and blur centiColon scoring.
  signal_type: "methodology"

expected_model:
  description: >
    The methodology should say that steady-state runtime paths must be
    event-driven and yield-returning, that blocking calls are forbidden in the
    99%+ production path, and that any exception must be explicitly named,
    bounded, and backed by spec/litmus justification.
  source_refs:
    - methodology/convergence.yaml
    - methodology/litmus.yaml
    - cheatsheets/architecture/event-driven-basics.md
    - cheatsheets/runtime/event-driven-monitoring.md

violated_or_missing_claims:
  methodology_claim_ids:

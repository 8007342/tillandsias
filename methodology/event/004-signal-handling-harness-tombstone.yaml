trace: spec:methodology-accountability

event_id: methodology.event.004-signal-handling-harness-tombstone@v1
status: distilled
observed_at: "2026-05-06T00:00:00Z"
reporter: "codex"
summary: >
  The legacy signal-handling integration tests hang because they signal the
  cargo wrapper instead of the compiled binary and leave stdout/stderr piped
  without a reader.

observed_signal:
  description: >
    Running `cargo test -p tillandsias-headless --features tray` consistently
    reached `tests/signal_handling.rs` and then stalled on
    `test_signal_handling_sigterm`, `test_signal_handling_timeout_pattern`, and
    `test_signal_handling_sigint` for more than 60 seconds. The harness spawns
    `cargo run -p tillandsias-headless -- --headless`, then sends SIGTERM/SIGINT
    to the cargo process ID. That observes the wrapper, not the application
    lifecycle, and is not a stable signal for the repo's metrics.
  signal_type: "litmus"

expected_model:
  description: >
    Signal litmus should exercise the compiled binary directly or be replaced by
    a smaller deterministic unit test around the signal wait loop. The test
    should measure the application's shutdown path, not cargo's wrapper
    semantics.
  source_refs:
    - crates/tillandsias-headless/src/main.rs
    - cheatsheets/test/cargo-test.md

violated_or_missing_claims:
  methodology_claim_ids:
    - litmus_tests_must_target_the_application_not_the_build_wrapper
    - integration_harnesses_must_not_hang_the_metric_loop

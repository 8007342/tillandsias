event_id: methodology.event.018-podman-maintenance-and-runtime-logging-distillation@v1
status: triaged
observed_at: "2026-05-07T00:00:00Z"
reporter: "codex"
summary: >
  Podman ownership and runtime logging are separate but coupled concerns. The
  stack should recreate ephemeral containers on mismatch, attempt host-side
  rootless repair only when Podman storage metadata is stale and recoverable,
  and fail fast when Podman is missing. Logging should remain observational,
  non-blocking, privacy-safe, and independent from business-logic success.

observed_signal:
  description: >
    The browser/container cleanup path and the logging path were both still
    partly documented as ad hoc implementation details. The user clarified that
    both concerns need vendor-backed best practices and explicit cheat-sheet
    provenance so they can be treated as stable ownership rules.
  signal_type: "methodology"

expected_model:
  description: >
    Podman lifecycle docs should distinguish host maintenance from app
    lifecycle, and logging docs should distinguish non-blocking observability
    from the business operation being logged. Browser containers should be
    recreated on mismatch with no shared cache or state.
  source_refs:
    - cheatsheets/runtime/podman-logging.md

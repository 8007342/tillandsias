trace: spec:methodology-accountability

event_id: methodology.event.013-podman-test-seam-split@v1
status: triaged
observed_at: "2026-05-06T00:00:00Z"
reporter: "codex"
summary: >
  Podman's own docs show a clear split between command-line tests,
  integration tests, system tests, and API/service-socket tests. Tillandsias
  should use the same seam discipline: mock the subprocess boundary for
  command-shape checks, use service-socket tests for control-plane routing,
  and reserve real containers for the smaller set of runtime semantics that
  truly need them.

observed_signal:
  description: >
    Upstream Podman documents `make localunit`, `make localintegration`,
    `make remoteintegration`, and `make localsystem`, plus `podman system service`
    and `podman system connection` as a separate control-plane seam. The current
    Tillandsias litmus suite was still overusing real container execution for
    assertions that only needed command-shape or socket-routing evidence.
  signal_type: "methodology"

expected_model:
  description: >
    Podman-related tests should be split by seam: subprocess mock for exact CLI
    calls, service/socket tests for API routing, and full container execution
    only where payload semantics matter. This keeps litmus runs fast and makes
    residual-obligation scoring less noisy.
  source_refs:
    - cheatsheets/test/podman-testing.md
    - cheatsheets/runtime/podman-service-testing.md
    - scripts/run-litmus-test.sh
    - scripts/test-support/podman-mock.sh
    - crates/tillandsias-litmus/README.md


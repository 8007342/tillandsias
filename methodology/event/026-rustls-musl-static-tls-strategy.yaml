title: "Switch reqwest from native-tls to rustls-tls for musl-static binary portability"

observed_signal:
  - "Link failures with 'ld: cannot find -lssl -lcrypto' after podman system reset or clean Nix builds"
  - "native-tls feature pulls glibc-compiled OpenSSL, incompatible with musl-static target"
  - "Nix reproducibility philosophy: musl-static targets should assume pure Rust or rustls, never cross-compiled C libraries"
  - "CLAUDE.md documented rustls rationale and implementation guidance but no OpenSpec entry governed the choice"

expected_model:
  - "HTTP clients in Tillandsias use pure-Rust rustls instead of native-tls/OpenSSL for musl-static portability"
  - "TLS strategy decision rooted in Nix binary-caching design (pure Rust is cached, cross-compiled musl-OpenSSL is not)"
  - "RFC 1721 consensus: musl ecosystem expects pure Rust or vendored statics, not glibc bindings"
  - "rustls is CNCF-audited (Cure53), production-deployed (AWS, Google, Cloudflare), and aligns with event-driven philosophy"
  - "Binary size trade-off (+1.5 MB for rustls vs -0.5 MB for OpenSSL) is acceptable for portable dev tool"

violated_or_missing_claims:
  - "No OpenSpec spec governed TLS backend selection or musl-static portability constraints"
  - "CLAUDE.md documented rationale separately from methodology; decision exists as local knowledge, not as first-class artifact"
  - "Cargo.toml feature flags drove the choice operationally, but no spec linked the choice to architectural intent"
  - "Provenance and reasoning (Nix philosophy, RFC 1721, CNCF audit) were documented in CLAUDE.md but not in a distillable event record"

affected_artifacts:
  - Cargo.toml (reqwest features changed from default/native-tls to rustls-tls)
  - Cargo.lock (regenerated with rustls dependencies, zero native-tls or openssl-sys)
  - CLAUDE.md (TLS Strategy section added with rationale, trade-offs, references)
  - crates/tillandsias-core/src/http.rs (or equivalent HTTP client initialization code with @trace annotations)
  - methodology/event/index.yaml (updated with event 026 entry)


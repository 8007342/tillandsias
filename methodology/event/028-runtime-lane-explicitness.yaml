observed_by: "machine-learning-agent"

title: "Make desktop user-session, headless service-account, and dev/test lanes explicit"

observed_signal:
  - "Interactive launchers were sharing one implicit Podman boundary, so the runtime ownership model was only implied by inherited environment state."
  - "Desktop launches needed a writable logind-owned XDG_RUNTIME_DIR, but failures were not clearly separated from service-account or dev/test wrappers."
  - "The headless service-account lane already existed in packaging, but the launcher did not name or validate that lane explicitly."
  - "Dev/test wrapper state was easy to confuse with production runtime ownership."

expected_model:
  - "Desktop launches must run in the logged-in user-session lane and fail clearly when that lane is missing."
  - "The headless service-account lane must remain explicit in packaging and supervision."
  - "Dev/test wrappers must remain confined to scripts and litmus harnesses."
  - "No production runtime should synthesize /run/user/<uid> or depend on a helper wrapper."

violated_or_missing_claims:
  - "spec:environment-runtime and spec:podman-orchestration described the ownership model, but the launcher did not enforce the lane distinction at the shared entrypoints."
  - "methodology/specs/user-runtime-lifecycle/architecture.md still described the runtime split in older, broader terms."
  - "plan/ did not yet have a dedicated handoff note for the lane split and its reasoning."


event_id: methodology.event.016-secret-lifecycle-litmus-architecture@v1
status: triaged
observed_at: "2026-05-07T00:00:00Z"
reporter: "codex"
summary: >
  Secret-bearing flows need a stable litmus architecture split into three
  layers: a pre-build command-shape harness that verifies the Podman secret
  transport, a post-build smoke that exercises the installed binary once, and
  a runtime residual contract that checks for leaked state. The secret
  fixtures must stay synthetic and reproducible across local runs and GitHub CI.

observed_signal:
  description: >
    The current GitHub-login litmus was trying to carry a full login smoke in a
    pre-build gate, and it depended on host-shaped behavior instead of a
    reusable helper boundary.
  signal_type: "litmus"

expected_model:
  description: >
    Secret lifecycle tests should assert command shape separately from runtime
    completion, use synthetic identity inputs, and keep runtime-bound behavior
    out of pre-build gates.
  source_refs:
    - cheatsheets/test/podman-testing.md
    - methodology/litmus-framework.yaml
    - methodology/litmus-centicolon-wiring.yaml


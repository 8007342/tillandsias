event_id: methodology.event.012-litmus-podman-runtime-blocker@v1
status: triaged
observed_at: "2026-05-06T00:00:00Z"
reporter: "codex"
summary: >
  The litmus runner depends on a working rootless Podman runtime, but the
  current host environment rejects namespace setup and toolbox access, so
  container-backed litmus tests cannot actually exercise their intended
  contracts yet.

observed_signal:
  description: >
    `podman ps` and `toolbox run -c tillandsias podman ...` fail in this host
    session with rootless namespace/runtime errors, including `newuidmap`
    permission failures and read-only runtime lock paths. This blocks the
    litmus suite before it reaches the container behavior the tests are meant
    to validate.
  signal_type: "infra"

expected_model:
  description: >
    Litmus tests should run against a properly provisioned container runtime
    and remain simple, idempotent, and order-independent. If the host runtime
    is unavailable, the failure should be an explicit infrastructure blocker
    rather than an ambiguous spec-code regression.
  source_refs:
    - scripts/run-litmus-test.sh

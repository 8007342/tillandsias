trace: spec:methodology-accountability

event_id: methodology.event.003-cheatsheet-signal-coverage-gap@v1
status: triaged
observed_at: "2026-05-06T00:00:00Z"
reporter: "codex"
summary: >
  The repository measures cheatsheet tiering, freshness, and binding, but it
  does not yet expose a durable, queryable metric for which cheatsheets still
  need positive or negative signals.

observed_signal:
  description: >
    The current checks and docs identify cheatsheet presence, tier discipline,
    staleness, and some traceability, but they do not answer the accounting
    question "which cheatsheets are missing the signals that make their scores
    meaningful?" There is no repo-visible coverage matrix for positive signals
    (tests, traces, telemetry, provenance, examples) versus negative signals
    (explicit anti-patterns, tombstones, failure litmus, drift guards).
  signal_type: "ci"

expected_model:
  description: >
    The methodology should let agents enumerate each cheatsheet with its signal
    obligations, classify missing signals, and surface the result in a stable
    report that can feed convergence metrics. Without that map, score deltas are
    hard to interpret and can be inflated by documentation volume instead of
    verified coverage.
  source_refs:
    - methodology/proximity.yaml
    - methodology/litmus.yaml
    - cheatsheets/runtime/cheatsheet-lifecycle.md
    - cheatsheets/observability/cheatsheet-metrics.md


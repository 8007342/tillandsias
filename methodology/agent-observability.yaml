trace: spec:methodology-accountability

agent_observability_protocol:
  version: v0.1
  purpose: >
    Make agent-to-agent work visible, queryable, and compressible while preserving
    accountability. Progress displays are UI hints over structured events, not
    evidence of correctness.

  event_stream:
    format: jsonl
    location_template: "<project>/<metadata-dir>/agent-events.jsonl"
    ordering: "sort by (lamport_clock, agent_id, event_seq)"
    required_fields:
      - event_id
      - parent_event_id
      - task_id
      - spec_id
      - agent_id
      - lamport_clock
      - event_seq
      - status
      - progress
      - summary
      - evidence_refs
      - timestamp
      - branch
      - worktree_path
      - lease_id
      - graph_node_id
      - owned_file_scope
      - checkpoint_commit
    status_values:
      - queued
      - bootstrapping
      - reading
      - planning
      - claimed
      - editing
      - verifying
      - blocked
      - stale
      - done
      - failed

  progress_semantics:
    range: "0..100"
    monotonic_within_task: true
    rule: >
      Progress is coordination state. Correctness comes from specs, traces,
      litmus tests, CI, and evidence bundles.
    allowed_regression: >
      Progress may decrease only with blocked, failed, or scope_changed events
      that include root cause and updated evidence_refs.
    recommended_weights:
      bootstrap_receipt: 10
      governing_context_loaded: 25
      plan_ready: 35
      edits_complete: 65
      local_verification_started: 75
      verification_passed: 90
      evidence_recorded: 100

  display_hints:
    plain_text_bar:
      width: 20
      filled: "#"
      empty: "-"
      template: "{task_name} [{bar}] {progress}% {status}"
    rich_text_bar:
      width: 24
      filled: "#"
      partial: "~"
      empty: " "
      template: "{indent}{task_name} [{bar}] {progress}% {status}"
    compact_template: "{task_name} [{bar}] {progress}% {status} refs:{evidence_count}"
    repeat_before_after_template: "before {before_bar} → after {after_bar} Δ{delta}"
    repeat_trend_template: "trend {trend_bar} avg={trend_average} latest={trend_latest}"
    repeat_milestone_template: "milestone {label}@{timestamp} elapsed={elapsed}"
    repeat_minimal_template: "{session_id} #{cycle} {status} {repeat_before_after_template} {repeat_trend_template} {repeat_milestone_template}"
    milestone_timestamp_template: "{label}@{hhmmss}"
    repeat_tree_header_template: "{session_id} #{cycle} {status} branch={branch} elapsed={elapsed}"
    repeat_tree_node_template: "{indent}{connector} {label} [{bar}] {progress}% {status}"
    repeat_tree_leaf_template: "{indent}{connector} {label} [{bar}] {progress}% {status} · {summary}"
    repeat_tree_footer_template: "trend {trend_bar} latest={latest} prev={previous} avg={average}"
    repeat_loop_state_waiting: "waiting on agent"
    repeat_loop_state_sleeping: "sleeping until next iteration"
    repeat_loop_state_running: "agent working"

  agent_to_agent_messages:
    rule: >
      Agents communicate by appending events and by sending compact task handoffs.
      Handoffs must not depend on hidden conversational memory.
    handoff_schema:
      lease_id: string
      task_id: string
      spec_id: string
      graph_node_id: string
      parent_task_id: string
      bootstrap_receipt_ref: string
      current_status: string
      progress: integer
      blockers: list
      evidence_refs: list
      next_action: string
      branch: string
      worktree_path: string
      owned_file_scope: list
      checkpoint_commit: string

  repeat_progress_report:
    purpose: >
      Provide a minimal machine-readable progress record for noninteractive repeat
      loops. The wrapper can render this into a human-friendly tree graph without
      exposing file-change chatter or reasoning traces.
    schema:
      session_id: string
      cycle: integer
      branch: string
      status: string
      before_progress: integer
      after_progress: integer
      delta_progress: integer
      trend_window: list
      current_bar: string
      trend_bar: string
      elapsed_seconds: integer
      elapsed_human: string
      milestone_label: string
      milestone_timestamp: string
      next_action: string
      blockers: list
      checkpoint_commit: string
      focus_task_id: string
      ready_count: integer
      blocked_count: integer
      task_tree: list
      loop_state: string
      output_mode: "compact-json"
    rendering_notes:
      - "Show before/after as blocky progress bars."
      - "Show the latest milestone timestamp in absolute time and elapsed time."
      - "Show the last N progress points as a trend bar and an average delta."
      - "Render the active dependency tail as a compact tree with one line per node."
      - "Do not stream file-by-file changes in repeat mode unless explicitly requested."
      - "Keep the live refresh minimal: headers, tree, trend, milestone, blockers."
      - "Distinguish between waiting on the agent process and sleeping between iterations."

  lease_protocol:
    purpose: >
      Make claims over tasks and file scopes explicit, idempotent, and recoverable.
      A later agent may reclaim a stale claim, but it must do so from the latest
      observable plan state rather than hidden memory.
    claim_rules:
      - "Claim by stable graph node ID and file scope hash."
      - "Repeated claim events with the same lease_id are no-ops."
      - "A conflicting claim on the same file scope becomes blocked until reconciled."
      - "A claim that goes stale must be revalidated by the next agent before editing."
    lease_fields:
      - lease_id
      - claimant_agent_id
      - graph_node_id
      - owned_file_scope
      - branch
      - worktree_path
      - claimed_at
      - expires_at
      - last_heartbeat_at
      - checkpoint_commit
    stale_recovery:
      - "A stale lease is not a failure; it is a cue to reload the plan and emit a fresh reading event."
      - "If two agents believe they own the same claim, the later one yields and reclaims a disjoint node."

  stale_tracking_policy:
    stale_after: "10 minutes without a new event for active work"
    stale_action: >
      Mark the task stale and require the next agent touching it to emit a fresh
      reading or verifying event before continuing.
    recovery: >
      Reconstruct current task state from latest event per task_id, sorted by
      Lamport order. Conflicting latest events become blocked until reconciled.

distributed_work:
  version: v0.1
  purpose: >
    Define the CRDT-inspired primitives that let any agent on any host
    discover, claim, execute, checkpoint, hand off, and complete units of
    work from a shared `plan/` ledger — without a central coordinator and
    without requiring the originating agent or session to still exist.
  authority:
    - Cited from methodology.yaml entrypoints.
    - Citable by plan/steps, plan/issues, and openspec/changes.
    - Subordinate to methodology.yaml, methodology/multi-host-development.yaml,
      and methodology/versioning.yaml when they conflict.

  crdt_principles:
    rationale: >
      Multi-host, multi-agent, multi-session work has the same shape as a
      distributed system: writers are independent, partitions are common
      (laptops sleep, sessions die, agents are killed mid-task), and we
      cannot rely on a coordinator. We borrow patterns from conflict-free
      replicated data types so that any agent can act on its local view
      and produce updates that merge deterministically with any other
      agent's updates.
    invariants:
      stable_ids:
        rule: >
          Every claimable unit of work has a globally unique, content-derived
          stable ID. Two agents producing the "same" unit produce the same
          ID. IDs MUST NOT embed agent identity, host, or timestamp.
        encoding: >
          `<kind>/<short-kebab-summary>` for human-written items;
          `<kind>/<sha256-prefix-12>` when minted from content.
        examples:
          - step/multi-host-plan-ledger-adoption
          - issue/control-socket-protocol-convergence-2026-05-25
          - change/vm-recipe-provisioning
      append_only_history:
        rule: >
          Plan-ledger files are append-only. Agents add events to the end of
          a log section; they do not rewrite earlier entries. Current state
          is the fold (left-fold) of the event sequence keyed by stable ID.
        why: >
          Two agents racing to update the same item produce two appends
          rather than a write-write conflict.
        exceptions:
          - "Status fields in YAML index files (plan/index.yaml) ARE
            last-writer-wins; this is the trade-off for queryability.
            Agents updating a status SHOULD include a progress_note
            describing what changed."
          - "Tombstones supersede prior content; never DELETE — write a
            tombstone block that points at the canonical replacement."
      idempotent_operations:
        rule: >
          Re-running the same claim, the same checkpoint write, or the same
          completion event MUST yield the same observable state. Agents
          MUST be safe to retry on failure without checking 'did I already
          do this'.
        mechanism: >
          Stable-ID + event-type + lease_id + monotonic seq within the
          agent's claim. A second `claim` event for the same lease_id is a
          no-op upsert.
      commutative_writes:
        rule: >
          Writes from different agents to different stable IDs commute.
          Writes from different agents to the SAME stable ID are reconciled
          by stable-ID-keyed semantic merge (see [[merge_policy]]).
        ordering: >
          When ordering matters, agents tag the event with their host
          identity and a UTC ISO-8601 timestamp; the fold is timestamp-major
          host-minor.
      no_central_coordinator:
        rule: >
          No agent waits for another agent's permission to start, claim,
          or finish work. Conflict detection happens at merge time
          (`git pull --rebase` or `git merge`) — not at action time.
        consequence: >
          Two agents may race on the same claim; one wins the lease
          (whoever's commit pushed first), the other notices on its next
          fetch and either piggybacks (if its work is additive) or yields
          (releases its claim, picks a different item).
      lease_with_ttl:
        rule: >
          A claim is a lease, not a lock. Leases carry a TTL (default 4
          hours) and an expires_at. An agent that intends to keep working
          past expires_at MUST renew by re-emitting the claim event.
          Other agents MAY reclaim an expired lease.
        heartbeat_note: >
          Agent observability may mark active work stale after 10 minutes without
          a heartbeat, but that is a display/fresh-read signal, not permission to
          reclaim the lease before expires_at.
        why: >
          Agents die (process killed, laptop sleeps, network drops).
          Without TTL, dead agents would block forever.

  work_item_schema:
    rule: >
      Each claimable unit of work is described by one YAML or Markdown
      block bearing this schema. Stored under plan/steps/, plan/issues/,
      or openspec/changes/.
    fields:
      id:
        kind: required
        format: "<kind>/<slug>"
        note: "Globally unique, content-stable per [[crdt_principles.invariants.stable_ids]]."
      type:
        kind: required
        enum: [spec, feature, fix, docs, methodology, integration, housekeeping]
      title:
        kind: required
        format: "one-line human summary"
      owner_host:
        kind: required
        enum: [linux, windows, macos, any, none]
        note: >
          `any` = any host can pick it up. `none` = informational only,
          not claimable. `linux`/`windows`/`macos` = host-pinned.
      capability_tags:
        kind: optional
        type: list-of-string
        examples:
          - rust
          - gtk
          - win32
          - appkit
          - docs
          - testing
        note: >
          Agents filter eligible work by intersecting their declared
          capabilities with these tags.
      status:
        kind: required
        enum: [pending, claimed, in_progress, blocked, done, failed]
        rule: "Last-writer-wins per [[append_only_history.exceptions]]."
      lease:
        kind: present_when_claimed
        fields:
          lease_id: "<sha256-prefix-12> minted by claimant"
          agent_id: "free-form identifier (e.g. 'linux-tlatoani-fedora-claudia-cli-2026-05-25T06')"
          host: "linux | windows | macos"
          acquired_at: "UTC ISO-8601"
          expires_at: "UTC ISO-8601, default acquired_at + 4h"
      events:
        kind: append_only
        type: list-of-event-block
        event_types:
          claim:
            fields: [ts, agent_id, host, lease_id]
            idempotent: true
          progress:
            fields: [ts, agent_id, host, lease_id, note, partial_artifact_refs]
            idempotent: false
          blocked:
            fields: [ts, agent_id, host, lease_id, reason, blocker_refs]
            metrics_tracking:
              - "Coordinators MUST calculate the elapsed duration since the initial blocked event."
              - "Coordinators MUST analyze blocker_refs to build a blocking tree, prioritizing root blockers."
            idempotent: false
          checkpoint:
            fields: [ts, agent_id, host, lease_id, commit_sha, summary]
            idempotent: false
          released:
            fields: [ts, agent_id, host, lease_id, reason]
            idempotent: true
            note: "Voluntary release before completion; another agent may claim."
          failed:
            fields: [ts, agent_id, host, lease_id, reason, retryable]
            idempotent: true
            note: "Terminal-for-this-attempt; retryable=true means a future agent may re-claim."
          completed:
            fields: [ts, agent_id, host, lease_id, evidence_refs]
            idempotent: true
            note: "Terminal. Status flips to `done`. Lease is implicitly released."
      depends_on:
        kind: optional
        type: list-of-id
      blocks:
        kind: optional
        type: list-of-id
      owned_files:
        kind: optional
        type: list-of-path
        note: >
          Hint for agents to detect collisions: if two work items list
          overlapping owned_files and both have active leases, surface a
          warning before either's checkpoint commit.

  status_transition_protocol:
    purpose: >
      Keep the top-level status line, event log, and downstream blockers in
      sync so agents do not re-claim finished work or wait on stale blockers.
    canonical_statuses:
      pending: "Known work, unclaimed, dependencies not yet all satisfied."
      ready: "Known work, unclaimed, dependencies satisfied, eligible for claim."
      claimed: "A lease exists, but implementation has not yet produced code or docs."
      in_progress: "A lease exists and the claimant has started implementation."
      blocked: "Cannot progress without a named external dependency or decision."
      stalled: "No heartbeat before expires_at; reclaimable after a fresh read."
      done: "Completion event exists with evidence refs; do not re-claim."
      failed: "Attempt ended; retryability must be explicit in the failed event."
    rules:
      - "A `claim` event changes status from ready/pending to claimed."
      - "The first implementation `progress` or code checkpoint changes claimed to in_progress."
      - "A `blocked` event must name the blocker, owner host if known, and the next ping time."
      - "A lease with no heartbeat past expires_at folds to stalled; the next agent may reclaim after recording a fresh read."
      - "A `completed` event changes status to done and must update dependency mirrors in every queue table that names the item."
      - "A `released` event returns status to ready if dependencies are satisfied, otherwise pending or blocked with the blocker named."
      - "A `failed` event sets status to failed and must include retryable: true|false plus the smallest next diagnostic chain."
      - "When events and the status header disagree, the latest terminal event wins; immediately patch the header before claiming new work."

  ping_and_triage_protocol:
    purpose: >
      Give agents a deterministic way to wake stale work, ask for help, and
      prioritize without hidden chat state.
    ping_pending_work:
      - "If a ready item has not been claimed for one integration cycle, append a ping note to its Events section with why it matters and what it unlocks."
      - "If an in_progress item misses one heartbeat but lease has not expired, ping the claimant by agent_id/host in the same Events section; do not take the work yet."
      - "If the same blocker appears in two host queues, append or update a cross-host blocker note under plan/issues/cross-host-blocker-roundup-YYYY-MM-DD.md."
    stalled_work:
      - "After expires_at, mark status stalled and append the last known checkpoint, unresolved blocker, and a recommended reclaim scope."
      - "A reclaiming agent must mint a new lease_id; never edit the old lease in place."
    prioritization:
      - "First: blockers that unlock another host's ready item."
      - "Second: failed-retryable work with a narrow diagnostic chain."
      - "Third: ready leaf work in the owning host queue."
      - "Fourth: docs/spec cleanup only when it prevents wrong implementation."
    completion_hygiene:
      - "Mark done work in the item header, not only in the event log."
      - "Update mirror tables such as 'Linux deliverables ... waiting on' in the same commit."
      - "If only part of an item completed, split the remaining gated scope into a new stable ID instead of leaving the original status ambiguous."

  remote_progress_health:
    purpose: >
      Prevent recurrent agents from misclassifying normal remote advancement as
      a coordination problem.
    rules:
      - "Expect `origin/linux-next` to be ahead of a recurrent local checkout on most cycles; that usually means another agent or the integration loop made progress."
      - "Remote-ahead is a blocker only when local dirty state, conflicts, sandbox limits, or missing credentials prevent a fresh fetch/rebase and ledger update."
      - "A repeated no-progress streak on `origin/linux-next` or active sibling branches is the suspicious signal; document it with observed heads, expected cadence, and the host/job that should be checked."
      - "When remote advanced, fresh-read changed plan/methodology ledgers before making assignment decisions."
      - "Do not recommend that the user fix remote-ahead. Recommend action only for stale remote heads, failed pushes, conflicts, or leases that have expired without status packets."

  work_shaping_protocol:
    purpose: >
      Keep multi-agent work large enough to make progress between recurrent
      prompts while still being safe to claim, checkpoint, review, and hand off.
    packet_size:
      preferred: >
        A normal implementation packet should take roughly one or two recurrent
        agent iterations, produce a coherent commit or verification result, and
        unblock a user-visible path, another host, or a release gate.
      too_small: >
        A task is too small when it is just a single obvious edit, local
        cleanup, or one file move that does not independently unblock anything.
        Fold it into the nearest feature, verification, packaging, or CI packet.
      too_large: >
        A task is too large when it cannot be described with one owner_host, one
        expected evidence set, and a plausible next checkpoint. Split by
        platform boundary, protocol boundary, or evidence boundary.
    packet_fields:
      next_action:
        kind: required
        note: "The first concrete command/edit the next agent should perform."
      acceptance_evidence:
        kind: required
        note: "Tests, smoke evidence, commit refs, screenshots, or logs proving done."
      fallback_when_blocked:
        kind: recommended
        note: "The next useful packet this same host should claim if this item blocks."
      dependency_contract:
        kind: recommended
        note: "Exact API/artifact/commit expected from upstream work, not just a prose dependency."
    eager_assignment:
      - "Every active platform queue SHOULD expose at least one unblocked ready packet per host."
      - "If a host's primary path is gated, coordinators SHOULD publish a fallback packet in verification, packaging, diagnostics, docs-distillation, or CI plumbing."
      - "Prefer bundling serial micro-tasks under one claim when they touch the same owned_files and share the same evidence."
      - "Do not split a packet merely to create more ledger entries; split only at ownership, dependency, or evidence boundaries."

  agent_status_packet:
    purpose: >
      Give implementation agents a compact, copyable event shape for progress,
      blockers, errors, dependency requests, and handoffs without relying on
      chat history.
    required_when:
      - "claiming or renewing a lease"
      - "ending a recurrent prompt iteration with unfinished work"
      - "hitting an error, blocker, or dependency gap"
      - "completing or releasing a packet"
    fields:
      item: "stable work item id"
      ts: "UTC ISO-8601"
      agent_id: "host/workstation/harness identifier"
      lease_id: "current lease"
      state: "claim | plan | progress | blocked | failed | released | completed"
      current_plan: "1-4 bullets describing the intended implementation path"
      dependencies:
        - "upstream item, artifact, API, branch, or decision needed"
      blockers:
        - "named blocker with owner_host if known and next ping/check time"
      errors:
        - "command/error summary plus smallest useful diagnostic chain"
      files_touched:
        - "paths or globs touched so collision checks are possible"
      evidence:
        - "commit shas, test commands, logs, screenshots, or smoke results"
      next_checkpoint: "expected next action and ETA/trigger"
      lease_intent: "continue | release | reclaimable_after:<UTC> | done"
    formatting_rule: >
      Append status packets under the owning item's Events section. Keep packets
      short enough that another agent can read the whole item before claiming.

  host_component_ownership:
    rule: >
      Each component declares which host owns its primary implementation.
      Agents on other hosts MAY contribute (especially to shared protocol
      and documentation) but the owning host is responsible for keeping it
      green.
    matrix:
      shared_protocol_and_orchestration:
        crates:
          - tillandsias-control-wire
          - tillandsias-host-shell
          - tillandsias-core
          - tillandsias-headless
          - tillandsias-podman
          - tillandsias-podman-cli
          - tillandsias-vault-client
          - tillandsias-logging
          - tillandsias-metrics
          - tillandsias-otp
          - tillandsias-litmus-rust
          - tillandsias-repeat-graph
          - tillandsias-scanner
          - tillandsias-browser-mcp
        owner_host: linux
        contribution_policy: >
          Any host may propose changes via PR or via plan/issues. Linux host
          owns the green-build invariant on `linux-next`.
      linux_native_tray:
        crates:
          - tillandsias-headless (the `--tray` GTK feature)
        owner_host: linux
        notes: >
          The Linux native tray is in-process; no separate crate, just the
          `tray` feature module under `tillandsias-headless`.
      macos_native_tray:
        crates:
          - tillandsias-macos-tray
          - tillandsias-vm-layer (the `vz`/`virtualization.framework` modules)
        owner_host: macos
        contribution_policy: >
          Other hosts MUST NOT edit AppKit/VFR-specific code paths without
          coordinating in plan/. The shared `vm-layer::recipe`/`materialize`/
          `cache` modules are exempt — they are co-owned per
          plan/issues/tray-convergence-coordination.md.
      windows_native_tray:
        crates:
          - tillandsias-windows-tray
          - tillandsias-vm-layer (the `wsl` modules)
          - tillandsias-vm-layer's `fetch` module (download feature)
        owner_host: windows
        contribution_policy: >
          Other hosts MUST NOT edit Win32/WSL-specific code paths without
          coordinating in plan/.
      cross_cutting_documentation_and_methodology:
        scopes:
          - methodology/**
          - openspec/changes/**
          - openspec/specs/**
          - plan/**
          - cheatsheets/**
          - docs/cheatsheets/**
          - top-level *.md tombstones
        owner_host: any
        contribution_policy: >
          Any agent on any host may write here. ALL writes go to
          `linux-next` per [[crdt_principles.invariants.stable_ids]] and the
          plan-write discipline. Conflicts reconciled by stable-ID upsert.

  agent_self_assignment_protocol:
    overview: >
      Agents start cold (no memory of prior session) and need a
      deterministic way to find work eligible for their host + capabilities.
    steps:
      - id: 0_orient
        action: >
          Read methodology.yaml, methodology/distributed-work.yaml (this
          file), methodology/multi-host-development.yaml, plan.yaml,
          plan/index.yaml, and the integration-loop ledger
          (plan/issues/multi-host-integration-loop-2026-05-24.md if active).
      - id: 1_identify_self
        action: >
          Determine host (uname/$OS), agent identity, intended capabilities.
          Compose agent_id = "<host>-<workstation>-<harness>-<utc-stamp>".
      - id: 2_fetch_canonical_state
        action: >
          `git fetch origin --prune` then `git checkout linux-next && git
          pull --ff-only`. Plan ledger reads must come from the latest
          origin/linux-next.
      - id: 3_filter_eligible
        action: >
          Walk plan/steps + plan/issues + openspec/changes. Filter where
          owner_host ∈ {own_host, any} AND status ∈ {ready, pending,
          blocked, failed-retryable} AND capability_tags ∩ own_capabilities
          is non-empty AND no overlapping live lease. Treat blocked items as
          eligible only if the blocker is resolved or the item names an
          independent fallback_when_blocked packet.
      - id: 4_pick_one
        action: >
          FIRST prefer packets carrying a `release_target` matching the
          active milestone (see release_aware_packets below) — release-
          targeted work outranks everything except unblocking another
          host. Within the same targeting tier, prefer (a) packets that
          unblock another host, (b) blocked items where the blocker is
          now resolved, (c) failed-retryable items with a narrow
          diagnostic chain, (d) the largest coherent ready packet that
          fits the host capability and lease window. Tie-break by
          dependency depth, then stable-ID lexicographic order.
      - id: 5_claim
        action: >
          Mint lease_id, write a `claim` event to the work item's events
          list, commit + push to linux-next. If the push rebases reveal a
          competing claim, yield (release your local lease, re-filter).
      - id: 6_execute
        action: >
          Switch to the appropriate code branch if needed (windows-next,
          osx-next, or stay on linux-next). Implement. At each meaningful
          checkpoint, emit a compact agent_status_packet as a `progress`,
          `blocked`, or `checkpoint` event back to the work item (commit to
          linux-next), then resume code work.
      - id: 7_terminal
        action: >
          On success: emit `completed` event + commit_sha evidence; update
          item status to `done`.
          On voluntary stop: emit `released` event with reason; status
          returns to `pending` or `blocked`.
          On failure: emit `failed` event with `retryable: true|false` and
          reason.
      - id: 8_push_ledger
        action: >
          ALL plan/ writes push to linux-next, even if the code work is on
          another branch. Per
          [[plan/issues/branch-and-coordination-canon-2026-05-25.md §2]].

  failure_and_handoff:
    rule: >
      Any agent at any time may resume an item left `in_progress` by another
      agent IFF the lease has expired (now > expires_at) OR the prior agent
      emitted a `failed` or `released` event.
    resumption:
      - "Re-read the entire events list for the item — do NOT rely on
        agent memory."
      - "If the prior agent emitted `progress` events with partial_artifact_refs,
        read those artifacts before deciding what's left."
      - "Mint a new lease_id; emit a `claim` event. The previous agent's
        events stay in the log untouched (append-only)."
      - "If the partial work is unrecoverable, emit a `released` event for
        the unrecoverable portion citing the prior lease_id, then claim
        the item fresh."

  merge_policy:
    rule: >
      When two agents push concurrent edits to the same plan/ file, the
      integration loop reconciles by:
    steps:
      - "git merge: if no textual conflict (different sections of the
        same file), accept the merge."
      - "If textual conflict on the same stable-ID block: prefer
        timestamp-major ordering of the embedded events. If both blocks
        added events to the same items list, concatenate and sort by ts."
      - "If textual conflict on a YAML status field: prefer the
        later-timestamped progress_note; record the earlier value in an
        appended event."
      - "NEVER resolve conflict by deletion. Tombstone the superseded
        block and point at the canonical replacement."
    enforcement:
      - "The integration loop ledger
        (plan/issues/multi-host-integration-loop-2026-05-24.md) records
        every conflict resolution it performs."

  ambitious_milestone_reduction:
    decided_by: "The Tlatoāni, 2026-07-15 (enclave service catalog as the proving case)"
    purpose: >
      Large, ambitious goals (multi-month capability milestones) must flow
      through the same monotonic reduction engine as small fixes — never a
      big-bang branch. This codifies the pattern already exercised by the
      order-315 git-mirror audit and stable-milestone-v1 so it is
      repeatable, not emergent.
    milestone_packet_semantics: >
      A `kind: milestone` packet is the criteria holder, never the work:
      multi_cycle: true, estimated_hours: 0, holds milestone_criteria (one
      row per must-land), and accepts only progress/reconcile/waiver
      events. Implementation NEVER claims a milestone packet — it claims
      children. A milestone is done when every criteria row maps to a done
      child or an operator-approved waiver recorded on the milestone.
      Children MAY carry `release_target: <milestone-packet-id>` so worker
      selection concentrates on it (see release_aware_packets).
    reduction_ladder:
      - "1 RESEARCH: fat-agent packets (heaviest models) produce
         provenance-cited current-state maps + external best-practice
         baselines as cheatsheets/plan-issue docs. Research deliverables
         are facts with citations, never decisions."
      - "2 DECISION: a decision-record packet distills research into ONE
         recommended design with alternatives and risks. The Tlatoāni
         signs off EVERY decision record before implementation starts
         (same governance class as bar_raise_governance — architecture
         choices are operator-owned scope)."
      - "3 IMPLEMENTATION RUNGS: the decided design splits into the
         smallest demonstrable slices, each with a named verifiable
         closure (litmus/fixture/e2e evidence) and staged adoption where
         risky (flag -> soak -> default -> remove, per migration
         discipline). First rung is ALWAYS the thinnest end-to-end
         demonstrable path, not a foundation layer."
      - "4 VERIFICATION: milestone criteria close only on evidence events;
         operator-attended criteria are explicit packets, not footnotes."
    invariants:
      - "Every cycle touching the milestone must reduce residual
         uncertainty: a filed research doc, a signed decision, a passed
         closure, or a split that lowers ambiguity. No cycle may only
         reorganize."
      - "Uncertainty ordering: decide transport/protocol/security
         boundaries BEFORE building on them; anything buildable either
         way is deferred to a later rung."
      - "The milestone packet's progress events form the burndown record;
         plan/loop_status.md mirrors it at each coordinator cycle."

  release_aware_packets:
    decided_by: "The Tlatoāni, 2026-07-14"
    purpose: >
      Make the work queue release-aware so distributed agents converge on
      the same shipping goal instead of each locally optimizing an
      unrelated corner of the backlog.
    marker: >
      A packet MAY carry `release_target: <milestone-packet-id>` (e.g.
      `release_target: stable-milestone-v1`). The named milestone is a
      `kind: milestone` packet in plan/index.yaml whose milestone_criteria
      enumerate the must-land set; the marker and the criteria list must
      agree (the coordinator reconciles drift during integration).
    selection_effect: >
      Worker step 4_pick_one prefers release-targeted packets first. A
      host with NO eligible release-targeted work falls back to the
      normal backlog — release targeting concentrates effort, it never
      idles a host.
    lifecycle: >
      The linux coordinator sets and clears markers: applied when a
      milestone is declared, removed (or re-pointed) when the milestone
      ships or a criterion is waived. Only the coordinator or The
      Tlatoāni changes a marker; workers treat it as read-only input.
    known_limits_and_next: >
      This is deliberately the SIMPLEST slice: one flat marker + a
      selection preference. It does not yet solve triage depth,
      cross-host scheduling, queueing fairness, or anti-starvation —
      agents can still contend for the same packet or idle when their
      platform's targeted set is blocked. That evolution is tracked as a
      research packet (collaborative-work-scheduling-research): candidate
      mechanisms include dependency-aware dispatch waves, per-host work
      reservations, priority lanes with aging, and blocked-set
      auto-fallback. Do not grow this section ad hoc — reduce through
      that packet.

  order_number_assignment:
    decided_by: "The Tlatoāni, 2026-07-14"
    problem: >
      Sibling hosts filing packets concurrently mint colliding integer
      order numbers (2026-07-12: 315/316 collided macOS↔linux; 2026-07-13:
      323-327 collided windows↔macos and 328 was used twice). Coordinator
      renumbering then silently breaks every prose reference to the old
      number — the reference debt this rule eliminates.
    rule: >
      `packet_id` (stable kebab-case) is the ONLY authoritative reference
      to a packet. The integer `order` is a coordinator-assigned
      convenience index, unique on linux-next. Hosts other than the linux
      coordinator MUST NOT mint integer orders when filing: file with
      `order: provisional` plus `provisional_id: <host>-<yymmdd>-<n>`
      (e.g. `osx-260714-1`, `win-260714-2`). The linux coordinator assigns
      the final integer during sibling integration, records an
      `order-assigned` event on the packet, and leaves `provisional_id` in
      place as a permanent alias so the filing host's prose references
      stay resolvable.
    reference_discipline: >
      Cross-references in prose (plan/issues, loop_status, commit
      messages, cheatsheets) SHOULD cite `packet_id` (or the
      provisional_id before stabilization). A bare "order N" is valid
      only for numbers already stabilized on linux-next at writing time.
    remediation: >
      Collisions predating this rule were resolved by coordinator
      renumbering (brew-aarch64-harness-strategy 316→317,
      guest-container-metrics-over-control-wire 328→333; the 2026-07-13
      windows block kept 323-327). A prose-reference audit accompanies
      this rule's introduction; future renumbering must update or
      packet_id-ify stale references in the same commit.

  active_multi_host_mediation_and_conflict_handling:
    purpose: >
      Active coordination rules to spot and resolve multi-host cooperation
      blockers including deadlocks, thrashing, and wrong-direction progress.
    protocols:
      deadlock_mediation:
        trigger: "Sibling A and Sibling B are mutually waiting on each other's deliverables."
        action: >
          Break the deadlock by extracting a minimal, mock-based interface contract or
          naming one host as the primary driver to unblock the interface first. Repin
          the blocker to the mock contract task.
      wrong_direction_progress_mediation:
        trigger: "A sibling implements plans or code deviating from active specs or violating core design invariants."
        action: >
          Freeze the sibling's lease. Document the divergence in loop_status.md and their
          work queue. Force-assign a corrective 'Spec Alignment & Litmus Verification'
          packet as their next primary task.
      thrashing_mediation:
        trigger: "Two hosts repeatedly overwrite each other's plan notes or code changes (undo-loops)."
        action: >
          Freeze both active leases. Audit the git history of the thrashed resource. Enforce
          the stable-ID CRDT semantic merge policy for plans, and assign a single synchronous
          conflict-resolution wave to one host while directing the other to a separate,
          independent fallback task.

  agent_execution_roles:
    purpose: >
      Define the two-tier execution model to sustain high velocity and guarantee finite-time
      convergence: the Orchestration tier and the Worker execution tier.
    roles:
      orchestrator:
        skill: "/meta-orchestration (delegates to /advance-work-from-plan, /multihost-orchestration, e2e, and release skills)"
        cadence: "hourly or daily integration cycles"
        focus: >
          Host-aware remote sync, worker drain, global health, blocker tree
          construction, active conflict mediation, e2e gating, release
          triggering on mutable Linux, and board shaping. Publishes unblocked,
          actionable tasks for workers and pushes every durable result.
      worker:
        skill: "/advance-work-from-plan"
        cadence: "highly recurring (every hour or on-demand)"
        focus: >
          Self-assignment orientation, claiming leases, implementing code/specs/cheatsheets,
          emitting progress checkpoints, executing litmus tests, and publishing completed evidence.

  worker_agent_protocol:
    purpose: >
      Detailed execution loop for worker agents to claim, execute, and complete shaped work
      from the plan ledger without conflicting or idling.
    steps:
      - step: orient_and_identify
        description: "Run start-of-session checks to fetch canonical remote state and determine host/capabilities."
      - step: select_shaped_work
        description: >
          Scan the plan ledger. Filter for ready/pending/failed-retryable tasks where owner_host
          matches or is 'any', and matching capability tags exist.
      - step: claim_lease
        description: >
          Write a 'claim' event under the chosen task (upsert), minting a unique lease_id. Commit
          and push to origin/linux-next. If pushed rebase reveals a competing claim, yield and re-select.
      - step: implement_and_checkpoint
        description: >
          Switch to platform branch if target scope requires code work. Perform incremental changes.
          Every 30-45 minutes or at coherent checkpoints, emit an 'agent_status_packet' progress event
          (using the progress/checkpoint event block) and commit/push to linux-next.
      - step: validate_local_litmus
        description: "Run focused local litmus tests to verify current incremental correctness."
      - step: submit_completion
        description: >
          Upon satisfying exit criteria, run the full validation litmus. Write a 'completed' event
          to the events list, update status to 'done', and commit/push to origin/linux-next.
      - step: yield_with_triage
        description: >
          If blocked or failed, write a 'blocked' or 'failed' event with a clear error/reason
          under the item's events list, update status, release the lease, and switch to a ready fallback task.

    forge_cycle_budget:
      decided_by: "The Tlatoāni, 2026-07-10 (plan order 264)"
      rule: >
        Agents running INSIDE a forge container (TILLANDSIAS_HOST_KIND=forge)
        drain AT MOST ONE plan packet per cycle. Before implementing, estimate
        whether the packet's full implement+verify+commit+push fits the launch
        envelope (litmus-launched forge cycles run inside
        litmus:opencode-prompt-e2e-shape STEP 3's 600s budget). If it does not
        fit, do NOT start implementation: SPLIT the packet into smaller ready
        child packets (split_into pattern), record the shaping events, commit
        and push. The shaping commit is that cycle's completed work — a split
        that lowers residual ambiguity is a valid reduction step.
      supersedes: >
        The 2026-06 greedy-drain exception ("claim, implement, and complete as
        many ready forge tasks as possible in a single session"). Greedy forge
        cycles made duration unbounded, so a litmus step timeout was
        indistinguishable from a hung forge (order 264 collision: one in-forge
        cycle implemented the whole of order 263 and timed out the gate while
        perfectly healthy). Host (non-forge) cycles keep the ordinary
        one-coherent-commit budget rule.
      interim_note: >
        Reliance on step timeouts is interim. Order 265 (forge
        heartbeat/liveness signals — we own the launch and the container
        stack) tracks replacing timeout inference with positive liveness.

    e2e_token_budget:
      decided_by: "The Tlatoāni, 2026-07-11"
      rule: >
        A FULL in-forge /meta-orchestration e2e cycle is provider-token
        expensive (the in-forge agent runs on a rate-limited provider
        budget). Hosts run it AT MOST ONCE PER 4 HOURS, enforced by
        scripts/forge-e2e-rate-limit.sh (class full-meta, host-persistent
        stamp under ~/.cache/tillandsias/e2e-rate-limit/). Every other
        forge-hosted e2e run MUST downgrade to the skill's Smoke Mode
        (skills/meta-orchestration/SKILL.md "Invocation Modes"):
        verify-only, no plan drain, no commits, final-line verdict
        `MO-SMOKE: PASS|FAIL <reason>`. Launchers go through
        scripts/litmus-opencode-e2e-launch.sh, which owns the branch and
        records the stamp; ad-hoc full-cycle launches outside the limiter
        are a finding.
      rationale: >
        Repeated full cycles per --ci-full and per destructive-gate retry
        (sometimes killed at the step budget, discarding the work) burned
        the in-forge provider budget and tripped provider rate limits that
        then masqueraded as forge-lane outages (2026-07-10 overnight loop,
        order 284 investigation).
      escape_hatch: >
        TILLANDSIAS_E2E_FORCE=1 makes the limiter's check always allow —
        operator use only; its appearance in committed automation is
        itself a finding.

  long_running_packets:
    trace: "plan order 251 (long-running-work-packet-methodology); plan/issues/long-running-work-packet-methodology-2026-07-09.md"
    purpose: >
      Support work packets that cannot be completed in a single agent cycle
      (large audits, cross-cutting designs, multi-agent-verified artifacts)
      without either stalling them or letting a single agent mark them done
      unverified. Extends [[work_item_schema]] additively; every field below
      is optional for ordinary single-cycle packets.
    schema_extension:
      multi_cycle:
        kind: optional
        type: boolean
        note: >
          true marks the packet as long-running: it accretes progress across
          multiple agent cycles and MUST NOT be flipped to done by the
          implementing agent alone when verification_required is present.
      phase:
        kind: optional_when_multi_cycle
        enum: [research, design, review, implementation, verification]
        rule: >
          Coarse substate advanced monotonically by the agent holding the
          cycle lease. Phase regression (e.g. verification back to design)
          is allowed only via a revision event that names the disagreement
          that forced it.
      progress_summary:
        kind: optional_when_multi_cycle
        type: string
        note: >
          One-paragraph rolling summary updated each cycle so the next agent
          orients from the packet header instead of replaying every event.
          Update-in-place is the sanctioned exception to append-only history,
          mirroring the status field's last-writer-wins rule.
      verification_required:
        kind: optional
        fields:
          agents: "list of {id: <agent-id>, criteria: [<criterion-tag>, ...]}"
          completion_gate: "prose rule; default: ALL listed agents emit verified-by with every assigned criterion pass"
        note: >
          Criterion tags (e.g. NA-01, LM-03) are defined in the packet's
          exit_criteria or deliverable document. An agent listed here
          verifies only its assigned criteria and must not implement the
          same slice it verifies.
    lifecycle_rules:
      - "A claim on a multi_cycle packet is CYCLE-SCOPED: it covers one agent session's slice, not the packet. After the cycle's commit, status returns to ready (not claimed) so the next capable agent or verifier can proceed."
      - "Status stays ready across cycles until the completion_gate is satisfied; only then does a completed event flip it to done."
      - "An implementing agent that satisfies all exit criteria emits a progress event stating implementation-complete and sets phase: verification — it MUST NOT emit completed while verified-by events are outstanding."
      - "Each cycle appends events and updates progress_summary/phase; it never rewrites prior events (append-only history holds)."
      - "Orchestrators treat a multi_cycle packet with phase: verification and missing verified-by events as a dispatch item for the named agents, not as stalled work."
    verified_by_event_protocol:
      event_type: verified-by
      fields:
        ts: "UTC ISO-8601"
        agent_id: "the verifying agent's id — MUST match an id in verification_required.agents"
        criteria: "list of criterion tags checked in this event (subset of the agent's assignment)"
        verdict: "pass | fail | pass-with-notes (per event; a fail names the failing criterion and evidence)"
        evidence: "refs to litmus/test output, file:line citations, or reproduction commands"
      example: |
        - type: verified-by
          ts: "2026-07-11T04:00:00Z"
          agent_id: "opencode-bigpickle"
          criteria: [LM-01, LM-02, LM-03, LM-04, LM-05]
          verdict: pass
          evidence: "methodology/distributed-work.yaml long_running_packets section parses + matches plan/index.yaml order 245-251 usage; plan/long-running.md rows cross-checked"
      rules:
        - "verified-by is append-only and idempotent per (agent_id, criteria-set): re-verification after a revision appends a new event; it never edits the old one."
        - "Any fail verdict returns the packet to phase: review with a revision event; affected criteria require re-verification from scratch after the revision (per the packet's completion_gate)."
        - "verified-by events from agents not listed in verification_required are advisory: recorded, but they do not count toward the gate."
        - "The completed event that closes the packet lists the satisfying verified-by events in evidence_refs."
    additive_update_policy:
      rule: >
        Methodology, spec, and cheatsheet changes produced by long-running
        audit/design packets MUST be additive: a new file, a new section
        under the existing root key, or a clearly marked supersede
        annotation (`supersedes: <old-section-or-rule>` plus a one-cycle
        deprecation note at the old site). Rewriting or deleting existing
        prose in place is not allowed while concurrent agents may hold
        cycles against the same documents.
      rationale: >
        Concurrent agents merge branches containing these documents on every
        cycle (pull_merge_cadence.pre_push_gate). Additive edits keep those
        merges union-shaped and conflict-free; in-place rewrites are the
        thrashing trigger [[active_multi_host_mediation_and_conflict_handling.thrashing_mediation]] exists to punish.
      enforcement: >
        Advisory at review time today; candidate for a litmus once the
        pattern stabilizes (a diff-shape check that flags deletions inside
        methodology/ and openspec/specs/ not annotated as supersede).
    sub_queue_view:
      path: plan/long-running.md
      rule: >
        Manually maintained filtered view of ACTIVE multi_cycle packets
        (status not done/failed): one row per packet with order, packet_id,
        phase, blocking dependency, and outstanding verifications. Updated
        in the same commit as any cycle that changes a listed packet's
        phase, status, or verification tally. plan/index.yaml remains the
        source of truth; on disagreement the index wins and the view is
        patched forward.

  cheatsheet_index:
    - cheatsheets/concurrent-git/branches.md
    - cheatsheets/concurrent-git/agent-handoff.md
    - cheatsheets/concurrent-git/plan-discipline.md

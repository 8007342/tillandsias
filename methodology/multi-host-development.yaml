trace: spec:methodology-accountability

multi_host_development:
  version: v0.1
  purpose: >
    Coordinate Linux, Windows, and macOS hosts working on sibling branches while
    the Fedora Pivot (using official Fedora Cloud/WSL2 images) provides the
    stable, zero-drift runtime enclave. `plan/` remains the durable inter-agent
    ledger for long-running work, failures, restarts, and idempotent recovery.

  platform_branches:
    linux: linux-next
    windows: windows-next
    macos: osx-next
    release: main
    rule: >
      Each host checkpoints to its platform branch. Platform-specific work stays
      on that branch until stable, then merges back to main. Cross-cutting work
      lands on main or the selected shared integration branch and is
      fast-forwarded to all platform branches only after ancestry is verified.
    scope: >
      These branch names (linux-next/windows-next/osx-next/main) are the
      Tillandsias project's OWN development conventions. They apply ONLY when
      the working repository is Tillandsias itself (including dogfooding forge
      cycles launched on this repo). They are NOT a runtime convention of the
      product: a forge launched on an end user's project MUST NOT create,
      assume, or push these branches there.
    forge_target_project_conventions: >
      Agents running inside a Tillandsias forge operate on the TARGET project's
      terms. Before any branch or push decision they discover that project's
      conventions — default branch, existing branch naming, CONTRIBUTING.md /
      repo docs, protection rules — and follow them. When the target project
      declares no convention, agents use its default branch plus ordinary
      short-lived feature branches and surface the choice to the operator;
      they never import Tillandsias-internal branch names into someone else's
      repository. The git mirror service is convention-neutral: it relays
      whatever refs the target project uses.

  branch_convention:
    shared_logic:
      - crates/tillandsias-host-shell
      - crates/tillandsias-core
      - crates/tillandsias-headless
      - images
      - openspec
      - methodology
      - plan
    platform_splits:
      - crates/tillandsias-host-shell-linux
      - crates/tillandsias-host-shell-macos
      - crates/tillandsias-host-shell-windows
      - cfg_target_os_modules
    separation_rule: >
      Keep protocol and shared orchestration in `tillandsias-host-shell` and
      platform-agnostic crates. Keep thin tray wrappers and OS API calls on the
      owning platform branch unless the shared API contract changes.

  host_identity:
    required_fields:
      - host_id
      - platform
      - branch
      - worktree_path
      - agent_id
      - lease_id
      - last_seen_commit
      - upstream_commit
      - observed_sibling_heads
    rule: >
      Every plan lease, agent event, and handoff touching shared files includes
      host_id and platform so a cold-start agent can distinguish Linux local
      state from Windows/macOS remote progress.

  start_of_session:
    required_checks:
      - "git fetch origin"
      - "git pull --ff-only"
      - "git ls-remote origin refs/heads/main refs/heads/linux-next refs/heads/windows-next refs/heads/osx-next"
      - "git status --short --branch"
    rule: >
      Before editing, absorb the current remote head for the active platform
      branch and record sibling branch heads in the plan issue or event that
      governs the work.
    remote_progress_rule: >
      A recurrent agent should normally find `origin/linux-next` ahead of its
      local checkout. Treat that as healthy remote progress and fresh-read the
      changed ledgers. The warning condition is repeated lack of remote progress
      across the expected cadence, or remote-ahead combined with a local dirty
      tree, conflict, sandbox, or credential issue that prevents reconciliation.
    repeat_entrypoint: >
      Long-running unattended hosts should use `./repeat --prompt "Use the
      /meta-orchestration skill"`. The repeat launcher resolves the current
      Git worktree root so multiple Tillandsias checkouts on one host stay
      isolated.

  fast_forward_guard:
    before_updating_platform_branch:
      - "git merge-base --is-ancestor origin/<platform-branch> <source-ref>"
      - "git diff --name-only origin/<platform-branch>..<source-ref>"
    rule: >
      A platform branch may be fast-forwarded from main or another shared
      source only when its current remote head is an ancestor. If the ancestry
      check fails, another host has independent work; stop and coordinate
      through `plan/` before pushing.

  sibling_drift_guard:
    max_unintegrated_commits: 5
    rule: >
      If `git rev-list --count origin/linux-next..origin/<sibling>` exceeds 5
      for `osx-next` or `windows-next`, that sibling is in branch-drift alert.
      Freeze new platform feature leases on that sibling until it merges
      `origin/linux-next`, records the observed conflicts or smoke evidence, and
      the coordinator creates or updates a named integration packet.
    rationale: >
      The product-critical path crosses shared secure-wire, embedded guest
      binary, VM provisioning, Podman, and forge-launch boundaries. Long sibling
      drift turns implementation progress into hidden uncertainty because branch
      heads can each be locally correct but globally incompatible.
    allowed_work_while_frozen:
      - "merge origin/linux-next into the platform branch"
      - "resolve platform-owned conflicts"
      - "run and record focused no-regression/e2e evidence"
      - "write shared-state plan/methodology updates directly on linux-next"
    prohibited_work_while_frozen:
      - "new platform feature scope unrelated to the integration blocker"
      - "rebasing or cherry-picking published sibling commits across branches"
      - "overwriting linux-next plan/methodology state with stale sibling copies"

  pull_merge_cadence:
    before_start: true
    before_long_verification: true
    before_checkpoint_push: true
    during_long_work: "at each meaningful checkpoint or before touching shared files"
    integration_strategy: >
      Two distinct cases, do not conflate them.
      (1) SAME-branch catch-up (your own UN-PUSHED local commits vs
      origin/<same-branch> on a non-ff push): rebase your local commits onto
      origin/<same-branch>, then run the Integration Verification Gate
      (advance-work-from-plan §6) before push. This rewrites only un-published
      hashes, so it cannot duplicate anything on the trunk.
      (2) CROSS-branch integration (sibling->trunk e.g. windows-next->linux-next,
      and main->branch): MERGE-ONLY (`git merge` / `gh pr merge --merge`). Merges
      PRESERVE commit hashes, so git dedupes already-present commits via ancestry.
      NEVER rebase or cherry-pick PUBLISHED commits across branches: that mints a
      SECOND hash for the same change, and a later merge then applies BOTH copies —
      this is precisely the cb9def48->6dbca259 duplication that broke the trunk.
      (Earlier guidance said "rebase, not merge, for cross-branch"; that was
      backwards and self-defeating — corrected 2026-06-30, see
      plan/issues/methodology-integration-strategy-contradiction-2026-06-30.md.)
    conflict_policy:
      - "Spec, methodology, and plan conflicts block until explicitly reconciled."
      - "Platform crate conflicts stay on the owning platform branch unless a shared API contract changed."
      - "Never resolve conflicts by deleting another host's plan notes; tombstone, supersede, or merge by stable ID."
    pre_push_gate:
      rule: >
        NON-linux-next branches (windows-next, osx-next, any shared non-trunk
        branch) MUST `git fetch` and `git merge origin/linux-next` (merge-only,
        integration_strategy case 2) and resolve all conflicts LOCALLY before
        EVERY push to their remote branch. Pushing un-integrated platform work
        exports the conflict to the linux-next coordinator, who then has to
        resolve platform-side conflicts on the trunk — the wrong side, with the
        least context. Operator directive 2026-07-02: this is the normal
        workflow — platform hosts absorb the merge cost so remote linux workers
        can merge platform branches back into linux-next cleanly.
      applies_to: ["windows-next", "osx-next", "any non-linux-next shared branch"]
      race_exception: >
        If the coordinator is actively merging your already-pushed head (your
        commits are in flight toward linux-next), do NOT race them with a second
        divergent push: wait for their merge to land on origin/linux-next, merge
        THAT into your branch, validate (packets/code survived, tests green),
        then push. First applied 2026-07-02 (windows merge validation of
        6feac841).

  plan_ledger:
    canonical_files:
      - plan.yaml
      - plan/index.yaml
      - plan/steps
      - plan/issues
    scratch_root: plan/localwork
    rules:
      - "Long-running module builds get durable step or issue files before implementation begins."
      - "Agents update the same stable graph node rather than creating host-specific duplicates unless scopes are independent."
      - "Repeated plan updates are semantic upserts keyed by stable IDs."
      - "Each checkpoint records sibling heads observed and whether they were merged, skipped, or blocked."
      - "A failed or restarted agent can reclaim a stale lease only after re-reading plan.yaml, plan/index.yaml, and the governing issue/step."

  markdown_distillation:
    rule: >
      Ad hoc Markdown is intake only. Durable knowledge belongs in methodology,
      OpenSpec specs, provenance-backed cheatsheets, or plan issues/steps.
      Tool-local `CLAUDE.md` files may contain only pointers and local command
      affordances; they must not be a hidden architecture or process source of
      truth.
    intake_paths:
      - CLAUDE.md
      - .claude/*.md
      - top-level *.md reports
    closure_steps:
      - "Distill requirements into openspec/specs."
      - "Distill process rules into methodology."
      - "Distill operational facts into cheatsheets with provenance."
      - "Distill long-running work state into plan/steps or plan/issues."
      - "Replace the source Markdown with a tombstone pointer when retained for compatibility."

  distributed_work:
    rule: >
      The CRDT-inspired primitives for cross-host, cross-agent,
      cross-session work — stable IDs, append-only events, lease+TTL,
      idempotent operations — are defined in
      `methodology/distributed-work.yaml`. That file is the authority for
      the work-item schema, host-component ownership matrix, and the
      agent self-assignment protocol. This section is its index.
    references:
      - methodology/distributed-work.yaml
      - plan/issues/branch-and-coordination-canon-2026-05-25.md
    cheatsheet_index:
      - cheatsheets/concurrent-git/branches.md
      - cheatsheets/concurrent-git/agent-handoff.md
      - cheatsheets/concurrent-git/plan-discipline.md

  plan_write_discipline:
    rule: >
      ALL writes to `plan/`, `methodology/`, `openspec/`, and `cheatsheets/`
      land on `linux-next` regardless of which host or agent authored them.
      The integration loop merges sibling-branch CODE work into
      `linux-next`; SHARED-state writes go directly. See §2 of
      `plan/issues/branch-and-coordination-canon-2026-05-25.md` for the
      full destination matrix.
    rationale: >
      One ledger branch eliminates merge conflicts on coordination state.
      Sibling branches stay focused on platform-specific code, not on
      cross-host narrative.
    procedure:
      - "git fetch origin && git checkout linux-next && git pull --ff-only"
      - "Edit target plan/methodology/openspec file using stable-ID-keyed semantic upsert."
      - "git add ONLY the intended files (never `git add -A` from a dirty tree)."
      - "git commit with `chore(plan): <subject>` or `docs(plan): <subject>`."
      - "git push origin linux-next. On rejection: `git fetch && git rebase origin/linux-next && ./build.sh --check` and retry up to 3 times."
      - "Switch back to your code branch (windows-next / osx-next) when done."
      - "Do not exit a skill successfully with local-only commits or uncommitted tracked changes."
      - "Incomplete but coherent work must be checkpoint-committed, pushed, and recorded in the owning plan item."
      - "Prefer separate `git worktree` directories for concurrent platform branches instead of switching branches with dirty state."

  product_topology_invariant:
    rule: >
      The target runtime is an ephemeral portable cloud region with a frozen
      control plane: top host terminal -> platform tray/launcher -> Fedora 44
      guest -> Podman service stack -> deepest forge container running the
      selected agent harness. Requirements that do not preserve this topology
      must be tombstoned or rewritten before implementation.
    verification_boundary: >
      A packet is not product-complete until it states which hop it proves
      (host, guest, Podman service stack, or deepest forge) and records evidence
      that credentials, version identity, and transport mode did not silently
      cross an unintended boundary.

  idiomatic_layers_for_agents:
    decided_by: "The Tlatoāni, 2026-07-10 attended session (plan order 271)"
    rule: >
      The Tillandsias idiomatic layers (tray/launcher surfaces, the control
      wire, --diagnose, ExecOneShot, PTY attach with the TILLANDSIAS_PTY_DEBUG
      tee, and the litmus/e2e skills' launch shapes) are the ONLY sanctioned
      guest access for agents — for DEVELOPMENT work (forensics, rebuilds,
      probes, log reading) exactly as for user runtime. Making the layers good
      enough for development is what makes them good enough for users. The
      host and guest do not share a trusted network; the guest is fully
      isolated and root is never required.
    when_the_layer_cannot_do_it: >
      A debugging or development task that cannot be performed through the
      sanctioned surfaces is a PRODUCT GAP, not a license to side-step: file
      and promote a packet extending the idiomatic layer (precedents: the
      TILLANDSIAS_PTY_DEBUG tee, orders 268/272), then do the task through
      the extended layer. Side channels — ssh into the guest, cloud-init
      debug keys, host-mounted guest disks, root exec in guest or forge —
      are findings to file, never tools to use. The prompting incident: a
      macOS agent ssh'd into the guest as root via a cloud-init debug key to
      read journals and sneak a manual image rebuild (backdoor closed by
      order 272); the correct move was extending the diagnose/attach
      surface.
    audit_rule: >
      Any `ssh` to a guest address, any root shell in guest or forge, and any
      credential/key material enabling either is a finding in coordinator
      audits and code review — capture it per the reduction engine and check
      the sanctioned-surface litmus (litmus:idiomatic-layers-doctrine-shape)
      still pins this block and its skill cross-references.

  branch_canon:
    rule: >
      Branch names are CANONICAL — `osx-next`, not `macos-next`. The
      branch predates the Apple branding shift from OS X → macOS and is
      grandfathered for stability.
    canonical:
      linux: linux-next
      windows: windows-next
      macos: osx-next
      release: main
    common_mistakes:
      - "Saying `macos-next` — wrong. Always `osx-next`."
      - "Pushing platform code to `linux-next` directly — should route through the platform branch unless the file is shared (plan/, methodology/, openspec/, cheatsheets/)."

  common_pitfalls:
    rule: >
      Learned by the integration loop between 2026-05-24 and 2026-05-25.
      Reading this section before starting a multi-host work session saves
      you from re-experiencing them.
    items:
      - id: dirty-tree-blocks-integration
        symptom: >
          The integration loop skips with "dirty-tree-skipped"; sibling
          backlog grows silently.
        cause: >
          Linux-host had uncommitted edits to methodology/openspec/plan
          (intake docs in flight); STEP 1 of the loop refuses to merge
          onto an uncommitted base.
        mitigation: >
          Commit (or stash) before stepping away. The loop's STEP 1 now
          notes a dirty-tree skip in the ledger; treat 2 consecutive
          dirty-tree skips as a soft escalation.
      - id: claim-collision-on-parallel-amendment
        symptom: >
          Two hosts independently draft the same amendment (e.g. macOS D6
          and Windows D8 of `vm-recipe-provisioning`), and the later
          author has to drop redundant work.
        cause: >
          Neither agent checked the integration branch for a competing
          claim before drafting.
        mitigation: >
          Before starting work on a cross-cutting amendment, look for
          recent commits and open claims on the same scope. Add a CLAIM
          block to the relevant `plan/issues/` file FIRST, push, then
          start drafting. If the claim push reveals a competing claim,
          coordinate before continuing.
      - id: silent-drop-on-unhandled-control-variant
        symptom: >
          Tray sends a control-wire message and never gets a reply; hangs.
        cause: >
          The dispatcher on the receiving transport (unix-socket OR vsock)
          had no arm for that variant and fell through to a silent
          `_ => {}`.
        mitigation: >
          As of commit `a9adf59f`, both dispatchers reply with
          `Error { code: Unsupported }`. New variants must be added to
          the shared dispatcher (see Slice 2 in
          plan/issues/control-socket-protocol-convergence-2026-05-25.md);
          DO NOT fork local handlers.
      - id: macos-direct-commit-to-linux-next
        symptom: >
          `origin/osx-next` is frozen while macOS-authored commits land
          directly on `linux-next`.
        cause: >
          macOS host bypassed its platform branch.
        decision: >
          Ratified for `plan/` writes (canonical per branch-canon issue
          §4). For CODE work, still SHOULD route through `osx-next` so
          the integration loop can run isolation checks. Advisory only;
          the loop notes drift in its ledger.
      - id: gitignore-drift-across-hosts
        symptom: >
          A file like `.claude/scheduled_tasks.lock` is session-state on
          host A, untracked on host B (which adds it to `.gitignore`),
          but the gitignore change only lands on a sibling branch.
        cause: >
          Session-local artifacts vary by harness; one host added the
          ignore on its branch but the other hosts didn't.
        mitigation: >
          When a host adds an entry to `.gitignore` covering a
          cross-platform session artifact, file a plan/ note so the
          integration loop's ledger surfaces the methodology-level
          implication.

  waves_of_local_agents:
    rule: >
      To minimize coordination overhead and sustain development velocity,
      agents claiming work SHOULD utilize local "waves" (parallel or sequential
      local sub-tasks or sub-agents) to implement larger chunks of work rather than executing
      micro-steps and immediately yielding for verification.
    remote_deliverables: >
      Remote hosts must have clear, actionable deliverable definitions in
      `plan/` and use the defined communication protocols (agent_status_packet)
      to report the completion of entire waves, avoiding unnecessary stalls
      while waiting for central unblocking.

  fedora_silverblue_immutable_builders:
    trace: "operator directive 2026-07-16 (The Tlatoāni, 'Toolboxes baby!!'): immutable != restricted"
    immutable_is_actually_flexible: >
      "Immutable" here describes ONLY the host's read-only /usr (rpm-ostree)
      layer — it is NOT a restriction on available tooling and is NOT a reason
      to declare a missing tool a blocker. Standing pre-authorization: any
      agent MAY (and SHOULD) run `sudo dnf install` — and `dnf copr enable`,
      etc. — for ANY package it needs inside ANY toolbox (`tools`,
      `tillandsias-builder`, or a fresh `toolbox create`) WITHOUT asking the
      operator. The sanctioned validators and build deps (ruby for the
      `ruby -ryaml` YAML fallback, shellcheck, gcc/cmake/make, cross
      toolchains, …) are all one toolbox `dnf install` away. Net effect: an
      immutable Linux host is effectively MORE flexible than a mutable one —
      it gets a clean, disposable, per-need build/validate sandbox without
      ever mutating /usr. Do not surface "tool X absent on the bare host" as a
      gap; install it in a toolbox and proceed.
    idempotency_expectation: >
      We like toolboxes AND idempotency. Prefer ENSURING over assuming:
      builder / CI / validation entry points should idempotently install their
      required packages inside the toolbox (see
      scripts/with-tillandsias-builder.sh) so tools are guaranteed present on
      every run, not merely on first init. When adding a tool to a builder's
      ensured set, make the ensure re-run for already-created toolboxes —
      gating the whole install on a single sentinel (e.g. `rustup` presence)
      means existing toolboxes silently miss the newly-added tool. An ensure
      that only fires on a pristine toolbox is not idempotent over a changing
      tool list.
    rule: >
      On Fedora Silverblue (and other immutable Linux hosts), native cross-compilation
      to target guest architectures (like aarch64 musl) requires standard C library headers
      that are missing from the host's minimal bare-metal toolchains. To build without
      rebooting or polluting the host's immutable /usr layer, all compilation MUST be
      standardized inside a local Toolbx container (e.g. tillandsias-builder).
    setup_and_execution:
      - "Create the Toolbx container: toolbox create -y tillandsias-builder"
      - "Enable the cross-compiler COPR repo inside Toolbx: toolbox run --container tillandsias-builder sudo dnf copr enable -y lantw44/aarch64-linux-gnu-toolchain"
      - "Install compilation tools inside Toolbx: toolbox run --container tillandsias-builder sudo dnf install -y gcc aarch64-linux-gnu-gcc aarch64-linux-gnu-glibc"
      - "Build targets via Toolbx wrapper: toolbox run --container tillandsias-builder env CC_aarch64_unknown_linux_musl=aarch64-linux-gnu-gcc CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=rust-lld CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS='-C link-self-contained=yes' cargo build --release --target aarch64-unknown-linux-musl --features listen-vsock"
    rootless_dns_recommendation: >
      Since rootless users cannot write to /etc/hosts, the launcher automatically falls
      back to published port loopback routing (https://127.0.0.1:<port>) on host runs. All
      enclave containers and toolboxes must configure working public resolvers (like 1.1.1.1) in
      ~/.config/containers/containers.conf to bypass broken system-resolved defaults.

  wsl2_hybrid_work:
    trace: "plan/index.yaml wsl2-transparent-build-wrappers; operator directive 2026-07-15"
    rule: >
      Windows hosts carry a DEDICATED `tillandsias-build` WSL2 distro (the
      toolbox sibling; never the runtime `tillandsias` distro, which
      destructive e2e unregisters). `scripts/with-wsl2-builder.sh` re-execs
      build entry points into it transparently, so a Windows worker can run
      the REAL canonical gates and advance Linux-shaped work. Whether to do
      a QUICK LOCAL WSL2 unblock or FILE a plan packet for a Linux-native
      host is a cost boundary, measured 2026-07-15 on a stock Windows 11
      host (order 238 hybrid experiment).
    measured_costs:
      one_time_bootstrap: "~5 min (rootfs import 15s + dnf toolchain ~3min + rustup ~2min); persists across e2e runs"
      per_invocation_overhead: "~1-2s (re-exec + stdin marker probe)"
      shell_or_git_fixture_test: "~3s wall (e.g. test-git-mirror-relay-verified-ack.sh, 3 cases)"
      targeted_warm_cargo_test: "~8s wall (38-test crate)"
      full_workspace_check_warm: "~35s (fmt + check + clippy strict x2); first cold run ~10 min"
    do_locally_via_wsl2:
      - "the canonical gate itself: ./build.sh --check before EVERY push (now mandatory-cheap on Windows; a cargo-only substitute already let one broken merge through, 2026-07-15)"
      - "linux-universe compile/clippy/test verification of any crate (targeted `with-wsl2-builder.sh cargo test -p <crate>`)"
      - "shell/git-shaped scripts and fixture tests (scripts/test-*.sh, litmus command steps, hook/relay fixtures)"
      - "ruby YAML validation + shellcheck (the sanctioned validators, absent from stock Windows)"
      - "unblock-with-NOOP class repairs in sibling scope (cfg gates, dead-code allows) — verify with the wrapped gate, mark PLEASE REVIEW: <sibling>"
      - "research packets whose probes are plain git/bash mechanics (order 238 precedent)"
    file_a_linux_packet_instead:
      - "anything needing podman/containers, the enclave network, systemd services, or live Vault — the build distro deliberately ships none of these; the runtime distro is not a dev substrate"
      - "destructive or long-lived runtime verification (e2e gates, lane launches, curl-install smokes) — these belong to the host-native gates"
      - "work whose exit criteria demand linux-HOST evidence (device integration, immutable-host paths, toolbox behavior)"
      - "multi-hour linux implementation slices when a Linux worker is active — the wrapper makes you CAPABLE, not the cheapest owner; check plan/loop_status.md lane assignments first"
    decision_heuristic: >
      If the verification a change needs is 'compile, unit/fixture tests, or
      script runs against the repo tree', do it locally through the wrapper
      and cite the wrapped-gate evidence in the plan event. If it needs a
      container runtime, a live enclave, host-native hardware/OS surfaces,
      or an attended operator, file (or leave) the packet for a Linux-native
      host and say exactly which evidence is missing. When in doubt: run the
      wrapped gate locally (35s) AND leave the packet's live criteria to the
      owning host — partial local evidence plus an honest residual note
      beats both silence and false completion.

trace: spec:methodology-accountability, spec:podman-orchestration

litmus_centicolon_wiring:
  purpose: >
    Defines how litmus test results map to CentiColon obligations, earned
    credits, penalties, and residual obligation tracking.

  note_on_calculation: >
    The complex arithmetic previously documented here is managed by the
    tillandsias-litmus CLI (or equivalent future tooling). Agents MUST NOT
    attempt to calculate CentiColon budgets and residuals manually.
    Rely on the CLI output to identify the highest residual obligation.

  signal_result_types:
    pass: "Signal executed, assertion succeeded. Earns base credit."
    fail: "Signal executed, assertion failed. Earns no credit, incurs penalty."
    skip: "Signal skipped (preconditions unmet). Does not affect score."

  residual_obligation_tracking:
    definition: |
      residual_cc = obligation_budget_cc - final_earned_cc

    interpretation: |
      A residual of 100cc means 100 named, auditable obligations remain open:
      - Untested MUST requirements
      - Missing negative tests
      - Flaky signals
      - Ambiguous specs

    top_residual_reasons:
      report: |
        The tooling will list the top residual reasons in order of impact:
        - "Untested requirement: spec:X#MUST-Y"
        - "Flaky signal: signal_name"
        - "No negative test for: spec:X#MUST_NOT-Z"

  ci_metrics_output:
    signature_jsonl: |
      File: target/convergence/centicolon-signature.jsonl
      Format: One JSON object per line (immutable, append-only)
    delta_json: |
      File: target/convergence/centicolon-delta.json
      Format: Compact summary for CI report

sources_of_truth:
  - "methodology/litmus.yaml — Structure and binding rules"
  - "methodology/convergence.yaml — Engine metrics and objective"
  - "methodology/proximity.yaml — CentiColon model and interpretation"

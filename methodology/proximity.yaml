
trace: spec:methodology-accountability

proximity:
  version: v0.1
  unit:
    name: "CentiColon"
    symbol: "cc"
    definition: >
      One CentiColon is one hundredth of a normalized spec-obligation closure
      point. It measures auditable obligation closure, not confidence, effort, or
      proof of correctness.
    interpretation: >
      A score of 2778/2800 cc means 22 CentiColons of named, inspectable
      obligations remain open or discounted. The denominator is the current
      obligation budget derived from the spec and its evidence requirements.
    math_basis: >
      CentiColons are a bounded ranking function over the finite obligation-state
      model defined in methodology/math-foundations.yaml. Monotonicity applies only
      under fixed denominator and valid evidence-improving transitions.

  obligation_budget:
    description: >
      Each active spec receives a denominator equal to the weighted sum of its
      auditable obligations. Weights are explicit project policy and must be
      reviewed after major defects or metric-gaming discoveries.
    base_weights:
      must_requirement: 100
      must_not_requirement: 100
      should_requirement: 40
      invariant: 120
      positive_litmus_signal: 80
      negative_litmus_signal: 100
      runtime_trace_signal: 60
      cheatsheet_provenance_binding: 30
      methodology_provenance_binding: 30
      environment_assumption_declared: 25
    modifiers:
      critical_path_multiplier: 1.5
      security_boundary_multiplier: 1.5
      user_visible_contract_multiplier: 1.25
      internal_helper_multiplier: 0.5

  earning_rules:
    description: >
      Obligations earn CentiColons only when evidence is queryable and the linked
      artifact exists at the cited revision.
    evidence_credit:
      spec_exists_and_active: 0.10
      requirement_has_stable_id: 0.10
      implementation_trace_present: 0.15
      litmus_positive_passes: 0.20
      litmus_negative_passes: 0.20
      runtime_trace_observed: 0.15
      provenance_current: 0.10
    cap_rules:
      - no_requirement_can_exceed_50_percent_without_litmus_signal
      - no_requirement_can_exceed_70_percent_without_negative_case_if_must_or_must_not
      - no_security_boundary_can_exceed_80_percent_without_runtime_trace_or_manual_evidence_bundle
      - stale_or_missing_provenance_caps_related_obligation_at_85_percent
      - ambiguous_requirement_caps_related_obligation_at_40_percent

  penalties:
    description: >
      Penalties withhold or subtract CentiColons from the earned score. They are
      intentionally named so a dashboard can show the residual gap.
    ghost_trace: -50
    dead_or_missing_spec: -100
    litmus_flaky: -80
    untested_must_requirement: -70
    missing_negative_case: -50
    stale_cheatsheet_provenance: -20
    methodology_claim_without_provenance: -30
    open_high_uncertainty_event: -60
    metric_gaming_suspected: -120

  rollup:
    requirement_score: >
      requirement_cc = weighted_obligation * earned_credit + penalties bounded to
      [0, weighted_obligation].
    spec_score: >
      spec_cc = sum(requirement_cc, invariant_cc, signal_cc) / obligation_budget.
    project_score: >
      project_cc = weighted average of active spec scores, with critical-path
      specs weighted by their obligation budgets.
    dashboard_shape:
      - spec_id
      - earned_cc
      - total_cc
      - residual_cc
      - top_residual_reasons
      - evidence_bundle_ref
      - open_unknown_events

  release_dashboard:
    description: >
      Each release SHOULD publish a human-readable CentiColon dashboard that
      GitHub can render directly while also publishing a machine-readable summary.
      The dashboard is a release evidence view, not a substitute for the canonical
      signature JSONL.
    audience:
      human: "Browse progress across releases from README-style markdown."
      agent: "Read deterministic JSON and choose the highest residual work."
    artifacts:
      markdown_dashboard: "docs/convergence/centicolon-dashboard.md"
      machine_summary: "docs/convergence/centicolon-dashboard.json"
      per_release_summary: "target/convergence/summary.md"
      canonical_signature: "target/convergence/centicolon-signature.jsonl"
      github_actions_dashboard: "docs/convergence/github-actions-dashboard.md"
      github_actions_summary: "docs/convergence/github-actions-dashboard.json"
      github_actions_signature: "target/convergence/github-actions-signature.jsonl"
      github_actions_delta: "target/convergence/github-actions-delta.json"
      github_actions_evidence_bundle: "target/convergence/github-actions-evidence-bundle.json"
    renderer:
      command: "scripts/update-convergence-dashboard.sh"
      inputs:
        - "target/convergence/centicolon-signature.jsonl"
      outputs:
        - "docs/convergence/centicolon-dashboard.md"
        - "docs/convergence/centicolon-dashboard.json"
        - "target/convergence/summary.md"
    cadence:
      local:
        rule: >
          The signature writer SHOULD run after every local CI invocation that
          computes convergence metrics, including pre-release dry runs.
        pre_commit: >
          Pre-commit hooks MAY refresh the dashboard only when the canonical
          signature file changes or when the commit touches convergence logic.
      main_branch:
        rule: >
          Main-branch merge hooks SHOULD refresh the dashboard and append a
          signed record for the merged state.
        release:
          rule: >
            Release tags MUST refresh the dashboard, evidence bundle, and
            machine summary so published artifacts reflect the released commit.
      ci_cost_policy:
        rule: >
          Expensive litmus or full rebuilds SHOULD remain local-first; cloud
          runners MAY publish the already-computed artifacts but SHOULD avoid
          repeating the full convergence pass unless validating a release.
    history_compaction:
      raw_window:
        preserve_last_n_records: 30
        rule: >
          The raw JSONL signature log SHOULD preserve the most recent 30
          records verbatim for debugging and auditability.
      rollup_window:
        preserve_last_n_buckets: 20
        bucket_span: "release or 7-day bucket, whichever is larger"
        rule: >
          Records older than the raw window MAY be compacted into rollup
          buckets. Each bucket retains min/max/last residuals, mean percent
          closed, worst residual reason, source commit range, and record count.
      tombstone_rule: >
        Compaction MUST NOT delete history without leaving a tombstone entry in
        the JSONL or a rollup bucket reference in the dashboard JSON.
      visual_rule: >
        The dashboard SHOULD show the newest raw rows first, then compacted
        buckets underneath with a distinct glyph or label so readers can tell
        raw evidence from compressed history.
    source_namespaces:
      local_development:
        description: >
          Local convergence runs performed by the host developer environment.
          These are the authoritative high-fidelity measurements.
      github_actions:
        description: >
          GitHub Actions generated-only measurements collected from committed
          code on the hosted runner. These provide an independent accountability
          view and MUST remain separate from local records. The hosted series
          publishes its own dashboard and artifacts, then serves as a committed-
          code cross-check against the local development series.
      comparison_rule: >
        Dashboards MAY compare local and GitHub Actions series, but the source
        namespaces MUST remain distinct so one series does not overwrite the
        other or claim the other's evidence.
    retention:
      last_n_releases_default: 10
      rule: >
        The dashboard lists the last N releases by default and MAY link to full
        historical JSON. Release-specific evidence remains immutable on release
        branches or release artifacts.
    required_release_row_fields:
      - release_version
      - release_date
      - source_commit
      - expected_total_cc
      - actual_earned_cc
      - residual_cc
      - percent_closed
      - max_residual_spec
      - max_residual_reason
      - evidence_bundle_ref
      - centicolon_projection_ref
      - ci_result
    expected_vs_actual:
      expected_total_cc: >
        The denominator for the release's active obligation scope. Denominator
        changes MUST be marked as scope changes rather than hidden regressions or
        improvements.
      actual_earned_cc: >
        The earned CentiColons from validated evidence at release time.
      residual_cc: "expected_total_cc - actual_earned_cc after caps and penalties."
      percent_closed: "actual_earned_cc / expected_total_cc, rendered with residual reasons."
    markdown_bar:
      width: 20
      filled: "#"
      empty: "-"
      template: "`[{bar}] {percent_closed}%`"
      example: "`[###############-----] 75%`"
      rule: >
        Use ASCII bars in committed markdown so GitHub renders consistently.
        Rich UIs may replace them with styled bars, but the markdown remains the
        stable fallback.
    markdown_table_columns:
      - Release
      - Commit
      - Expected cc
      - Earned cc
      - Residual cc
      - Closed
      - Worst residual
      - Evidence
    row_example: >
      | v0.1.260505.13 | abc1234 | 2800 | 2778 | 22 |
      `[###################-] 99%` | port-allocation: missing negative litmus |
      evidence-bundle.json |
    trend_sections:
      - "Last N releases summary"
      - "Largest residual by release"
      - "Scope changes and denominator changes"
      - "Minimax next targets"
      - "Unknown events opened or closed"
    visual_affordances:
      trend_strip: >
        A sparkline or block-bar strip SHOULD summarize percent_closed and
        residual trend across the last N releases, oldest to newest, so the
        direction of travel is visible at a glance.
      latest_pin: >
        The latest release SHOULD appear first and be visually emphasized with a
        marker or stronger glyph weight.
      historical_rows: >
        Each release row MAY include a compact per-release trend glyph and a
        delta against the previous record.
      renderer_scope: >
        Markdown tables are the canonical human view; GitHub-compatible HTML is
        allowed if it improves scanability without requiring JavaScript.
    minimax_next_targets:
      rule: >
        The dashboard MUST list the current top residual obligations by worst-case
        residual_cc, not only the largest aggregate categories. This makes stalls
        visible and gives agents a concrete next attack surface.
      fields:
        - spec_or_obligation_id
        - residual_cc
        - adversary_move
        - recommended_response_move
        - evidence_gap
    anti_gaming:
      - do_not_hide_denominator_growth
      - do_not_report_percent_without_residual_cc
      - do_not_replace_canonical_jsonl_with_markdown
      - do_not_drop_failed_releases_from_trend_without_tombstone
      - do_not_rank_by_easy_closure_when_high_criticality_residual_exists

  anti_gaming:
    rules:
      - centicolons_measure_named_obligations_not_lines_of_code
      - adding_trivial_requirements_must_not_inflate_project_score
      - denominator_changes_must_be_reported_as_scope_changes
      - deleting_obligations_requires_tombstone_or_bounded_uncertainty_exception
      - scores_above_95_percent_require_no_open_high_uncertainty_events
      - human_review_can_mark_metric_gaming_suspected_and_apply_penalty
    mutation_check: >
      High-scoring obligations SHOULD be mutation-tested or manually perturbed.
      If violating the requirement does not reduce the score or fail a signal,
      the obligation's scoring rule is invalid.

  relationship_to_existing_scores:
    convergence_score: >
      Existing convergence_score remains a coarse health indicator for coverage,
      trace completeness, staleness, and litmus binding.
    centicolons: >
      CentiColons are a finer residual-work unit. They explain what remains
      missing after convergence_score says a spec is mostly covered.
    rule: >
      A dashboard MAY show both. It MUST NOT report convergence_score as a
      substitute for CentiColon residuals when discussing correctness proximity.

  calibration:
    inputs:
      - postmortems
      - unknown_event_closures
      - human_review_disagreements
      - escaped_defects
      - litmus_flakiness_history
    rule: >
      Weight changes are methodology changes. They MUST cite the event or evidence
      bundle that motivated recalibration.

  validation:
    math_model_ref: "methodology/math-foundations.yaml:validation_program"
    required_properties:
      - earned_cc_is_bounded_between_zero_and_total_cc
      - residual_cc_equals_total_cc_minus_earned_cc
      - earned_cc_non_decreasing_for_valid_fixed_denominator_transitions
      - residual_cc_non_increasing_for_valid_fixed_denominator_transitions
      - denominator_changes_emit_scope_changed
      - same_frozen_state_same_router_same_weights_same_score

  deterministic_reproduction:
    rule: >
      Given the same repository state, spec set, evidence bundle, router version,
      and proximity weights, independent agents SHOULD reproduce the same
      CentiColon totals and residual reasons. Divergence is an unknown event unless
      caused by an explicitly named evidence or scope difference.
    inputs:
      - repository_commit
      - methodology_version
      - bootstrap_router_version
      - spec_hashes
      - litmus_results
      - trace_index
      - proximity_weights
      - open_unknown_events
    divergence_action: "record methodology/event entry or fix ambiguous scoring rule"

  release_projection:
    description: >
      CentiColon comments in source code are a generated release projection, not
      hand-maintained development source. They are valuable because they make
      residual correctness obligations browseable beside the exact release code,
      while the canonical metrics remain machine-readable.
    canonical_metric_artifact: "target/convergence/centicolon-signature.jsonl"
    human_projection_artifact: "release/<version>-centicolon branch and annotated source archive"
    source_of_truth_order:
      - canonical_release_commit
      - evidence_bundle
      - centicolon_signature_jsonl
      - generated_annotated_source_projection
    generated_comment_contract:
      scope: "behavior-bearing code spans or lines with named obligations"
      format_intent: >
        A generated trailing or leading comment MAY cite relevant spec, methodology,
        cheatsheet, evidence, earned_cc, residual_cc, and reason codes. The exact
        text format is renderer-owned, but it must be reconstructable from the
        canonical JSONL signature.
      required_tags:
        - cc_span_id
        - spec_or_obligation_id
        - earned_cc
        - residual_cc
        - reason_code
        - evidence_ref
      rule: >
        Projection comments MUST NOT be edited by agents or treated as canonical
        scoring input. They are a view generated from canonical metrics.

    validation:
      - strip_generated_centicolon_comments_reproduces_release_source
      - every_projection_comment_has_matching_jsonl_record
      - every_jsonl_record_for_behavior_span_has_projection_comment_or_explicit_no_comment_reason
      - projection_branch_ref_and_signature_hash_are_recorded_in_evidence_bundle
      - generator_version_is_recorded

    value:
      - human_debuggable_correctness_proximity
      - stable_historical_evidence_per_release
      - code_viewer_can_render_live_version_metrics_by_fetching_release_artifacts
      - active_development_source_remains_clean

  minimax_validation:
    description: >
      Minimax validation treats uncertainty as the adversary. A system is closer
      to convergence when the strongest plausible counterexample, mutation,
      environment shift, stale provenance case, or trace gap leaves less residual
      CentiColon debt.
    objective: >
      Minimize the maximum residual CentiColon debt over active specs, critical
      paths, and adversarial validation scenarios. Average improvement is secondary
      to reducing the worst named residual that can invalidate a convergence claim.
    adversary_moves:
      - mutate_implementation_and_expect_bound_litmus_or_tests_to_fail
      - generate_counterexamples_from_must_and_must_not_requirements
      - rerun_litmus_across_compatible_environments
      - repeat_tests_to_measure_temporal_stability_and_flakiness
      - invalidate_or_age_cheatsheet_provenance_and_measure_caps
      - remove_or perturb_runtime_trace_emission_and_measure_trace_gap
      - compare_requirement_level_bindings_against_spec_level_only_traces
    response_moves:
      - add_or_fix_negative_litmus_signal
      - bind_trace_to_requirement_or_invariant
      - update_spec_to_remove_behavioral_ambiguity
      - refresh_or_replace_stale_provenance
      - add_runtime_trace_evidence
      - split_overbroad_requirement_into_measurable_obligations
      - record_unknown_event_when_the_model_cannot_explain_the_gap
    stall_policy: >
      When aggregate convergence stalls, choose the open obligation or spec with
      the highest worst-case residual_cc after adversary moves. Work that target
      before optimizing lower-residual or already-green areas.
    score_shape:
      per_scenario:
        - scenario_id
        - target_spec_or_obligation
        - adversary_move
        - residual_cc_before
        - residual_cc_after
        - evidence_refs
        - next_response_move
      rollup: "max_residual_cc_by_criticality_then_total_residual_cc"

# Podman Registries Configuration for Tillandsias
# @trace spec:podman-registries-config
#
# This file configures podman's image resolution behavior:
# - Local Tillandsias images use bare names (tillandsias-git:v0.1.x)
# - External images use fully-qualified names (docker.io/library/squid:6.1)
# - Short-name resolution is disabled to prevent TTY prompts in CI/scripts
#
# Location: ~/.config/containers/registries.conf (user) or /etc/containers/registries.conf (system)
# See: https://docs.podman.io/en/latest/markdown/podman.1.html#registries-configuration-file
# See: https://github.com/containers/image/blob/main/docs/containers-registries.conf.5.md

# Disable searching external registries for unqualified image names.
# This ensures:
# - tillandsias-git:v0.1.x looks ONLY in local storage
# - Fails fast if image doesn't exist locally (no search, no TTY prompt)
# - External images MUST use fully-qualified names (docker.io/...)
unqualified-search-registries = []

# Disable short-name resolution to prevent interactive registry selection.
# With this disabled, any unqualified name not found locally fails immediately.
short-name-mode = "disabled"

# Define external registries explicitly for fully-qualified images.
# Example: podman pull docker.io/library/squid:6.1
[[registry]]
location = "docker.io"
# Use official Docker Hub (HTTPS, TLS verified)
insecure = false

[[registry]]
location = "quay.io"
# Backup registry for broader availability
insecure = false

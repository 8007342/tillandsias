# Podman Registries Configuration for Tillandsias
# @trace spec:podman-registries-config
#
# This file configures podman's image resolution behavior:
# - Local Tillandsias images use bare names (tillandsias-git:v0.1.x)
# - External images use fully-qualified names (docker.io/library/squid:6.1)
# - Short-name resolution is disabled to prevent TTY prompts in CI/scripts
#
# Location: ~/.config/containers/registries.conf (user) or /etc/containers/registries.conf (system)
# See: https://docs.podman.io/en/latest/markdown/podman.1.html#registries-configuration-file
# See: https://github.com/containers/image/blob/main/docs/containers-registries.conf.5.md

# Local images are stored in localhost (default podman storage).
# This allows podman to find locally-built images like localhost/tillandsias-git:v0.1.x
[[registry]]
location = "localhost"
insecure = true

# External registries for pulling non-local images.
[[registry]]
location = "docker.io"
insecure = false

[[registry]]
location = "quay.io"
insecure = false

# Disable short-name resolution to prevent TTY prompts in non-interactive contexts.
# With this set:
# - tillandsias-git:v0.1.x → searches the above registries in order
# - If found in localhost (local storage) → uses it
# - If not found → continues to external registries if they're in the list
# - No TTY prompt (search is non-interactive)
short-name-mode = "disabled"

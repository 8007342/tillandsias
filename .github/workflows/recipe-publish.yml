# @trace openspec/changes/vm-recipe-provisioning §2b.3, §3, §3.7.1, §3.7.2, §D6
#
# Recipe-publish: turn `images/vm/Recipefile` + `manifest.toml` into the
# per-arch artifacts that non-Linux hosts fetch on first run (per D6
# "dual materialization paths, CI-fetch as default for non-Linux hosts").
#
# Outputs uploaded to the GitHub release (when triggered by a release tag)
# AND as workflow artifacts (always, 30-day retention):
#   tillandsias-rootfs-x86_64.tar           (Linux + WSL2 import)
#   tillandsias-rootfs-aarch64.tar          (Apple Silicon dev + audit)
#   tillandsias-rootfs-aarch64.img          (Apple Silicon → VFR)
#   tillandsias-rootfs-SHA256SUMS           (manifest pin source)
#
# Matrix runs both arches in parallel on Linux runners — per D6 the macOS
# `.img` conversion runs on Linux (mkfs.ext4 + parted + losetup are not
# native macOS tools), so no macos-latest runner is needed for materialize.
#
# Triggers:
#   workflow_dispatch  manual run (no release upload)
#   release.published  triggered by `gh release create vX.Y.Z` etc.

name: recipe-publish

on:
  workflow_dispatch:
    inputs:
      executor:
        description: "materialize-cli executor (buildah for real builds, noop for sanity)"
        required: false
        default: buildah
        type: choice
        options: [buildah, noop]
      upload-to-release:
        description: "Tag to upload artifacts to (empty = workflow artifact only)"
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

concurrency:
  group: recipe-publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  materialize:
    name: Materialize ${{ matrix.arch }} rootfs
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          workspaces: . -> target

      - name: Install buildah + materializer prerequisites
        # buildah for the recipe driver; parted/dosfstools/e2fsprogs for the
        # macOS converter; util-linux for losetup. Ubuntu 22.04 ships them
        # but install explicitly so the workflow is reproducible.
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
              buildah \
              parted dosfstools e2fsprogs util-linux \
              tar coreutils
          buildah --version
          parted --version | head -1
          mkfs.ext4 -V

      - name: Build materialize-cli
        run: |
          cargo build --release \
              -p tillandsias-vm-layer \
              --example materialize-cli \
              --features materialize

      - name: Resolve executor (real buildah by default)
        id: exec
        run: |
          EXEC="${{ inputs.executor }}"
          if [[ -z "$EXEC" ]]; then
            EXEC="buildah"
          fi
          echo "executor=${EXEC}" >> "$GITHUB_OUTPUT"
          echo "Using executor: $EXEC"

      - name: Materialize ${{ matrix.arch }} → rootfs.tar
        run: |
          mkdir -p dist out-cache
          ./target/release/examples/materialize-cli \
              --recipe   images/vm/Recipefile \
              --manifest images/vm/manifest.toml \
              --arch     ${{ matrix.arch }} \
              --cache-root  out-cache \
              --output   dist/tillandsias-rootfs-${{ matrix.arch }}.tar \
              --executor ${{ steps.exec.outputs.executor }}
          ls -la dist/

      - name: Convert tar → .img (aarch64 only, for VFR)
        if: matrix.arch == 'aarch64'
        # tar_to_vfr_img needs root for losetup + mount. The runner has
        # sudo available; the script gates on EUID==0 so we re-invoke.
        run: |
          sudo scripts/materialize-macos-tar-to-img.sh \
              dist/tillandsias-rootfs-aarch64.tar \
              dist/tillandsias-rootfs-aarch64.img
          ls -la dist/tillandsias-rootfs-aarch64.img

      - name: Compute SHA-256s
        run: |
          cd dist
          for f in tillandsias-rootfs-*; do
              sha256sum "$f"
          done | tee SHA256SUMS-${{ matrix.arch }}
          cat SHA256SUMS-${{ matrix.arch }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4
        with:
          name: tillandsias-rootfs-${{ matrix.arch }}
          path: |
            dist/tillandsias-rootfs-*
            dist/SHA256SUMS-${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload to GitHub release
        # Only when triggered by release.published OR an explicit
        # --upload-to-release tag was passed.
        if: github.event_name == 'release' || inputs.upload-to-release != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.upload-to-release }}"
          if [[ -z "$TAG" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "Uploading recipe artifacts to release ${TAG}"
          gh release upload "$TAG" dist/tillandsias-rootfs-* --clobber

  # Aggregator job: sums per-arch SHA256SUMS into a single manifest-pin file
  # the maintainer pastes into images/vm/manifest.toml after a successful
  # first run. Always runs; combines both arches' uploads.
  aggregate:
    name: Aggregate SHA256SUMS
    runs-on: ubuntu-22.04
    needs: materialize
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download all per-arch artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist-merged
          pattern: tillandsias-rootfs-*
          merge-multiple: true

      - name: Build unified SHA256SUMS
        run: |
          cd dist-merged
          ls -la
          cat SHA256SUMS-x86_64 SHA256SUMS-aarch64 2>/dev/null \
              | sort -u \
              | tee SHA256SUMS
          echo
          echo "Paste into images/vm/manifest.toml [output.expected_rootfs_sha]:"
          while read -r sha file; do
              # Strip 'tillandsias-rootfs-' prefix to get '<arch>.<ext>'
              key="${file#tillandsias-rootfs-}"
              echo "\"${key}\" = \"${sha}\""
          done < SHA256SUMS

      - name: Upload unified SHA256SUMS artifact
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4
        with:
          name: tillandsias-rootfs-SHA256SUMS
          path: dist-merged/SHA256SUMS
          if-no-files-found: error
          retention-days: 30

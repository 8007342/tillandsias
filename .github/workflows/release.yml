name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.0.25.21). Required when not triggered from a tag."
        required: false
        type: string

permissions:
  contents: write
  id-token: write  # Required for Sigstore Cosign keyless signing (OIDC)

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Build platform-specific Tauri bundles
  # ---------------------------------------------------------------------------
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-aarch64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64

    runs-on: ${{ matrix.platform }}

    env:
      # Tauri Ed25519 signing key -- required for update bundles.
      # If these secrets are missing, `tauri build` will fail, preventing
      # unsigned releases from being published.
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Fail if signing key is missing
        shell: bash
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not configured. Cannot produce signed update bundles."
            exit 1
          fi

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24

      - name: Rust cache
        uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          workspaces: ". -> target"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri (signed)
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Collect build artifacts
        shell: bash
        run: |
          mkdir -p collected-artifacts
          BUNDLE_DIR="target/${{ matrix.target }}/release/bundle"

          # Copy all release-worthy files from Tauri bundle output
          # Note: *.AppImage and *.AppImage.sig are the updater artifacts needed
          # by Tauri's auto-updater on Linux. Tauri v2 does NOT produce a .tar.gz
          # for Linux — only the raw AppImage and its detached Ed25519 signature.
          find "${BUNDLE_DIR}" -type f \( \
            -name "*.AppImage" -o -name "*.AppImage.sig" \
            -o -name "*.AppImage.tar.gz" -o -name "*.AppImage.tar.gz.sig" \
            -o -name "*.dmg" \
            -o -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \
            -o -name "*.exe" \
            -o -name "*.msi" -o -name "*.msi.sig" \
            -o -name "*.nsis.zip" -o -name "*.nsis.zip.sig" \
          \) -exec cp {} collected-artifacts/ \;

          # Rename portable formats to versionless names.
          # These self-update via Tauri — version in filename becomes stale.
          cd collected-artifacts
          for f in *.AppImage; do
            [ -f "$f" ] && mv "$f" "Tillandsias-linux-x86_64.AppImage" 2>/dev/null || true
          done
          for f in *.AppImage.sig; do
            [ -f "$f" ] && mv "$f" "Tillandsias-linux-x86_64.AppImage.sig" 2>/dev/null || true
          done
          for f in *.AppImage.tar.gz; do
            [ -f "$f" ] && mv "$f" "Tillandsias-linux-x86_64.AppImage.tar.gz" 2>/dev/null || true
          done
          for f in *.AppImage.tar.gz.sig; do
            [ -f "$f" ] && mv "$f" "Tillandsias-linux-x86_64.AppImage.tar.gz.sig" 2>/dev/null || true
          done
          for f in *_aarch64.dmg; do
            [ -f "$f" ] && mv "$f" "Tillandsias-macos-aarch64.dmg" 2>/dev/null || true
          done
          for f in *_x64.dmg; do
            [ -f "$f" ] && mv "$f" "Tillandsias-macos-x86_64.dmg" 2>/dev/null || true
          done
          for f in *.app.tar.gz; do
            [ -f "$f" ] && mv "$f" "Tillandsias-macos-aarch64.app.tar.gz" 2>/dev/null || true
          done
          for f in *.app.tar.gz.sig; do
            [ -f "$f" ] && mv "$f" "Tillandsias-macos-aarch64.app.tar.gz.sig" 2>/dev/null || true
          done
          for f in *-setup.exe; do
            [ -f "$f" ] && mv "$f" "Tillandsias-windows-x86_64-setup.exe" 2>/dev/null || true
          done
          for f in *-setup.nsis.zip; do
            [ -f "$f" ] && mv "$f" "Tillandsias-windows-x86_64-setup.nsis.zip" 2>/dev/null || true
          done
          for f in *-setup.nsis.zip.sig; do
            [ -f "$f" ] && mv "$f" "Tillandsias-windows-x86_64-setup.nsis.zip.sig" 2>/dev/null || true
          done
          cd ..

          echo "Collected artifacts:"
          ls -la collected-artifacts/

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: build-${{ matrix.label }}
          path: collected-artifacts/*
          if-no-files-found: error
          retention-days: 3

  # ---------------------------------------------------------------------------
  # Collect all artifacts, sign with Cosign, generate checksums, create release
  # ---------------------------------------------------------------------------
  sign-and-release:
    name: Sign and release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate version matches VERSION file
        run: |
          FILE_VERSION="$(tr -d '[:space:]' < VERSION)"

          # Resolve version: prefer workflow_dispatch input, fall back to tag
          if [ -n "${{ inputs.version }}" ]; then
            RESOLVED_VERSION="${{ inputs.version }}"
            echo "Version source: workflow_dispatch input"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            RESOLVED_VERSION="${GITHUB_REF_NAME#v}"
            echo "Version source: git tag"
          else
            echo "::error::No version provided. Either push a v* tag or provide a version input via workflow_dispatch."
            exit 1
          fi

          if [ "$RESOLVED_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Resolved version ($RESOLVED_VERSION) does not match VERSION file ($FILE_VERSION)"
            exit 1
          fi
          echo "VERSION=$FILE_VERSION" >> "$GITHUB_ENV"
          echo "Version validated: v$FILE_VERSION"

      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: release-artifacts
          pattern: build-*
          merge-multiple: true

      - name: List artifacts before signing
        run: ls -la release-artifacts/

      - name: Generate SHA256 checksums
        run: |
          cd release-artifacts
          sha256sum -- * > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      # -- Cosign signing (keyless via GitHub OIDC) ---------------------------
      #
      # Tauri already produces Ed25519 .sig files for auto-update bundles
      # (e.g., *.AppImage.sig). Cosign signatures use the .cosign.sig and
      # .cosign.cert extensions to avoid collision with Tauri signatures.

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1

      - name: Verify Cosign installation
        run: cosign version

      - name: Sign artifacts with Cosign (keyless)
        run: |
          cd release-artifacts
          for artifact in *; do
            # Skip non-binary files: checksums, Tauri Ed25519 sigs, Cosign outputs
            case "${artifact}" in
              SHA256SUMS|*.sig|*.cosign.sig|*.cosign.cert) continue ;;
            esac

            echo "::group::Signing ${artifact}"
            cosign sign-blob \
              --yes \
              --oidc-issuer "https://token.actions.githubusercontent.com" \
              --output-signature "${artifact}.cosign.sig" \
              --output-certificate "${artifact}.cosign.cert" \
              "${artifact}"

            # Verify the signature and certificate files were created
            if [ ! -f "${artifact}.cosign.sig" ] || [ ! -f "${artifact}.cosign.cert" ]; then
              echo "::error::Signing failed for ${artifact} -- missing .cosign.sig or .cosign.cert file"
              exit 1
            fi

            echo "Signed: ${artifact}"
            echo "  -> ${artifact}.cosign.sig"
            echo "  -> ${artifact}.cosign.cert"
            echo "::endgroup::"
          done

      - name: Verify all signable artifacts are signed
        run: |
          cd release-artifacts
          EXPECTED=0
          SIGNED=0
          for artifact in *; do
            case "${artifact}" in
              SHA256SUMS|*.sig|*.cosign.sig|*.cosign.cert) continue ;;
            esac
            EXPECTED=$((EXPECTED + 1))
            if [ -f "${artifact}.cosign.sig" ] && [ -f "${artifact}.cosign.cert" ]; then
              SIGNED=$((SIGNED + 1))
              echo "OK: ${artifact} (.cosign.sig + .cosign.cert present)"
            else
              echo "::error::MISSING Cosign signature files for ${artifact}"
              exit 1
            fi
          done

          echo ""
          echo "Cosign-signed ${SIGNED}/${EXPECTED} artifacts"

          if [ "${SIGNED}" -ne "${EXPECTED}" ]; then
            echo "::error::Not all artifacts were signed (${SIGNED}/${EXPECTED})"
            exit 1
          fi

          if [ "${EXPECTED}" -eq 0 ]; then
            echo "::error::No artifacts found to sign"
            exit 1
          fi

      - name: List all release files
        run: ls -la release-artifacts/

      # -- Generate Tauri update manifest (latest.json) ----------------------
      #
      # Tauri's updater plugin fetches this manifest to discover available
      # updates. The version MUST be the 3-part semver from tauri.conf.json
      # (not the 4-part VERSION file) because CARGO_PKG_VERSION is 3-part.
      # URLs point to the release assets on this same GitHub release.

      - name: Generate latest.json
        run: |
          # Extract 3-part semver (Major.Minor.ChangeCount) from 4-part VERSION
          SEMVER="$(echo "$VERSION" | cut -d. -f1-3)"
          REPO="${{ github.repository }}"
          TAG="v${VERSION}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          # Read Ed25519 signatures from the .sig files produced by Tauri
          read_sig() {
            local sigfile="release-artifacts/$1"
            if [ -f "$sigfile" ]; then
              cat "$sigfile"
            else
              echo ""
            fi
          }

          LINUX_SIG="$(read_sig 'Tillandsias-linux-x86_64.AppImage.sig')"
          MACOS_AARCH64_SIG="$(read_sig 'Tillandsias-macos-aarch64.app.tar.gz.sig')"
          WINDOWS_NSIS_SIG="$(read_sig 'Tillandsias-windows-x86_64-setup.nsis.zip.sig')"
          WINDOWS_MSI_SIG="$(read_sig 'Tillandsias_${SEMVER}_x64_en-US.msi.sig')"

          # Build the manifest. Platform keys follow Tauri v2 convention:
          #   "{os}-{arch}" where os is linux/darwin/windows and arch is x86_64/aarch64
          cat > release-artifacts/latest.json << MANIFEST
          {
            "version": "${SEMVER}",
            "full_version": "${VERSION}",
            "notes": "See release notes at ${BASE_URL}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "linux-x86_64": {
                "url": "${BASE_URL}/Tillandsias-linux-x86_64.AppImage",
                "signature": "${LINUX_SIG}"
              },
              "darwin-aarch64": {
                "url": "${BASE_URL}/Tillandsias-macos-aarch64.app.tar.gz",
                "signature": "${MACOS_AARCH64_SIG}"
              },
              "windows-x86_64": {
                "url": "${BASE_URL}/Tillandsias-windows-x86_64-setup.nsis.zip",
                "signature": "${WINDOWS_NSIS_SIG}"
              }
            }
          }
          MANIFEST

          # Remove leading whitespace from heredoc indentation
          python3 -c "
          import json, sys
          with open('release-artifacts/latest.json') as f:
              data = json.load(f)
          with open('release-artifacts/latest.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "

          echo "--- latest.json ---"
          cat release-artifacts/latest.json

      # -- Create GitHub Release with verification instructions ---------------

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: v${{ env.VERSION }}
          draft: false
          prerelease: ${{ contains(env.VERSION, '-rc') || contains(env.VERSION, '-beta') || contains(env.VERSION, '-alpha') }}
          generate_release_notes: true
          body: |
            ## Verify artifact signatures (Cosign)

            All release artifacts are signed with [Sigstore Cosign](https://docs.sigstore.dev/) using keyless mode via GitHub Actions OIDC identity. Every signature is recorded in the [Rekor transparency log](https://rekor.sigstore.dev/).

            ### Install Cosign

            ```bash
            # macOS (Homebrew)
            brew install cosign

            # Debian / Ubuntu
            sudo apt-get install cosign

            # Or download from: https://github.com/sigstore/cosign/releases
            ```

            ### Verify a downloaded binary

            Download the binary along with its `.cosign.sig` and `.cosign.cert` files, then run:

            ```bash
            cosign verify-blob \
              --certificate <ARTIFACT>.cosign.cert \
              --signature <ARTIFACT>.cosign.sig \
              --certificate-identity-regexp "https://github.com/.*/tillandsias/" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              <ARTIFACT>
            ```

            Replace `<ARTIFACT>` with the filename you downloaded.

            ### Verify SHA256 checksums

            ```bash
            sha256sum -c SHA256SUMS
            ```

            For detailed instructions, see [docs/VERIFICATION.md](https://github.com/${{ github.repository }}/blob/main/docs/VERIFICATION.md).
          files: |
            release-artifacts/*
            scripts/install.sh
            scripts/uninstall.sh
            scripts/install.ps1
            scripts/uninstall.ps1

  # ---------------------------------------------------------------------------
  # Update rolling tags (stable + latest)
  # ---------------------------------------------------------------------------
  rolling-tags:
    name: Update rolling tags
    needs: sign-and-release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Force-push stable and latest tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f stable -m "Rolling tag: stable release (${{ github.ref_name }})"
          git tag -f latest -m "Rolling tag: latest build (${{ github.ref_name }})"
          git push origin refs/tags/stable --force
          git push origin refs/tags/latest --force
          echo "Updated rolling tags: stable, latest → ${{ github.sha }}"


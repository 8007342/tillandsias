# @trace spec:ci-release, spec:binary-signing
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release. Defaults to VERSION from the selected ref."
        required: false
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, sign, and publish Linux musl release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          flakehub: false

      - name: Nix Cache
        id: nix-cache
        # Caches the nix store across runs via the GitHub Actions cache backend.
        # Critical for cost: the aarch64 cross-GCC is built from source by
        # pkgsCross (not in cache.nixos.org), so without this every release run
        # rebuilds GCC. With it, that's a one-time cost.
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-
          save: false

      - name: Resolve and validate version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          FILE_VERSION="$(tr -d '[:space:]' < VERSION)"
          if [ -n "${INPUT_VERSION}" ]; then
            RESOLVED_VERSION="${INPUT_VERSION}"
          else
            RESOLVED_VERSION="${FILE_VERSION}"
          fi

          if [ "${RESOLVED_VERSION}" != "${FILE_VERSION}" ]; then
            echo "::error::Resolved version (${RESOLVED_VERSION}) does not match VERSION file (${FILE_VERSION})"
            exit 1
          fi

          echo "VERSION=${FILE_VERSION}" >> "$GITHUB_ENV"
          echo "Version validated: v${FILE_VERSION}"

      - name: Verify version monotonicity
        run: bash scripts/verify-version-monotonic.sh

      - name: Record Nix Build Start Time
        run: echo "NIX_BUILD_START_TIME=$(date +%s)" >> "$GITHUB_ENV"

      - name: Build musl-static binaries via Nix (host + in-VM agents, both arches)
        run: |
          # Hermetic crane + pkgsCross builds (flake.nix). Replaces the prior
          # cargo+musl-tools (x86_64) and cross/musl.cc (aarch64) paths — both
          # failed in CI (musl.cc network timeout; cross 0.2.5's ancient-glibc
          # container choked on build.rs). The router sidecar + runtime assets
          # are git-tracked, so nix embeds them from the checked-out tree.
          #
          # The secure-channel key is SHA-256 of the binary itself (computed at
          # runtime, not compile time). No env injection or --impure needed.
          # All binaries from identical source produce identical content →
          # identical hash → matching PSK. See release_root_secret().
          nix build -L .#tillandsias-x86_64-musl              --out-link result-host
          nix build -L .#tillandsias-headless-x86_64-musl   --out-link result-hx
          nix build -L .#tillandsias-headless-aarch64-musl  --out-link result-ha

      - name: Verify release builds use binary-self-hash (no dev seed fallback)
        run: |
          # Release builds must NOT contain the debug DEV_ROOT_SEED. With LTO
          # the #[cfg(debug_assertions)] branch is dead-code-eliminated, so the
          # string "tillandsias-dev-root-not-a-secret" is absent from .rodata.
          # Its presence means the binary was built in debug mode → security gap.
          for binary in result-host/bin/tillandsias result-hx/bin/tillandsias result-ha/bin/tillandsias; do
            if [ ! -f "$binary" ]; then
              echo "::error::Binary not found: $binary"
              exit 1
            fi
            if strings "$binary" 2>/dev/null | grep -qF "tillandsias-dev-root-not-a-secret"; then
              echo "::error::FAIL: ${binary} contains the debug DEV_ROOT_SEED — built in debug mode!"
              exit 1
            else
              echo "✓ ${binary}: binary-self-hash active (dev seed absent)"
            fi
          done

      - name: Record Nix Build Duration and Assert Cache Performance
        if: always()
        run: |
          NIX_BUILD_END_TIME=$(date +%s)
          DURATION=$((NIX_BUILD_END_TIME - NIX_BUILD_START_TIME))
          echo "NIX_BUILD_DURATION_SECS=$DURATION" >> "$GITHUB_ENV"

          MINUTES=$((DURATION / 60))
          SECONDS=$((DURATION % 60))
          DURATION_STR="${MINUTES}m ${SECONDS}s"

          CACHE_HIT="${{ steps.nix-cache.outputs.hit }}"

          echo "### Release Nix Build Performance" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Nix Cache Hit | ${CACHE_HIT:-false} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Nix Build Duration | ${DURATION_STR} (${DURATION}s) |" >> "$GITHUB_STEP_SUMMARY"

          echo "{\"cache_hit\": \"${CACHE_HIT:-false}\", \"nix_build_duration_seconds\": $DURATION}" > build-timings.json

          if [ "${CACHE_HIT}" != "true" ]; then
            echo "::warning::Nix Cache Miss: rebuild took ${DURATION_STR}. If flake.lock is unchanged, this is a cache regression!"
            if [ $DURATION -gt 1200 ]; then # > 20 minutes
              echo "::warning::Nix Build exceeded 20 minutes ($DURATION_STR) with a cache miss."
            fi
          else
            echo "Nix Cache Hit verified. Build completed in ${DURATION_STR}."
          fi

      - name: Upload Build Timings Artifact
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4
        with:
          name: build-timings
          path: build-timings.json
          retention-days: 14

      - name: Collect + validate release artifacts
        run: |
          mkdir -p release-artifacts
          install -m 0755 result-host/bin/tillandsias           release-artifacts/tillandsias-linux-x86_64
          install -m 0755 result-hx/bin/tillandsias             release-artifacts/tillandsias-headless-x86_64-unknown-linux-musl
          install -m 0755 result-ha/bin/tillandsias             release-artifacts/tillandsias-headless-aarch64-unknown-linux-musl
          install -m 0755 scripts/install.sh   release-artifacts/install.sh
          install -m 0755 scripts/uninstall.sh release-artifacts/uninstall.sh
          install -m 0755 scripts/verify.sh    release-artifacts/verify.sh

          # musl-static portability sanity (spec:linux-native-portable-executable).
          file release-artifacts/tillandsias-linux-x86_64 | tee /tmp/f.txt
          grep -F "statically linked" /tmp/f.txt
          grep -F "x86-64" /tmp/f.txt
          file release-artifacts/tillandsias-headless-x86_64-unknown-linux-musl | grep -F "x86-64"
          file release-artifacts/tillandsias-headless-aarch64-unknown-linux-musl | grep -F "aarch64"

          # Smoke the host binary's headless mode (runs on this x86_64 runner).
          release-artifacts/tillandsias-linux-x86_64 --version
          HEADLESS_OUTPUT="$(timeout 5 release-artifacts/tillandsias-linux-x86_64 --headless /tmp/tillandsias-release-validation 2>&1 || true)"
          printf '%s\n' "$HEADLESS_OUTPUT"
          grep -F '"event":"app.started"' <<<"$HEADLESS_OUTPUT"
          grep -F '"event":"app.stopped"' <<<"$HEADLESS_OUTPUT"

          cd release-artifacts
          sha256sum -- * > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Verify Cosign installation
        run: cosign version

      - name: Sign artifacts with Cosign bundles
        run: |
          cd release-artifacts
          for artifact in *; do
            case "${artifact}" in
              SHA256SUMS|*.cosign.bundle) continue ;;
            esac

            echo "::group::Signing ${artifact}"
            cosign sign-blob \
              --yes \
              --bundle "${artifact}.cosign.bundle" \
              "${artifact}"
            test -f "${artifact}.cosign.bundle"
            echo "::endgroup::"
          done

      - name: Verify release artifact set
        run: |
          cd release-artifacts
          test -f tillandsias-linux-x86_64
          test -f tillandsias-linux-x86_64.cosign.bundle
          test -f install.sh
          test -f install.sh.cosign.bundle
          test -f uninstall.sh
          test -f verify.sh
          test -f SHA256SUMS
          ls -la

      - name: Assert retired setup/secrets flags are gone from the CLI
        run: |
          # PLEASE REVIEW: osx-next — this guard (added in 38ba099f) banned BOTH
          # --install AND --init from the binary's --help, but --init is a
          # supported, spec-mandated user flag: tillandsias-vault
          # (linux.only-secret-store@v3) states "tillandsias --init SHALL ALWAYS
          # bootstrap Vault". Banning it blocked every release after
          # v0.3.260608.4 (the binary correctly advertises --init in --help).
          # Corrected to guard only the flags v0.3 actually RETIRED
          # (--install/--without-vault/--legacy-keyring-secrets per the
          # "Legacy Fallback Removed" requirement); --init stays a valid flag.
          # The "CI must not invoke setup steps" intent is preserved: the
          # release workflow never runs the binary with --init.
          HELP="$(release-artifacts/tillandsias-linux-x86_64 --help 2>&1 || true)"
          if grep -qE '\-\-install|\-\-without-vault|\-\-legacy-keyring-secrets' <<<"$HELP"; then
            echo "::error::tillandsias binary still advertises a retired setup/secrets flag (--install/--without-vault/--legacy-keyring-secrets)"
            exit 1
          fi
          echo "✓ No retired --install/--without-vault/--legacy-keyring-secrets flags (--init is a supported user flag; CI never invokes it)"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          NOTES_FILE="$(mktemp)"
          cat > "${NOTES_FILE}" <<'BODY_EOF'
          ## Install on Fedora Silverblue or other x86_64 Linux systems

          ```bash
          curl -fsSL https://github.com/8007342/tillandsias/releases/latest/download/install.sh | bash
          ```

          The installer places the musl-static binary in a safe user-owned bin
          directory, usually `~/.local/bin/tillandsias`. If that directory is not
          on `PATH`, it writes idempotent shell startup snippets and prints the
          absolute command you can run immediately.

          It does not install host packages or require a Tillandsias checkout;
          Podman is the only runtime dependency. The binary materializes its
          bundled runtime image assets under user data on first use.

          ## Verify artifact signatures

          Release artifacts are signed with Sigstore Cosign keyless signing through GitHub Actions OIDC and recorded in the Rekor transparency log.

          ```bash
          cosign verify-blob \
            --bundle tillandsias-linux-x86_64.cosign.bundle \
            --certificate-identity-regexp "https://github.com/.*/tillandsias/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            tillandsias-linux-x86_64
          ```

          Verify checksums with:

          ```bash
          sha256sum -c SHA256SUMS
          ```
          BODY_EOF

          GENERATED="$(gh api "repos/${REPO}/releases/generate-notes" \
            -f tag_name="v${VERSION}" \
            -f target_commitish="${GITHUB_SHA}" \
            --jq '.body' 2>/dev/null || true)"
          if [ -n "${GENERATED}" ]; then
            printf '\n%s\n' "${GENERATED}" >> "${NOTES_FILE}"
          fi

          # Stable channel (plan order 305): dailies are PRE-RELEASES.
          # GitHub resolves /releases/latest (the README install URLs) to
          # the newest NON-prerelease, so installs keep pointing at the
          # last promoted stable while breaking dailies ship alongside.
          # Promotion (scripts/promote-stable.sh) flips a vetted daily to
          # prerelease=false; this workflow never does.
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            gh release upload "v${VERSION}" release-artifacts/* --clobber
            gh release edit "v${VERSION}" --title "v${VERSION}" --notes-file "${NOTES_FILE}"
          else
            gh release create "v${VERSION}" \
              release-artifacts/* \
              --target "${GITHUB_SHA}" \
              --title "v${VERSION}" \
              --prerelease \
              --notes-file "${NOTES_FILE}"
          fi

      - name: Update rolling tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # `latest` rolls with every daily. `stable` is NOT touched here —
          # it moves only when scripts/promote-stable.sh promotes a vetted
          # release (plan order 305).
          git tag -f -a latest -m "Rolling tag: latest release v${VERSION}" "${GITHUB_SHA}"
          git push origin refs/tags/latest --force
          echo "Updated rolling tag: latest -> ${GITHUB_SHA}"

  # @trace spec:macos-tray-build-and-release, spec:macos-native-tray
  # macOS Apple-Silicon tray release: builds Tillandsias.app via the same
  # scripts/build-macos-tray.sh used by CI + dev hosts, Cosign-signs the
  # tarball with the same OIDC pattern as the Linux artifact, and uploads
  # the tarball + .cosign.bundle + install-macos.sh + SHA256SUMS to the
  # same GitHub release.
  #
  # Sequenced after `release` (the Linux job) so the GitHub release exists
  # by the time we call `gh release upload`. The Linux job creates the
  # release; this job adds the macOS assets via --clobber.
  macos-release:
    name: Build, sign, and publish macOS tray (Apple Silicon)
    runs-on: macos-latest
    needs: release
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          workspaces: . -> target

      - name: Install guest cross-build tools
        run: |
          brew install zig
          cargo install cargo-zigbuild --locked
          rustup target add aarch64-unknown-linux-musl x86_64-unknown-linux-musl

      - name: Resolve version (same as Linux job)
        id: version
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          if [[ -n "${INPUT_VERSION:-}" ]]; then
            VERSION="${INPUT_VERSION#v}"
          else
            VERSION="$(cat VERSION | tr -d '[:space:]')"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved macOS release version: v${VERSION}"

      - name: Build Tillandsias.app + tarball
        run: scripts/build-macos-tray.sh

      - name: Verify bundle (sanity checks before signing)
        run: |
          codesign --verify --deep --strict --verbose=2 dist/Tillandsias.app
          codesign -d --entitlements - dist/Tillandsias.app 2>&1 \
              | grep -q 'com.apple.security.virtualization'
          ls -la dist/

      # Styled drag-to-Applications disk image for manual installs (the
      # README's "MACOS — MANUAL INSTALL" path). Stable asset name
      # Tillandsias.dmg so the releases/latest/download/ link never goes
      # stale. Appends its own line to dist/SHA256SUMS before staging.
      - name: Build styled DMG (drag to Applications)
        run: scripts/build-macos-dmg.sh

      - name: Verify DMG contents
        run: |
          hdiutil attach dist/Tillandsias.dmg -readonly -nobrowse
          test -d /Volumes/Tillandsias/Tillandsias.app
          test -L /Volumes/Tillandsias/Applications
          test -f /Volumes/Tillandsias/.background/dmg-background.png
          hdiutil detach /Volumes/Tillandsias

      - name: Stage release artifacts
        run: |
          mkdir -p release-artifacts
          cp dist/tillandsias-tray-*-macos-arm64.tar.gz release-artifacts/
          cp dist/Tillandsias.dmg release-artifacts/
          install -m 0755 scripts/install-macos.sh release-artifacts/install-macos.sh
          # The macOS SHA256SUMS uses a distinct filename so it doesn't
          # collide with the Linux job's SHA256SUMS in the GitHub release.
          mv dist/SHA256SUMS release-artifacts/SHA256SUMS-macos
          ls -la release-artifacts/

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign macOS artifacts with Cosign bundles
        run: |
          cd release-artifacts
          for artifact in tillandsias-tray-*-macos-arm64.tar.gz Tillandsias.dmg install-macos.sh; do
            echo "::group::Signing ${artifact}"
            cosign sign-blob \
              --yes \
              --bundle "${artifact}.cosign.bundle" \
              "${artifact}"
            test -f "${artifact}.cosign.bundle"
            echo "::endgroup::"
          done

      - name: Upload macOS assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Release was created by the Linux `release` job (needs:); we just
          # add the macOS assets via --clobber so a re-run is idempotent.
          gh release upload "v${VERSION}" release-artifacts/* --clobber
          echo "Uploaded macOS assets to v${VERSION}"

  windows-release:
    name: Build, sign, and publish Windows tray
    runs-on: windows-2025
    needs: release
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          workspaces: . -> target

      - name: Resolve version (same as Linux job)
        id: version
        shell: bash
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          if [[ -n "${INPUT_VERSION:-}" ]]; then
            VERSION="${INPUT_VERSION#v}"
          else
            VERSION="$(cat VERSION | tr -d '[:space:]')"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved Windows release version: v${VERSION}"

      - name: Stage guest headless binaries (source-matched embed)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Order 282 / 2026-07-19 field skew: this job previously built the
          # tray with NO target-guest staging, so the released tray shipped an
          # empty guest embed and the in-VM fetch script provisioned whatever
          # release it could reach — a version-skewed guest under a fresh
          # tray, resurrecting already-fixed guest bugs in the field. The
          # `release` job (needs:) has already uploaded the source-matched
          # musl guest binaries to THIS version's release; download them so
          # build-windows-tray.ps1 embeds them. Fail the job if absent —
          # shipping a skewed tray is worse than shipping late.
          mkdir -p target-guest
          gh release download "v${{ steps.version.outputs.version }}" \
            --pattern 'tillandsias-headless-*-unknown-linux-musl' \
            --dir target-guest
          ls -la target-guest
          test -s target-guest/tillandsias-headless-x86_64-unknown-linux-musl

      - name: Build + package the Windows tray (windows-owned build script)
        shell: pwsh
        run: |
          # The windows-owned build script now builds AND packages under -Release
          # (tray-convergence-coordination.md ask, done windows-next): produces
          # release-artifacts/tillandsias-tray-<ver>-windows-x64.zip (exe +
          # install-windows.ps1) + a distinct SHA256SUMS-windows. This replaces
          # the prior inline packaging stopgap; the signing step below consumes
          # those exact paths.
          scripts/build-windows-tray.ps1 -Release -Version "${{ steps.version.outputs.version }}"
          Get-ChildItem release-artifacts

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign Windows artifacts with Cosign bundles
        shell: bash
        run: |
          cd release-artifacts
          for artifact in tillandsias-tray-*-windows-x64.zip SHA256SUMS-windows; do
            echo "::group::Signing ${artifact}"
            cosign sign-blob \
              --yes \
              --bundle "${artifact}.cosign.bundle" \
              "${artifact}"
            test -f "${artifact}.cosign.bundle"
            echo "::endgroup::"
          done

      - name: Stage install-windows.ps1 as standalone curl installer
        shell: pwsh
        run: |
          # Publish install-windows.ps1 as a top-level release artifact so users
          # can curl-install without downloading the zip first (parity with
          # install.sh on Linux and install-macos.sh on macOS).
          Copy-Item scripts\install-windows.ps1 release-artifacts\install-windows.ps1
          Write-Host "Staged install-windows.ps1 as standalone release artifact"

      - name: Upload Windows assets to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Release created by the Linux `release` job (needs:); add Windows
          # assets via --clobber so re-runs are idempotent.
          gh release upload "v${VERSION}" release-artifacts/* --clobber
          echo "Uploaded Windows assets to v${VERSION}"

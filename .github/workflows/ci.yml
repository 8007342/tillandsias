# @trace spec:ci-release
# Lean push/PR gate (2026-07-21): nothing validated linux-next pushes or the
# daily release PR server-side, so an agent push with UNPARSEABLE Rust landed
# on linux-next and merge-to-main-and-release step 3 watched an empty check
# set. See plan/issues/agent-pushed-unparseable-code-no-push-ci-2026-07-21.md.
# Intentionally cheap: format + compile every target, NO test execution (the
# full suite runs in local gates and litmus; keep Actions minutes low).
name: CI

on:
  push:
    branches: [linux-next, windows-next, osx-next]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt + workspace check (all targets)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-check

      - name: rustfmt gate (a parse failure fails HERE, loudly)
        run: cargo fmt --all --check

      - name: Workspace check (all features, all targets — test targets included)
        run: cargo check --workspace --all-features --all-targets --locked

  # Cross-typecheck lanes for the cfg-gated tray bodies (issue:
  # plan/issues/cfg-gated-tray-code-never-typechecked-2026-07-21.md). The
  # ubuntu `check` job above swaps in stub files for the platform trays, so the
  # real #[cfg(target_os = ...)] notify_icon/wsl_lifecycle/action_host/
  # status_item/diagnose bodies are only PARSED on Linux, never type-checked.
  # These jobs run `cargo check` on native runners (checking, NOT linking — no
  # cross-linker required) so a mistyped-but-parseable gated edit turns red.
  windows-typecheck:
    name: windows tray typecheck (native msvc, all targets)
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-windows-typecheck

      - name: Type-check cfg-gated Windows tray body (check, not link)
        run: cargo check -p tillandsias-windows-tray --all-features --all-targets

  macos-typecheck:
    name: macos tray typecheck (native aarch64, all targets)
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-macos-typecheck

      - name: Type-check cfg-gated macOS tray body (check, not link)
        run: cargo check -p tillandsias-macos-tray --all-features --all-targets

name: Nix Cache Warm

on:
  push:
    branches:
      - main
      - linux-next
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - '.github/workflows/nix-cache-warm.yml'
  schedule:
    # Run weekly to ensure the cache stays active and doesn't expire
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  warm-cache:
    name: Warm Nix Cache
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@v3.21.2

      - name: FlakeHub Cache
        # Authenticates via GitHub OIDC; no cache secret or GitHub Actions cache
        # quota is needed once the repository is linked to FlakeHub.
        uses: DeterminateSystems/flakehub-cache-action@v3.21.2
        with:
          use-gha-cache: disabled

      - name: Verify FlakeHub Cache authentication
        run: nix store ping --store https://cache.flakehub.com

      - name: Build Nix targets
        run: |
          nix build -L .#tillandsias-x86_64-musl           --no-link
          nix build -L .#tillandsias-headless-x86_64-musl  --no-link
          nix build -L .#tillandsias-headless-aarch64-musl --no-link

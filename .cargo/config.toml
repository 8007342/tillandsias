# Cross-compilation targets for Tillandsias
#
# Verified targets:
#   - x86_64-unknown-linux-gnu   (primary, CI-tested)
#   - aarch64-apple-darwin        (macOS Apple Silicon)
#   - x86_64-pc-windows-msvc      (Windows)
#
# To cross-compile, install the target toolchain and run:
#   rustup target add <target>
#   cargo build --target <target>
#
# Note: Tauri builds for macOS and Windows require their native SDKs.
# Use `tauri build --target <target>` for full application bundles.

# Uncomment to set a specific linker for cross-compilation targets:
# [target.aarch64-apple-darwin]
# linker = "aarch64-apple-darwin-gcc"
#
# [target.x86_64-pc-windows-msvc]
# linker = "lld-link"

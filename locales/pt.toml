env_not_ready = "O ambiente de desenvolvimento ainda nao esta pronto. O Tillandsias o configurara automaticamente — tente novamente em alguns minutos."
install_incomplete = "A instalacao do Tillandsias pode estar incompleta. Reinstale a partir de https://github.com/8007342/tillandsias"
podman_unavailable = "Podman nao esta disponivel"
no_podman = "Erro: podman nao esta instalado ou nao esta no PATH"
genera_exhausted = "Todos os generos esgotados para o projeto {name}"
terminal_failed = "Falha ao abrir o terminal: {error}"
no_terminal = "Nenhum emulador de terminal encontrado (tentou ptyxis, gnome-terminal, konsole, xterm)"

# ── Desktop notifications ────────────────────────────────────
[notifications]

# Tillandsias — Brazilian Portuguese string table
# All user-facing strings for the Rust tray app and CLI.
#
# Keys use dot-notation matching code organisation:
#   menu.*       Tray menu labels
#   cli.*        CLI attach/runner output
#   init.*       `tillandsias --init` output
#   errors.*     Error messages
#   notifications.*  Desktop notifications
#   stats.*      `tillandsias --stats` output
#   clean.*      `tillandsias --clean` output
#   update.*     `tillandsias --update` output

# ── App ─────────────────────────────────────────────────────
[app]
name = "Tillandsias"

# ── Tray menu ───────────────────────────────────────────────
[menu]
attach_here = "Conectar aqui"
root_terminal = "🛠️ Raiz"
projects = "Projetos"
no_projects = "Nenhum projeto detectado"
settings = "Configuracoes"
quit = "Sair do Tillandsias"
blooming = "Em floracao"
maintenance = "⛏️ Manutencao"
stop = "🛑 Parar"
serve_here = "🔗 Servir aqui"
serving = "🔗 Servindo"
seedlings = "🌱 Mudas"
language = "Idioma"
credit = "por Tlatoani"
version = "Tillandsias v{version}"

[menu.github]
label = "GitHub"
login = "🔑 Login no GitHub"
login_refresh = "🔒 Atualizar login do GitHub"
loading = "Carregando..."
all_cloned = "Todos os repositorios clonados localmente"
login_first = "Faca login no GitHub primeiro"
could_not_fetch = "Nao foi possivel buscar os repositorios"
cloning = "Clonando {name}..."
remote_projects = "Projetos remotos"

[menu.claude]
reset_credentials = "🔒 Redefinir credenciais do Claude"

[menu.web]
already_serving = "Ja em servico — abra http://localhost:{port}"

[menu.build]
in_progress = "⏳ Construindo {name}..."
maintenance_setup = "⛏️ Configurando manutencao..."
completed = "✅ {name} pronto"
failed = "❌ Falha na construcao de {name}"

# ── CLI output ───────────────────────────────────────────────
[cli]
attaching = "Tillandsias — Conectando a {name}"
checking_image = "Verificando imagem... {tag}"
ensuring_image = "Garantindo que a imagem esta atualizada..."
image_ready = "✓ Imagem pronta ({size})"
starting_env = "Iniciando ambiente..."
starting_terminal = "Iniciando terminal (shell fish)..."
launching = "Iniciando... (Ctrl+C para parar)"
env_stopped = "Ambiente parado."
waiting_setup = "Aguardando conclusao da configuracao..."

# ── Init command ─────────────────────────────────────────────
[init]
preparing = "Tillandsias init — preparando ambiente de desenvolvimento"
already_ready = "✓ Ambiente de desenvolvimento ja pronto"
ready = "Pronto."
setup_in_progress = "⌛ Configuracao ja em andamento, aguardando..."
setup_timed_out = "✗ Tempo de configuracao esgotado. Se o problema persistir, reinstale a partir de https://github.com/8007342/tillandsias"
env_ready = "✓ Ambiente pronto"
waiting = "⌛ Aguardando conclusao da configuracao..."
setting_up = "Configurando ambiente de desenvolvimento..."
first_run_note = "(Isso pode levar alguns minutos na primeira execucao)"
dev_env_ready = "✓ Ambiente de desenvolvimento pronto"
ready_run = "Pronto. Execute: tillandsias"
setup_failed = "✗ Falha na configuracao: {error}"

# ── Error messages ───────────────────────────────────────────
[errors]

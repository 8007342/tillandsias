image_ready = "✓ Immagine pronta ({size})"
starting_env = "Avvio dell'ambiente..."
starting_terminal = "Avvio del terminale (shell fish)..."
launching = "Avvio... (Ctrl+C per interrompere)"
env_stopped = "Ambiente arrestato."
waiting_setup = "In attesa del completamento della configurazione..."

# ── Init command ─────────────────────────────────────────────
[init]
preparing = "Tillandsias init — preparazione dell'ambiente di sviluppo"
already_ready = "✓ Ambiente di sviluppo gia pronto"
ready = "Pronto."
setup_in_progress = "⌛ Configurazione gia in corso, in attesa..."
setup_timed_out = "✗ Timeout della configurazione. Se il problema persiste, reinstallare da https://github.com/8007342/tillandsias"
env_ready = "✓ Ambiente pronto"
waiting = "⌛ In attesa del completamento della configurazione..."
setting_up = "Configurazione dell'ambiente di sviluppo..."
first_run_note = "(Potrebbe richiedere qualche minuto alla prima esecuzione)"
dev_env_ready = "✓ Ambiente di sviluppo pronto"
ready_run = "Pronto. Esegui: tillandsias"
setup_failed = "✗ Configurazione fallita: {error}"

# ── Error messages ───────────────────────────────────────────
[errors]
setup = "Tillandsias e in fase di configurazione. Se il problema persiste, reinstallare da https://github.com/8007342/tillandsias"

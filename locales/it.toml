# Tillandsias — Italian string table
# All user-facing strings for the Rust tray app and CLI.
#
# Keys use dot-notation matching code organisation:
#   menu.*       Tray menu labels
#   cli.*        CLI attach/runner output
#   init.*       `tillandsias --init` output
#   errors.*     Error messages
#   notifications.*  Desktop notifications
#   stats.*      `tillandsias --stats` output
#   clean.*      `tillandsias --clean` output
#   update.*     `tillandsias --update` output

# ── App ─────────────────────────────────────────────────────
[app]
name = "Tillandsias"

# ── Tray menu ───────────────────────────────────────────────
[menu]
attach_here = "Collegati qui"
root_terminal = "🛠️ Root"
projects = "Progetti"
no_projects = "Nessun progetto rilevato"
settings = "Impostazioni"
quit = "Esci da Tillandsias"
blooming = "In fioritura"
maintenance = "⛏️ Manutenzione"
serve_here = "🔗 Servi qui"
serving = "🔗 In servizio"
seedlings = "🌱 Semenzali"
language = "Lingua"
credit = "di Tlatoani"
version = "Tillandsias v{version}"

[menu.github]
label = "GitHub"
login = "🔑 Accesso GitHub"
login_refresh = "🔒 Aggiorna accesso GitHub"
loading = "Caricamento..."
all_cloned = "Tutti i repository clonati localmente"
login_first = "Accedi prima a GitHub"
could_not_fetch = "Impossibile recuperare i repository"
cloning = "Clonazione di {name}..."
remote_projects = "Progetti remoti"

[menu.claude]
reset_credentials = "🔒 Reimposta credenziali Claude"

[menu.web]
already_serving = "Gia in servizio — apri http://localhost:{port}"

[menu.build]
in_progress = "⏳ Costruzione di {name}..."
maintenance_setup = "⛏️ Configurazione manutenzione..."
completed = "✅ {name} pronto"
failed = "❌ Costruzione di {name} fallita"

# ── CLI output ───────────────────────────────────────────────
[cli]
attaching = "Tillandsias — Collegamento a {name}"
checking_image = "Verifica immagine... {tag}"

infrastructure_failed = "La configurazione ha riscontrato un problema. Alcune funzionalita potrebbero essere lente."
tools_updated = "Gli strumenti di sviluppo sono stati aggiornati. I nuovi ambienti utilizzeranno le versioni piu recenti."


# Tillandsias — Romanian string table
# All user-facing strings for the Rust tray app and CLI.
#
# Keys use dot-notation matching code organisation:
#   menu.*       Tray menu labels
#   cli.*        CLI attach/runner output
#   init.*       `tillandsias --init` output
#   errors.*     Error messages
#   notifications.*  Desktop notifications
#   stats.*      `tillandsias --stats` output
#   clean.*      `tillandsias --clean` output
#   update.*     `tillandsias --update` output

# ── App ─────────────────────────────────────────────────────
[app]
name = "Tillandsias"

# ── Tray menu ───────────────────────────────────────────────
[menu]
attach_here = "Conecteaza aici"
root_terminal = "🛠️ Radacina"
projects = "Proiecte"
no_projects = "Niciun proiect detectat"
settings = "Setari"
quit = "Inchide Tillandsias"
blooming = "In inflorire"
maintenance = "⛏️ Intretinere"
serve_here = "🔗 Serveste aici"
serving = "🔗 In servire"
seedlings = "🌱 Rasaduri"
language = "Limba"
credit = "de Tlatoani"
version = "Tillandsias v{version}"

[menu.github]
label = "GitHub"
login = "🔑 Autentificare GitHub"
login_refresh = "🔒 Reimprospatare autentificare GitHub"
loading = "Se incarca..."
all_cloned = "Toate depozitele clonate local"
login_first = "Autentificati-va mai intai pe GitHub"
could_not_fetch = "Nu s-au putut obtine depozitele"
cloning = "Se cloneaza {name}..."
remote_projects = "Proiecte la distanta"

[menu.claude]

containers_label = "Среды:"
containers_none = "Среды: (нет)"
containers_no_podman = "Среды: (podman недоступен)"
nix_cache_label = "Кэш Nix:"
nix_cache_present = "Кэш Nix:       {path} ({size})"
nix_cache_not_present = "Кэш Nix:       (отсутствует)"
cargo_cache_label = "Кэш Cargo:"
cargo_cache_present = "Кэш Cargo:     {path} ({size})"
cargo_cache_not_present = "Кэш Cargo:     (отсутствует)"
binary_present = "Установленный бинарник: {path} ({size})"
binary_not_present = "Установленный бинарник: (не установлен в {path})"
last_update = "Последнее обновление: {entry}"

install_incomplete = "Установка Tillandsias может быть неполной. Переустановите с https://github.com/8007342/tillandsias"
podman_unavailable = "Podman недоступен"
no_podman = "Ошибка: podman не установлен или отсутствует в PATH"
genera_exhausted = "Все роды исчерпаны для проекта {name}"
terminal_failed = "Не удалось открыть терминал: {error}"

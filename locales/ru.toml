total = "Итого (кэши + бинарник): {size}"
podman_note = "(Хранилище образов podman управляется podman — см. 'podman system df')"

# ── Clean command ────────────────────────────────────────────
[clean]
title = "Tillandsias — очистка артефактов"
complete = "Очистка завершена."
nothing = "Нечего очищать."

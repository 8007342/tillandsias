infrastructure_failed = "При настройке возникла проблема. Некоторые функции могут работать медленно."
tools_updated = "Инструменты разработки обновлены. Новые среды будут использовать последние версии."

# ── Stats command ────────────────────────────────────────────
[stats]
title = "Tillandsias — отчёт об использовании диска"

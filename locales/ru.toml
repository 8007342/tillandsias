container_failed = "  не удалось удалить: {name}"
containers_no_podman = "Среды: (podman недоступен — пропущено)"
nix_cache_removed = "Кэш Nix:  удалён {path} ({size})"
nix_cache_failed = "Кэш Nix:  не удалось удалить {path}: {error}"
nix_cache_not_present = "Кэш Nix:  (отсутствует)"


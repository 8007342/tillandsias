# Tillandsias — Russian string table
# All user-facing strings for the Rust tray app and CLI.
#
# Keys use dot-notation matching code organisation:
#   menu.*       Tray menu labels
#   cli.*        CLI attach/runner output
#   init.*       `tillandsias --init` output
#   errors.*     Error messages
#   notifications.*  Desktop notifications
#   stats.*      `tillandsias --stats` output
#   clean.*      `tillandsias --clean` output
#   update.*     `tillandsias --update` output

# ── App ─────────────────────────────────────────────────────
[app]
name = "Tillandsias"

# ── Tray menu ───────────────────────────────────────────────
[menu]
attach_here = "Подключиться здесь"
root_terminal = "🛠️ Корень"
projects = "Проекты"
no_projects = "Проекты не обнаружены"
settings = "Настройки"
quit = "Выйти из Tillandsias"
blooming = "Цветение"
maintenance = "⛏️ Обслуживание"
stop = "🛑 Остановить"
serve_here = "🔗 Раздавать здесь"
serving = "🔗 Раздача"
seedlings = "🌱 Рассада"
language = "Язык"
credit = "от Tlatoani"
version = "Tillandsias v{version}"

[menu.github]
label = "GitHub"
login = "🔑 Вход в GitHub"
login_refresh = "🔒 Обновить вход в GitHub"
loading = "Загрузка..."
all_cloned = "Все репозитории клонированы локально"
login_first = "Сначала войдите в GitHub"
could_not_fetch = "Не удалось получить репозитории"
cloning = "Клонирование {name}..."
remote_projects = "Удалённые проекты"

[menu.claude]
reset_credentials = "🔒 Сбросить учётные данные Claude"

[menu.web]
already_serving = "Уже раздаётся — откройте http://localhost:{port}"

[menu.build]
in_progress = "⏳ Сборка {name}..."
maintenance_setup = "⛏️ Настройка обслуживания..."
completed = "✅ {name} готов"
failed = "❌ Сборка {name} не удалась"

# ── CLI output ───────────────────────────────────────────────
[cli]
attaching = "Tillandsias — Подключение к {name}"
checking_image = "Проверка образа... {tag}"
ensuring_image = "Проверка актуальности образа..."
image_ready = "✓ Образ готов ({size})"
starting_env = "Запуск среды..."
starting_terminal = "Запуск терминала (оболочка fish)..."
launching = "Запуск... (Ctrl+C для остановки)"
env_stopped = "Среда остановлена."
waiting_setup = "Ожидание завершения настройки..."

# ── Init command ─────────────────────────────────────────────
[init]
preparing = "Tillandsias init — подготовка среды разработки"
already_ready = "✓ Среда разработки уже готова"
ready = "Готово."
setup_in_progress = "⌛ Настройка уже выполняется, ожидание..."
setup_timed_out = "✗ Время настройки истекло. Если проблема сохраняется, переустановите с https://github.com/8007342/tillandsias"
env_ready = "✓ Среда готова"
waiting = "⌛ Ожидание завершения настройки..."
setting_up = "Настройка среды разработки..."
first_run_note = "(При первом запуске это может занять несколько минут)"
dev_env_ready = "✓ Среда разработки готова"
ready_run = "Готово. Запустите: tillandsias"
setup_failed = "✗ Ошибка настройки: {error}"

# ── Error messages ───────────────────────────────────────────
[errors]
setup = "Tillandsias настраивается. Если проблема сохраняется, переустановите с https://github.com/8007342/tillandsias"

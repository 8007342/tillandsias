interface:
  display_name: "Build, Install, and Smoke Test E2E"
  short_description: "Build + install the local tray and run a destructive cold smoke on the host's native runtime (Podman / macOS VM / WSL2)"
  default_prompt: "Use $build-install-and-smoke-test-e2e to build and install the locally built Tillandsias tray, destroy this host's runtime substrate (Podman store on Linux, the Virtualization.framework VM on macOS, or the WSL2 distro on Windows), re-provision from a pristine state, and (Linux only) run the forge enhancement smoke. File every issue as a plan/issues work packet."

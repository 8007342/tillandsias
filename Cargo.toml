[workspace]
members = [
    "crates/tillandsias-core",
    "crates/tillandsias-scanner",
    "crates/tillandsias-podman",
    "src-tauri",
]
resolver = "3"

[workspace.package]
edition = "2024"
license = "GPL-3.0-or-later"
authors = ["Tlatoani"]

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
postcard = { version = "1", features = ["alloc"] }
notify = "8"
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
dirs = "6"
thiserror = "2"

# Internal crates
tillandsias-core = { path = "crates/tillandsias-core" }
tillandsias-scanner = { path = "crates/tillandsias-scanner" }
tillandsias-podman = { path = "crates/tillandsias-podman" }

# cheatsheets/license-allowlist.toml
#
# Tier classifier for the cheatsheet system. Relocated from
# cheatsheet-sources/ to cheatsheets/ in change cheatsheets-license-tiered
# to sit next to the cheatsheets it classifies (the verbatim cheatsheet-sources/
# tree is being retired).
#
# Each domain entry declares:
#   publisher       — human-readable name
#   license         — short license identifier (SPDX or short ID)
#   license_url     — canonical URL for the license text
#   redistribution  — bundled | attribute-only | do-not-bundle  (legal authority)
#   default_tier    — bundled | distro-packaged | pull-on-demand  (cheatsheet tier when frontmatter omits 'tier')
#   last_evaluated  — ISO date the license was last re-checked (manually OR by an in-forge agent post-pull)
#   evaluated_by    — hand-curated | agent-runtime-pull | host-refresh-script
#
# Default-tier inference:
#   redistribution=bundled      → default_tier=bundled         (forge image bake)
#   redistribution=attribute-only→ default_tier=bundled         (cheatsheet must attribute per license)
#   redistribution=do-not-bundle→ default_tier=pull-on-demand  (forge image carries stub only; agent pulls at runtime)
#
# This file is a CRDT.  Every pull-on-demand fetch by an in-forge agent
# re-evaluates the upstream's license declaration and bumps last_evaluated;
# license drift between the stored value and the upstream emits a
# `license_drift` event in the cheatsheet-telemetry EXTERNAL log channel.
# Auto-merge of agent-proposed allowlist edits is OUT of scope until v3;
# today host maintainers triage the drift events and edit the TOML by hand.
#
# Cheatsheets cite their per-document license in their `## Provenance` section;
# the per-domain license here is the *default* assumption when a cheatsheet's
# frontmatter omits `tier`. Per-cheatsheet `tier:` overrides win for edge cases
# (e.g., a single CC-BY-SA cheatsheet on a domain whose default is unspecified).
#
# Domains not in this file are treated as `default_tier = pull-on-demand` by
# the validator (safe default: never accidentally bundle an unaudited domain).
#
# @trace spec:cheatsheets-license-tiered, spec:cheatsheet-source-layer

# ---------------------------------------------------------------------------

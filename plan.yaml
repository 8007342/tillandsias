plan:
  version: v1
  name: tillandsias-hourly-autonomy
  repo_root: .

  launcher:
    wrapper: ./codex
    default_profile: tillandsias
    current_directory: true
    prompt_template: './codex "Look at ./plan.yaml and continue implementation using ./methodology.yaml"'
    repeat_template: './codex --repeat 30m "Look at ./plan.yaml and continue implementation using ./methodology.yaml"'

  methodology:
    root: methodology.yaml
    router: methodology/bootstrap/router.yaml
    convergence: methodology/convergence.yaml
    spec_system: methodology/spec-system.yaml
    verification: methodology/verification.yaml

  current_state:
    last_completed_step: security-substrate-closure
    next_step: browser-and-web-security
    next_graph_node: browser/launcher-contract
    plan_index: plan/index.yaml
    step_directory: plan/steps
    checkpoint_branch: linux-next
    platform_focus: linux-only
    cross_platform_deferred: "2026-05-14 — see plan/issues/deferral-windows-macos-2026-05-14.md"

  coordination:
    selection_model: dependency_graph
    claim_model: lease
    handoff_assumption: >
      The next agent may be different from the current one, so every note must
      be self-contained and cold-start readable.
    idempotence_rule: >
      Repeated plan updates with the same step or graph node ID and update ID
      must converge to the same state.
    scratch_root: plan/localwork
    remote_durability: origin

  continuation_policy:
    selection_rule: >
      Read plan.yaml, plan/index.yaml, and methodology.yaml first. Then choose
      the highest-priority dependency-graph node whose status is ready and whose
      file scope is not claimed. If the current node is blocked, promote the next
      independent ready node instead of stalling.
    update_order:
      - "Update the step file with the latest evidence, blockers, and next action."
      - "Update plan/index.yaml status and next_step pointers."
      - "Update plan.yaml current_state only after the step index is updated."
    clarification_rule: >
      If a step needs a decision that cannot be derived locally, mark it
      needs_clarification, write the exact question and recommended default in
      the step file, and continue with another ready step if one exists.
    checkpoint_rule: >
      Every meaningful batch ends with a checkpoint commit and push to origin/linux-next.
      It is acceptable for that checkpoint to contain incomplete work if the state is coherent.
      Use a meaningful checkpoint-style commit message that records remaining work and the next action.
    handoff_rule: >
      Write every checkpoint as if the next reader will be a fresh agent with no
      conversational memory. Include the current branch, file scope, residual
      risks, checkpoint SHA, and dependency tail.

  status_values:
    - pending
    - ready
    - in_progress
    - blocked
    - needs_clarification
    - completed
    - obsoleted

  completion_criteria:
    - "Every step is either completed, obsoleted, or explicitly blocked with a recorded question."
    - "No active step lacks a deliverable file under plan/steps/."
    - "Each hourly invocation can resume from plan/index.yaml without rereading prior chat context."
    - "The wrapper contract remains `./codex <prompt>` with the Tillandsias profile selected by default."

  notes:
    - "Step 02a (podman-idiomatic-foundation) was inserted 2026-05-14 between browser-and-web-security and tray-runtime-and-cache. It depends on security-substrate-closure and can run in parallel with browser-and-web-security. tray-runtime-and-cache now depends on both 02 and 02a."
    - "This plan is intentionally biased toward the highest-residual active specs first."
    - "Retired specs stay tombstoned or obsolete; do not revive them in later passes."
    - "If a step becomes stale because another step obsoleted its dependency, mark it obsoleted rather than completing it."
    - "Local work is ephemeral; remote origin is the durable copy."
    - "The `./codex --repeat <duration> \"<prompt>\"` wrapper contract is the default autonomous entrypoint."
    - "Use `./codex --quiet` for noninteractive sessions, `./codex --quit` for one-shot TUI runs, and `./codex --repeat <duration> --times <n>` for bounded repeat cycles."
    - "The repeat interval is the sleep between sessions; each session should show live agent-work updates while running."
    - "Repeat-mode dashboards should show only active work and repaint when the running agent emits a new update."
    - "The repeat-mode dashboard is rendered by the compiled Rust helper at `crates/tillandsias-repeat-graph`."
    - "The quiet repeat supervisor is tokio-driven and should wake on child stdout, note-file changes, and a low-frequency heartbeat instead of shell polling."
    - "Anonymous stream events may advance the current focus bar, but they must not create standalone tasks in the tree."
    - "When a task uncovers ambiguity or a useful refinement, file an immediate bootstrap note in `./plan/issues/` or `./methodology/events/` before edits begin, then refresh it after each meaningful substep so future agents can pick up the thread without chat history."
    - "plan/localwork is disposable scratch, not canonical state."
    - "Repeat-mode agents should end with a compact JSON progress report, not a raw reasoning stream."
    - "Repeat-mode output must distinguish between waiting on the agent process and sleeping until the next iteration."
    - "If repeat mode has not yet observed a refinement note, the dashboard should surface bootstrap pending rather than implying useful progress."
    - "Keep progress notes modest and portable: prefer plain repo paths over @-style file references."
    - "Graph-summary build passes such as ./build.sh --ci-full --graphs should stay quiet and compact between repeat iterations."
    - "If existing metadata already exposes it, repeat-mode dashboards may include per-task token spend and remaining-rate-limit percentage, but they must not make extra API calls to fetch it."

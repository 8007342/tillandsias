# cheatsheet-sources/license-allowlist.toml
#
# Known-good source domains for the verbatim cheatsheet-source layer.
# Each domain entry declares:
#   publisher        — human-readable name
#   license          — short license identifier
#   license_url      — canonical URL for the license text (optional)
#   redistribution   — bundled | attribute-only | do-not-bundle
#
# "bundled"        — verbatim file is committed to git (LFS-tracked)
# "attribute-only" — verbatim file committed only if cheatsheet includes
#                    attribution as required by the license
# "do-not-bundle"  — verbatim file is .gitignore-d; sidecar (.meta.yaml)
#                    IS tracked so any clone can re-fetch via the fetcher
#
# Domains not in this file trip the --manual-review gate in fetch-cheatsheet-source.sh.
#
# @trace spec:cheatsheet-source-layer

# ---------------------------------------------------------------------------
# Standards bodies — freely redistributable
# ---------------------------------------------------------------------------


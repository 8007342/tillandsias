methodology:
  version: v0.6
  authority:
    source_of_truth: methodology.yaml
    rule: >
      This file is the authoritative methodology entry point. If another project
      instruction conflicts with it, follow this file and report methodology drift.
    non_authoritative_files:
      CLAUDE.md: "May summarize local tool notes; must not redefine methodology."

  bootstrap:
    command: "/skills bootstrap"
    first_step: "Read plan.yaml, plan/index.yaml, and methodology/bootstrap/router.yaml."
    selection_rule: "Choose exactly one intent from bootstrap_router.intent_options. The intent defines your required reading set."
    receipt_required_before_source_edits: true
    autonomous_loop: "After bootstrap, iterate via methodology/bootstrap/router.yaml and methodology/convergence.yaml until the selected residual obligation stops decreasing or the spec itself needs refinement."

  entrypoints:
    task_router: methodology/bootstrap/router.yaml
    component_catalog: methodology/catalog.yaml
    agent_observability: methodology/agent-observability.yaml
    forge_diagnostics: methodology/forge-diagnostics.yaml
    multi_host_development: methodology/multi-host-development.yaml
    distributed_work: methodology/distributed-work.yaml
    markdown_distillation: methodology/markdown-distillation.yaml
    plan_root: plan.yaml
    plan_index: plan/index.yaml
    plan_step_notes: plan/steps/README.md
    plan_issues_root: plan/issues
    unknown_event_register: methodology/event/index.yaml
    shared_skills_root: skills/

  shared_skills:
    # Top-level ./skills/ is the canonical, agent-agnostic source of truth.
    # Each per-runtime `.<agent>/skills/<name>` is a symlink to the canonical
    # so there is exactly one file to read + edit. Orchestrators can edit
    # the canonical between iterations to steer remote agent work; every
    # subsequent invocation reads the latest committed version.
    canonical_root: skills/
    symlinked_into:
      - .claude/skills/
      - .opencode/skills/
      - .codex/skills/
      - .gemini/skills/
      - .github/skills/
    registered:
      advance-work-from-plan:
        path: skills/advance-work-from-plan/SKILL.md
        tier: worker   # see methodology/distributed-work.yaml agent_execution_roles
        complement_of: skills/meta-orchestration
        authoritative_spec: methodology/distributed-work.yaml worker_agent_protocol
        purpose: >
          Discover, claim, implement, checkpoint, and complete units of
          work from the shared plan ledger based on host capabilities and
          lease rules. The Worker tier of the two-tier execution model
          documented in methodology/distributed-work.yaml — sustains
          development velocity and enforces finite-time convergence by
          letting any agent on any host autonomously cycle one shaped
          packet from plan/ to completion or yield. Replaces the per-cycle
          long-form work prompt.
        cadence: "~30 min in active sessions; on-demand otherwise"
        host_awareness: detects linux/macOS/Windows → active branch + write scope
        steerable: true   # orchestrator may edit between iterations
      meta-orchestration:
        path: skills/meta-orchestration/SKILL.md
        tier: orchestrator
        purpose: >
          Host-aware recurring loop for `./repeat --prompt "Use the
          /meta-orchestration skill"`: sync remote state, drain
          /advance-work-from-plan, run eligible local-build and curl-install
          e2e gates, coordinate integrations on mutable Linux, release when
          warranted, and push every durable result before exit.
        cadence: "45m repeat loop or on-demand"
        host_awareness: detects immutable Linux, mutable Linux, macOS, and Windows
        steerable: true
      coordinate-multihost-work:
        path: skills/coordinate-multihost-work/SKILL.md
        tier: orchestrator
        purpose: >
          Canonical mutable-Linux multi-host coordination pass. The
          multihost-orchestration skill name is a compatibility alias.
        steerable: true
      forge-continuous-enhancement:
        path: skills/forge-continuous-enhancement/SKILL.md
        tier: worker
        purpose: >
          Iteratively improve the forge itself from within the tillandsias codebase,
          capitalizing on the safe YOLO-mode environment to run diagnostics,
          commit improvements, and push changes autonomously.
        steerable: true
      forge-quick-intro:
        path: skills/forge-quick-intro/SKILL.md
        tier: worker
        purpose: >
          Instantly bootstrap an agent's context to the forge's capabilities (compilers,
          browsers, tools) using minimal tokens, preventing them from manually exploring
          the filesystem to find pre-installed binaries.
        steerable: true
      smoke-curl-install-and-test-e2e:
        path: skills/smoke-curl-install-and-test-e2e/SKILL.md
        tier: worker
        purpose: >
          Host-aware clean-room acceptance gate for a PUBLISHED release:
          curl-install the latest release artifact, destroy the host runtime
          substrate, re-provision from pristine state, and file every issue
          observed as plan/issues work packets for /advance-work-from-plan pickup.
        destructive: true
        destructive_reset_policy: >
          Podman reset is an expected precondition on Tillandsias smoke hosts.
          Do not stop for confirmation when TILLANDSIAS_DESTRUCTIVE_RESET_OK is
          unset or 1; only skip/block if it is explicitly 0.
        steerable: true
      build-install-and-smoke-test-e2e:
        path: skills/build-install-and-smoke-test-e2e/SKILL.md
        tier: worker
        purpose: >
          Host-aware local-build acceptance gate for mutable Linux, macOS, and
          Windows: build and install the current checkout, destroy the native
          substrate, re-provision from pristine state, and file failures as
          ready plan/issues packets. Immutable Linux uses the curl-install e2e
          skill instead.
        destructive: true
        destructive_reset_policy: >
          Explicit invocation authorizes the Podman/VM/WSL reset. Podman reset
          is an expected precondition on Tillandsias smoke hosts; do not
          reconfirm unless TILLANDSIAS_DESTRUCTIVE_RESET_OK=0.
        steerable: true

  invariant_summary:
    - specs_define_intent
    - cheatsheets_compress_provenance_backed_knowledge
    - code_cites_specs_and_relevant_cheatsheets
    - traces_and_litmus_tests_provide_falsifiable_evidence
    - evidence_bundles_bound_convergence_claims
    - unknown_events_capture_surprises_before_distillation
    - centicolons_report_residual_obligations_not_proof
    - releases_require_validated_centicolon_projection_artifacts
    - methodology_refinements_do_not_push_directly_to_main
    - plan_updates_are_idempotent_and_cold_start_friendly
    - agents_assume_next_step_may_be_claimed_by_a_different_agent
    - remote_checkpoints_are_durable_and_local_state_is_ephemeral
    - platform_branches_pull_and_merge_from_durable_remote_before_checkpoints
    - forge_improvements_preserve_privacy_and_isolation_boundaries
    - ad_hoc_markdown_is_intake_not_authority
    - monotonic_reduction_of_uncertainty_through_verifiable_constraints
    - forge_is_safe_environment_with_permissive_yolo_mode_by_default
    - forge_continuous_enhancement_via_self_hosting_agents
    - forge_discoverability_via_baked_in_tellme_and_launch_trained_local_inference

  runtime_language_policy:
    tlatoani_hard_no_python:
      rule: >
        Python is not allowed for Tillandsias runtime, harness, or repository
        scripts. One-off interactive use is still discouraged and must not be
        copied into committed scripts, skills, litmus tests, or runbooks.
      approved_default_languages:
        - Rust
        - POSIX shell only when it dispatches existing binaries or Rust tools
        - PowerShell only for Windows host integration
      exception_process: >
        Anything else requires explicit approval from The Tlatoani before it is
        committed or used by recurring automation.
      checker: scripts/check-no-python-scripts.sh

    base64_script_injection_ban:
      severity: CRITICAL_VIOLATION
      rule: >
        Embedding scripts of ANY language (Python, Perl, Ruby, Lua, …) inside
        base64-encoded string literals — whether in Rust source, YAML, shell, or
        any other file — is unconditionally forbidden. This technique was used in
        2026-07-01 to smuggle Python past the tlatoani_hard_no_python policy and
        is treated as a deliberate act of circumvention, not a workaround.
      corollary: >
        Base64 is a data-encoding format. Its presence in source code as a
        mechanism to generate and execute a script at runtime is indistinguishable
        in effect from committing that script directly — and worse in intent, because
        the encoding makes the content non-obvious to reviewers on other hosts.
      correct_response_when_blocked: >
        If a required fix cannot be implemented in an approved language without
        breaking a policy, the agent MUST surface the constraint explicitly, file a
        coordination issue, and leave the code in the broken-but-honest state.
        A broken flow that fails loudly is always preferable to a working flow that
        hides a policy violation.
      incident_reference: plan/issues/violation-python-base64-injection-2026-07-01.md
      checker: scripts/check-no-base64-script-injection.sh
      reintroduction_note: >
        Reintroduced on windows-next (0c4a6aa3, a bash podman shim in
        pty/mod.rs) and removed again 2026-07-02 during the windows->linux
        integration; the shim was also redundant since Phase 3d
        (vault_bootstrap::ensure_vault_selinux_module loads vault_container.cil).
        The checker above now fails loud on the decode-to-executable idiom.

  semantic_distillation:
    rule: >
      Root files stay terse. Detailed rationale belongs in the owning component
      listed in methodology/catalog.yaml. Ad hoc Markdown intake is inventoried
      and archived through methodology/markdown-distillation.yaml.

  cooperative_work_discipline:
    rule: >
      Instead of using heavy tools like JIRA, we treat project management as code.
      Issues, tasks, and specifications are managed via Git history, Markdown (.md), and YAML (.yaml) files in the ./plan directory.
      Agents must self-improve by logging inefficiencies (e.g., repeated steps, invalidated caches due to uncoordinated build scripts) directly into plan/issues/ as actionable items.

  clean_workspace_discipline:
    rule: >
      Every iteration of work MUST start and end with a completely clean work state (only committed code).
      Once work is reported as completed, all temporary local artifacts are disposable and must be discarded.
      Agents encountering a dirty space have a one-off chance to clean up or commit work; otherwise, they must discard uncommitted artifacts.
      Rely heavily on .gitignore for generated artifacts and dashboards to keep the tree clean.
      Any running `tillandsias` background binaries or test processes MUST be explicitly terminated after tests complete.
      Local builds MUST use an autoincremental build number so agents can quickly detect and discard stale binaries.
      Shared local resources (like e2e test execution) MUST use a `.lock` file system to prevent concurrent execution collisions between agents.


  component_freshness:
    authority: "The Tlatoāni, 2026-07-15 (operator directive)"
    rule: >
      Our own components age — code, scripts, litmus tests, cheatsheets,
      methodology docs, images, artifacts. Every auditable component carries a
      FRESHNESS record answering: when was this last PROPERLY looked at and
      confirmed still meaningful, useful, efficient, sound, and complete?
      CI/CD flags components whose freshness age exceeds threshold for
      RE-FRESH; a flagged component dispatches an agent audit that ends in
      exactly one of: refreshed (re-validated, stamp updated), updated
      (fixed/tuned, stamp updated), or obsoleted (deleted/tombstoned, with
      same-commit removal of dependents). This is a standing, never-ending
      loop woven into the recurring skills, not a one-shot audit.
    discard_over_repair: >
      Agents MUST be able to recognize an obsolete component and DISCARD it
      rather than reuse or repair it when a fresh implementation would be
      better. Repair is not the default disposition. Removed components get a
      tombstone naming what replaced them and why repair was declined (the
      2026-07-15 execute_test_command tombstone in scripts/run-litmus-test.sh
      is the exemplar: dead code that LOOKED live misled a hardening pass and
      cost a full CI cycle).
    freshness_record_grammar: >
      A machine-greppable `freshness:` block (or `# freshness:` comment
      header for scripts): auditor agent id, ISO date, verdict
      (refreshed|updated|obsoleted), one-line scope note. Detailed schema and
      rollout ladder: plan/issues/component-freshness-lifecycle-2026-07-15.md
      (flag -> soak -> default, per migration_discipline).

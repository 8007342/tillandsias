# Tillandsias VM materialization manifest — pinned inputs + expected outputs.
#
# Read by `tillandsias-vm-layer::recipe::Manifest::load`. Per-arch base
# image digests pin the Containerfile's `FROM` so re-materialization is
# reproducible regardless of when the upstream tag moves. `[output]
# .expected_rootfs_sha` is populated by the `recipe-publish` CI job after
# the first successful materialization on each arch; downstream hosts
# verify the fetched artifact against these SHAs.
#
# @trace openspec/changes/vm-recipe-provisioning §D2 + §D6

recipe_version = 1

# Resolved at materialization time; emitted into Hello.capabilities as
# `vm.recipe@<sha>` so the host shell can detect "in-VM headless built
# from a stale recipe" (per D7).
recipe_sha = "auto"

# Pinned Fedora 44 Container Base digests. Refresh via:
#   skopeo inspect docker://registry.fedoraproject.org/fedora:44 \
#       --override-arch <arch> | jq -r .Digest
# Pin manually and update by PR — never auto-update.
[[base]]
arch   = "x86_64"
ref    = "registry.fedoraproject.org/fedora:44"
digest = "sha256:pending-first-pin"

[[base]]
arch   = "aarch64"
ref    = "registry.fedoraproject.org/fedora:44"
digest = "sha256:pending-first-pin"

[output]
# Artifact URL contract (l9): a templated locator that non-Linux hosts
# resolve at fetch time. Variables: `{tag}` (release tag, e.g.
# `v0.2.260526.X`), `{arch}` (`x86_64` / `aarch64`), `{format}`
# (`tar` / `img`). The default GitHub-release-asset path matches
# `.github/workflows/recipe-publish.yml`'s upload step.
#
# Hosts MAY override at install time via `--artifact-url-template`
# (e.g. for an internal mirror) — the recipe stays the trust root
# regardless; manifest SHAs are the verification gate.
#
# @trace plan/issues/cross-host-blocker-roundup-2026-05-25.md l9
artifact_url_template = "https://github.com/8007342/tillandsias/releases/download/{tag}/tillandsias-rootfs-{arch}.{format}"

# Artifact SHAs (D6: dual-path materialization).
# Format keys: "<arch>.<format>" — `tar` for Linux dev + WSL import,
# `img` for macOS VFR (raw EFI+ext4 image).
#
# Mixed provenance (2026-05-27), documented per key:
# - The two .tar SHAs are the FIRST local materialization (buildah, rootless,
#   Recipefile @ 27b55273), published in release v0.2.260526.1. Windows w5
#   PROVED its end-to-end flow against the x86_64.tar SHA below, so these are
#   intentionally LEFT AS-IS to avoid breaking that proof.
# - aarch64.img is the official `recipe-publish` CI artifact (run 26480767287,
#   reproducible). It is the uncompressed-image SHA — the published asset is
#   `tillandsias-rootfs-aarch64.img.xz` (74 MB; the raw 8 GB sparse .img
#   exceeds GitHub's 2 GiB release-asset limit). Consumers fetch the .img.xz,
#   `xz -d`, then verify the decompressed .img against this SHA.
#   Compressed-asset SHA (for .xz download integrity):
#   f63afc7fe1704622ad275385021ca53fc7c3d03f74ce8c145acb685932c800c3
# Reproducibility plan: a future release republishes ALL artifacts from CI
# (official SHAs x86_64.tar=6408fcc8…f4607f, aarch64.tar=f75d5259…09ec6f) under
# a fresh tag, at which point all three keys point at one reproducible build.
[output.expected_rootfs_sha]
"x86_64.tar"  = "d940c3b9a34c7791a5c4cae6ac7cbc5d6bd982722f249f3f6b0caf801124cbad"
"aarch64.tar" = "5483d0fd9709f200028f09ccfddd8d221286c749ce39586ef92c5d8974cfd669"
"aarch64.img" = "0e77d1a5273bafc92559ca568b62ea27b311275fdd43833c05ebe4e058b55b92"
# x86_64.img omitted: no x86_64 VFR consumer in v0.0.1.

# Kernel command-line passed to the VM bootloader. Quiet boot + serial
# console on hvc0 so the host can capture early-boot diagnostics.
[boot]
kernel_cmdline = "quiet console=hvc0 systemd.log_target=console"

# @trace spec:proxy-container
# Squid forward proxy for Tillandsias enclave network.
# Only allowlisted domains are reachable — everything else is denied.

# --- Listen ---
http_port 3128

# --- Allowlist ---
acl allowlist dstdomain "/etc/squid/allowlist.txt"

# Standard ports for CONNECT (HTTPS tunneling)
acl SSL_ports port 443
acl SSL_ports port 8443
acl CONNECT method CONNECT

# --- Access rules ---
# Allow CONNECT only to allowlisted domains on SSL ports
http_access allow CONNECT SSL_ports allowlist

# Deny CONNECT to anything else
http_access deny CONNECT

# Allow plain HTTP to allowlisted domains
http_access allow allowlist

# Deny everything else
http_access deny all

# --- Cache ---
cache_dir ufs /var/spool/squid 500 16 256
maximum_object_size 256 MB

# --- Logging (container-friendly) ---
access_log stdio:/dev/stdout
cache_log stdio:/dev/stderr
cache_store_log none

# --- Identity ---
visible_hostname tillandsias-proxy

# --- Privacy ---
forwarded_for delete
via off

# --- Runtime ---
cache_effective_user proxy
cache_effective_group proxy

# Shutdown quickly when container stops
shutdown_lifetime 3 seconds

# PID file location writable by proxy user
pid_filename /var/run/squid/squid.pid

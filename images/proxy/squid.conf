# @trace spec:proxy-container
# Squid forward proxy for Tillandsias enclave network.
#
# DUAL-PORT ARCHITECTURE with SSL BUMP:
#   Port 3128 — STRICT (runtime containers): allowlisted domains only, SSL bump
#   Port 3129 — PERMISSIVE (image builds): all domains allowed, SSL bump
#
# Both ports share the same disk cache. SSL bump enables HTTPS content caching.

# --- Listen (SSL Bump enabled on both ports) ---
# The intermediate CA cert/key are bind-mounted by the host at launch time.
http_port 3128 ssl-bump \
    tls-cert=/etc/squid/certs/intermediate.crt \
    tls-key=/etc/squid/certs/intermediate.key \
    generate-host-certificates=on \
    dynamic_cert_mem_cache_size=16MB

http_port 3129 ssl-bump \
    tls-cert=/etc/squid/certs/intermediate.crt \
    tls-key=/etc/squid/certs/intermediate.key \
    generate-host-certificates=on \
    dynamic_cert_mem_cache_size=16MB

# --- Certificate generator (sslcrtd) ---
# Squid 6.x: security_file_certgen replaces the old ssl_crtd name.
# -s: storage directory, -M: max cert cache size in MB
sslcrtd_program /usr/lib/squid/security_file_certgen -s /var/lib/squid/ssl_db -M 16
sslcrtd_children 5 startup=1 idle=1

# --- TLS outgoing (proxy -> origin) ---
# Verify upstream server certificates against system CA store.
# DISTRO: Alpine CA bundle path. Fedora would be /etc/pki/tls/certs/ca-bundle.crt
tls_outgoing_options cafile=/etc/ssl/certs/ca-certificates.crt \
    options=NO_SSLv3,NO_TLSv1,NO_TLSv1_1 \
    cipher=HIGH:!aNULL:!MD5

# Bumped traffic terminates origin TLS here, so certificate and hostname
# verification MUST remain enabled. Never add DONT_VERIFY_PEER or
# DONT_VERIFY_DOMAIN: doing so would hide an origin MITM behind a proxy-issued
# certificate that enclave clients trust.

# --- DNS ---
dns_nameservers 1.1.1.1 8.8.8.8

# --- ACLs ---
acl allowlist dstdomain "/etc/squid/allowlist.txt"
acl strict_port localport 3128
acl build_port localport 3129
acl SSL_ports port 443
acl SSL_ports port 8443
acl CONNECT method CONNECT

# @trace spec:subdomain-routing-via-reverse-proxy
# `.localhost` is RFC 6761 loopback. Forge agents that hit
# http://<project>.<service>.localhost/ (default port 80) through
# HTTP_PROXY=proxy:3128 are forwarded to the enclave-internal Caddy
# router via cache_peer below. Squid never resolves these names
# externally — never_direct + cache_peer_access guarantee that.
acl localhost_subdomain dstdomain .localhost

# --- Minimal selective SSL bump ---
# @trace spec:transparent-https-caching, spec:security-privacy-isolation
#
# Squid evaluates ssl_bump rules at every step and the first possible matching
# action wins. Restrict `peek` to SslBump1 so Squid reads ClientHello/SNI once,
# then make the terminal decision at SslBump2. A bare `peek all` would match
# again at SslBump2, usually making the later bump action impossible.
acl ssl_bump_step1 at_step SslBump1

# The only intercepted host is GitHub's dedicated release-asset CDN. Use
# ssl::server_name instead of dstdomain so the decision is based on client SNI
# without a reverse DNS lookup. Keep the hostname exact (no leading dot):
# github.com, APIs, raw content, package registries, provider/auth endpoints,
# and every other TLS-sensitive destination remain end-to-end spliced.
acl github_release_assets ssl::server_name --client-requested release-assets.githubusercontent.com

ssl_bump peek ssl_bump_step1
ssl_bump bump github_release_assets
ssl_bump splice all

# --- Access rules ---
# @trace spec:subdomain-routing-via-reverse-proxy
# Permit *.localhost on both ports — these requests are forwarded to
# the enclave router peer, never to the public internet.
http_access allow localhost_subdomain

# Port 3129 (permissive/build): allow everything on SSL ports
http_access allow CONNECT SSL_ports build_port
http_access allow build_port

# Define an ACL for strictly-denied traffic on the runtime port.
acl strict_deny_acl localport 3128
# Send a TCP reset instead of an HTTP 403 error for strictly-denied runtime traffic.
# This prevents sophisticated tunneling/exfiltration over denied connections.
# @trace plan/forge-improvements/proposals/2026-05-28-proxy-egress-isolation.md
deny_info TCP_RESET strict_deny_acl

# Port 3128 (strict/runtime): allowlisted domains only
http_access allow CONNECT SSL_ports allowlist strict_port
http_access allow allowlist strict_port

# Deny strictly-denied traffic on strict_port with TCP Reset
http_access deny strict_deny_acl

# Deny CONNECT to non-SSL ports
http_access deny CONNECT

# Deny everything else
http_access deny all

# @trace spec:subdomain-routing-via-reverse-proxy, gap:BR-003
# --- Reverse-proxy peer for *.localhost ---
# Forward .localhost requests to the Caddy router container via enclave network.
# The router container runs as `tillandsias-router` with network alias `router`
# on the enclave network (tillandsias-enclave) and listens on :8080.
#
# Squid cache_peer directive parameters:
#   - `router` — hostname on enclave network (DNS alias set by podman)
#   - `parent 8080 0` — parent proxy mode, port 8080, ICP disabled (0)
#   - `no-query` — don't send ICP queries (no ICP service running)
#   - `default` — use as default parent if no ACL matches
#   - `name=tillandsias-router` — unique identifier for logging and ACL references
#   - `connect-timeout=1` — 1 second timeout for establishing peer connection
#
# The `never_direct allow localhost_subdomain` rule ensures that .localhost
# requests never escape to external DNS — they MUST go through the peer.
cache_peer router parent 8080 0 no-query default name=tillandsias-router connect-timeout=1
cache_peer_access tillandsias-router allow localhost_subdomain
cache_peer_access tillandsias-router deny all
never_direct allow localhost_subdomain

# --- Cache ---
# The observed Ollama GitHub release asset is ~1.44GB. The old 500MB cache and
# 512MB per-object ceiling could never retain it even if TLS bumping worked.
cache_dir ufs /var/spool/squid 4096 16 256
maximum_object_size 2048 MB

# Preserve origin cache-control semantics. This host-specific pattern is first
# because Squid uses the first matching refresh_pattern; it supplies a bounded
# heuristic only when the response lacks explicit freshness. Never add
# override-expire, ignore-no-store, or ignore-private.
refresh_pattern -i ^https://release-assets\.githubusercontent\.com/ 0 20% 4320
refresh_pattern -i (/cgi-bin/|\?) 0 0% 0
refresh_pattern . 0 20% 4320

# --- Logging (container-friendly) ---
access_log stdio:/dev/stdout
cache_log stdio:/dev/stderr
cache_store_log none

# Signed release-asset URLs contain query credentials. Squid defaults this to
# on; pin it so access logs never expose those terms during cache diagnostics.
# This is log privacy only: query terms remain part of the cache key, and this
# config deliberately has no StoreID/URL normalization.
strip_query_terms on

# --- Identity ---
visible_hostname tillandsias-proxy

# --- Privacy ---
forwarded_for delete
via off

# --- Runtime ---
cache_effective_user proxy
cache_effective_group proxy

shutdown_lifetime 3 seconds

pid_filename /var/run/squid/squid.pid

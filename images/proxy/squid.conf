# @trace spec:proxy-container
# Squid forward proxy for Tillandsias enclave network.
#
# DUAL-PORT ARCHITECTURE:
#   Port 3128 — STRICT (runtime containers): allowlisted domains only
#   Port 3129 — PERMISSIVE (image builds): all domains allowed, caching enabled
#
# Both ports share the same disk cache. The strict port protects runtime
# containers from data exfiltration. The permissive port lets image builds
# (dnf, microdnf, apt, apk) hit any mirror while benefiting from caching.

# --- Listen ---
http_port 3128
http_port 3129

# --- DNS ---
# The proxy container is on the enclave network (internal DNS only).
# External domains must be resolved via public DNS, not aardvark-dns.
dns_nameservers 1.1.1.1 8.8.8.8

# --- ACLs ---
# Strict allowlist for runtime containers
acl allowlist dstdomain "/etc/squid/allowlist.txt"

# Port-based ACLs to distinguish strict vs permissive
acl strict_port myport 3128
acl build_port myport 3129

# Standard ports for CONNECT (HTTPS tunneling)
acl SSL_ports port 443
acl SSL_ports port 8443
acl CONNECT method CONNECT

# --- Access rules ---

# Port 3129 (permissive/build): allow everything on SSL ports
http_access allow CONNECT SSL_ports build_port
http_access allow build_port

# Port 3128 (strict/runtime): allowlisted domains only
http_access allow CONNECT SSL_ports allowlist strict_port
http_access allow allowlist strict_port

# Deny CONNECT to non-SSL ports
http_access deny CONNECT

# Deny everything else
http_access deny all

# --- Cache ---
cache_dir ufs /var/spool/squid 500 16 256
maximum_object_size 256 MB

# --- Logging (container-friendly) ---
access_log stdio:/dev/stdout
cache_log stdio:/dev/stderr
cache_store_log none

# --- Identity ---
visible_hostname tillandsias-proxy

# --- Privacy ---
forwarded_for delete
via off

# --- Runtime ---
cache_effective_user proxy
cache_effective_group proxy

# Shutdown quickly when container stops
shutdown_lifetime 3 seconds

# PID file location writable by proxy user
pid_filename /var/run/squid/squid.pid

server.modules = (
    "mod_cgi",
    "mod_alias",
    "mod_setenv",
)

server.document-root = "/srv/git"
server.port = 8080
server.bind = "0.0.0.0"

# Log files in writable tmpfs/tmp location inside the container
server.errorlog = "/tmp/lighttpd-error.log"
server.pid-file = "/tmp/lighttpd.pid"

# Route git HTTP requests to git-http-backend
alias.url = (
    "/" => "/usr/libexec/git-core/git-http-backend/"
)

$HTTP["url"] =~ "^/" {
    cgi.assign = ( "" => "" )
    setenv.add-environment = (
        "GIT_PROJECT_ROOT" => "/srv/git",
        "GIT_HTTP_EXPORT_ALL" => ""
    )
}

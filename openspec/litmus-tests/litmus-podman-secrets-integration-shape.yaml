# @trace spec:podman-secrets-integration
#
# Drift-protection for the broader podman-secrets-integration
# surfaces. spec:podman-secrets-integration has 9 requirements covering
# the full lifecycle of podman-secret-backed credentials (CA cert/key
# + GitHub token + future SSH keys), the launch-time `--secret` flag
# contract, secret-name registry, accountability logging, and tray-
# shutdown cleanup.
#
# `litmus:secrets-management-implementation-shape` (shipped 01:21Z)
# already pins the GitHub-token slice: `--driver=file
# tillandsias-github-token`, `/run/secrets/tillandsias-github-token`
# read path, `category="secrets"` + `operation="rotation_complete"`
# accountability fields, and `podman secret rm tillandsias-github-
# token` cleanup. Bind it here too — it covers Reqs 1, 5, 6, 8 for
# the GH-token half.
#
# This litmus complements with the broader surfaces NOT covered there:
#
#   Req 2 (--secret flag, never bind mounts): >=4 `"--secret"` literal
#     sites across remote_projects.rs + vault_bootstrap.rs + main.rs
#   Req 3 (read path /run/secrets/<name>): cleanup-secrets.sh lists
#     the canonical secret names registry (ca-cert + github-token +
#     vault-unseal)
#   Req 4 (secrets hidden from inspect + redacted in logs):
#     `invocation_line_contains_label_and_redacts_secrets` unit test
#     pinned by name
#   Req 5 (panic + idempotent cleanup): cleanup-secrets.sh walks
#     `tillandsias-vault-token-*` per-container leftover pattern
#   Req 8 (accountability): >=8 `secret_name = "tillandsias-…"` log
#     fields in main.rs
#
# All 3 entrypoint scripts (proxy/git/inference) carry
# `@trace spec:podman-secrets-integration` — pinned as the spec-
# identity edge.
#
# Combined with the 2 existing tests, raises podman-secrets-
# integration coverage_ratio 33 → 75.
name: litmus:podman-secrets-integration-shape
spec: podman-secrets-integration
phase: pre-build
description: >
  Pin the broader podman-secrets-integration surfaces: cleanup-
  secrets.sh secret-name registry + leftover walker, >=4 `--secret`
  flag sites at launch, invocation-line redaction test, >=8
  secret_name accountability fields, and entrypoint @trace markers.
severity: medium
size: instant

preconditions:
  - workspace contains scripts/cleanup-secrets.sh
  - workspace contains crates/tillandsias-headless/src/remote_projects.rs
  - workspace contains crates/tillandsias-headless/src/vault_bootstrap.rs
  - workspace contains crates/tillandsias-headless/src/main.rs
  - workspace contains crates/tillandsias-podman/src/lib.rs
  - workspace contains images/{git,proxy,inference}/entrypoint.sh
  - shell utilities (grep) are available in PATH

critical_path:
  - step: "cleanup-secrets.sh declares the secret-name registry (Req 5 + Secret Names Registry table)"
    # Spec § "Secret Names Registry" mandates `tillandsias-ca-cert`,
    # `tillandsias-github-token`, `tillandsias-vault-unseal` as
    # canonical names. A regression renaming any of them in
    # cleanup-secrets.sh would silently leave secrets leaked at
    # shutdown. Pin all 3 literals in the SECRETS array.
    command: "grep -cE '\"(tillandsias-ca-cert|tillandsias-github-token|tillandsias-vault-unseal)\"' scripts/cleanup-secrets.sh | awk '{ if ($1+0 >= 3) print \"ok:\", $1, \"registered secret names\"; else { print \"FAIL: only\", $1, \"of >=3\"; exit 1 } }'"
    timeout_ms: 3000
    expected_behavior: "ok:"

  - step: "cleanup-secrets.sh walks per-container vault-token leftover pattern (Req 5 panic + idempotent)"
    # Spec § "Secrets removed on panic" + § "Cleanup is idempotent" —
    # the per-container `tillandsias-vault-token-<container-id>` AppRole
    # tokens left by CTRL-C / SIGKILL paths need a walker; the regex
    # captures them. A regression that drops the walker would leak
    # tokens across tray restarts.
    command: "grep -F 'tillandsias-vault-token-*' scripts/cleanup-secrets.sh"
    timeout_ms: 3000
    expected_behavior: "tillandsias-vault-token-"

  - step: "Req 2: >=4 `--secret` flag literal sites at launch (NEVER bind mounts for credentials)"
    # Spec § "Secrets mounted via --secret flag, never bind mounts"
    # mandates podman secret flag for ALL credential material. >=4
    # literal sites across vault_bootstrap.rs + remote_projects.rs +
    # main.rs reflect today's surface area. A regression converting a
    # `--secret` to a `-v /host/…:/run/secrets/…` bind mount would
    # silently expose the secret to `podman inspect` (spec § Req 4
    # violation).
    command: "grep -cF '\"--secret\"' crates/tillandsias-headless/src/remote_projects.rs crates/tillandsias-headless/src/vault_bootstrap.rs crates/tillandsias-headless/src/main.rs | awk -F: '{ sum += $2 } END { if (sum >= 4) print \"ok:\", sum, \"--secret flag sites\"; else { print \"FAIL: only\", sum, \"of >=4\"; exit 1 } }'"
    timeout_ms: 3000
    expected_behavior: "ok:"

  - step: "Req 4: invocation-line redaction test pins log scrubbing (secrets not in logs)"
    # Spec § "Secrets hidden from podman inspect and process environment"
    # — the test `invocation_line_contains_label_and_redacts_secrets`
    # is the behavioural pin for `format_podman_invocation_line()`
    # replacing secret values with `<redacted>` BEFORE logging. A
    # regression to a non-redacting formatter would silently leak
    # secrets into accountability logs. Pin by test-name presence.
    command: "grep -F 'fn invocation_line_contains_label_and_redacts_secrets' crates/tillandsias-podman/src/lib.rs"
    timeout_ms: 3000
    expected_behavior: "invocation_line_contains_label_and_redacts_secrets"

  - step: "Req 8: >=8 secret_name accountability log fields in main.rs"
    # Spec § "Accountability logging for all secret operations" —
    # every secret operation MUST log `secret_name = "..."`. >=8
    # sites reflect today's create/access/cleanup logging surface.
    # A regression to a non-named log field would silently break the
    # auditor's ability to filter by secret.
    command: "grep -cF 'secret_name = \"tillandsias-' crates/tillandsias-headless/src/main.rs | awk '{ if ($1+0 >= 8) print \"ok:\", $1, \"secret_name log sites\"; else { print \"FAIL: only\", $1, \"of >=8\"; exit 1 } }'"
    timeout_ms: 3000
    expected_behavior: "ok:"

  - step: "all 3 container entrypoints (proxy/git/inference) carry @trace spec:podman-secrets-integration"
    # Spec maps these scripts as Req 3 readers — they read from
    # `/run/secrets/<name>`. The @trace markers are the spec-identity
    # edge; a regression dropping any would silently demote the script
    # out of the podman-secrets-integration graph.
    command: "for f in images/git/entrypoint.sh images/proxy/entrypoint.sh images/inference/entrypoint.sh; do grep -Fq '@trace spec:podman-secrets-integration' \"$f\" || { echo \"FAIL: $f missing @trace\"; exit 1; }; done && echo \"ok: all 3 entrypoints carry @trace spec:podman-secrets-integration\""
    timeout_ms: 3000
    expected_behavior: "ok:"

observability:
  traces:
    - "@trace spec:podman-secrets-integration"
    - "@trace spec:secrets-management"
    - "@trace spec:tillandsias-vault"
  expected_log: "podman-secrets-integration cleanup script + --secret launch flag + redaction + accountability fields + entrypoint traces all pinned (Reqs 2 + 3 + 4 + 5 + 8)"
  log_fields:
    spec: "podman-secrets-integration"
    test: "podman-secrets-integration-shape"
    artifact: "scripts/cleanup-secrets.sh + crates/tillandsias-headless/src/*.rs + crates/tillandsias-podman/src/lib.rs + images/*/entrypoint.sh"

rollback:
  on_failure: >
    A `spec:podman-secrets-integration` surface drifted. Restore the
    cleanup-secrets.sh SECRETS array entries
    (`tillandsias-ca-cert`, `tillandsias-github-token`,
    `tillandsias-vault-unseal`) and the
    `tillandsias-vault-token-*` per-container leftover walker;
    `--secret` flag literal at >=4 launch sites (NEVER convert to
    `-v` bind mount); `invocation_line_contains_label_and_redacts_
    secrets` test; >=8 `secret_name = "tillandsias-…"`
    accountability fields in main.rs; `@trace spec:podman-secrets-
    integration` on git/proxy/inference entrypoints.
  command: "grep -nE 'tillandsias-(ca-cert|github-token|vault-unseal|vault-token)|--secret|secret_name|spec:podman-secrets-integration' scripts/cleanup-secrets.sh crates/tillandsias-headless/src/main.rs crates/tillandsias-headless/src/vault_bootstrap.rs images/git/entrypoint.sh | head -25"

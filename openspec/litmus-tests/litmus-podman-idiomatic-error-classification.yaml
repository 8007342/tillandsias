# @trace spec:podman-idiomatic-patterns
name: litmus:podman-idiomatic-error-classification
spec: podman-idiomatic-patterns
phase: pre-build
description: Verify PodmanError.is_transient() classifies network errors as retryable and permanent errors as fatal
severity: critical

preconditions:
  - workspace contains crates/tillandsias-podman with client.rs PodmanError enum
  - is_transient() method exists on PodmanError type
  - cargo is available in PATH

critical_path:
  - step: "verify is_transient() method exists on PodmanError"
    command: "grep -F 'pub fn is_transient(&self) -> bool' crates/tillandsias-podman/src/client.rs"
    timeout_ms: 5000
    expected_behavior: "pub fn is_transient(&self) -> bool"

  - step: "verify PodmanError enum has StreamError variant"
    command: "grep -F 'StreamError' crates/tillandsias-podman/src/client.rs"
    timeout_ms: 5000
    expected_behavior: "StreamError"

  - step: "verify PodmanError enum has CommandFailed variant"
    command: "grep -F 'CommandFailed' crates/tillandsias-podman/src/client.rs"
    timeout_ms: 5000
    expected_behavior: "CommandFailed"

  - step: "verify PodmanError enum has NotFound variant"
    command: "grep -F 'NotFound' crates/tillandsias-podman/src/client.rs"
    timeout_ms: 5000
    expected_behavior: "NotFound"

  - step: "verify PodmanError enum has ParseError variant"
    command: "grep -F 'ParseError' crates/tillandsias-podman/src/client.rs"
    timeout_ms: 5000
    expected_behavior: "ParseError"

  - step: "verify is_transient() handles StreamError as transient"
    command: "grep -A 30 'pub fn is_transient' crates/tillandsias-podman/src/client.rs | grep 'StreamError'"
    timeout_ms: 5000
    expected_behavior: "StreamError"

  - step: "verify is_transient() handles timeout errors"
    command: "grep -A 30 'pub fn is_transient' crates/tillandsias-podman/src/client.rs | grep 'timeout'"
    timeout_ms: 5000
    expected_behavior: "timeout"

  - step: "verify is_transient() handles NotFound as permanent"
    command: "grep -A 30 'pub fn is_transient' crates/tillandsias-podman/src/client.rs | grep -A 5 'NotFound' | grep 'false'"
    timeout_ms: 5000
    expected_behavior: "false"

  - step: "verify is_transient() handles ParseError as permanent"
    command: "grep -A 30 'pub fn is_transient' crates/tillandsias-podman/src/client.rs | grep 'ParseError'"
    timeout_ms: 5000
    expected_behavior: "ParseError"

observability:
  traces:
    - "@trace spec:podman-idiomatic-patterns"
  expected_log: "Error classification verified: StreamError/timeout as transient, NotFound/ParseError as permanent"
  log_fields:
    spec: "podman-idiomatic-patterns"
    test: "podman-idiomatic-error-classification"
    requirement: "podman-idiomatic-patterns.errors.retry-discrimination@v1"

rollback:
  on_failure: "inspect PodmanError enum and is_transient() implementation in client.rs"
  command: "grep -B 5 -A 35 'pub fn is_transient' crates/tillandsias-podman/src/client.rs"

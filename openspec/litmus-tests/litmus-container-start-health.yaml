# @trace spec:podman-idiomatic-patterns, spec:runtime-diagnostics-stream, spec:forge-as-only-runtime
# Container-Start Health via the Idiomatic Podman Layer.
#
# Verifies that when a container-launching flow runs with --diagnostics, the
# IDIOMATIC layer (PodmanClient::run_container_observed → emit_launch_event)
# reports each container reaching `state=running` and NONE reaching
# `state=failed`. This is how litmus tests confirm containers started
# correctly — by asserting on tillandsias's own structured launch-event
# stream, NOT by scraping raw `podman ps`. The stream shape
# (`event:container_launch stage=… state=… container=…`) is pinned by the
# `launch_event_line_shape_is_stable` unit test in tillandsias-podman; keep
# the greps below in lockstep with it.
name: litmus:container-start-health
spec: podman-idiomatic-patterns
phase: post-build
description: >
  Run a forge-launching flow with --diagnostics, capture the idiomatic
  layer's container_launch event stream from stderr, and assert every
  launched container reached state=running with zero state=failed. Proves
  the idiomatic-podman + runtime-diagnostics layers verify container start.
severity: high
size: e2e

preconditions:
  - tillandsias binary is installed and on PATH
  - forge + enclave images are built locally (scripts/build-image.sh)
  - a project dir exists at PWD (the litmus runs from the repo root)

critical_path:
  - step: "ensure diagnostics artifact dir"
    command: "mkdir -p target/forge-diagnostics"
    timeout_ms: 2000

  - step: "launch forge with --diagnostics, capturing the idiomatic launch-event stream (stderr)"
    # --diagnostics implies --debug, which enables emit_launch_event. stdout
    # (agent output) is discarded; stderr carries the structured
    # event:container_launch stream we assert on. Non-fatal exit: we judge by
    # the captured stream, not the agent's exit code.
    command: >
      tillandsias . --opencode --diagnostics
      --prompt "report ready and exit"
      >/dev/null
      2> "target/forge-diagnostics/container-start_$(date -u +%Y%m%dT%H%M%SZ).stderr.log"
      || true
    timeout_ms: 600000

  - step: "at least one container reached state=running via the idiomatic layer"
    command: >
      LOG=$(ls -t target/forge-diagnostics/container-start_*.stderr.log 2>/dev/null | head -1)
      && [ -n "$LOG" ]
      && grep -Eq 'event:container_launch stage=[^ ]+ state=running container=' "$LOG"
      && echo "ok: idiomatic layer reported >=1 container running"
    timeout_ms: 10000
    expected_behavior: "ok: idiomatic layer reported >=1 container running"

  - step: "NO container reported state=failed"
    # A single failed launch fails this gate, surfacing the failing stage +
    # container name straight from the stream.
    command: >
      LOG=$(ls -t target/forge-diagnostics/container-start_*.stderr.log 2>/dev/null | head -1)
      && if grep -E 'event:container_launch .* state=failed' "$LOG"; then
           echo "FAIL: a container launch failed (see lines above)"; exit 1;
         else
           echo "ok: no container_launch state=failed";
         fi
    timeout_ms: 10000
    expected_behavior: "ok: no container_launch state=failed"

  - step: "the forge-agent stage launched (running OR exited)"
    # spec:runtime-diagnostics-stream "Launch stage event" allows TWO
    # terminal states: `state=running` for detached containers, or
    # `state=exited` for an attached foreground forge that completed
    # (which is what `--diagnostics --prompt …` produces).
    # Stage label is per-agent — accept the current set.
    # First production distill confirms the real shape:
    #   `event:container_launch stage=opencode state=exited container=…`
    command: >
      LOG=$(ls -t target/forge-diagnostics/container-start_*.stderr.log 2>/dev/null | head -1)
      && grep -Eq 'event:container_launch stage=(opencode|claude|codex|forge) state=(running|exited) container=' "$LOG"
      && echo "ok: forge-agent stage launched"
    timeout_ms: 10000
    expected_behavior: "ok: forge-agent stage launched"

  - step: "events came from the idiomatic layer (no raw-podman bypass signature)"
    # The event:container_launch stream is emitted ONLY by the shared
    # PodmanClient path; its presence is the proof launches were not done via
    # a bare Command::new(\"podman\") bypass.
    command: >
      LOG=$(ls -t target/forge-diagnostics/container-start_*.stderr.log 2>/dev/null | head -1)
      && grep -cE 'event:container_launch ' "$LOG"
      | awk '{ if ($1+0 >= 1) print "ok: " $1 " idiomatic launch events"; else { print "FAIL: no idiomatic launch events"; exit 1 } }'
    timeout_ms: 10000
    expected_behavior: "ok: <N> idiomatic launch events"

  # Piggyback: run the forge-diagnostics annex WITHOUT --reset. The annex's
  # dedupe-by-prompt-sha mechanism ensures that across all
  # forge-launching E2E tests in the same cycle, exactly one captures the
  # diagnostics prompt and the rest append a skip note. This test's main
  # launch (above) is its own thing — the annex runs the *separate*
  # diagnostics prompt from `plan/diagnostics/forge-diagnostics-prompt.txt`
  # and writes its own log under `target/forge-diagnostics/diagnostics_*.log`
  # + a distilled summary under `plan/diagnostics/`.
  #
  # NON-BLOCKING by contract — the annex always exits 0 (see annex script
  # header); the `|| true` is belt+suspenders. Capturing failures become
  # signals in the distill summary, not parent-E2E failures.
  #
  # @trace methodology/forge-diagnostics.yaml (piggyback_protocol)
  # @trace plan/issues/forge-diagnostics-automation-2026-05-27.md
  #   (forge-diagnostics/e2e-piggyback-orchestration)
  - step: "non-blocking annex piggyback: capture diagnostics summary if first in cycle, else dedup-skip"
    command: "scripts/forge-diagnostics-annex.sh || true"
    timeout_ms: 600000
    expected_behavior: "annex exit 0 (always); summary or skip note recorded under target/forge-diagnostics/"

  # Non-gating observation: confirm the annex produced *something* —
  # either a raw log + distill summary (first in cycle) or a skip note
  # (later in cycle). This is the durable evidence that the piggyback
  # wired up.
  - step: "annex produced a raw log, skip note, OR distill summary (any cycle outcome is fine)"
    command: >
      if ls -t target/forge-diagnostics/diagnostics_*.log >/dev/null 2>&1
         || [ -s target/forge-diagnostics/cycle-skips.log ]
         || ls -t plan/diagnostics/diagnostics_*-summary.md >/dev/null 2>&1; then
        echo "ok: annex left evidence (raw log, skip note, or distill summary)";
      else
        echo "ok: annex ran but left no evidence on this host (annex contract honoured)";
      fi
    timeout_ms: 5000
    expected_behavior: "ok: annex left evidence ..."

observability:
  traces:
    - "@trace spec:podman-idiomatic-patterns"
    - "@trace spec:runtime-diagnostics-stream"
    - "@trace methodology/forge-diagnostics.yaml (piggyback_protocol)"
    - "@trace plan/issues/forge-diagnostics-automation-2026-05-27.md (e2e-piggyback-orchestration)"
  expected_log: "Container start health verified via idiomatic launch-event stream + annex piggyback"
  log_fields:
    spec: "podman-idiomatic-patterns"
    test: "container-start-health"
    artifact: "target/forge-diagnostics/container-start_*.stderr.log"
    piggyback_artifact: "target/forge-diagnostics/diagnostics_*.log OR plan/diagnostics/diagnostics_*-summary.md OR target/forge-diagnostics/cycle-skips.log"

rollback:
  on_failure: >
    Inspect the captured stderr log for the failing stage/container, then
    `podman logs <container>` for that stage. Common causes mirror the
    typed exit-125 classifier: enclave network missing (ensure_enclave_network),
    host port already bound, or image not present locally. If tillandsias is
    not installed, run ./build.sh --release --install first.
  command: "ls -la target/forge-diagnostics/ && tail -40 target/forge-diagnostics/container-start_*.stderr.log 2>/dev/null"

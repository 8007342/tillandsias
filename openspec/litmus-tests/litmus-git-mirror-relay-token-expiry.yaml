# @trace spec:git-mirror-service, spec:tillandsias-vault
name: litmus:git-mirror-relay-token-expiry
spec: git-mirror-service
phase: pre-build
description: >
  Offline fixture proving the relay distinguishes an unavailable Vault Agent
  client-token sink from an ABSENT GitHub token. A failing self-lookup means
  the Agent is re-authenticating or its AppRole path failed, not that the
  GitHub credential is absent. The positive max_ttl re-authentication path is
  pinned separately by litmus:git-mirror-vault-agent-auto-auth.
severity: critical
size: instant

preconditions:
  - workspace contains images/git/relay-refs.sh, images/git/vault-cli.sh, images/git/entrypoint.sh
  - workspace contains scripts/test-git-mirror-relay-token-expiry.sh

critical_path:
  - step: "expired mirror token yields honest re-mint diagnosis, not a false GitHub Login; a valid mirror token with an absent GitHub token still says GitHub Login"
    command: "scripts/test-git-mirror-relay-token-expiry.sh"
    timeout_ms: 60000
    expected_behavior: "PASS: git-mirror relay distinguishes expired mirror token from absent GitHub token (order 414)"

  - step: "vault-cli exposes lookup and graceful current-token revocation"
    command: "grep -Fq 'lookup-self)' images/git/vault-cli.sh && grep -Fq 'revoke-self)' images/git/vault-cli.sh && grep -Fq 'auth/token/lookup-self' images/git/vault-cli.sh && grep -Fq 'auth/token/revoke-self' images/git/vault-cli.sh && echo 'ok: vault-cli token verbs'"
    timeout_ms: 5000
    expected_behavior: "ok: vault-cli token verbs"

  - step: "relay discriminates on lookup-self before blaming the GitHub credential"
    command: "grep -Fq 'vault-cli lookup-self' images/git/relay-refs.sh && grep -Fq 'do NOT run GitHub Login' images/git/relay-refs.sh && echo 'ok: relay discriminator'"
    timeout_ms: 5000
    expected_behavior: "ok: relay discriminator"

  - step: "entrypoint starts Vault Agent and waits for its renewable sink"
    command: "grep -Fq 'start_vault_agent' images/git/entrypoint.sh && grep -Fq 'vault-agent-bootstrap' images/git/entrypoint.sh && grep -Fq 'exit_after_auth = false' images/git/vault-agent.hcl && echo 'ok: Vault Agent auto-auth'"
    timeout_ms: 5000
    expected_behavior: "ok: Vault Agent auto-auth"

observability:
  traces:
    - "@trace spec:git-mirror-service"
    - "@trace spec:tillandsias-vault"
  expected_log: "relay names an unavailable Vault Agent sink distinctly from an absent GitHub token"
  log_fields:
    spec: git-mirror-service
    test: git-mirror-relay-token-expiry

rollback:
  on_failure: >
    Do not restore the swallowed `2>/dev/null || true` vault read that conflates
    an unavailable Agent sink with an absent GitHub token. Inspect the
    lookup-self discriminator and Vault Agent bootstrap.
  command: "scripts/test-git-mirror-relay-token-expiry.sh"

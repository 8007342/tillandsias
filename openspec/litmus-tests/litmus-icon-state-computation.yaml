# @trace spec:tray-icon-lifecycle
name: litmus:icon-state-computation
spec: tray-icon-lifecycle
phase: pre-build
description: Verify tray icon state computation across podman, building, blooming, and mature states
severity: high

preconditions:
  - workspace contains crates/tillandsias-core
  - cargo is available in PATH

critical_path:
  - step: "run the Pup initialization test"
    command: "cargo test -p tillandsias-core tray_state_new_starts_with_pup_icon -- --exact"
    timeout_ms: 120000

  - step: "run the Dried state test"
    command: "cargo test -p tillandsias-core compute_icon_state_returns_dried_when_podman_missing -- --exact"
    timeout_ms: 120000

  - step: "run the Building state test"
    command: "cargo test -p tillandsias-core compute_icon_state_returns_building_when_build_in_progress -- --exact"
    timeout_ms: 120000

  - step: "run the Blooming state test"
    command: "cargo test -p tillandsias-core compute_icon_state_returns_blooming_for_recent_completion -- --exact"
    timeout_ms: 120000

  - step: "run the Mature state test"
    command: "cargo test -p tillandsias-core compute_icon_state_returns_mature_when_idle -- --exact"
    timeout_ms: 120000

observability:
  traces:
    - "@trace spec:tray-icon-lifecycle"
  expected_log: "Tray icon state computation remains stable across the lifecycle"
  log_fields:
    spec: "tray-icon-lifecycle"
    test: "icon-state-computation"

rollback:
  on_failure: "inspect crates/tillandsias-core/src/state.rs for tray icon lifecycle drift"
  command: "sed -n '280,360p' crates/tillandsias-core/src/state.rs"

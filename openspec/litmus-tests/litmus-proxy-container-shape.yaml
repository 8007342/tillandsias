# @trace spec:proxy-container
#
# Drift-protection for the proxy container implementation across
# images/proxy/{Containerfile, squid.conf, allowlist.txt,
# entrypoint.sh}. spec:proxy-container has 12 requirements covering
# image build, ssl-bump policy, dual-port architecture, allowlist,
# CA chain injection, *.localhost enclave routing, privacy header
# stripping, and lifecycle. The single existing binding
# `litmus:enclave-isolation` (e2e, last_verified 2026-05-03) covered
# the generic network-isolation invariant but no source-level pin.
#
# windows-260723-4 reconciles the former spec/config drift with a
# step-aware selective policy: peek only at SslBump1, bump the exact
# GitHub release-asset CDN host, and splice every other destination.
# Origin certificate verification and HTTP cache-control remain
# authoritative.
name: litmus:proxy-container-shape
spec: proxy-container
phase: pre-build
description: >
  Pin the proxy container source surfaces: Containerfile (Alpine +
  squid + UID 1000), squid.conf (dual-port, step-aware selective bump,
  exact GitHub release-asset host, verified origin TLS, bounded large-object
  cache policy,
  *.localhost cache_peer router, allowlist dstdomain,
  forwarded_for delete + via off), allowlist.txt (key OpenCode
  egress domains + leading-dot Squid 6.x rule), entrypoint.sh
  (cert init + podman-secret CA delivery + runtime parser gate).
severity: medium
size: instant

preconditions:
  - workspace contains images/proxy/Containerfile
  - workspace contains images/proxy/squid.conf
  - workspace contains images/proxy/allowlist.txt
  - workspace contains images/proxy/entrypoint.sh
  - workspace contains crates/tillandsias-headless/tests/proxy_cache_policy.rs
  - shell utilities (grep) are available in PATH

critical_path:
  - step: "all 4 proxy files carry @trace spec:proxy-container"
    # The proxy implementation is split across 4 files; each needs
    # the spec-identity edge. A regression dropping any would
    # silently demote that file out of the spec graph.
    command: "for f in images/proxy/Containerfile images/proxy/squid.conf images/proxy/allowlist.txt images/proxy/entrypoint.sh; do grep -Fq '@trace spec:proxy-container' \"$f\" || { echo \"FAIL: $f missing @trace\"; exit 1; }; done && echo \"ok: 4 proxy files trace spec:proxy-container\""
    timeout_ms: 3000
    expected_behavior: "ok:"

  - step: "Containerfile: Alpine 3.20 base + squid/openssl/bash + non-root proxy UID 1000"
    # Spec § "Proxy container image versioned and built via pipeline"
    # Scenarios: Alpine-based with squid + SSL support; runs as
    # non-root `proxy` UID 1000. A regression to a different base or
    # root user would silently widen the attack surface.
    command: "grep -F 'FROM docker.io/library/alpine:3.20' images/proxy/Containerfile && grep -F 'apk add --no-cache squid openssl bash' images/proxy/Containerfile && grep -F 'adduser -D -u 1000' images/proxy/Containerfile"
    timeout_ms: 3000
    expected_behavior: "alpine:3.20"

  - step: "squid.conf: dual-port architecture (3128 strict + 3129 permissive) with ssl-bump on both"
    # Spec § "Dual-port architecture" mandates 3128 (strict
    # allowlist) + 3129 (permissive) both with ssl-bump configured.
    # A regression to single-port or non-ssl-bump would silently
    # break the spec's port-determines-policy contract.
    command: "grep -F 'http_port 3128 ssl-bump' images/proxy/squid.conf && grep -F 'http_port 3129 ssl-bump' images/proxy/squid.conf"
    timeout_ms: 3000
    expected_behavior: "ssl-bump"

  - step: "squid.conf: peek only at SslBump1, bump one exact release host, splice everything else"
    # Squid 6 re-evaluates every ssl_bump rule at every step; a bare
    # `peek all` consumes step 2 and usually makes a later bump
    # impossible. The exact three-rule order is the trust boundary.
    command: "grep -Fx 'acl ssl_bump_step1 at_step SslBump1' images/proxy/squid.conf && grep -Fx 'acl github_release_assets ssl::server_name --client-requested release-assets.githubusercontent.com' images/proxy/squid.conf && test \"$(grep -c '^ssl_bump ' images/proxy/squid.conf)\" -eq 3 && peek=$(grep -nFx 'ssl_bump peek ssl_bump_step1' images/proxy/squid.conf | cut -d: -f1) && bump=$(grep -nFx 'ssl_bump bump github_release_assets' images/proxy/squid.conf | cut -d: -f1) && splice=$(grep -nFx 'ssl_bump splice all' images/proxy/squid.conf | cut -d: -f1) && test \"$peek\" -lt \"$bump\" && test \"$bump\" -lt \"$splice\" && ! grep -Eq '^ssl_bump (peek all|stare all|bump all)$' images/proxy/squid.conf && echo 'ok: exact allowlist then splice-all'"
    timeout_ms: 3000
    expected_behavior: "exact allowlist then splice-all"

  - step: "squid.conf: bumped TLS verifies origin and cache policy respects origin directives"
    # Bumped clients trust the proxy-issued leaf, so Squid must verify
    # the real origin. Cache freshness must not ignore no-store/private
    # or normalize signed URLs under an unsafe StoreID.
    command: "grep -F 'tls_outgoing_options cafile=/etc/ssl/certs/ca-certificates.crt' images/proxy/squid.conf && ! grep -Eq '^[[:space:]]*(flags=.*DONT_VERIFY|sslproxy_cert_error allow)' images/proxy/squid.conf && grep -Fx 'refresh_pattern -i ^https://release-assets\\.githubusercontent\\.com/ 0 20% 4320' images/proxy/squid.conf && ! grep -Eq '^[[:space:]]*(refresh_pattern .*override-expire|refresh_pattern .*ignore-(no-store|private|reload)|store_id_program|url_rewrite_program)' images/proxy/squid.conf && grep -Fx 'strip_query_terms on' images/proxy/squid.conf && echo 'ok: verified origin TLS and standards-respecting cache policy'"
    timeout_ms: 3000
    expected_behavior: "ok: verified origin TLS and standards-respecting cache policy"

  - step: "squid.conf: disk and per-object bounds can retain the observed 1.44GiB asset"
    command: "grep -Fx 'cache_dir ufs /var/spool/squid 4096 16 256' images/proxy/squid.conf && grep -Fx 'maximum_object_size 2048 MB' images/proxy/squid.conf && echo 'ok: 4096 MiB cache / 2048 MiB object ceiling'"
    timeout_ms: 3000
    expected_behavior: "4096 MiB cache / 2048 MiB object ceiling"

  - step: "squid.conf: allowlist sourced from /etc/squid/allowlist.txt"
    # Spec § "Generous developer-focused domain allowlist" mandates
    # /etc/squid/allowlist.txt is the canonical source. The
    # dstdomain ACL syntax is the integration point; a refactor to
    # an inline allowlist would silently lose the maintenance
    # workflow.
    command: "grep -F 'acl allowlist dstdomain \"/etc/squid/allowlist.txt\"' images/proxy/squid.conf"
    timeout_ms: 3000
    expected_behavior: "allowlist dstdomain"

  - step: "squid.conf: *.localhost enclave routing via cache_peer router"
    # Spec § "Forward proxy recognises *.localhost as enclave-
    # internal" mandates an `acl localhost_subdomain dstdomain
    # .localhost` + a `cache_peer router parent` directive. A
    # regression breaking either would silently leak *.localhost
    # to external DNS (RFC 6761 violation).
    command: "grep -F 'acl localhost_subdomain dstdomain .localhost' images/proxy/squid.conf && grep -F 'cache_peer router parent' images/proxy/squid.conf && grep -F 'never_direct allow localhost_subdomain' images/proxy/squid.conf"
    timeout_ms: 3000
    expected_behavior: "never_direct"

  - step: "squid.conf: forwarded_for delete + via off (Req Privacy and identity)"
    # Spec § "Privacy and identity" mandates Forwarded /
    # X-Forwarded-For / Via headers MUST NOT reach origin servers.
    # Pinning both directives by literal so a regression to
    # `forwarded_for on` or default Via would silently leak proxy
    # identity.
    command: "grep -F 'forwarded_for delete' images/proxy/squid.conf && grep -F 'via off' images/proxy/squid.conf"
    timeout_ms: 3000
    expected_behavior: "via off"

  - step: "allowlist.txt: OpenCode default egress footprint covered (.models.dev + .openrouter.ai + .helicone.ai + .anthropic.com)"
    # Spec § "Allowlist covers OpenCode's default egress footprint"
    # mandates at minimum these 4 domains. The leading-dot form is
    # also pinned by Squid 6.x's single-entry rule (§ "Allowlist
    # entries follow Squid 6.x single-entry rule").
    command: "grep -Fq '.models.dev' images/proxy/allowlist.txt && grep -Fq '.openrouter.ai' images/proxy/allowlist.txt && grep -Fq '.helicone.ai' images/proxy/allowlist.txt && grep -Fq '.anthropic.com' images/proxy/allowlist.txt && echo \"ok: 4 OpenCode-default domains present\""
    timeout_ms: 3000
    expected_behavior: "ok:"

  - step: "entrypoint.sh: cache/cert init + CA secret + runtime squid parser gate"
    # Spec § "Ephemeral CA chain (per-launch generation)" Scenario
    # "Cert generation on proxy launch" — the cert generator
    # binary `security_file_certgen` initialises the ssl_db; the
    # CA cert is delivered via the podman secret. Pin the 3
    # surfaces: cache init, certgen tooling, podman-secret read.
    command: "grep -F 'squid -z' images/proxy/entrypoint.sh && grep -F 'security_file_certgen' images/proxy/entrypoint.sh && grep -F '/run/secrets/tillandsias-ca-cert' images/proxy/entrypoint.sh && parse=$(grep -nF 'squid -k parse' images/proxy/entrypoint.sh | cut -d: -f1) && launch=$(grep -nF 'exec squid -N' images/proxy/entrypoint.sh | cut -d: -f1) && test \"$parse\" -lt \"$launch\" && echo 'ok: security_file_certgen and pre-launch parser gate'"
    timeout_ms: 3000
    expected_behavior: "ok: security_file_certgen and pre-launch parser gate"

observability:
  traces:
    - "@trace spec:proxy-container"
    - "@trace spec:reverse-proxy-internal"
    - "@trace spec:podman-secrets-integration"
  expected_log: "proxy Containerfile + squid.conf + allowlist + entrypoint surfaces pinned"
  log_fields:
    spec: "proxy-container"
    test: "proxy-container-shape"
    artifact: "images/proxy/{Containerfile,squid.conf,allowlist.txt,entrypoint.sh}"

rollback:
  on_failure: >
    A `spec:proxy-container` source surface drifted. Restore all 4
    `@trace spec:proxy-container` markers; Alpine 3.20 base + apk
    install of squid/openssl/bash + UID-1000 proxy user;
    `http_port 3128 ssl-bump` + `http_port 3129 ssl-bump`; the exact
    `acl ssl_bump_step1 at_step SslBump1` → `ssl_bump peek
    ssl_bump_step1` → `ssl_bump bump github_release_assets` →
    `ssl_bump splice all` policy with only
    `release-assets.githubusercontent.com` in that interception ACL;
    verified outgoing TLS without DONT_VERIFY flags; the 4096 MiB
    cache / 2048 MiB object bounds; origin-respecting refresh patterns
    and `strip_query_terms on`; `acl allowlist dstdomain
    "/etc/squid/allowlist.txt"`;
    `acl localhost_subdomain dstdomain .localhost` +
    `cache_peer router parent` + `never_direct allow localhost_
    subdomain`; `forwarded_for delete` + `via off`; the 4 OpenCode
    egress allowlist entries (`.models.dev`, `.openrouter.ai`,
    `.helicone.ai`, `.anthropic.com`); `squid -z` cache init +
    `security_file_certgen` + `/run/secrets/tillandsias-ca-cert` +
    pre-launch `squid -k parse` in entrypoint.sh.
  command: "grep -nE '@trace|FROM|squid|http_port|ssl_bump|allowlist|localhost_subdomain|forwarded_for|via off|tillandsias-ca-cert|security_file_certgen' images/proxy/Containerfile images/proxy/squid.conf images/proxy/entrypoint.sh | head -30"

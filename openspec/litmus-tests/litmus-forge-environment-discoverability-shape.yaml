name: litmus:forge-environment-discoverability-shape
spec: forge-environment-discoverability
description: Verify the forge discovery scripts and welcome banner expose the current flat command surface
severity: medium
size: instant
phase: pre-build

preconditions:
  - workspace contains images/default/cli/tillandsias-inventory
  - workspace contains images/default/cli/tillandsias-services
  - workspace contains images/default/cli/tillandsias-models
  - workspace contains images/default/cli/tellme
  - workspace contains images/default/forge-welcome.sh

critical_path:
  - step: "verify inventory help advertises the flat JSON-capable interface"
    command: "mf_literal images/default/cli/tillandsias-inventory 'Usage: tillandsias-inventory [--json]' && echo 'inventory help present'"
    timeout_ms: 10000
    expected_behavior: "inventory help present"

  - step: "verify services help advertises the flat JSON-capable interface"
    command: "mf_literal images/default/cli/tillandsias-services 'Usage: tillandsias-services [--json]' && echo 'services help present'"
    timeout_ms: 10000
    expected_behavior: "services help present"

  - step: "verify models help advertises the flat JSON-capable interface"
    command: "mf_literal images/default/cli/tillandsias-models 'Usage: tillandsias-models [--json]' && echo 'models help present'"
    timeout_ms: 10000
    expected_behavior: "models help present"

  - step: "verify tellme help advertises the usage syntax"
    command: "mf_literal images/default/cli/tellme 'Usage: tellme about <topic> [--full]' && mf_literal images/default/cli/tellme 'tellme howto' && echo 'tellme help present'"
    timeout_ms: 10000
    expected_behavior: "tellme help present"

  - step: "verify the welcome banner points to the discovery commands"
    command: "mf_literal images/default/forge-welcome.sh 'tillandsias-inventory' && mf_literal images/default/forge-welcome.sh 'tillandsias-services' && mf_literal images/default/forge-welcome.sh 'tillandsias-models' && mf_literal images/default/forge-welcome.sh 'tellme' && echo 'welcome banner points to discovery commands'"
    timeout_ms: 10000
    expected_behavior: "welcome banner points to discovery commands"

observability:
  traces:
    - "@trace spec:forge-environment-discoverability"
  expected_log: "forge discovery scripts remain visible to the welcome path"
  log_fields:
    spec: "forge-environment-discoverability"
    test: "forge-environment-discoverability-shape"

rollback:
  on_failure: "inspect images/default/cli/tillandsias-inventory, images/default/cli/tillandsias-services, images/default/cli/tillandsias-models, and images/default/forge-welcome.sh for drift"
  command: "mf_literal images/default/cli/tillandsias-inventory 'Usage: tillandsias-inventory [--json]' && mf_literal images/default/forge-welcome.sh 'tillandsias-models'"

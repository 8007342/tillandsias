name: litmus:fix-windows-image-routing-shape
spec: fix-windows-image-routing
description: Verify the image builder routes forge/proxy/git/inference/web to their own Containerfiles
severity: medium
phase: pre-build

preconditions:
  - workspace contains crates/tillandsias-core/src/image_builder.rs
  - cargo is available in PATH

critical_path:
  - step: "verify image routing matrix in the build helper"
    command: "cargo test -p tillandsias-core image_builder::tests::build_routing_uses_type_specific_containerfiles -- --exact"
    timeout_ms: 30000
    expected_behavior: "build_routing_uses_type_specific_containerfiles"

observability:
  traces:
    - "@trace spec:fix-windows-image-routing"
  expected_log: "image build routing remains type-specific"
  log_fields:
    spec: "fix-windows-image-routing"
    test: "fix-windows-image-routing-shape"

rollback:
  on_failure: "inspect crates/tillandsias-core/src/image_builder.rs and openspec/specs/fix-windows-image-routing/spec.md for routing drift"
  command: "cargo test -p tillandsias-core image_builder::tests::build_routing_uses_type_specific_containerfiles -- --exact"

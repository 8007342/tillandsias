# @trace spec:knowledge-source-of-truth
name: litmus:knowledge-source-of-truth-shape
spec: knowledge-source-of-truth
phase: pre-build
description: Verify debug-source fetching, vendor/debug isolation, and gitignore coverage
severity: medium

preconditions:
  - workspace contains scripts/ and .gitignore
  - bash and grep are available in PATH

critical_path:
  - step: "verify the debug-source fetch script is manifest-driven"
    command: "grep -F 'MANIFEST=\"$SCRIPT_DIR/debug-sources.toml\"' scripts/fetch-debug-source.sh && grep -F 'VENDOR_DIR=\"$PROJECT_ROOT/vendor/debug\"' scripts/fetch-debug-source.sh"
    timeout_ms: 3000

  - step: "verify vendor/debug stays ignored"
    command: "grep -F 'vendor/debug/' .gitignore"
    timeout_ms: 3000

  - step: "verify the script advertises local source listing without fetching"
    command: "bash scripts/fetch-debug-source.sh | grep -F 'Available debug sources' && bash scripts/fetch-debug-source.sh | grep -F 'Usage:'"
    timeout_ms: 5000

observability:
  traces:
    - "@trace spec:knowledge-source-of-truth"
  expected_log: "Knowledge source-of-truth boundaries remain manifest-driven and offline-safe"
  log_fields:
    spec: "knowledge-source-of-truth"
    test: "knowledge-source-of-truth-shape"

rollback:
  on_failure: "inspect scripts/fetch-debug-source.sh, .gitignore, and openspec/specs/knowledge-source-of-truth/spec.md for drift"
  command: "sed -n '1,220p' scripts/fetch-debug-source.sh && printf '\\n---\\n' && grep -n 'vendor/debug/' .gitignore"

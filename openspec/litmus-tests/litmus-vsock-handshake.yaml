# @trace spec:vsock-transport
name: litmus:vsock-handshake
spec: vsock-transport
phase: 2
description: >
  Exercise the maintained headless vsock listener fixture, exchange the real
  Hello/HelloAck schema at wire version 2, and prove the same typed framing on
  the deterministic Unix transport. Unsupported runtime hosts report an
  explicit skip after the definition and shared-framing gates pass.
severity: critical
size: e2e

preconditions:
  - workspace contains the maintained vsock_listener_e2e integration target
  - Linux runtime hosts may bind vsock loopback as the unprivileged user

caveats:
  - requires_vsock_capable_host: "Linux host kernel needs CONFIG_VSOCKETS; Windows needs WSL2; macOS needs VZ-capable hardware"
  - skip_on_unsupported: "The helper prints an explicit SKIP marker after deterministic framing tests pass"

critical_path:
  - step: "wire-v2 definition, typed framing, and maintained runtime fixture pass or skip explicitly"
    phase: runtime
    command: "scripts/test-vsock-handshake-wire-v2.sh"
    timeout_ms: 180000
    success_pattern: "(PASS|SKIP): wire-v2 vsock"

observability:
  traces:
    - "@trace spec:vsock-transport"
    - "@trace spec:host-shell-architecture"
  expected_log: "wire-v2 Hello/HelloAck passes on loopback or reports an explicit unsupported-host skip"
  log_fields:
    spec: "vsock-transport"
    test: "vsock-handshake"

rollback:
  on_failure: "inspect WIRE_VERSION/spec drift first, then the maintained integration fixture and unprivileged loopback permissions"
  command: "scripts/test-vsock-handshake-wire-v2.sh"

# @trace spec:forge-shell-tools
#
# Drift-protection for the forge shell-tool surfaces AS DEPLOYED
# (post-lean-forge ~90MB diet). spec:forge-shell-tools has 3 reqs
# (alternative shells / terminal tools / shell configs). Existing
# binding `litmus:forge-shell-tools-shape` (last_verified
# 2026-05-14) covered welcome-banner tool tips but not the actual
# install-line surfaces or the bash/zsh vs fish helper split.
#
# Pin the lean-forge reality, NOT the aspirational spec list:
# Req 2 mandates 10 terminal tools (mc, vim, nano, eza, bat, fd,
# fzf, zoxide, htop, tree); deployed image carries 2 (bat + fd-
# find). Divergence flagged inline in spec.md with the same
# `⚠ Implementation reality` block pattern as proxy-container /
# reverse-proxy-internal / no-terminal-flicker / simplified-tray-
# ux / github-credential-health used.
name: litmus:forge-shell-tools-implementation-shape
spec: forge-shell-tools
phase: pre-build
description: >
  Pin the AS-DEPLOYED forge shell-tool surfaces: fish+zsh in
  microdnf install (Req 1), bat+fd-find as the surviving terminal-
  tool subset (Req 2 partial — lean-forge dropped 8 of 10), 5
  shell config files in canonical paths (Req 3), bashrc+zshrc
  sourcing shell-helpers.sh (POSIX) vs config.fish sourcing
  shell-helpers.fish (fish-native), and alias `ll` in bash+zsh.
severity: medium
size: instant

preconditions:
  - workspace contains images/default/Containerfile
  - workspace contains images/default/shell/{bashrc,zshrc,config.fish}
  - workspace contains images/default/config-overlay/shell-helpers.{sh,fish}
  - shell utilities (grep, sed) are available in PATH

critical_path:
  - step: "Req trace: @trace spec:forge-shell-tools on both shell-helpers"
    # Spec § Sources lists shell-helpers.sh + shell-helpers.fish
    # as the canonical helper files. Both carry comma-list trace
    # annotations; substring match for the bare spec id.
    command: "grep -F 'spec:forge-shell-tools' images/default/config-overlay/shell-helpers.sh && grep -F 'spec:forge-shell-tools' images/default/config-overlay/shell-helpers.fish"
    timeout_ms: 3000
    expected_behavior: "spec:forge-shell-tools"

  - step: "Req 1 Alt shells: `fish zsh` literal in microdnf install line"
    # Spec § Req mandates fish and zsh available. The lean-forge
    # install line keeps both on their own line for readability —
    # pin the literal so a regression dropping either surfaces.
    command: "grep -F 'fish zsh' images/default/Containerfile"
    timeout_ms: 3000
    expected_behavior: "fish zsh"

  - step: "Req 2 Terminal tools (lean reality): bat + fd-find present in install"
    # Spec § Req mandates 10 terminal tools; lean-forge diet
    # dropped 8 of them (mc/vim/nano/eza/fzf/zoxide/htop/tree),
    # keeping bat + fd-find as the survivors. The divergence is
    # documented in the Containerfile docblock + an `⚠ Implementation
    # reality` block in spec.md. Pin the surviving subset.
    command: "grep -F 'ripgrep fd-find bat' images/default/Containerfile"
    timeout_ms: 3000
    expected_behavior: "fd-find"

  - step: "Req 2 Lean-forge docblock acknowledges the divergence"
    # The Containerfile docblock literally lists the dropped tools.
    # Pin the canonical `LEAN forge` phrase + the `~90MB` savings
    # note so a refactor that re-adds the tools doesn't accidentally
    # leave a stale docblock claiming they're gone — and vice
    # versa, a docblock rewrite doesn't silently re-promise the
    # tools without the install line catching up.
    command: "grep -F 'LEAN forge' images/default/Containerfile && grep -F '~90MB' images/default/Containerfile"
    timeout_ms: 3000
    expected_behavior: "LEAN forge"

  - step: "Req 3 Shell configs: all 5 files exist at canonical paths"
    # Spec § Sources lists 5 files. The container's COPY directives
    # depend on these paths existing on the host build context.
    command: "for f in shell/bashrc shell/zshrc shell/config.fish config-overlay/shell-helpers.sh config-overlay/shell-helpers.fish; do [ -f images/default/$f ] || { echo \"FAIL: images/default/$f missing\"; exit 1; }; done && echo \"ok: 5 shell config files present\""
    timeout_ms: 3000
    expected_behavior: "ok:"

  - step: "Req 3 Helper split: bashrc+zshrc source shell-helpers.sh (POSIX), config.fish sources shell-helpers.fish (native)"
    # Spec § Scenario "Fish helper startup" mandates fish MUST
    # source fish-native helpers, NOT the POSIX shell-helpers.sh.
    # The split is the impl contract; pin both branches so a
    # regression making fish source the POSIX file (or vice
    # versa) surfaces immediately.
    command: "grep -Fq '/etc/tillandsias/shell-helpers.sh' images/default/shell/bashrc && grep -Fq '/etc/tillandsias/shell-helpers.sh' images/default/shell/zshrc && grep -Fq '/etc/tillandsias/shell-helpers.fish' images/default/shell/config.fish && ! grep -Fq 'shell-helpers.sh' images/default/shell/config.fish && echo \"ok: POSIX vs fish-native split intact\""
    timeout_ms: 3000
    expected_behavior: "ok:"

  - step: "Req 3 Fish-native syntax: shell-helpers.fish carries >=10 `function ...` definitions"
    # Spec § Scenario "Fish helper startup" mandates the fish
    # helper file uses fish-native syntax. fish's function keyword
    # is the differentiator vs POSIX `name() { }`. Pin a >=10
    # floor so a partial rewrite to POSIX surfaces.
    command: "FUNS=$(grep -c '^function ' images/default/config-overlay/shell-helpers.fish); if [ \"$FUNS\" -ge 10 ]; then echo \"ok: $FUNS fish-native functions\"; else echo \"FAIL: only $FUNS fish functions (expected >=10)\"; exit 1; fi"
    timeout_ms: 3000
    expected_behavior: "ok:"

  - step: "Req 3 ll alias: both bashrc and zshrc declare `alias ll=`"
    # Spec § Scenario "Aliases available" mandates `ll` for
    # detailed directory listing. Both interactive bash and zsh
    # paths must wire it.
    command: "grep -F \"alias ll='\" images/default/shell/bashrc && grep -F \"alias ll='\" images/default/shell/zshrc"
    timeout_ms: 3000
    expected_behavior: "alias ll="

observability:
  traces:
    - "@trace spec:forge-shell-tools"
    - "@trace spec:forge-environment-discoverability"
    - "@trace spec:forge-cache-dual"
  expected_log: "forge-shell-tools lean reality (fish+zsh + bat+fd-find subset + 5 config files + POSIX/fish helper split + ll alias) pinned alongside the spec.md divergence acknowledgement"
  log_fields:
    spec: "forge-shell-tools"
    test: "forge-shell-tools-implementation-shape"
    artifact: "images/default/{Containerfile,shell/*,config-overlay/shell-helpers.*}"

rollback:
  on_failure: >
    A `spec:forge-shell-tools` source surface drifted. Restore:
    `@trace spec:forge-shell-tools` on both shell-helpers files;
    `fish zsh \\` on its own line in Containerfile microdnf
    install; `ripgrep fd-find bat` install subset (lean-forge
    surviving terminal tools); `LEAN forge` docblock + `~90MB`
    savings note acknowledging the dropped 8 (mc/vim/nano/eza/
    fzf/zoxide/htop/tree); all 5 shell config files at canonical
    paths; bashrc+zshrc sourcing `/etc/tillandsias/shell-helpers.
    sh` AND config.fish sourcing `/etc/tillandsias/shell-helpers.
    fish` (POSIX vs fish-native split); shell-helpers.fish with
    >=10 `function ` definitions; `alias ll='` in both bashrc
    and zshrc. If a tools refactor genuinely re-adds the dropped
    8, update the Containerfile install line + drop the divergence
    block from spec.md + relax this litmus before landing.
  command: "grep -nE 'spec:forge-shell-tools|fish zsh|fd-find|LEAN forge|shell-helpers\\.(sh|fish)|alias ll' images/default/Containerfile images/default/shell/{bashrc,zshrc,config.fish} images/default/config-overlay/shell-helpers.{sh,fish} 2>/dev/null | head -15"

# @trace spec:zen-default-with-ollama-analysis-pool
#
# Drift-protection for the Zen-default + Ollama-analysis-pool model
# routing. Spec mandates: (1) default `opencode/big-pickle` Zen model
# for primary reasoning + `opencode/gpt-5-nano` small model; (2)
# Ollama provider enumerated in config.json with all local-pool
# models; (3) inference container pre-pulls T0 + T1 tool-capable
# models at startup.
#
# Single existing binding `litmus:inference-readiness-probe-shape`
# (last_verified 2026-05-15) covered the readiness probe but not
# the config defaults or the pre-pull tier logic.
name: litmus:zen-default-with-ollama-shape
spec: zen-default-with-ollama-analysis-pool
phase: pre-build
description: >
  Pin opencode/big-pickle + opencode/gpt-5-nano default-model
  literals in config.json, the ollama provider enumeration with
  >=8 models, and the inference container's T0 + T1 pull logic
  in entrypoint.sh (qwen2.5:0.5b + llama3.2:3b).
severity: medium
size: instant

preconditions:
  - workspace contains images/default/config-overlay/opencode/config.json
  - workspace contains images/inference/entrypoint.sh
  - workspace contains images/inference/Containerfile
  - shell utilities (grep) are available in PATH

critical_path:
  - step: "Req Default routing: config.json sets model = opencode/big-pickle (Zen primary)"
    # Spec § Req mandates the bundled config.json defaults to
    # `opencode/big-pickle` for primary reasoning. A regression
    # to a different model name silently breaks the Zen-default
    # contract — operators who don't override get a different
    # tool-calling model.
    command: "grep -F '\"model\": \"opencode/big-pickle\"' images/default/config-overlay/opencode/config.json"
    timeout_ms: 3000
    expected_behavior: "opencode/big-pickle"

  - step: "Req Default routing: config.json sets small_model = opencode/gpt-5-nano (fast non-tool tasks)"
    # Spec § Req mandates `opencode/gpt-5-nano` as the fast non-
    # reasoning Zen model. A regression to a different small-model
    # silently changes the title/classification path.
    command: "grep -F '\"small_model\": \"opencode/gpt-5-nano\"' images/default/config-overlay/opencode/config.json"
    timeout_ms: 3000
    expected_behavior: "opencode/gpt-5-nano"

  - step: "Req Default routing: ollama provider enumerated with baseURL pointing at enclave inference container"
    # Spec § Req mandates `provider.ollama` is enumerated with
    # `--model ollama/<name>` opt-in. The baseURL
    # http://inference:11434/v1 is the enclave-DNS path; a
    # regression to a different URL would break the offline-
    # analysis opt-in path.
    command: "grep -F '\"baseURL\": \"http://inference:11434/v1\"' images/default/config-overlay/opencode/config.json"
    timeout_ms: 3000
    expected_behavior: "inference:11434"

  - step: "Req Default routing: ollama provider enumerates >=8 local-pool models"
    # Spec § Req mandates ollama enumerates `all available local
    # models` for explicit `--model ollama/<name>` use. Today the
    # list has 10 (qwen2.5:{0.5b,7b,14b,coder:7b,coder:14b,coder:
    # 32b}, llama3.2:{1b,3b}, llama3.1:8b, gpt-oss:20b). Pin >=8
    # so a regression dropping models surfaces without false-
    # positive on small-list pruning.
    command: "MODEL_COUNT=$(mf_regex_count images/default/config-overlay/opencode/config.json '\"(qwen|llama|gpt)[^\"]*\":'); if [ \"$MODEL_COUNT\" -ge 8 ]; then echo \"ok: $MODEL_COUNT ollama models enumerated\"; else echo \"FAIL: only $MODEL_COUNT of >=8\"; exit 1; fi"
    timeout_ms: 3000
    expected_behavior: "ok:"

  - step: "Req Tier-tagged pre-pull: inference entrypoint pulls T0 (qwen2.5:0.5b)"
    # Spec § Tier table mandates T0 is always pulled (CPU baseline,
    # 397MB qwen2.5:0.5b). Order 183 (2026-07-04) replaced the
    # hardcoded `ollama pull qwen2.5:0.5b` literal with a config-driven
    # DEFAULT_MODELS loop (`ollama pull "$_model"`) whose fallback
    # default is still exactly qwen2.5:0.5b — check both halves of that
    # shape instead of the now-nonexistent literal call. Discovered
    # running this litmus on macOS for the first time — see
    # plan/issues/litmus-full-suite-macos-first-run-findings-2026-07-06.md.
    command: "grep -F 'DEFAULT_MODELS=\"${TILLANDSIAS_DEFAULT_MODELS:-qwen2.5:0.5b}\"' images/inference/entrypoint.sh && grep -F 'ollama pull \"$_model\"' images/inference/entrypoint.sh && echo 'ok: T0 default-model pull wired'"
    timeout_ms: 3000
    expected_behavior: "ok: T0 default-model pull wired"

  - step: "Req Tier-tagged pre-pull: T1 auto-pull was intentionally dropped (order 168 OOM fix), T0-only is correct"
    # Was: "T1 is always pulled (CPU, 2.0GB llama3.2:3b)". RESOLVED
    # 2026-07-06 (was an open question in the macOS-first-run triage,
    # answered by Linux's independent order-168 investigation on the
    # sibling inference-firstrun-default-models-shape litmus): order 168
    # (2026-07-05, commit e56b0156, operator fix) deliberately narrowed
    # DEFAULT_MODELS from 4 models (~2GB) down to just qwen2.5:0.5b
    # (~400MB) to fix a real OOM/~32s container-death bug. T1's
    # "always pulled" guarantee was intentionally dropped, not a silent
    # regression — pin the explanatory comment that documents why,
    # instead of asserting a pull that no longer exists on purpose. See
    # plan/issues/litmus-full-suite-macos-first-run-findings-2026-07-06.md.
    command: "grep -F 'is replaced by llama3.2:1b' images/inference/entrypoint.sh && echo 'ok: T1 auto-pull intentionally dropped (tiny-model-first, order 168 OOM fix)'"
    timeout_ms: 3000
    expected_behavior: "ok: T1 auto-pull intentionally dropped"

  - step: "Req inference container: ollama install via FIRST_RUN tarball extracting only bin/ (skip GPU lib/)"
    # @trace plan/issues/forge-firstrun-tool-migration-2026-07-04.md (order 180 ollama sub-slice)
    # Ollama moved from CREATION-time (Containerfile) to FIRST_RUN (entrypoint.sh) to
    # avoid hardcoded version/SHA + enable arch-awareness + de-hardcode to latest release.
    # Pin that the entrypoint downloads `ollama-linux-*.tar.zst` (arch-resolved) and
    # extracts `bin/ollama` to the persistent model cache.
    command: "grep -F 'ollama-linux-${OLLAMA_ARCH}.tar.zst' images/inference/entrypoint.sh && grep -F 'bin/ollama' images/inference/entrypoint.sh"
    timeout_ms: 3000
    expected_behavior: "ollama-linux-"

observability:
  traces:
    - "@trace spec:zen-default-with-ollama-analysis-pool"
    - "@trace spec:inference-container"
  expected_log: "Zen-default model literals + ollama provider enumeration + T0/T1 pre-pull + inference container CPU-only ollama FIRST_RUN install (arch-aware, latest)"
  log_fields:
    spec: "zen-default-with-ollama-analysis-pool"
    test: "zen-default-with-ollama-shape"
    artifact: "images/default/config-overlay/opencode/config.json + images/inference/{entrypoint.sh,Containerfile}"

rollback:
  on_failure: >
    A `spec:zen-default-with-ollama-analysis-pool` source surface
    drifted. Restore: `"model": "opencode/big-pickle"` + `"small_
    model": "opencode/gpt-5-nano"` in config.json; ollama provider
    with `baseURL: http://inference:11434/v1` + >=8 enumerated
    models; inference entrypoint's DEFAULT_MODELS fallback still
    defaults to `qwen2.5:0.5b` (T0) pulled via `ollama pull "$_model"`
    (order 183, 2026-07-04, replaced the old hardcoded per-model
    literals — see the T0 step above); entrypoint.sh self-installs
    ollama binary at FIRST_RUN into the persistent model cache
    (arch-aware, de-hardcoded to latest release). T1's old
    `llama3.2:3b` guarantee needs owner review — see the T1 step's
    note.
  # The `[$]` bracket-expression matches a literal `$`, not `\$`: the
  # latter needs `\\` for real YAML double-quote validity, but
  # run-litmus-test.sh's command parser doesn't collapse `\\`, so it
  # would survive as a literal double-backslash into grep -E. Same
  # portability fix pattern as the T0/T1 steps above — see
  # plan/issues/litmus-full-suite-macos-first-run-findings-2026-07-06.md.
  command: "grep -nE 'opencode/big-pickle|opencode/gpt-5-nano|inference:11434|DEFAULT_MODELS|ollama-linux-[$]{OLLAMA_ARCH}' images/default/config-overlay/opencode/config.json images/inference/entrypoint.sh | head -15"

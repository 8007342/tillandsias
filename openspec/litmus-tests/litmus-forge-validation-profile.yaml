# @trace spec:default-image
name: litmus:forge-validation-profile
spec: default-image
phase: pre-build
description: >
  Prove the non-destructive forge validation profile reports credential,
  headless-test, and e2e-eligibility outcomes with stable PASS/SKIP/FAIL rows.
severity: high
size: quick

preconditions:
  - workspace contains scripts/forge-validate.sh
  - workspace contains scripts/test-forge-validate.sh

critical_path:
  - step: "validate deterministic forge report classifications"
    command: "scripts/test-forge-validate.sh"
    timeout_ms: 10000
    expected_behavior: "PASS: forge validation profile classifies PASS/SKIP/FAIL deterministically"

  - step: "validate production profile shell syntax"
    command: "bash -n scripts/forge-validate.sh scripts/test-forge-validate.sh && echo 'ok: validation scripts parse successfully'"
    timeout_ms: 2000
    expected_behavior: "ok: validation scripts parse successfully"

observability:
  traces:
    - "@trace spec:default-image"
  expected_log: "stable rows end in a SUMMARY whose failure count controls the exit status"
  log_fields:
    spec: default-image
    test: forge-validation-profile

rollback:
  on_failure: "inspect validator classification and fixture command isolation"
  command: "scripts/test-forge-validate.sh"

# @trace spec:macos-native-tray
# Drift protection for nine pre-existing macos-native-tray spec invariants
# that until now had no pre-build litmus coverage. Unlike slices 25 / 27 /
# 28 / 29 (cross-tray symmetric pins), these are macOS-only architectural
# invariants — UX-correction-series and Phase 0 establishment artifacts —
# but they are equally drift-prone because they pin *absences* and
# build-config shape that a refactor can violate without anything else
# catching it.
#
# Slice 30 (2026-05-29T14:10Z) introduced the first four steps (vz-via-vm-
# layer, no-tauri-or-webview, lsuielement-true, terminal-attach-no-ssh).
# Slice 31 (2026-05-29T14:45Z) extends with five more grep patterns
# pinning four additional invariants: menu-from-host-shell-state,
# gui-items-deferred-to-v2, terminal-uses-iterm2-when-default, vz-cid-
# allocated-at-config, no-display-passthrough-in-v1. macOS-spec
# invariants pinned by litmus is now 10/12 (only menu-renders-in-50ms
# remains: runtime perf, not statically pinnable).
#
# The nine invariants pinned here (all from openspec/specs/macos-native-tray/spec.md):
#
#   1. `vz-via-vm-layer` (macos-native-tray.invariant.vz-via-vm-layer):
#      `crates/tillandsias-macos-tray/src/**.rs CONTAINS no
#      objc2_virtualization::` — VZ access SHALL route through
#      tillandsias-vm-layer's abstraction (VzRuntime). A direct
#      objc2_virtualization import in the tray would bypass the
#      vm-layer trait surface and break the shared trait contract.
#
#   2. `no-tauri-or-webview` (macos-native-tray.invariant.no-tauri-or-
#      webview): `crates/tillandsias-macos-tray/Cargo.toml CONTAINS no
#      [tauri, wry, webview]` — architectural anti-dep, codifies the
#      "thin AppKit wrapper" v1 shape (no embedded browser engine).
#
#   3. `lsuielement-true` (macos-native-tray.invariant.lsuielement-true):
#      `Info.plist CONTAINS <key>LSUIElement</key><true/>` — without
#      this, the tray binary would appear in the Dock + Cmd-Tab
#      switcher, breaking the "menubar-only daemon" UX contract.
#
#   4. `terminal-attach-no-ssh` (macos-native-tray.invariant.terminal-
#      attach-no-ssh): the live PTY-attach codepath SHALL never invoke
#      ssh on the host (all VM I/O routes through virtio-vsock; no
#      sshd in the in-VM forge container). Pin test
#      `screen_attach_never_invokes_ssh` in terminal_attach.rs asserts
#      this; this litmus enforces the test continues to exist.
#
# Pattern: each step's expected_behavior is a literal substring of the
# step's stdout (per the matcher's substring rule documented at
# scripts/run-litmus-test.sh:466 — same convention slices 27 + 28 + 29
# established after the linux-host repair at e8659b38). For "must NOT
# contain" invariants (1) + (2) we use the `! grep ... && echo <token>`
# idiom: stdout is the success token on absence, empty on presence. The
# matcher catches presence as a substring miss.

name: litmus:macos-tray-architectural-invariants
spec: macos-native-tray
phase: pre-build
description: "Pin nine pre-existing macos-native-tray spec invariants without litmus coverage: vz-via-vm-layer, no-tauri-or-webview, lsuielement-true, terminal-attach-no-ssh, menu-from-host-shell-state, gui-items-deferred-to-v2, terminal-uses-iterm2-when-default, vz-cid-allocated-at-config, no-display-passthrough-in-v1."
severity: medium
size: instant

preconditions:
  - workspace contains crates/tillandsias-macos-tray/src
  - workspace contains crates/tillandsias-macos-tray/Cargo.toml
  - workspace contains crates/tillandsias-macos-tray/assets/Info.plist.template
  - workspace contains crates/tillandsias-macos-tray/src/terminal_attach.rs
  - workspace contains crates/tillandsias-macos-tray/src/status_item.rs
  - workspace contains crates/tillandsias-host-shell/src/menu_state.rs
  - workspace contains crates/tillandsias-vm-layer/src/vz.rs
  - shell utilities (grep) are available in PATH

critical_path:
  - step: "vz-via-vm-layer: no direct objc2_virtualization:: imports in tray sources"
    # The `:: ` after the crate name ensures we catch the use-path
    # form (e.g. `objc2_virtualization::VZVirtualMachine`) without
    # false-positiving on the @trace comments or docstrings that may
    # mention the crate name as text. Inverted grep pattern produces
    # the success token on absence, empty stdout on presence.
    command: "! grep -rq 'objc2_virtualization::' crates/tillandsias-macos-tray/src/ && echo 'no-direct-vz-import'"
    expected_behavior: "no-direct-vz-import"
    timeout_ms: 3000

  - step: "no-tauri-or-webview: macos-tray Cargo.toml carries no [tauri, wry, webview] deps"
    command: "! grep -qE 'tauri|wry|webview' crates/tillandsias-macos-tray/Cargo.toml && echo 'no-tauri-or-webview'"
    expected_behavior: "no-tauri-or-webview"
    timeout_ms: 3000

  - step: "lsuielement-true: Info.plist template binds LSUIElement -> <true/>"
    # grep -A1 extracts the LSUIElement key line + the next line (the
    # value); pipe through grep '<true/>' to confirm the value is true.
    # Robust against other `<true/>` values elsewhere in the plist.
    command: "grep -A1 -F '<key>LSUIElement</key>' crates/tillandsias-macos-tray/assets/Info.plist.template | grep -F '<true/>' && echo 'lsuielement-is-true'"
    expected_behavior: "lsuielement-is-true"
    timeout_ms: 3000

  - step: "terminal-attach-no-ssh: pin test screen_attach_never_invokes_ssh exists"
    command: "grep -F 'fn screen_attach_never_invokes_ssh' crates/tillandsias-macos-tray/src/terminal_attach.rs"
    expected_behavior: "screen_attach_never_invokes_ssh"
    timeout_ms: 3000

  # Slice 31 additions (4 more invariants, 5 grep patterns):

  - step: "menu-from-host-shell-state: status_item builds via host_shell::menu_state::build"
    command: "grep -F 'menu_state::build' crates/tillandsias-macos-tray/src/status_item.rs"
    expected_behavior: "menu_state::build"
    timeout_ms: 3000

  - step: "gui-items-deferred-to-v2: macos-tray pin tests disable observatorium + opencode_web for MacosTray"
    # The macos-target rendering of MenuStructure must mark
    # observatorium + opencode_web disabled on v1 (defers_gui_to_v2() in
    # crates/tillandsias-host-shell/src/menu_state.rs). The behavior is
    # exercised end-to-end by two pin tests in macos-tray's
    # menu_disabled_v2.rs (not a host-shell test, despite the older name
    # this litmus previously pinned — corrected 2026-07-06, see
    # plan/issues/litmus-full-suite-macos-first-run-findings-2026-07-06.md
    # order 199): this litmus enforces both continue to exist.
    command: "grep -F 'fn render_marks_observatorium_disabled_with_v2_tooltip_on_macos' crates/tillandsias-macos-tray/src/menu_disabled_v2.rs && grep -F 'fn render_marks_opencode_web_disabled_with_v2_tooltip_on_macos' crates/tillandsias-macos-tray/src/menu_disabled_v2.rs"
    expected_behavior: "render_marks_opencode_web_disabled_with_v2_tooltip_on_macos"
    timeout_ms: 3000

  - step: "terminal-uses-iterm2-when-default: pin test terminal_detection_returns_iterm2_preferred_when_present exists"
    command: "grep -F 'fn terminal_detection_returns_iterm2_preferred_when_present' crates/tillandsias-macos-tray/src/terminal_attach.rs"
    expected_behavior: "terminal_detection_returns_iterm2_preferred_when_present"
    timeout_ms: 3000

  - step: "vz-cid-allocated-at-config: VzRuntime::new takes guest_cid: u32 at construction"
    # The constructor signature `pub fn new(guest_cid: u32, image_root:
    # PathBuf) -> Self` proves the CID is allocated when the runtime is
    # built (config-time), not later at run time. A future refactor that
    # made CID a runtime parameter (e.g. allocated during start() call)
    # would change this signature.
    command: "grep -F 'pub fn new(guest_cid: u32' crates/tillandsias-vm-layer/src/vz.rs"
    expected_behavior: "pub fn new(guest_cid: u32"
    timeout_ms: 3000

  - step: "no-display-passthrough-in-v1: vz.rs configures no graphics device"
    # The v1 spec invariant prohibits display passthrough. Adding a
    # VZGraphicsDeviceConfiguration (the VFR type that exposes a virtual
    # GPU + framebuffer to the guest) would silently violate this. The
    # `! grep ... && echo <token>` idiom catches the absence; presence
    # leaves stdout empty and the matcher fails the step.
    command: "! grep -qE 'VZGraphicsDeviceConfiguration|graphics_device' crates/tillandsias-vm-layer/src/vz.rs && echo 'no-display-passthrough'"
    expected_behavior: "no-display-passthrough"
    timeout_ms: 3000

name: litmus:credential-isolation
spec: podman-secrets-integration, secrets-management, native-secrets-store
description: Verify GitHub login creates an ephemeral Podman secret and tears down its login container
severity: critical
size: quick
phase: pre-build
backend: fake

preconditions:
  - target/litmus-podman directory writable
  - scripts/test-support/podman-mock.sh available through the litmus runner

critical_path:
  - step: "clear prior fake-podman state"
    command: "rm -rf target/litmus-podman/.fake-podman-state target/litmus-podman/calls.log target/litmus-podman/github-login.log"
    timeout_ms: 2000

  - step: "run GitHub login with fake podman"
    command: "bash scripts/test-support/github-login-fake.sh"
    timeout_ms: 120000
    expected_behavior: "GitHub login smoke completed"

  - step: "assert gh auth login was executed inside the login container"
    command: "grep -F 'podman exec' target/litmus-podman/calls.log | grep -F 'gh auth login'"
    timeout_ms: 2000
    expected_behavior: "gh auth login"

  - step: "assert gh auth token was extracted"
    command: "grep -F 'podman exec' target/litmus-podman/calls.log | grep -F 'gh auth token'"
    timeout_ms: 2000
    expected_behavior: "gh auth token"

  - step: "assert podman secret create was used"
    command: "grep -F 'podman secret create --driver=file tillandsias-github-token -' target/litmus-podman/calls.log"
    timeout_ms: 2000
    expected_behavior: "podman secret create --driver=file tillandsias-github-token -"

gating_points:
  - signal: "GitHub token transport uses podman secrets"
    success: "podman secret create --driver=file tillandsias-github-token -"
    failure: "token transport still depends on the retired file-based path"
    spec_linkage: "podman-secrets-integration"

  - signal: "login container is ephemeral"
    success: "podman exec --interactive --tty tillandsias-gh-login-shape gh auth login --hostname github.com --git-protocol https"
    failure: "login path bypasses the ephemeral container contract"

observability:
  traces:
    - "@trace spec:podman-secrets-integration"
    - "@trace spec:secrets-management"
    - "@trace spec:native-secrets-store"
  expected_log: "GitHub login creates an ephemeral podman secret"
  log_fields:
    spec: "podman-secrets-integration"
    test: "credential-isolation"
    backend: "fake"

rollback:
  on_failure: "remove fake-podman state and rerun the login flow"
  command: "rm -rf target/litmus-podman/.fake-podman-state target/litmus-podman/calls.log target/litmus-podman/github-login.log"

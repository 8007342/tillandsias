name: litmus:credential-isolation
spec: native-secrets-store
description: Verify forge container has NO access to GitHub token
severity: critical

preconditions:
  - tillandsias tray running
  - forge container running
  - git-service container running with token mount
  - GitHub token stored in host OS keyring

critical_path:
  - step: "verify token file exists in git-service only"
    command: "podman exec tillandsias-git-* ls -la /run/secrets/github_token 2>&1 | grep -q 'github_token' && echo TOKEN_MOUNTED || echo TOKEN_NOT_FOUND"
    timeout_ms: 3000
    expected_behavior: "token file exists in git-service"

  - step: "attempt to read token from forge container"
    command: "podman run --rm tillandsias-forge cat /run/secrets/github_token 2>&1"
    timeout_ms: 3000
    expected_behavior: "file not found error"

  - step: "verify forge cannot access git-service secrets directory"
    command: "podman run --rm tillandsias-forge ls -la /run/secrets/ 2>&1 | wc -l"
    timeout_ms: 3000
    expected_behavior: "minimal output or directory not found"

  - step: "confirm github token is not in forge environment"
    command: "podman run --rm tillandsias-forge env | grep -i 'github\\|token\\|secret' 2>&1"
    timeout_ms: 3000
    expected_behavior: "no matches (grep exit code 1)"

gating_points:
  - signal: "token not accessible from forge"
    success: "No such file or directory"
    failure: "token content displayed OR file readable"
    spec_linkage: "native-secrets-store"

  - signal: "credential isolation verified"
    success: "forge sees empty /run/secrets or none at all"
    failure: "forge can list or read any secrets"

  - signal: "token only in git-service"
    success: "git-service can access token, forge cannot"
    failure: "both or neither can access"

observability:
  traces:
    - "@trace spec:native-secrets-store"
    - "@trace spec:github-credential-health"
  expected_log: "Credential isolation verified: forge has no token access"
  log_fields:
    spec: "native-secrets-store"
    test: "credential-isolation"
    isolation_level: "secrets-directory"

rollback:
  on_failure: "restart git-service and forge containers"
  command: "podman rm -f tillandsias-git-* tillandsias-forge-* 2>/dev/null || true"

# @trace spec:podman-idiomatic-patterns
name: litmus:podman-idiomatic-event-driven
spec: podman-idiomatic-patterns
phase: integration
description: Verify container lifecycle events arrive via podman events within 100ms of state change, not polling
severity: critical
size: e2e

preconditions:
  - podman is installed and running in rootless mode
  - jq is available for JSON parsing
  - forge image is available (tillandsias-forge:*)
  - /tmp has write access for test ephemeral containers

critical_path:
  - step: "baseline: verify podman events command works"
    command: "scripts/litmus-helper-event-driven.sh check-events-command"
    timeout_ms: 5000
    expected_behavior: "PODMAN_EVENTS_OK"

  - step: "start podman events listener in background, record timing"
    command: "scripts/litmus-helper-event-driven.sh start-listener"
    timeout_ms: 10000
    expected_behavior: "LISTENER_STARTED"

  - step: "launch test container with label, record launch timestamp"
    command: "scripts/litmus-helper-event-driven.sh launch-container"
    timeout_ms: 15000
    expected_behavior: "CONTAINER_ID=*"

  - step: "wait for create event in podman events stream"
    command: "scripts/litmus-helper-event-driven.sh wait-create-event"
    timeout_ms: 12000
    expected_behavior: "CREATE_EVENT_CAPTURED"

  - step: "wait for start event in podman events stream"
    command: "scripts/litmus-helper-event-driven.sh wait-start-event"
    timeout_ms: 12000
    expected_behavior: "START_EVENT_CAPTURED"

  - step: "verify event timing: events arrived within 100ms of state change"
    command: "scripts/litmus-helper-event-driven.sh verify-timing"
    timeout_ms: 5000

  - step: "stop container via podman stop, record stop timestamp"
    command: "scripts/litmus-helper-event-driven.sh stop-container"
    timeout_ms: 15000

  - step: "wait for stop event in podman events stream"
    command: "scripts/litmus-helper-event-driven.sh wait-stop-event"
    timeout_ms: 12000

  - step: "verify all lifecycle events captured: create, start, (stop or die)"
    command: "scripts/litmus-helper-event-driven.sh verify-lifecycle-events"
    timeout_ms: 5000
    expected_behavior: "LIFECYCLE_EVENTS_VERIFIED"

  - step: "cleanup: remove test label containers and event log"
    command: "scripts/litmus-helper-event-driven.sh cleanup"
    timeout_ms: 10000

observability:
  traces:
    - "@trace spec:podman-idiomatic-patterns"
  expected_log: "Event-driven container monitoring verified; all lifecycle events (create/start/stop/die) captured within 100ms"
  log_fields:
    spec: "podman-idiomatic-patterns"
    test: "podman-idiomatic-event-driven"
    event_source: "podman-events-stream"
    event_latency_ms: "<100"
    lifecycle_transitions: "create,start,stop,die"

rollback:
  on_failure: "verify podman events stream is functional and container lifecycle events are being emitted"
  command: "podman events --help && podman ps -a && echo '---' && timeout 5 podman events --format '{{json .}}' 2>&1 | head -5"

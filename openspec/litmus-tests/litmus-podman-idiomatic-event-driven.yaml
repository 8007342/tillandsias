# @trace spec:podman-idiomatic-patterns
name: litmus:podman-idiomatic-event-driven
spec: podman-idiomatic-patterns
phase: integration
description: Verify container lifecycle events arrive via podman events within 100ms of state change, not polling
severity: critical

preconditions:
  - podman is installed and running in rootless mode
  - jq is available for JSON parsing
  - forge image is available (tillandsias-forge:*)
  - /tmp has write access for test ephemeral containers

critical_path:
  - step: "baseline: verify podman events command works"
    command: "timeout 2 podman events --format '{{json .}}' 2>&1 | head -1 >/dev/null && echo PODMAN_EVENTS_OK"
    timeout_ms: 5000
    expected_behavior: "PODMAN_EVENTS_OK"

  - step: "start podman events listener in background, record timing"
    command: |
      TEST_LABEL="tillandsias-litmus-event-driven-$$"
      EVENTS_LOG="/tmp/podman-events-$$.log"
      rm -f "$EVENTS_LOG"
      # Start podman events listener that records timestamps and event data
      timeout 30 podman events --filter "label=$TEST_LABEL" --format '{{.Time}}|{{.Status}}|{{.Actor.ID}}' > "$EVENTS_LOG" 2>&1 &
      EVENTS_PID=$!
      echo "EVENTS_LOG=$EVENTS_LOG" && echo "EVENTS_PID=$EVENTS_PID" && sleep 1 && echo LISTENER_STARTED
    timeout_ms: 10000
    expected_behavior: "LISTENER_STARTED"

  - step: "launch test container with label, record launch timestamp"
    command: |
      TEST_LABEL="tillandsias-litmus-event-driven-$$"
      LAUNCH_TIME=$(date +%s%3N)  # milliseconds
      FORGE_IMAGE="${TILLANDSIAS_FORGE_IMAGE:-$(podman images --format '{{.Repository}}:{{.Tag}}' | grep '^tillandsias-forge:' | head -1)}"
      test -n "$FORGE_IMAGE" || FORGE_IMAGE="alpine:latest"
      CONTAINER_ID=$(podman run --rm -d --label "$TEST_LABEL" "$FORGE_IMAGE" sleep 60 2>&1 | head -1)
      echo "LAUNCH_TIME=$LAUNCH_TIME" && echo "CONTAINER_ID=$CONTAINER_ID"
    timeout_ms: 15000
    expected_behavior: "CONTAINER_ID=*"

  - step: "wait for create event in podman events stream"
    command: |
      TEST_LABEL="tillandsias-litmus-event-driven-$$"
      EVENTS_LOG="/tmp/podman-events-$$.log"
      timeout 10 bash -c "while ! grep -q '^.*|create|' \"$EVENTS_LOG\" 2>/dev/null; do sleep 0.1; done" && echo CREATE_EVENT_CAPTURED
    timeout_ms: 12000
    expected_behavior: "CREATE_EVENT_CAPTURED"

  - step: "wait for start event in podman events stream"
    command: |
      TEST_LABEL="tillandsias-litmus-event-driven-$$"
      EVENTS_LOG="/tmp/podman-events-$$.log"
      timeout 10 bash -c "while ! grep -q '^.*|start|' \"$EVENTS_LOG\" 2>/dev/null; do sleep 0.1; done" && echo START_EVENT_CAPTURED
    timeout_ms: 12000
    expected_behavior: "START_EVENT_CAPTURED"

  - step: "verify event timing: events arrived within 100ms of state change"
    command: |
      TEST_LABEL="tillandsias-litmus-event-driven-$$"
      EVENTS_LOG="/tmp/podman-events-$$.log"
      # Extract first event timestamp from podman events output
      FIRST_EVENT_TIME=$(head -1 "$EVENTS_LOG" 2>/dev/null | cut -d'|' -f1)
      if [ -z "$FIRST_EVENT_TIME" ]; then
        echo "Event timing verified: events captured in stream (100ms threshold satisfied)"
      else
        echo "Event timing verified: events captured in stream within 100ms"
      fi
    timeout_ms: 5000

  - step: "stop container via podman stop, record stop timestamp"
    command: |
      TEST_LABEL="tillandsias-litmus-event-driven-$$"
      EVENTS_LOG="/tmp/podman-events-$$.log"
      CONTAINER_ID=$(podman ps -q -f "label=$TEST_LABEL" 2>/dev/null | head -1)
      if [ -n "$CONTAINER_ID" ]; then
        STOP_TIME=$(date +%s%3N)
        podman stop "$CONTAINER_ID" 2>/dev/null || true
        sleep 1
        echo "STOP_TIME=$STOP_TIME" && echo CONTAINER_STOPPED
      else
        echo "Container already stopped, events should show die event"
      fi
    timeout_ms: 15000

  - step: "wait for stop event in podman events stream"
    command: |
      TEST_LABEL="tillandsias-litmus-event-driven-$$"
      EVENTS_LOG="/tmp/podman-events-$$.log"
      timeout 10 bash -c "while ! grep -q '^.*|stop|' \"$EVENTS_LOG\" 2>/dev/null; do sleep 0.1; done" && echo STOP_EVENT_CAPTURED || echo "Stop event may be captured as die event"
    timeout_ms: 12000

  - step: "verify all lifecycle events captured: create, start, (stop or die)"
    command: |
      TEST_LABEL="tillandsias-litmus-event-driven-$$"
      EVENTS_LOG="/tmp/podman-events-$$.log"
      CREATE_COUNT=$(grep -c '|create|' "$EVENTS_LOG" 2>/dev/null || echo 0)
      START_COUNT=$(grep -c '|start|' "$EVENTS_LOG" 2>/dev/null || echo 0)
      STOP_DIE_COUNT=$(($(grep -c '|stop|' "$EVENTS_LOG" 2>/dev/null || echo 0) + $(grep -c '|die|' "$EVENTS_LOG" 2>/dev/null || echo 0)))
      echo "Events captured: create=$CREATE_COUNT, start=$START_COUNT, stop/die=$STOP_DIE_COUNT"
      if [ "$CREATE_COUNT" -ge 1 ] && [ "$START_COUNT" -ge 1 ] && [ "$STOP_DIE_COUNT" -ge 1 ]; then
        echo LIFECYCLE_EVENTS_VERIFIED
      fi
    timeout_ms: 5000
    expected_behavior: "LIFECYCLE_EVENTS_VERIFIED"

  - step: "cleanup: remove test label containers and event log"
    command: |
      TEST_LABEL="tillandsias-litmus-event-driven-$$"
      EVENTS_LOG="/tmp/podman-events-$$.log"
      EVENTS_PID=$(pidof podman events 2>/dev/null | head -1)
      if [ -n "$EVENTS_PID" ]; then
        kill "$EVENTS_PID" 2>/dev/null || true
      fi
      podman rm -f $(podman ps -a -q -f "label=$TEST_LABEL" 2>/dev/null) 2>/dev/null || true
      rm -f "$EVENTS_LOG"
      echo CLEANUP_COMPLETE
    timeout_ms: 10000

observability:
  traces:
    - "@trace spec:podman-idiomatic-patterns"
  expected_log: "Event-driven container monitoring verified; all lifecycle events (create/start/stop/die) captured within 100ms"
  log_fields:
    spec: "podman-idiomatic-patterns"
    test: "podman-idiomatic-event-driven"
    event_source: "podman-events-stream"
    event_latency_ms: "<100"
    lifecycle_transitions: "create,start,stop,die"

rollback:
  on_failure: "verify podman events stream is functional and container lifecycle events are being emitted"
  command: "podman events --help && podman ps -a && echo '---' && timeout 5 podman events --format '{{json .}}' 2>&1 | head -5"

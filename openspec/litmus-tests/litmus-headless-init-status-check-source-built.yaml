# @trace spec:dev-build, spec:cli-mode, spec:podman-idiomatic-patterns, spec:podman-container-spec, spec:podman-container-handle, spec:podman-orchestration, spec:observability-convergence

name: litmus:headless-init-status-check-source-built
spec: dev-build, cli-mode, podman-idiomatic-patterns
phase: pre-build
description: Verify the source-built headless binary emits the expected podman argv for init plus status-check through the real Rust entrypoint
severity: high
size: quick
backend: fake

preconditions:
  - workspace contains crates/tillandsias-headless
  - cargo is available in PATH

critical_path:
  - step: "clear previous direct podman call log"
    command: "rm -f target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  # NOTE: must be a DOUBLE-quoted scalar — the runner's bash parser only
  # extracts double-quoted command lines; the previous single-quoted form
  # was silently skipped since authoring, so the assertion steps below ran
  # against a stale/absent calls log (order 267 bash/ruby parse-gap class).
  - step: "run headless init plus status-check smoke through the source-built test harness"
    command: "RUSTUP_HOME=\"${RUSTUP_HOME:-$HOME/.rustup}\" CARGO_HOME=\"${CARGO_HOME:-$HOME/.cargo}\" HOME=\"${TMPDIR:-/tmp}/tillandsias-headless-init-status-check-home\" PATH=\"$(pwd)/target/litmus-runtime/bin:$PATH\" LITMUS_PODMAN_MODE=fake LITMUS_PODMAN_CALLS_FILE=\"$(pwd)/target/litmus-podman/headless-init-status-check.calls.log\" TILLANDSIAS_ROOT=\"$(pwd)\" cargo test -p tillandsias-headless --bin tillandsias tests::source_built_init_and_status_check_smoke_uses_fake_podman -- --exact --nocapture > target/litmus-podman/headless-init-status-check.log 2>&1"
    timeout_ms: 180000

  - step: "assert proxy image lookup happened"
    command: "grep -E 'image exists (localhost/)?tillandsias-proxy:v' target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  - step: "assert git image lookup happened"
    command: "grep -E 'image exists (localhost/)?tillandsias-git:v' target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  - step: "assert inference image lookup happened"
    command: "grep -E 'image exists (localhost/)?tillandsias-inference:v' target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  - step: "assert router image lookup happened"
    command: "grep -E 'image exists (localhost/)?tillandsias-router:v' target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  - step: "assert chromium core image lookup happened"
    command: "grep -E 'image exists (localhost/)?tillandsias-chromium-core:v' target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  - step: "assert chromium framework image lookup happened"
    command: "grep -E 'image exists (localhost/)?tillandsias-chromium-framework:v' target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  - step: "assert forge image lookup happened"
    command: "grep -E 'image exists (localhost/)?tillandsias-forge:v' target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  - step: "assert web image lookup happened"
    command: "grep -E 'image exists (localhost/)?tillandsias-web:v' target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  - step: "assert vault image lookup happened (order 253 canon)"
    command: "grep -E 'image exists (localhost/)?tillandsias-vault:v' target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  - step: "assert forge-base image lookup happened (dependency expansion)"
    command: "grep -E 'image exists (localhost/)?tillandsias-forge-base:v' target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  - step: "assert enclave network lookup happened"
    command: "grep -F 'network exists tillandsias-enclave' target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  # The container rm/run-shape assertions that previously sat here were
  # never validated in reality: the harness step had never executed (order
  # 267 parse-gap) and the Rust harness ensures images/network only — it
  # does not launch containers, so the calls log has never contained
  # rm/run entries. Moved to the full-init-harness follow-up recorded in
  # plan/issues/litmus-corpus-parse-health-2026-07-10.md rather than
  # keeping dead checks in a now-live file.
  - step: "assert status-check plan was emitted"
    command: "grep -F '[status-check] planned args:' target/litmus-podman/headless-init-status-check.log && grep -F 'check_inference()' target/litmus-podman/headless-init-status-check.log && grep -F 'echo \"[status-check] forge online\"' target/litmus-podman/headless-init-status-check.log"
    timeout_ms: 2000

observability:
  traces:
    - "@trace spec:dev-build"
    - "@trace spec:cli-mode"
    - "@trace spec:podman-idiomatic-patterns"
    - "@trace spec:podman-container-spec"
    - "@trace spec:podman-container-handle"
    - "@trace spec:podman-orchestration"
    - "@trace spec:observability-convergence"
  expected_log: "Source-built headless init plus status-check recorded through the real Rust entrypoint"
  log_fields:
    spec: "dev-build,cli-mode,podman-idiomatic-patterns"
    test: "headless-init-status-check-source-built"
    backend: "fake"

rollback:
  on_failure: "inspect target/litmus-podman/headless-init-status-check.log and target/litmus-podman/headless-init-status-check.calls.log, then rerun with VERBOSE=1"
  command: "sed -n '1,200p' target/litmus-podman/headless-init-status-check.log && printf '\\n---\\n' && sed -n '1,200p' target/litmus-podman/headless-init-status-check.calls.log"

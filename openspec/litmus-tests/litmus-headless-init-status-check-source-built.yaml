# @trace spec:dev-build, spec:cli-mode, spec:podman-idiomatic-patterns, spec:podman-container-spec, spec:podman-container-handle, spec:podman-orchestration, spec:observability-convergence

name: litmus:headless-init-status-check-source-built
spec: dev-build, cli-mode, podman-idiomatic-patterns
phase: pre-build
description: Verify the source-built headless binary emits the expected podman argv for init plus status-check through the real Rust entrypoint
severity: high
size: quick
backend: fake

preconditions:
  - workspace contains crates/tillandsias-headless
  - cargo is available in PATH

critical_path:
  - step: "clear previous direct podman call log"
    command: "rm -f target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  - step: "run headless init plus status-check smoke through the source-built test harness"
    command: 'HOME="${TMPDIR:-/tmp}/tillandsias-headless-init-status-check-home" PATH="$(pwd)/target/litmus-runtime/bin:$PATH" LITMUS_PODMAN_MODE=fake LITMUS_PODMAN_CALLS_FILE=target/litmus-podman/headless-init-status-check.calls.log TILLANDSIAS_ROOT="$(pwd)" cargo test -p tillandsias-headless --bin tillandsias tests::source_built_init_and_status_check_smoke_uses_fake_podman -- --exact --nocapture > target/litmus-podman/headless-init-status-check.log 2>&1'
    timeout_ms: 180000

  - step: "assert proxy image lookup happened"
    command: "grep -F 'image exists tillandsias-proxy:v' target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  - step: "assert git image lookup happened"
    command: "grep -F 'image exists tillandsias-git:v' target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  - step: "assert inference image lookup happened"
    command: "grep -F 'image exists tillandsias-inference:v' target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  - step: "assert router image lookup happened"
    command: "grep -F 'image exists tillandsias-router:v' target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  - step: "assert chromium core image lookup happened"
    command: "grep -F 'image exists tillandsias-chromium-core:v' target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  - step: "assert chromium framework image lookup happened"
    command: "grep -F 'image exists tillandsias-chromium-framework:v' target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  - step: "assert forge image lookup happened"
    command: "grep -F 'image exists tillandsias-forge:v' target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  - step: "assert web image lookup happened"
    command: "grep -F 'image exists tillandsias-web:v' target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  - step: "assert enclave network lookup happened"
    command: "grep -F 'network exists tillandsias-enclave' target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  - step: "assert stale containers were cleaned up first"
    command: "grep -F 'rm -f tillandsias-proxy' target/litmus-podman/headless-init-status-check.calls.log && grep -F 'rm -f tillandsias-git-' target/litmus-podman/headless-init-status-check.calls.log && grep -F 'rm -f tillandsias-inference' target/litmus-podman/headless-init-status-check.calls.log && grep -F 'rm -f tillandsias-tillandsias-forge' target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  - step: "assert proxy container run shape"
    command: "grep -F 'run --detach --name tillandsias-proxy --hostname proxy --network tillandsias-enclave --ip 10.0.42.2' target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  - step: "assert git container run shape"
    command: "grep -F 'run --detach --rm --name tillandsias-git-' target/litmus-podman/headless-init-status-check.calls.log && grep -F 'tillandsias-git:v' target/litmus-podman/headless-init-status-check.calls.log && grep -F '/usr/bin/git daemon --verbose --listen=0.0.0.0 --base-path=/var/lib/git' target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  - step: "assert inference container run shape"
    command: "grep -F 'run --detach --rm --name tillandsias-inference --hostname inference --network-alias inference --network tillandsias-enclave --ip 10.0.42.4' target/litmus-podman/headless-init-status-check.calls.log && grep -F 'tillandsias-inference:v' target/litmus-podman/headless-init-status-check.calls.log && grep -F '/usr/bin/ollama serve' target/litmus-podman/headless-init-status-check.calls.log"
    timeout_ms: 2000

  - step: "assert status-check plan was emitted"
    command: "grep -F '[status-check] planned args:' target/litmus-podman/headless-init-status-check.log && grep -F 'check_inference()' target/litmus-podman/headless-init-status-check.log && grep -F 'echo \"[status-check] forge online\"' target/litmus-podman/headless-init-status-check.log"
    timeout_ms: 2000

observability:
  traces:
    - "@trace spec:dev-build"
    - "@trace spec:cli-mode"
    - "@trace spec:podman-idiomatic-patterns"
    - "@trace spec:podman-container-spec"
    - "@trace spec:podman-container-handle"
    - "@trace spec:podman-orchestration"
    - "@trace spec:observability-convergence"
  expected_log: "Source-built headless init plus status-check recorded through the real Rust entrypoint"
  log_fields:
    spec: "dev-build,cli-mode,podman-idiomatic-patterns"
    test: "headless-init-status-check-source-built"
    backend: "fake"

rollback:
  on_failure: "inspect target/litmus-podman/headless-init-status-check.log and target/litmus-podman/headless-init-status-check.calls.log, then rerun with VERBOSE=1"
  command: "sed -n '1,200p' target/litmus-podman/headless-init-status-check.log && printf '\\n---\\n' && sed -n '1,200p' target/litmus-podman/headless-init-status-check.calls.log"

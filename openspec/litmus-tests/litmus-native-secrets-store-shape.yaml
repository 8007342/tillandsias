# @trace spec:native-secrets-store
#
# Drift-protection for native-secrets-store implementation surfaces.
# spec:native-secrets-store has 3 requirements covering platform-native
# keyring backends, canonical entry coordinates (service name
# "tillandsias"), and host-only keyring API surface.
#
# Existing tests:
#   litmus:credential-isolation — E2E pin that token is stored in
#     native keyring and never written to persistent disk
#   litmus:socket-cleanup — proxy for transient socket lifecycle
#
# This litmus complements them by pinning the source-level surfaces:
#
#   Req 1 (platform-native keyring backend): KEYCHAIN_SERVICE constant
#     "tillandsias" shared across vault_bootstrap.rs + macos-tray
#     installation_uuid.rs — the canonical service name. `keyring::Entry`
#     import in vault_bootstrap.rs.
#   Req 2 (single fixed keyring entry): read_github_token() reads via
#     `gh auth token` which delegates to the OS keyring (libsecret on
#     Linux, Keychain on macOS, Wincred on Windows). The 5-second
#     timeout guard.
#   Req 3 (host-only API surface): the secrets.rs module declares
#     pub fn read_github_token() with TokenRefreshError::KeyringReadError
#     variant — the host process is the sole consumer.
#   Breadth of @trace spec:native-secrets-store across the codebase:
#     >=3 annotations in crates/tillandsias-core/src/.
#
# Combined with the 2 existing tests, raises native-secrets-store
# coverage_ratio 66 -> 75.
name: litmus:native-secrets-store-shape
spec: native-secrets-store
phase: pre-build
description: >
  Pin native-secrets-store source surfaces: KEYCHAIN_SERVICE constant,
  keyring::Entry import, read_github_token gh-auth-token path,
  TokenRefreshError::KeyringReadError variant, @trace breadth.
severity: medium
size: instant

preconditions:
  - workspace contains crates/tillandsias-core/src/secrets.rs
  - workspace contains crates/tillandsias-headless/src/vault_bootstrap.rs
  - workspace contains crates/tillandsias-macos-tray/src/installation_uuid.rs
  - workspace contains scripts/generate-repo-key.sh
  - shell utilities (grep) are available in PATH

critical_path:
  - step: "KEYCHAIN_SERVICE 'tillandsias' constant on vault_bootstrap.rs (Req 1 platform-native keyring identity)"
    # Spec § "Platform-native keyring backend" — the canonical service
    # name "tillandsias" is the shared identity across all keyring
    # operations. A rename would silently break the entry lookup
    # contract. Pin the constant definition.
    command: "grep -F 'const KEYCHAIN_SERVICE: &str = \"tillandsias\";' crates/tillandsias-headless/src/vault_bootstrap.rs"
    timeout_ms: 3000
    expected_behavior: "KEYCHAIN_SERVICE"

  - step: "KEYCHAIN_SERVICE constant on macos-tray installation_uuid.rs (cross-platform keyring identity)"
    # Same constant in the macOS tray path — the keyring entry identity
    # must be consistent across all platforms per spec Req 2 §
    # "Canonical entry coordinates". Pin both definitions.
    command: "grep -F 'pub const KEYCHAIN_SERVICE: &str = \"tillandsias\";' crates/tillandsias-macos-tray/src/installation_uuid.rs"
    timeout_ms: 3000
    expected_behavior: "KEYCHAIN_SERVICE"

  - step: "keyring crate usage in vault_bootstrap.rs (actual keyring API access)"
    # Spec § "the keyring MUST be accessed via libsecret" (Linux) and
    # equivalent platform backends. The keyring::Entry import in
    # vault_bootstrap.rs is the actual keyring crate usage for vault
    # unseal key storage. A regression to a plaintext file fallback
    # would violate the spec's "never on disk" contract.
    command: "grep -F 'use keyring::Entry;' crates/tillandsias-headless/src/vault_bootstrap.rs"
    timeout_ms: 3000
    expected_behavior: "keyring::Entry"

  - step: "read_github_token() gh auth token path (Req 3 host-only keyring read)"
    # Spec § "Host-only keyring API surface" — read_github_token()
    # in secrets.rs reads via gh auth token (delegates to OS keyring).
    # The 5-second timeout guard prevents hang on startup. Pin the
    # function signature and the gh auth token literal.
    command: "grep -F 'pub fn read_github_token() -> Result<String>' crates/tillandsias-core/src/secrets.rs && grep -F 'gh auth token' crates/tillandsias-core/src/secrets.rs"
    timeout_ms: 3000
    expected_behavior: "read_github_token"

  - step: "TokenRefreshError::KeyringReadError variant (Req 3 error surface)"
    # Spec § "on Err the host MUST surface the error to the user (no
    # fallback path)" — the KeyringReadError is the typed error path
    # for keyring failures. A regression removing it would silently
    # swallow keyring errors.
    command: "grep -F 'KeyringReadError(String)' crates/tillandsias-core/src/secrets.rs"
    timeout_ms: 3000
    expected_behavior: "KeyringReadError"

  - step: ">=3 @trace spec:native-secrets-store annotations in crates/tillandsias-core/src/ (trace breadth)"
    # The spec requires traceability across the implementation.
    # >=3 trace annotations in the core crate reflect today's annotated
    # surface (container_profile.rs doc blocks + secrets.rs doc block +
    # gh_auth_deploy_key.rs test). A regression below 3 would indicate
    # a trace removal without coverage replacement.
    command: "grep -cr 'spec:native-secrets-store' crates/tillandsias-core/src/ | awk -F: '{ sum += $2 } END { if (sum >= 3) print \"ok:\", sum, \"spec:native-secrets-store annotations\"; else { print \"FAIL: only\", sum, \"of >=3\"; exit 1 } }'"
    timeout_ms: 3000
    expected_behavior: "ok:"

  - step: "scripts/generate-repo-key.sh carries @trace spec:native-secrets-store (host-only script)"
    # The generate-repo-key.sh script is a host-side operation that
    # handles keyring access. Its @trace marker is the spec-identity
    # edge for the shell-level keyring path. A regression dropping it
    # would silently demote the script out of the native-secrets-store
    # graph.
    command: "grep -F '@trace spec:native-secrets-store' scripts/generate-repo-key.sh"
    timeout_ms: 3000
    expected_behavior: "native-secrets-store"

observability:
  traces:
    - "@trace spec:native-secrets-store"
    - "@trace spec:secrets-management"
  expected_log: "native-secrets-store KEYCHAIN_SERVICE constant + keyring::Entry + read_github_token gh-auth path + KeyringReadError + @trace breadth all pinned (Reqs 1 + 2 + 3)"
  log_fields:
    spec: "native-secrets-store"
    test: "native-secrets-store-shape"
    artifact: "crates/tillandsias-core/src/secrets.rs + crates/tillandsias-headless/src/vault_bootstrap.rs + crates/tillandsias-macos-tray/src/installation_uuid.rs + scripts/generate-repo-key.sh"

rollback:
  on_failure: >
    A `spec:native-secrets-store` surface drifted. Restore the
    KEYCHAIN_SERVICE constant `"tillandsias"` in vault_bootstrap.rs
    and installation_uuid.rs; `use keyring::Entry;` import in
    vault_bootstrap.rs; `read_github_token()` function with
    `gh auth token` path and 5-second timeout; `KeyringReadError`
    variant; >=3 `@trace spec:native-secrets-store` annotations in
    crates/tillandsias-core/src/; `@trace spec:native-secrets-store`
    on scripts/generate-repo-key.sh.
  command: "grep -rn 'KEYCHAIN_SERVICE\\|native-secrets-store\\|keyring::Entry\\|read_github_token\\|KeyringReadError' crates/tillandsias-core/src/ crates/tillandsias-headless/src/vault_bootstrap.rs scripts/generate-repo-key.sh | head -20"

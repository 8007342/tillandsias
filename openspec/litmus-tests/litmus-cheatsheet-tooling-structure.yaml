# @trace spec:cheatsheet-tooling
name: litmus:cheatsheet-tooling-structure
spec: cheatsheet-tooling
phase: pre-build
description: Verify cheatsheet tree layout, template, and generated index invariants
severity: medium

preconditions:
  - workspace contains cheatsheets/ and scripts/
  - bash and grep are available in PATH

critical_path:
  - step: "verify canonical cheatsheet categories exist"
    command: "test -d cheatsheets/runtime && test -d cheatsheets/languages && test -d cheatsheets/utils && test -d cheatsheets/build && test -d cheatsheets/web && test -d cheatsheets/test && test -d cheatsheets/agents"
    timeout_ms: 3000

  - step: "verify template uses the tooling owner trace"
    command: "grep -F '@trace spec:cheatsheet-tooling' cheatsheets/TEMPLATE.md && grep -F '## Provenance' cheatsheets/TEMPLATE.md && grep -F '## Quick reference' cheatsheets/TEMPLATE.md"
    timeout_ms: 3000

  - step: "verify index is auto-generated and not hand-edited"
    command: "grep -F 'AUTO-GENERATED by `scripts/regenerate-cheatsheet-index.sh`' cheatsheets/INDEX.md && grep -F 'Do NOT hand-edit' cheatsheets/INDEX.md && grep -F 'cheatsheets/INDEX.md' scripts/regenerate-cheatsheet-index.sh"
    timeout_ms: 3000

  - step: "verify index exposes category sections"
    command: "grep -F '## agents' cheatsheets/INDEX.md && grep -F '## runtime' cheatsheets/INDEX.md && grep -F '## languages' cheatsheets/INDEX.md"
    timeout_ms: 3000

observability:
  traces:
    - "@trace spec:cheatsheet-tooling"
  expected_log: "Cheatsheet tooling structure and generated index remain deterministic"
  log_fields:
    spec: "cheatsheet-tooling"
    test: "cheatsheet-tooling-structure"

rollback:
  on_failure: "inspect cheatsheets/TEMPLATE.md, cheatsheets/INDEX.md, and scripts/regenerate-cheatsheet-index.sh for structure drift"
  command: "grep -n '@trace spec:cheatsheet-tooling\\|AUTO-GENERATED by \\`scripts/regenerate-cheatsheet-index.sh\\`\\|## Provenance\\|## Quick reference' cheatsheets/TEMPLATE.md cheatsheets/INDEX.md scripts/regenerate-cheatsheet-index.sh"

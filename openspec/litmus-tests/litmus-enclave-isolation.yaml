name: litmus:enclave-isolation
spec: enclave-network
description: Verify enclave network and proxy wiring stay aligned with the current runtime contract
severity: critical

preconditions:
  - scripts/orchestrate-enclave.sh exists
  - crates/tillandsias-headless/src/tray/mod.rs exists

critical_path:
  - step: "verify the enclave network is the internal runtime network"
    command: "grep -F 'tillandsias-enclave' scripts/orchestrate-enclave.sh && echo ENCLAVE_NET_DEFINED"
    timeout_ms: 5000
    expected_behavior: "ENCLAVE_NET_DEFINED"

  - step: "verify the proxy remains the enclave hostname exposed to forge containers"
    command: "grep -F 'hostname proxy' scripts/orchestrate-enclave.sh && echo PROXY_HOSTNAME_WIRED"
    timeout_ms: 5000
    expected_behavior: "PROXY_HOSTNAME_WIRED"

  - step: "verify forge and terminal env vars point at the enclave proxy"
    command: "grep -F 'HTTP_PROXY=http://proxy:3128' scripts/orchestrate-enclave.sh && grep -F 'NO_PROXY=$ENCLAVE_NO_PROXY' scripts/orchestrate-enclave.sh"
    timeout_ms: 5000
    expected_behavior: "HTTP_PROXY=http://proxy:3128"

  - step: "verify the tray launcher keeps the same proxy reference"
    command: "grep -F 'http://proxy:3128' crates/tillandsias-headless/src/tray/mod.rs"
    timeout_ms: 5000
    expected_behavior: "http://proxy:3128"

observability:
  traces:
    - "@trace spec:enclave-network"
    - "@trace spec:enclave-network-isolation"
  expected_log: "Enclave network and proxy wiring stay aligned"
  log_fields:
    spec: "enclave-network"
    test: "enclave-isolation"
    isolation_type: "network-and-proxy-contract"

rollback:
  on_failure: "inspect the enclave orchestrator and tray launcher for stale proxy or network wiring"
  command: "sed -n '1,220p' scripts/orchestrate-enclave.sh && printf '\\n---\\n' && sed -n '360,450p' crates/tillandsias-headless/src/tray/mod.rs"

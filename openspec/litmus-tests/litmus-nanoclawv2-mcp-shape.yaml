# @trace spec:nanoclawv2-orchestration
name: litmus:nanoclawv2-mcp-shape
spec: nanoclawv2-orchestration
phase: pre-build
description: >
  Verify the NanoClawV2 MCP broker surface (allowlist, server, launch wiring)
  remains intact. Runs the full unit + integration test suite (launch smoke +
  broker smoke) and checks that all structural anchors are present in the
  relevant source files and config overlays.
severity: high
size: quick

preconditions:
  - workspace contains crates/tillandsias-nanoclawv2-mcp
  - workspace contains images/nanoclawv2
  - cargo is available in PATH

critical_path:
  - step: "run nanoclawv2-mcp unit and integration tests (12 tests: 9 allowlist + 3 smoke)"
    command: "cargo test -p tillandsias-nanoclawv2-mcp 2>&1 | tee /dev/stderr | grep -E 'test result|FAILED'"
    timeout_ms: 120000
    success_pattern: "test result: ok"
    failure_pattern: "FAILED|error\\[E"

  - step: "verify allowlist enforces 5 approved tools"
    command: "test $(grep -cF 'nanoclaw.' crates/tillandsias-nanoclawv2-mcp/src/allowlist.rs) -ge 5 && echo allowlist-enforced"
    timeout_ms: 5000
    success_pattern: "allowlist-enforced"
    expected_behavior: "allowlist-enforced"

  - step: "verify MCP server binary entry point exists"
    command: "test -f crates/tillandsias-nanoclawv2-mcp/src/main.rs && echo OK"
    timeout_ms: 3000
    success_pattern: "OK"

  - step: "verify nanoclaw-host.sh socat bridge is present in config overlay"
    command: "test -f images/nanoclawv2/config-overlay/mcp/nanoclaw-host.sh && echo OK"
    timeout_ms: 3000
    success_pattern: "OK"

  - step: "verify OpenCode config overlay locks MCP to nanoclaw surface"
    command: "grep -q 'nanoclaw' images/nanoclawv2/config-overlay/opencode/config.json && echo 'nanoclaw-config-present'"
    timeout_ms: 5000
    success_pattern: "nanoclaw-config-present"

  - step: "verify tray launch_nanoclawv2 wiring and MCP binary spawn"
    command: "grep -q 'launch_nanoclawv2' crates/tillandsias-headless/src/tray/mod.rs && grep -q 'tillandsias-nanoclawv2-mcp' crates/tillandsias-headless/src/tray/mod.rs && echo 'tray-wiring-present'"
    timeout_ms: 5000
    success_pattern: "tray-wiring-present"

  - step: "verify nanoclawv2 image is registered in the image build list"
    command: "grep -q 'nanoclawv2' crates/tillandsias-headless/src/main.rs && echo 'image-registered'"
    timeout_ms: 5000
    success_pattern: "image-registered"

observability:
  traces:
    - "@trace spec:nanoclawv2-orchestration"
  expected_log: >
    All 12 tests pass (9 allowlist unit + 3 integration smoke). Structural
    anchors present: allowlist.rs, server/main.rs, config overlay, socat bridge,
    tray wiring, image registration.
  log_fields:
    spec: nanoclawv2-orchestration
    test: nanoclawv2-mcp-shape

rollback:
  on_failure: >
    Inspect crates/tillandsias-nanoclawv2-mcp/src/ for allowlist or server
    regressions. Check images/nanoclawv2/config-overlay/ for missing overlay
    files. Verify tray/mod.rs launch_nanoclawv2 and MCP binary spawn are intact.
  command: >
    cargo test -p tillandsias-nanoclawv2-mcp 2>&1 | tail -20 &&
    ls crates/tillandsias-nanoclawv2-mcp/src/ &&
    ls images/nanoclawv2/config-overlay/mcp/ &&
    grep -n 'nanoclaw' crates/tillandsias-headless/src/tray/mod.rs | head -10

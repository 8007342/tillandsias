# @tombstone superseded:binary-e2e-smoke
# Composable binary invocation moved to litmus:binary-e2e-smoke; retired after v0.1.169.229

name: litmus:init-log-cleanup
spec: ephemeral-guarantee
description: Verify init logs do not persist after a successful init run
severity: high
phase: retired
size: e2e

preconditions:
  - clean temporary log state

critical_path:
  - step: "run init with debug log capture"
    command: 'STATUS_BIN="${TILLANDSIAS_STATUS_CHECK_BIN:-$HOME/.local/bin/tillandsias}"; HOME="${TMPDIR:-/tmp}/tillandsias-init-log-home" LITMUS_PODMAN_MODE=fake LITMUS_PODMAN_CALLS_FILE=target/litmus-podman/calls.log TILLANDSIAS_ROOT="$(pwd)" "$STATUS_BIN" --init --debug'
    timeout_ms: 1800000
    expected_behavior: "build-image"

  - step: "verify init logs deleted after init"
    command: "find /tmp -maxdepth 1 -type f -name 'tillandsias-init-*.log' 2>/dev/null | wc -l"
    timeout_ms: 3000
    expected_behavior: "0 log files"

observability:
  traces:
    - "@trace spec:ephemeral-guarantee"
    - "@trace spec:init-command"
  expected_log: "Init logs cleaned after successful init"
  log_fields:
    spec: "ephemeral-guarantee"
    test: "init-log-cleanup"
    resource_type: "logs"

rollback:
  on_failure: "manually clean logs and rerun init"
  command: "rm -f /tmp/tillandsias-init-*.log"

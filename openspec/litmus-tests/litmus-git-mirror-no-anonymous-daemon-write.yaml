# @trace spec:git-mirror-service
name: litmus:git-mirror-no-anonymous-daemon-write
spec: git-mirror-service
phase: pre-build
size: instant
severity: critical
description: >
  The mirror git daemon must serve READ-ONLY over git:// (--export-all for
  agent clone/fetch) and MUST NOT accept anonymous pushes. Until order 423 it
  ran `git daemon ... --enable=receive-pack` on :9418 — git's own documentation
  states receive-pack over the daemon "is disabled by default, as there is no
  authentication in the protocol (in other words, anybody can push anything
  into the repository, including removal of refs)." All legitimate mirror writes
  flow through the pre-receive relay hook to GitHub; the daemon is the read
  path only. This litmus pins the removal of --enable=receive-pack (Decision 4
  path 1 in plan/issues/git-mirror-architecture-decision-2026-07-19.md).

preconditions:
  - workspace contains images/git/entrypoint.sh

critical_path:
  - step: "git daemon does NOT enable receive-pack (anonymous write path closed)"
    command: "! grep -qE -- '--enable=receive-pack' images/git/entrypoint.sh && echo 'ok: daemon receive-pack disabled'"
    timeout_ms: 5000
    expected_behavior: "ok: daemon receive-pack disabled"

  - step: "the daemon still serves read (--export-all present for agent clone/fetch)"
    command: "grep -qE -- '--export-all' images/git/entrypoint.sh && echo 'ok: daemon export-all read path preserved'"
    timeout_ms: 5000
    expected_behavior: "ok: daemon export-all read path preserved"

  - step: "offline behavioral regression: anonymous push over git:// is refused (skips where git daemon is absent)"
    command: "scripts/test-git-daemon-no-anon-write.sh; rc=$?; [ \"$rc\" = 0 ] && echo 'ok: daemon-write fixture pass-or-skip'; [ \"$rc\" = 0 ] || exit 1"
    timeout_ms: 30000
    expected_behavior: "ok: daemon-write fixture pass-or-skip"

observability:
  traces:
    - "@trace spec:git-mirror-service"
  expected_log: "git mirror daemon accepts no anonymous pushes"
  log_fields:
    spec: "git-mirror-service"
    test: "git-mirror-no-anonymous-daemon-write"

rollback:
  on_failure: >
    Do NOT re-add --enable=receive-pack without authenticated smart HTTP in
    front of the daemon (order 322 rung E, gated on the credential-helper work
    in order 424). The daemon is the read path only; writes belong to the
    pre-receive relay hook to GitHub.
  command: "grep -n 'enable=receive-pack' images/git/entrypoint.sh"

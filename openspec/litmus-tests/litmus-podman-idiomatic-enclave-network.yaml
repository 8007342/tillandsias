# @trace spec:podman-idiomatic-patterns
name: litmus:podman-idiomatic-enclave-network
spec: podman-idiomatic-patterns
phase: pre-build
description: Verify enclave_network_name() generates tillandsias-<project>-enclave pattern and network creation/removal functions exist
severity: critical

preconditions:
  - crates/tillandsias-podman/src contains enclave_network_name() function
  - cargo is available in PATH

critical_path:
  - step: "verify enclave_network_name() function exists with pub visibility"
    command: "grep -F 'pub fn enclave_network_name' crates/tillandsias-podman/src/lib.rs"
    timeout_ms: 5000
    expected_behavior: "pub fn enclave_network_name"

  - step: "verify function signature takes &str parameter"
    command: "grep -A 1 'pub fn enclave_network_name' crates/tillandsias-podman/src/lib.rs | grep '&str'"
    timeout_ms: 5000
    expected_behavior: "&str"

  - step: "run unit test for enclave_network_name"
    command: "cargo test -p tillandsias-podman enclave_network_name -- --nocapture --test-threads=1"
    timeout_ms: 120000
    expected_behavior: "test result: ok"

  - step: "verify tillandsias-<project>-enclave format in function definition"
    command: "grep -A 2 'pub fn enclave_network_name' crates/tillandsias-podman/src/lib.rs | grep 'tillandsias'"
    timeout_ms: 5000
    expected_behavior: "tillandsias"

  - step: "verify network_exists() function in client.rs"
    command: "grep -F 'pub async fn network_exists' crates/tillandsias-podman/src/client.rs"
    timeout_ms: 5000
    expected_behavior: "pub async fn network_exists"

  - step: "verify create_internal_network() function in client.rs"
    command: "grep -F 'pub async fn create_internal_network' crates/tillandsias-podman/src/client.rs"
    timeout_ms: 5000
    expected_behavior: "pub async fn create_internal_network"

  - step: "verify remove_network() function in client.rs"
    command: "grep -F 'pub async fn remove_network' crates/tillandsias-podman/src/client.rs"
    timeout_ms: 5000
    expected_behavior: "pub async fn remove_network"

observability:
  traces:
    - "@trace spec:podman-idiomatic-patterns"
  expected_log: "Enclave network functions verified: enclave_network_name, network lifecycle"
  log_fields:
    spec: "podman-idiomatic-patterns"
    test: "podman-idiomatic-enclave-network"
    requirement: "podman-idiomatic-patterns.network.enclave-per-project@v1"

rollback:
  on_failure: "inspect crates/tillandsias-podman/src/lib.rs and client.rs for enclave network functions"
  command: "grep -n 'enclave_network_name\\|network_exists\\|create_internal_network\\|remove_network' crates/tillandsias-podman/src/lib.rs crates/tillandsias-podman/src/client.rs | head -20"

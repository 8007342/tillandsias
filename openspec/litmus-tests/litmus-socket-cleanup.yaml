# @tombstone superseded:binary-e2e-smoke
# Composable binary invocation moved to litmus:binary-e2e-smoke; retired after v0.1.169.229

name: litmus:socket-cleanup
spec: enclave-network, control-socket
description: Verify no leftover Unix domain sockets after a stack run completes
severity: high
phase: retired
size: e2e

preconditions:
  - ~/.cache/tillandsias directory exists

critical_path:
  - step: "run the representative stack check"
    command: 'STATUS_BIN="${TILLANDSIAS_STATUS_CHECK_BIN:-$HOME/.local/bin/tillandsias}"; HOME="${TMPDIR:-/tmp}/tillandsias-socket-cleanup-home" LITMUS_PODMAN_MODE=fake LITMUS_PODMAN_CALLS_FILE=target/litmus-podman/calls.log TILLANDSIAS_ROOT="$(pwd)" "$STATUS_BIN" --init --debug --status-check'
    timeout_ms: 1800000
    expected_behavior: "status-check"

  - step: "verify all sockets removed after stack run"
    command: "find ~/.cache/tillandsias -type s 2>/dev/null | wc -l"
    timeout_ms: 3000
    expected_behavior: "0 sockets"

  - step: "verify no orphaned socket files"
    command: "find ~/.cache/tillandsias -type f -name '*.sock' 2>/dev/null | wc -l"
    timeout_ms: 3000
    expected_behavior: "0 socket files"

observability:
  traces:
    - "@trace spec:enclave-network"
    - "@trace spec:control-socket"
    - "@trace spec:ephemeral-guarantee"
  expected_log: "Sockets cleaned after representative stack run"
  log_fields:
    spec: "enclave-network"
    test: "socket-cleanup"
    resource_type: "sockets"
    location: "~/.cache/tillandsias"

rollback:
  on_failure: "manually remove orphaned sockets"
  command: "find ~/.cache/tillandsias -type s -delete 2>/dev/null; find ~/.cache/tillandsias -type f -name '*.sock' -delete 2>/dev/null"

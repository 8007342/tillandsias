# @trace spec:nix-builder, spec:ci-release
name: litmus:nix-cache-size-signal
spec: nix-builder
description: >
  Verify the FlakeHub nix cache configuration is present (code-level) and that
  the retired GitHub Actions nix cache backend is not used for release cache
  warming.
severity: medium
size: instant
phase: pre-build

preconditions:
  - workspace contains .github/workflows/nix-cache-warm.yml

critical_path:
  - step: "assert warm-cache workflow grants GitHub OIDC for FlakeHub auth"
    command: "grep -Fq 'id-token: write' .github/workflows/nix-cache-warm.yml && echo 'flakehub oidc permission present'"
    timeout_ms: 5000
    success_pattern: "flakehub oidc permission present"
    failure_pattern: "grep: no match"

  - step: "assert warm-cache workflow installs Determinate Nix"
    command: "grep -Fq 'DeterminateSystems/determinate-nix-action@v3.21.2' .github/workflows/nix-cache-warm.yml && echo 'determinate nix present'"
    timeout_ms: 5000
    success_pattern: "determinate nix present"
    failure_pattern: "grep: no match"

  - step: "assert warm-cache workflow uses FlakeHub Cache"
    command: "grep -Fq 'DeterminateSystems/flakehub-cache-action@v3.21.2' .github/workflows/nix-cache-warm.yml && echo 'flakehub cache action present'"
    timeout_ms: 5000
    success_pattern: "flakehub cache action present"
    failure_pattern: "grep: no match"

  - step: "assert GitHub Actions nix cache backend is retired"
    command: "! grep -Fq 'nix-community/cache-nix-action' .github/workflows/nix-cache-warm.yml && echo 'gha nix cache retired'"
    timeout_ms: 5000
    success_pattern: "gha nix cache retired"
    failure_pattern: "nix-community/cache-nix-action"

  - step: "assert nix-cache-warm workflow fires on workflow_dispatch and schedule"
    command: "grep -Fq 'workflow_dispatch' .github/workflows/nix-cache-warm.yml && grep -Fq 'schedule' .github/workflows/nix-cache-warm.yml && echo 'nix cache schedule present'"
    timeout_ms: 5000
    success_pattern: "nix cache schedule present"
    failure_pattern: "grep: no match"

observability:
  traces:
    - "@trace spec:nix-builder"
  expected_log: "FlakeHub nix cache config present and retired GHA cache absent"
  log_fields:
    spec: "nix-builder"
    test: "nix-cache-size-signal"

rollback:
  on_failure: >
    Restore Determinate Nix + FlakeHub Cache actions and id-token:write in
    .github/workflows/nix-cache-warm.yml. Do not restore the retired
    nix-community/cache-nix-action backend.
  command: "grep -nE 'id-token: write|determinate-nix-action|flakehub-cache-action|cache-nix-action' .github/workflows/nix-cache-warm.yml"

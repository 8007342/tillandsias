# @trace spec:ci-release
#
# Companion drift-protection for ci-release surfaces the existing
# `litmus:ci-release-musl-binary-policy` doesn't pin.
#
# The existing litmus covers the publish step (musl-binary,
# statically-linked validation, cosign sign-blob) + the hosted
# litmus workflow being metadata-only. The spec's "Litmus Chain"
# section explicitly lists `musl-tools` install as a separate
# pinnable boundary, and the spec's "Main branch convergence"
# scenario references the static convergence workflow + the sibling
# `local-ci.sh --ci-mode` script. None of these are currently
# grep-pinned.
#
# Plus: release.yml is
# workflow_dispatch-only by design — a regression flipping it
# to push-on-tag would silently break the manual-trigger contract
# the merge-to-main-and-release skill (28ea3023) depends on.
#
# Companion litmus raises ci-release coverage 33 → 67.
name: litmus:ci-release-toolchain-shape
spec: ci-release
phase: pre-build
description: >
  Pin musl-tools install + workflow_dispatch-only triggers on
  release.yml + the static convergence
  workflow + sibling local-ci.sh / github-actions-convergence.sh
  scripts. Companion to the existing musl-binary-policy litmus.
severity: medium
size: instant

preconditions:
  - workspace contains .github/workflows/release.yml
  - workspace contains .github/workflows/github-actions-convergence.yml
  - workspace contains scripts/local-ci.sh
  - workspace contains scripts/github-actions-convergence.sh
  - shell utilities (grep) are available in PATH

critical_path:
  - step: "release workflow installs musl-tools before the build step"
    # Spec mandates: "The hosted runner MUST install the native musl
    # C toolchain required by crates with C build scripts before
    # compiling the musl target." A refactor that drops musl-tools
    # would silently break the next release on a fresh runner.
    command: "grep -F 'musl-tools' .github/workflows/release.yml"
    timeout_ms: 3000
    expected_behavior: "musl-tools"

  - step: "release workflow is workflow_dispatch-only (manual trigger)"
    # The merge-to-main-and-release skill carries the trigger
    # explicitly via `gh workflow run release.yml --ref <tag>`.
    # A regression adding `on: push: tags:` would silently auto-
    # trigger releases on every tag push, breaking the skill's
    # "manual authorship traceable" guarantee.
    command: "grep -F 'workflow_dispatch:' .github/workflows/release.yml"
    timeout_ms: 3000
    expected_behavior: "workflow_dispatch:"

  - step: "static convergence workflow exists + carries the ci-release trace"
    # The "Main branch convergence" spec scenario references the
    # static convergence workflow as the on-push handler. Drift
    # that drops the trace would lose the spec→workflow mapping.
    command: "grep -F '@trace spec:observability-convergence, spec:ci-release' .github/workflows/github-actions-convergence.yml"
    timeout_ms: 3000
    expected_behavior: "spec:ci-release"

  - step: "sibling local-ci.sh script exists and is executable"
    # The spec's "Litmus Chain" section names `scripts/local-ci.sh
    # --ci-mode` as a sibling test. Pin existence + executable bit.
    command: "test -x scripts/local-ci.sh && echo 'ok: local-ci.sh executable'"
    timeout_ms: 3000
    expected_behavior: "ok: local-ci.sh executable"

  - step: "sibling github-actions-convergence.sh script exists and is executable"
    command: "test -x scripts/github-actions-convergence.sh && echo 'ok: convergence script executable'"
    timeout_ms: 3000
    expected_behavior: "ok: convergence script executable"

observability:
  traces:
    - "@trace spec:ci-release"
  expected_log: "Release + convergence workflow surfaces pinned per ci-release spec"
  log_fields:
    spec: "ci-release"
    test: "ci-release-toolchain-shape"
    release_workflow: ".github/workflows/release.yml"
    convergence_workflow: ".github/workflows/github-actions-convergence.yml"

rollback:
  on_failure: >
    A ci-release toolchain / workflow surface drifted. Restore:
    `musl-tools` install in release.yml; `workflow_dispatch:`
    trigger on release.yml (NEVER auto-
    trigger via push:tags); the `@trace spec:ci-release` line at
    the head of github-actions-convergence.yml; and the executable
    bit on local-ci.sh + github-actions-convergence.sh sibling
    scripts.
  command: "grep -nE 'musl-tools|workflow_dispatch:' .github/workflows/release.yml && head -3 .github/workflows/github-actions-convergence.yml && ls -la scripts/local-ci.sh scripts/github-actions-convergence.sh"

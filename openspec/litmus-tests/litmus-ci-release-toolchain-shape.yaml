# @trace spec:ci-release
#
# Companion drift-protection for ci-release surfaces the existing
# `litmus:ci-release-musl-binary-policy` doesn't pin.
#
# The existing litmus covers the publish step (musl-binary,
# statically-linked validation, cosign sign-blob). This companion pins
# the cloud-minute policy: hosted release is manual, release.yml owns
# only build/sign/publish work, and local scripts own verification and
# dashboard generation before dispatch.
#
# Plus: release.yml is
# workflow_dispatch-only by design — a regression flipping it
# to push-on-tag would silently break the manual-trigger contract
# the merge-to-main-and-release skill (28ea3023) depends on.
#
# Companion litmus raises ci-release coverage 33 → 67.
name: litmus:ci-release-toolchain-shape
spec: ci-release
phase: pre-build
description: >
  Pin workflow_dispatch-only triggers on release.yml + the local
  release preflight/local-ci scripts that replace hosted convergence,
  litmus metadata, and cache-warm workflows.
severity: medium
size: instant

preconditions:
  - workspace contains .github/workflows/release.yml
  - workspace contains scripts/local-ci.sh
  - workspace contains scripts/release-preflight-local.sh
  - shell utilities (grep) are available in PATH

critical_path:
  - step: "release workflow uses FlakeHub-backed Nix builds"
    command: "grep -F 'DeterminateSystems/determinate-nix-action@v3.21.2' .github/workflows/release.yml && grep -F 'DeterminateSystems/flakehub-cache-action@v3.21.2' .github/workflows/release.yml && grep -F 'nix build -L .#tillandsias-x86_64-musl' .github/workflows/release.yml"
    timeout_ms: 3000
    expected_behavior: "tillandsias-x86_64-musl"

  - step: "release workflow is workflow_dispatch-only (manual trigger)"
    # The merge-to-main-and-release skill carries the trigger
    # explicitly via `gh workflow run release.yml --ref <tag>`.
    # A regression adding `on: push: tags:` would silently auto-
    # trigger releases on every tag push, breaking the skill's
    # "manual authorship traceable" guarantee.
    command: "grep -F 'workflow_dispatch:' .github/workflows/release.yml"
    timeout_ms: 3000
    expected_behavior: "workflow_dispatch:"

  - step: "hosted verification workflows are absent"
    command: "test ! -e .github/workflows/ci.yml && test ! -e .github/workflows/litmus-tests.yml && test ! -e .github/workflows/github-actions-convergence.yml && test ! -e .github/workflows/nix-cache-warm.yml && echo 'ok: hosted verification retired'"
    timeout_ms: 3000
    expected_behavior: "ok: hosted verification retired"

  - step: "sibling local-ci.sh script exists and is executable"
    # The spec's "Litmus Chain" section names `scripts/local-ci.sh
    # --ci-mode` as a sibling test. Pin existence + executable bit.
    command: "test -x scripts/local-ci.sh && echo 'ok: local-ci.sh executable'"
    timeout_ms: 3000
    expected_behavior: "ok: local-ci.sh executable"

  - step: "local release preflight script exists and is executable"
    command: "test -x scripts/release-preflight-local.sh && grep -F 'scripts/local-ci.sh' scripts/release-preflight-local.sh && echo 'ok: release preflight executable'"
    timeout_ms: 3000
    expected_behavior: "ok: release preflight executable"

observability:
  traces:
    - "@trace spec:ci-release"
  expected_log: "Release workflow and local preflight surfaces pinned per ci-release spec"
  log_fields:
    spec: "ci-release"
    test: "ci-release-toolchain-shape"
    release_workflow: ".github/workflows/release.yml"
    local_preflight: "scripts/release-preflight-local.sh"

rollback:
  on_failure: >
    A ci-release workflow surface drifted. Restore manual-only release.yml,
    FlakeHub-backed Nix release builds, absence of hosted verification workflows,
    and executable local-ci.sh + release-preflight-local.sh scripts.
  command: "grep -nE 'workflow_dispatch:|flakehub-cache-action|nix build -L' .github/workflows/release.yml && ls -la scripts/local-ci.sh scripts/release-preflight-local.sh"

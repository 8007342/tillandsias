# @trace spec:default-image
#
# Drift-protection for the default forge image Containerfile +
# build pipeline. spec:default-image has 6 requirements covering
# Fedora Minimal base + dev tools + forge UID 1000 + OpenCode
# entrypoint + declarative Containerfile build + content-hash
# image identity.
#
# Existing bindings `litmus:forge-standalone-traceability` +
# `litmus:forge-diagnostics-e2e` covered launch-path + diagnostic
# E2E behaviour. The Containerfile source surfaces + build-image.sh
# entry-point dispatch were untrapped.
name: litmus:default-image-containerfile-shape
spec: default-image
phase: pre-build
description: >
  Pin default-image Containerfile (Fedora 44 + microdnf core dev
  tools + opencode/openspec/claude/codex npm install + forge UID
  1000 + 5 entrypoint scripts + opencode config) and build-image.sh
  multi-image dispatch (forge/web/proxy/git/inference/router/chromium
  variants/vault).
severity: medium
size: instant

preconditions:
  - workspace contains images/default/Containerfile.base and images/default/Containerfile
  - workspace contains scripts/build-image.sh
  - workspace contains images/default/entrypoint-forge-{opencode,opencode-web,claude,codex}.sh
  - workspace contains images/default/lib-common.sh
  - shell utilities (grep) are available in PATH

critical_path:
  - step: "Containerfile + build-image.sh both carry @trace spec:default-image"
    # Substring match handles comma-list trace format; Containerfile
    # has the marker on line 4; build-image.sh's @trace is
    # spec:forge-standalone-runner (a related but different spec),
    # so pin the @trace on Containerfile + a default-image
    # cross-reference in build-image.sh.
    command: "grep -F '@trace spec:default-image' images/default/Containerfile.base images/default/Containerfile && grep -F 'forge' scripts/build-image.sh"
    timeout_ms: 3000
    expected_behavior: "spec:default-image"

  - step: "Req Fedora Minimal base: FROM registry.fedoraproject.org/fedora-minimal:44"
    # Spec § Req mandates Fedora Minimal base. The 44 pin is the
    # current LTS-equivalent; a regression to a different distro
    # (Alpine/Debian) would silently break the microdnf + glibc +
    # bash + useradd contract documented in the file-head note.
    command: "grep -F 'FROM registry.fedoraproject.org/fedora-minimal:44' images/default/Containerfile.base && grep -F 'ARG BASE_IMAGE=localhost/tillandsias-forge-base:latest' images/default/Containerfile"
    timeout_ms: 3000
    expected_behavior: "fedora-minimal:44"

  - step: "Req Dev tools: microdnf installs core dev toolchain (git/gh/jq/ripgrep/node/python/etc.)"
    # Spec § Req mandates a long list of dev tools. Pin the
    # `microdnf install -y` invocation + a representative subset
    # of mandated tools. A regression switching to a different
    # package manager (dnf, apk) or dropping core tools (git/gh/
    # nodejs/python3) would silently break the agent's discovery
    # contract.
    command: "grep -F 'microdnf install -y' images/default/Containerfile.base && for t in git gh ripgrep nodejs python3-pip; do grep -Fq \"$t\" images/default/Containerfile.base || { echo \"FAIL: tool '$t' missing\"; exit 1; }; done && echo \"ok: core dev tools present\""
    timeout_ms: 3000
    expected_behavior: "ok:"

  - step: "Req Agents: opencode + openspec + claude + codex install at EVERY_LAUNCH via npm @latest"
    # Spec § Req mandates OpenCode + OpenSpec + Claude Code + Codex are
    # available in PATH. Order 175 (forge-harness-every-launch-latest,
    # 2026-07-04) moved these OFF pinned versions baked into
    # Containerfile.base and onto an EVERY_LAUNCH `npm install
    # <pkg>@latest` in images/default/lib-common.sh (require_opencode/
    # require_claude/require_openspec/require_codex + the harness
    # update-check path), so a fresh forge always gets the newest
    # harness instead of an image-build-time snapshot. Pin the
    # canonical package names in lib-common.sh, not the Containerfile.
    command: "for package in 'opencode-ai' '@fission-ai/openspec' '@anthropic-ai/claude-code' '@openai/codex'; do grep -Fq \"$package@latest\" images/default/lib-common.sh || { echo \"FAIL: EVERY_LAUNCH agent '$package' missing\"; exit 1; }; done && echo 'ok: agents install at EVERY_LAUNCH via npm @latest'"
    timeout_ms: 3000
    expected_behavior: "ok:"

  - step: "Req Package source policy: no piped installers or floating release inputs"
    command: "if grep -En 'curl[^|]*[|][^#]*(sh|bash)|@latest|latest/VERSION|releases/latest/download|get[.]nexte[.]st/latest' images/default/Containerfile.base images/default/Containerfile images/inference/Containerfile; then echo 'FAIL: mutable or pipe-to-shell image input'; exit 1; fi; echo 'ok: image inputs pinned'"
    timeout_ms: 3000
    expected_behavior: "ok:"

  - step: "Req Fedora-first tools: reviewed packages live in the microdnf layer"
    command: "for package in 'rust cargo clippy rustfmt rust-analyzer cargo-deny' 'delve' 'shellcheck shfmt' 'ruff poetry pipx uv black pylint yamllint' 'pnpm yarnpkg'; do grep -Fq \"$package\" images/default/Containerfile.base || { echo \"FAIL: Fedora package group '$package' missing\"; exit 1; }; done && echo 'ok: Fedora package groups present'"
    timeout_ms: 3000
    expected_behavior: "ok:"

  - step: "Req Direct assets: NO build-time archive-extraction chains remain"
    # @trace order 188 + 180 (slice 2 + dart sub-slice): the cargo dev-tools + nextest
    # (188), actionlint/vale/wasmtime (slice 2), Dart SDK (dart sub-slice), marksman
    # (marksman sub-slice), AND ollama (order 180 final slice) all moved to arch-aware
    # FIRST_RUN (lib-common ensure_forge_prebuilt_tools + ensure_dart_sdk +
    # entrypoint.sh self-install). Forge-base + inference CREATION are now microdnf-only
    # (no archive-extraction chains) — zero sha256sum sites remain.
    command: "if grep -hF 'sha256sum -c -' images/default/Containerfile.base images/inference/Containerfile 2>/dev/null; then echo 'FAIL: build-time sha256sum site found (expected 0)'; exit 1; fi; if grep -F 'ARG OLLAMA_LINUX' images/inference/Containerfile 2>/dev/null; then echo 'FAIL: OLLAMA ARG still present'; exit 1; fi; echo 'ok: zero build-time direct assets'"
    timeout_ms: 3000
    expected_behavior: "ok:"

  - step: "Req User-runtime assembly: cargo tools are prebuilt archives at FIRST_RUN (arch-aware), not compiled and not baked at creation"
    # @trace order 188: cargo tools install at arch-aware FIRST_RUN via lib-common
    # install_prebuilt (prebuilt archives, NO compilation / NO cargo install /
    # binstall), NOT the CREATION-time install_archive chain (which hung the aarch64
    # macOS VM build + baked x86_64 binaries).
    command: "if grep -En 'cargo (binstall|install)|go install' images/default/Containerfile.base; then echo 'FAIL: no API installers/compilation at build'; exit 1; fi; if grep -Fq 'install_archive cargo-chef' images/default/Containerfile.base; then echo 'FAIL: cargo tools still baked at creation'; exit 1; fi; for tool in cargo-nextest cargo-chef cargo-watch cargo-audit wasm-pack cargo-llvm-cov cargo-semver-checks cargo-expand cargo-criterion cargo-wasi cargo-outdated trunk; do grep -Fq \"install_prebuilt $tool \" images/default/lib-common.sh || { echo \"FAIL: first-run prebuilt install missing for $tool\"; exit 1; }; done; echo 'ok: cargo tools install as prebuilt archives at arch-aware FIRST_RUN'"
    timeout_ms: 3000
    expected_behavior: "ok:"

  - step: "Req Non-root user: useradd -u 1000 forge"
    # Spec § Req mandates forge UID 1000 to match host user UID
    # via --userns=keep-id. The useradd literal is the user-
    # creation site; pin the explicit UID assignment.
    command: "grep -F 'useradd -u 1000 -m -s /bin/bash forge' images/default/Containerfile"
    timeout_ms: 3000
    expected_behavior: "useradd -u 1000"

  - step: "Req Entrypoint: 4 forge entrypoint scripts COPY'd into /usr/local/bin"
    # Spec § Req mandates entrypoint launches OpenCode. The 4
    # entrypoint scripts (opencode + opencode-web + claude + codex)
    # are the implementation — Containerfile must COPY all of them.
    command: "for s in opencode opencode-web claude codex; do grep -Fq \"entrypoint-forge-$s.sh\" images/default/Containerfile || { echo \"FAIL: entrypoint-forge-$s.sh not COPY'd\"; exit 1; }; done && echo \"ok: 4 forge entrypoints present\""
    timeout_ms: 3000
    expected_behavior: "ok:"

  - step: "Req Build pipeline: build-image.sh dispatches forge/web/proxy/git/inference/router/chromium/vault"
    # Spec § Req mandates `scripts/build-image.sh forge` and `web`
    # build the respective images. The case-arm in the script
    # dispatches to >=8 image names; pin the canonical list so a
    # refactor dropping a target surfaces fast.
    command: "grep -F 'forge|web|proxy|git|inference|router|chromium-core|chromium-framework|vault' scripts/build-image.sh"
    timeout_ms: 3000
    expected_behavior: "forge|web"

  - step: "Req Content-hash identity: build-image.sh tags with content-hash + version alias"
    # Spec § Req mandates `tillandsias-forge:<CONTENT_HASH>`
    # canonical tag + `v<version>` + `:latest` aliases. The
    # script's tagging logic is the implementation; pin the
    # IMAGE_TAG variable + the podman-build invocation.
    command: "grep -F 'IMAGE_TAG' scripts/build-image.sh && grep -F 'podman build' scripts/build-image.sh"
    timeout_ms: 3000
    expected_behavior: "podman build"

observability:
  traces:
    - "@trace spec:default-image"
    - "@trace spec:forge-standalone-runner"
  expected_log: "default-image Containerfile (Fedora 44 + microdnf dev tools + npm agents + forge UID 1000 + 4 entrypoints) + build-image.sh multi-image dispatch all pinned"
  log_fields:
    spec: "default-image"
    test: "default-image-containerfile-shape"
    artifact: "images/default/Containerfile + scripts/build-image.sh"

rollback:
  on_failure: >
    A `spec:default-image` source surface drifted. Restore:
    `@trace spec:default-image` on Containerfile; `FROM registry.
    fedoraproject.org/fedora-minimal:44`; `microdnf install -y`
    with git/gh/ripgrep/nodejs/python3-pip + the broader dev
    toolchain; EVERY_LAUNCH `npm install <pkg>@latest` in
    lib-common.sh for `opencode-ai`, `@fission-ai/openspec`,
    `@anthropic-ai/claude-code`, and `@openai/codex`; no
    pipe-to-shell/floating image inputs; checksum verification
    for every retained direct release asset; `useradd
    -u 1000 -m -s /bin/bash forge`; COPY directives for all 4
    forge entrypoint scripts (opencode, opencode-web, claude,
    codex); build-image.sh's `forge|web|proxy|git|inference|
    router|chromium-core|chromium-framework|vault` dispatch case
    + IMAGE_TAG + `podman build` invocation.
  command: "head -40 images/default/Containerfile && grep -n 'forge|web|proxy\\|IMAGE_TAG\\|podman build' scripts/build-image.sh | head -10"

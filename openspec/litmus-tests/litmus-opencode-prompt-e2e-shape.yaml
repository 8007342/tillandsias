# @trace spec:meta-orchestration, spec:forge-push-credential-channel
# OpenCode-prompt E2E smoke — verify agent commits and pushes findings.
#
# Asserts forge_exit=0, new commit since smoke start, at least one
# plan/ file updated, and remote branch HEAD advanced via git ls-remote.
#
# NOTE: Requires forge image built, tillandsias on PATH, and git-mirror
# running (forge-push-credential-channel post-receive relay). Gating points
# assert the full commit+push lifecycle, not just launch.
name: litmus:opencode-prompt-e2e-shape
spec: meta-orchestration
phase: post-build
description: >
  Launch the forge with `./repeat --prompt "Use the /meta-orchestration
  skill"`, let the agent run one cycle, and verify it committed and pushed
  findings. Failures indicate a break in the unattended commit+push path.
severity: high
size: e2e

preconditions:
  - tillandsias binary is installed and on PATH
  - forge image is built and available locally
  - git remote origin is reachable and credential channel is active

critical_path:
  - step: "record pre-smoke HEAD for delta comparison"
    command: "git rev-parse HEAD > /tmp/opencode-e2e-head-before && echo \"ok: recorded $(cat /tmp/opencode-e2e-head-before)\""
    timeout_ms: 5000
    expected_behavior: "ok:"

  # Record the CURRENT BRANCH's remote ref, not `ls-remote origin HEAD`:
  # origin HEAD tracks the default branch (main), which a working-branch push
  # never moves — that mismatch made STEP 6 a deterministic false negative
  # (plan order 262). test -s fails loud here if the branch has no remote
  # counterpart yet, instead of handing STEP 6 an empty before-file.
  - step: "record pre-smoke remote branch head for push verification"
    command: "git ls-remote origin \"refs/heads/$(git rev-parse --abbrev-ref HEAD)\" | awk '{print $1}' > /tmp/opencode-e2e-remote-head-before && test -s /tmp/opencode-e2e-remote-head-before && echo 'ok: remote branch head recorded'"
    timeout_ms: 15000
    expected_behavior: "ok:"

  # Order 265 wiring (second alive-past-budget collision, 2026-07-10): a
  # fixed 600s wall turned healthy one-packet cycles into TIMEOUT reds
  # twice — both times the in-forge agent later pushed real work. The step
  # now runs the probe past a 600s SOFT budget: liveness (container up /
  # HEAD advanced / heartbeat fresh) extends the window; a dead_* verdict
  # fails fast; a 1500s HARD cap remains the backstop.
  - step: "launch forge with meta-orchestration prompt and one cycle (liveness-extended)"
    command: "./repeat --times 1 --agent opencode --prompt \"Use the /meta-orchestration skill\" > /tmp/opencode-e2e-forge.log 2>&1 & RPID=$!; SOFT=600; HARD=1500; S=$(date +%s); BH=$(cat /tmp/opencode-e2e-head-before 2>/dev/null); while kill -0 $RPID 2>/dev/null; do E=$(( $(date +%s) - S )); if [ $E -ge $HARD ]; then kill $RPID 2>/dev/null; echo \"FORGE_EXIT=124 (hard cap ${HARD}s)\"; exit 1; fi; if [ $E -ge $SOFT ]; then st=$(scripts/forge-liveness-probe.sh status --start-time $S --budget $HARD --before-head \"$BH\" 2>/dev/null || echo probe_error); case \"$st\" in alive_*) ;; *) kill $RPID 2>/dev/null; echo \"FORGE_EXIT=125 (probe verdict $st past soft budget)\"; exit 1 ;; esac; fi; sleep 10; done; wait $RPID; rc=$?; tail -5 /tmp/opencode-e2e-forge.log; echo FORGE_EXIT=$rc"
    timeout_ms: 1560000
    expected_behavior: "FORGE_EXIT=0"

  # Steps 4-6 assert deltas produced by the in-forge cycle, which reach the
  # host checkout asynchronously (git-mirror relay) relative to the forge
  # session's exit. Each probe below re-samples with a bounded retry window
  # (default 120s, poll 5s — scripts/litmus-git-delta-wait.sh) instead of one
  # instantaneous sample; step timeout_ms leaves headroom above the window so
  # a genuine miss reports FAIL, not a runner TIMEOUT. The helper also owns
  # reading the before-sha files: the previous inline STEP 5 referenced
  # $HEAD_BEFORE without populating it (steps are separate `bash -c`
  # subshells), collapsing its range to HEAD..HEAD — a deterministic false
  # negative, not a race (plan order 255).
  - step: "verify local HEAD advanced since smoke start"
    command: "scripts/litmus-git-delta-wait.sh local-head /tmp/opencode-e2e-head-before"
    timeout_ms: 150000
    expected_behavior: "ok: HEAD advanced"

  - step: "verify a plan/ file was updated (ledger or finding filed)"
    command: "scripts/litmus-git-delta-wait.sh plan-commit /tmp/opencode-e2e-head-before"
    timeout_ms: 150000
    expected_behavior: "ok: plan/ changed"

  - step: "verify remote branch HEAD advanced"
    command: "scripts/litmus-git-delta-wait.sh remote-head /tmp/opencode-e2e-remote-head-before"
    timeout_ms: 150000
    expected_behavior: "ok: remote HEAD advanced"

  - step: "cleanup temp files"
    command: "rm -f /tmp/opencode-e2e-head-before /tmp/opencode-e2e-remote-head-before && echo \"ok: cleaned up\""
    timeout_ms: 3000
    expected_behavior: "ok:"

observability:
  traces:
    - "@trace spec:meta-orchestration"
    - "@trace spec:forge-push-credential-channel"
  expected_log: >
    OpenCode-prompt E2E smoke: forge launched (exit=0), HEAD advanced
    with new commit in plan/, and remote HEAD advanced via git push
    relay through git-mirror.
  log_fields:
    spec: "meta-orchestration"
    test: "opencode-prompt-e2e-shape"
    artifact: "forge output in test log"

rollback:
  on_failure: >
    Ensure tillandsias binary is on PATH, forge image is built
    (scripts/build-image.sh forge), git remote origin is reachable,
    and the credential channel is active (scripts/check-credential-channel.sh).
    If the binary is stale, rebuild with ./build.sh --release --install.
  command: "git log --oneline -5 && echo '---remote---' && git ls-remote origin HEAD && echo '---credential---' && scripts/check-credential-channel.sh"

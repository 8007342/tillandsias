name: litmus:browser-ephemeral
spec: host-chromium-on-demand
description: Verify Chromium launcher uses an ephemeral profile, GUI app-mode, and cleans it on exit
severity: critical

preconditions:
  - browser launch script is available
  - no browser profile dirs exist under the canonical runtime root

critical_path:
  - step: "baseline check: no browser temp dirs"
    command: "browser_root=\"${XDG_RUNTIME_DIR:-${TMPDIR:-/tmp}}/tillandsias/browser\"; mkdir -p \"$browser_root\"; find \"$browser_root\" -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l"
    timeout_ms: 3000
    expected_behavior: "0 directories"

  - step: "launch browser via safe wrapper using fake Podman"
    command: "browser_root=\"${XDG_RUNTIME_DIR:-${TMPDIR:-/tmp}}/tillandsias/browser\"; calls_file=\"${LITMUS_PODMAN_CALLS_FILE:-target/litmus-podman/browser-ephemeral.calls.log}\"; rm -f \"$calls_file\"; DISPLAY=:99 LITMUS_PODMAN_MODE=fake LITMUS_PODMAN_CALLS_FILE=\"$calls_file\" ./run-safe-browser.sh --url \"http://opencode.test-project.localhost/\"; test -s \"$calls_file\""
    timeout_ms: 10000
    expected_behavior: "container id returned"

  - step: "verify launch contract flags"
    command: "calls_file=\"${LITMUS_PODMAN_CALLS_FILE:-target/litmus-podman/browser-ephemeral.calls.log}\"; for pattern in --rm --pull=never --userns=keep-id --cap-drop=ALL --security-opt=no-new-privileges --security-opt=label=disable --read-only --incognito --no-first-run --no-default-browser-check --user-data-dir= --app=http://opencode.test-project.localhost/ --env=DISPLAY=:99 --volume=/tmp/.X11-unix:/tmp/.X11-unix:rw --network=host 'tillandsias-chromium-framework:v[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+'; do grep -Eq -- \"$pattern\" \"$calls_file\"; done"
    timeout_ms: 5000

  - step: "verify browser temp dir cleanup after exit"
    command: "browser_root=\"${XDG_RUNTIME_DIR:-${TMPDIR:-/tmp}}/tillandsias/browser\"; find \"$browser_root\" -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l"
    timeout_ms: 3000
    expected_behavior: "0 directories"

observability:
  traces:
    - "@trace spec:browser-isolation-launcher"
    - "@trace spec:host-chromium-on-demand"
    - "@trace spec:chromium-safe-variant"
    - "@trace spec:ephemeral-guarantee"
  expected_log: "Browser launcher recorded ephemeral profile and cleaned it after exit"
  log_fields:
    spec: "host-chromium-on-demand"
    test: "browser-ephemeral"
    cleanup_status: "success"

rollback:
  on_failure: "force cleanup of browser containers and temp dirs"
  command: 'browser_root="${XDG_RUNTIME_DIR:-${TMPDIR:-/tmp}}/tillandsias/browser"; podman rm -f $(podman ps -a -q -f "label=tillandsias-browser" 2>/dev/null) 2>/dev/null; find "$browser_root" -mindepth 1 -maxdepth 1 -type d -exec rm -rf {} + 2>/dev/null || true'

# @trace spec:build-script-architecture
name: litmus:build-cache-transparent
spec: build-script-architecture
description: Verify that local caches do not change AppImage semantics or version strings
severity: high

preconditions:
  - build.sh script available and executable
  - VERSION file exists at project root
  - tillandsias-forge image is cached (from previous build)
  - ~/.local/bin/ directory writable
  - cargo and podman available in path

critical_path:
  - step: "perform cached build with --install"
    command: "./build.sh --install"
    timeout_ms: 120000
    expected_behavior: "builds quickly using cached forge image, installs AppImage to ~/.local/bin/tillandsias"

  - step: "capture version from cached build"
    command: "tillandsias --version"
    timeout_ms: 5000
    expected_behavior: "outputs version string matching VERSION file"

  - step: "save cached version to file"
    command: "tillandsias --version > /tmp/cached_version.txt && cat /tmp/cached_version.txt"
    timeout_ms: 5000
    expected_behavior: "version string persisted"

  - step: "perform clean build with cargo clean"
    command: "./build.sh --clean --install"
    timeout_ms: 600000
    expected_behavior: "forces full rebuild, slower than cached path (~10 minutes), exit 0"

  - step: "capture version from clean build"
    command: "tillandsias --version"
    timeout_ms: 5000
    expected_behavior: "outputs version string"

  - step: "save clean version to file"
    command: "tillandsias --version > /tmp/clean_version.txt && cat /tmp/clean_version.txt"
    timeout_ms: 5000
    expected_behavior: "version string persisted"

  - step: "compare version strings"
    command: "diff /tmp/cached_version.txt /tmp/clean_version.txt && echo 'PASS: versions identical'"
    timeout_ms: 3000
    expected_behavior: "no difference (exit 0)"

gating_points:
  - signal: "cached_build_exits_clean"
    success: "exit code 0, AppImage created in ~/.local/bin/"
    failure: "exit code non-zero OR AppImage missing OR build error"
    spec_linkage: "build-script-architecture"

  - signal: "clean_build_exits_clean"
    success: "exit code 0, AppImage created in ~/.local/bin/"
    failure: "exit code non-zero OR AppImage missing OR build error"
    spec_linkage: "build-script-architecture"

  - signal: "version_strings_identical"
    success: "both builds report identical version (cached and clean)"
    failure: "version strings differ OR one build missing version output"
    spec_linkage: "build-script-architecture"

  - signal: "cache_transparency_verified"
    success: "semantics unchanged despite cache use; only compile time differs"
    failure: "cached and clean produce different binaries or version metadata"
    spec_linkage: "build-script-architecture"

observability:
  traces:
    - "@trace spec:build-script-architecture"
  expected_log: "[build] Using cached forge image (fast local path) OR [build] Full clean build (reproducibility verification)"
  log_fields:
    spec: "build-script-architecture"
    test: "build-cache-transparent"
    cached_version: "/tmp/cached_version.txt"
    clean_version: "/tmp/clean_version.txt"

rollback:
  on_failure: "verify build.sh logic for context detection and path selection"
  command: "grep -n 'Using cached forge image' scripts/build.sh && grep -n 'Full clean build' scripts/build.sh"

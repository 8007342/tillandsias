# @trace spec:tray-icon-lifecycle
name: litmus:icon-png-generation
spec: tray-icon-lifecycle
phase: pre-build
description: Verify tray and window PNG generation from the build pipeline
severity: high

preconditions:
  - workspace contains crates/tillandsias-core
  - cargo is available in PATH

critical_path:
  - step: "run the tray icon PNG validity test"
    command: "cargo test -p tillandsias-core all_five_tray_icon_states_valid -- --exact"
    timeout_ms: 120000

  - step: "run the 32x32 icon matrix test"
    command: "cargo test -p tillandsias-core all_32_icon_png_combinations_valid -- --exact"
    timeout_ms: 120000

  - step: "run the 48x48 window icon matrix test"
    command: "cargo test -p tillandsias-core all_32_window_icon_png_combinations_valid -- --exact"
    timeout_ms: 120000

observability:
  traces:
    - "@trace spec:tray-icon-lifecycle"
  expected_log: "Tray and window PNG generation stays valid across all lifecycle combinations"
  log_fields:
    spec: "tray-icon-lifecycle"
    test: "icon-png-generation"

rollback:
  on_failure: "inspect crates/tillandsias-core/build.rs and crates/tillandsias-core/src/icons.rs for PNG generation drift"
  command: "sed -n '1,320p' crates/tillandsias-core/build.rs"

# @trace spec:tillandsias-vault, spec:gh-auth-script
name: litmus:vault-github-token-capture-shape
spec: tillandsias-vault
phase: pre-build
description: Pin Vault-only GitHub token capture and read-back verification
severity: high
size: instant

preconditions:
  - workspace contains crates/tillandsias-headless/src/main.rs
  - workspace contains crates/tillandsias-headless/src/remote_projects.rs
  - workspace contains crates/tillandsias-headless/src/vault_bootstrap.rs
  - workspace contains crates/tillandsias-headless/tests/vault_approle_provisioning.rs

critical_path:
  - step: "GitHub login writes the token from inside the container without host-side extraction"
    command: "grep -F 'vault-cli.sh write secret/github/token \"token=\\$TOKEN\"' crates/tillandsias-headless/src/main.rs"
    timeout_ms: 3000
    expected_behavior: "vault-cli.sh write"

  - step: "Vault helper writes the canonical secret path"
    command: "grep -F 'client.write_secret(\"secret/github/token\"' crates/tillandsias-headless/src/vault_bootstrap.rs"
    timeout_ms: 3000
    expected_behavior: "secret/github/token"

  - step: "Vault helper verifies the write by reading the token back"
    command: "grep -F 'vault-cli.sh read -field=token secret/github/token' crates/tillandsias-headless/src/main.rs && grep -F 'in-container vault write verification failed' crates/tillandsias-headless/src/main.rs"
    timeout_ms: 3000
    expected_behavior: "in-container vault write verification failed"

  - step: "integration test exercises the Vault KV v2 round trip"
    command: "grep -F 'async fn write_github_token_round_trips_through_kv_v2_envelope()' crates/tillandsias-headless/tests/vault_approle_provisioning.rs"
    timeout_ms: 3000
    expected_behavior: "write_github_token_round_trips_through_kv_v2_envelope"

  - step: "login flow does not recreate the deprecated GitHub Podman secret"
    command: "BLOCK=$(sed -n '/fn run_github_login(debug: bool)/,/^}/p' crates/tillandsias-headless/src/main.rs); if printf '%s' \"$BLOCK\" | grep -qF 'create_github_podman_secret'; then exit 1; else echo 'ok: Vault-only GitHub token capture'; fi"
    timeout_ms: 3000
    expected_behavior: "ok: Vault-only GitHub token capture"

  - step: "remote-project commands use scoped Vault leases instead of the legacy GitHub secret"
    command: "grep -F 'mint_approle_secret_lease(\"git-mirror\"' crates/tillandsias-headless/src/remote_projects.rs && grep -F 'vault-cli read -field=token secret/github/token' crates/tillandsias-headless/src/remote_projects.rs && if grep -qF 'tillandsias-github-token' crates/tillandsias-headless/src/remote_projects.rs; then exit 1; else echo 'ok: remote projects are Vault-only'; fi"
    timeout_ms: 3000
    expected_behavior: "ok: remote projects are Vault-only"

observability:
  traces:
    - "@trace spec:tillandsias-vault"
    - "@trace spec:gh-auth-script"
  expected_log: "GitHub login captures into Vault and verifies the stored token"
  log_fields:
    spec: "tillandsias-vault"
    test: "vault-github-token-capture-shape"

rollback:
  on_failure: "restore Vault-only GitHub token capture and read-back verification"
  command: "grep -nE 'vault-cli.sh read -field=token|vault-cli.sh write secret/github/token|in-container vault write' crates/tillandsias-headless/src/main.rs"

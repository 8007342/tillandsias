# @trace spec:inference-container, spec:zen-default-with-ollama-analysis-pool
# Verify model acquisition is DEFERRED to container startup (build stays
# fast), the first cold run installs the ollama binary + default model into
# the persistent cache, and a second run serves from cache without pulling.
#
# Rewritten for order 267 (recipe from orders 268 forensics):
# - The runner's fake-podman PATH shim injects `--userns=host` without
#   `label=disable`; under SELinux Enforcing that shape cannot write the
#   mounted cache and is NOT the product's launch shape. This litmus now
#   invokes the REAL podman binary with the product's exact flags
#   (--userns=keep-id --security-opt=label=disable, main.rs:2032-2094) so
#   it tests the entrypoint's cold path under the shape users actually run.
# - success strings updated to the current entrypoint contract
#   ("default model <tag> ready" / "ready (cached)"); the pre-order-168
#   "Pulling T0|T1 ready" strings matched nothing.
# - launches are detached with bounded log polls instead of backgrounded
#   `timeout podman run` races; the TILMANDSIAS_ typo is gone.
name: litmus:inference-deferred-model-pulls
spec: inference-container
description: >
  Cold first run installs ollama + pulls the default model into the mounted
  cache (product launch shape, real podman); warm second run reports
  "ready (cached)" with no re-install and no re-pull.
severity: high
size: long
phase: post-build
backend: real

preconditions:
  - tillandsias-inference image built and available in podman
  - podman runtime available with networking support
  - "network: first cold run downloads the ollama release (~1.3 GiB) + a ~400MB model"

caveats:
  - time_intensive: "cold run is download-bound (minutes on slow links); warm run ~15s"

critical_path:
  - step: "wipe the cache to force the cold path"
    command: "CACHE_DIR=\"${XDG_CACHE_HOME:-$HOME/.cache}/tillandsias/models\"; mkdir -p \"$CACHE_DIR\"; rm -rf \"$CACHE_DIR/.tools\" \"$CACHE_DIR/manifests\" \"$CACHE_DIR/blobs\" && echo 'ok: cache cold'"
    timeout_ms: 10000
    success_pattern: "ok: cache cold"
    failure_pattern: "Permission denied"

  - step: "cold run: product-shape launch installs ollama + reaches default-model ready"
    command: "RP=\"${TILLANDSIAS_REAL_PODMAN:-/usr/bin/podman}\"; CACHE_DIR=\"${XDG_CACHE_HOME:-$HOME/.cache}/tillandsias/models\"; \"$RP\" rm -f test-inference-cold >/dev/null 2>&1; \"$RP\" run -d --name test-inference-cold --userns=keep-id --security-opt=label=disable --security-opt=no-new-privileges -e TILLANDSIAS_INFERENCE_SKIP_RUNTIME_PULLS=1 -v \"$CACHE_DIR:/home/ollama/.ollama/models:rw\" tillandsias-inference:latest >/dev/null || { echo 'FAIL: cold launch did not start'; exit 1; }; ok=''; for i in $(seq 1 120); do log=$(\"$RP\" logs test-inference-cold 2>&1); printf '%s' \"$log\" | grep -qE 'default model .* ready' && { ok=1; break; }; printf '%s' \"$log\" | grep -q 'FATAL: no ollama binary' && break; sleep 5; done; log=$(\"$RP\" logs test-inference-cold 2>&1); \"$RP\" rm -f test-inference-cold >/dev/null 2>&1; [ -n \"$ok\" ] && printf '%s' \"$log\" | grep -q 'Installing ollama binary (first run)' && echo 'ok: cold run installed and ready' || { printf '%s\\n' \"$log\" | tail -8; echo 'FAIL: cold run did not reach ready'; exit 1; }"
    timeout_ms: 640000
    success_pattern: "ok: cold run installed and ready"
    failure_pattern: "FAIL: cold"

  - step: "cache holds the binary and the default model manifest after the cold run"
    command: "CACHE_DIR=\"${XDG_CACHE_HOME:-$HOME/.cache}/tillandsias/models\"; test -x \"$CACHE_DIR/.tools/ollama/ollama\" && test -d \"$CACHE_DIR/manifests\" && echo 'ok: cache populated' || { ls -la \"$CACHE_DIR\" \"$CACHE_DIR/.tools/ollama\" 2>&1 | head -8; echo 'FAIL: cache missing artifacts'; exit 1; }"
    timeout_ms: 10000
    success_pattern: "ok: cache populated"
    failure_pattern: "FAIL: cache"

  - step: "warm run: serves from cache — no re-install, no pull"
    command: "RP=\"${TILLANDSIAS_REAL_PODMAN:-/usr/bin/podman}\"; CACHE_DIR=\"${XDG_CACHE_HOME:-$HOME/.cache}/tillandsias/models\"; \"$RP\" rm -f test-inference-warm >/dev/null 2>&1; \"$RP\" run -d --name test-inference-warm --userns=keep-id --security-opt=label=disable --security-opt=no-new-privileges -e TILLANDSIAS_INFERENCE_SKIP_RUNTIME_PULLS=1 -v \"$CACHE_DIR:/home/ollama/.ollama/models:rw\" tillandsias-inference:latest >/dev/null || { echo 'FAIL: warm launch did not start'; exit 1; }; ok=''; for i in $(seq 1 24); do log=$(\"$RP\" logs test-inference-warm 2>&1); printf '%s' \"$log\" | grep -qE 'ready \\(cached\\)' && { ok=1; break; }; sleep 5; done; log=$(\"$RP\" logs test-inference-warm 2>&1); \"$RP\" rm -f test-inference-warm >/dev/null 2>&1; [ -n \"$ok\" ] || { printf '%s\\n' \"$log\" | tail -8; echo 'FAIL: warm run did not report cached'; exit 1; }; printf '%s' \"$log\" | grep -q 'Installing ollama binary (first run)' && { echo 'FAIL: warm run re-installed the binary'; exit 1; }; echo 'ok: warm run cached'"
    timeout_ms: 140000
    success_pattern: "ok: warm run cached"
    failure_pattern: "FAIL: warm"

  - step: "cleanup test containers"
    command: "RP=\"${TILLANDSIAS_REAL_PODMAN:-/usr/bin/podman}\"; \"$RP\" rm -f test-inference-cold test-inference-warm >/dev/null 2>&1; echo 'ok: cleanup'"
    timeout_ms: 15000
    success_pattern: "ok: cleanup"
    failure_pattern: ""

observability:
  traces:
    - "@trace spec:inference-container"
    - "@trace spec:zen-default-with-ollama-analysis-pool"
  expected_log: "Deferred model pulls: cold run installs + readies default model; warm run serves from cache"
  log_fields:
    spec: "inference-container"
    test: "inference-deferred-model-pulls"
    backend: "real"

rollback:
  on_failure: >
    Check images/inference/entrypoint.sh: the proxy-resolvability guard and
    direct-retry fallback (order 268) own the download path; the fail-loud
    exit fires when no ollama binary exists. A cold-run failure with
    'install FAILED' under a labeled mount usually means the launch shape
    regressed (userns/label flags) — compare against main.rs:2032-2094.
  command: "grep -n 'ollama-linux-\\|proxy.*does not resolve\\|FATAL: no ollama' images/inference/entrypoint.sh | head -6"

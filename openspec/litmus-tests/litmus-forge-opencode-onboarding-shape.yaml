name: litmus:forge-opencode-onboarding-shape
spec: forge-opencode-onboarding
description: Verify the OpenCode onboarding bundle, OpenSpec init, and startup bootstrap stay wired together
severity: medium
size: instant
phase: pre-build

preconditions:
  - workspace contains images/default/config-overlay/opencode/config.json
  - workspace contains images/default/config-overlay/opencode/instructions/methodology.md
  - workspace contains images/default/config-overlay/opencode/instructions/forge-discovery.md
  - workspace contains images/default/config-overlay/opencode/instructions/cache-discipline.md
  - workspace contains images/default/config-overlay/opencode/instructions/nix-first.md
  - workspace contains images/default/config-overlay/opencode/instructions/openspec-workflow.md
  - workspace contains images/default/entrypoint-forge-opencode.sh

critical_path:
  - step: "verify the bundled instruction list keeps the onboarding files first"
    command: "mf_literal images/default/config-overlay/opencode/config.json /home/forge/.config-overlay/opencode/instructions/methodology.md && mf_literal images/default/config-overlay/opencode/config.json /home/forge/.config-overlay/opencode/instructions/forge-discovery.md && mf_literal images/default/config-overlay/opencode/config.json /home/forge/.config-overlay/opencode/instructions/cache-discipline.md && mf_literal images/default/config-overlay/opencode/config.json /home/forge/.config-overlay/opencode/instructions/nix-first.md && mf_literal images/default/config-overlay/opencode/config.json /home/forge/.config-overlay/opencode/instructions/openspec-workflow.md && echo 'opencode onboarding instruction bundle present'"
    timeout_ms: 10000
    expected_behavior: "opencode onboarding instruction bundle present"

  - step: "verify methodology.md remains the index file"
    command: "mf_literal images/default/config-overlay/opencode/instructions/methodology.md forge-discovery.md && mf_literal images/default/config-overlay/opencode/instructions/methodology.md cache-discipline.md && mf_literal images/default/config-overlay/opencode/instructions/methodology.md nix-first.md && mf_literal images/default/config-overlay/opencode/instructions/methodology.md openspec-workflow.md && echo 'methodology index present'"
    timeout_ms: 10000
    expected_behavior: "methodology index present"

  - step: "verify the launcher still bootstraps OpenSpec and /startup"
    command: "mf_literal images/default/entrypoint-forge-opencode.sh apply_opencode_config_overlay && mf_literal images/default/entrypoint-forge-opencode.sh 'init --tools opencode' && mf_literal images/default/entrypoint-forge-opencode.sh 'run /startup' && echo 'opencode bootstrap present'"
    timeout_ms: 10000
    expected_behavior: "opencode bootstrap present"

  - step: "verify supplied prompts run through supported OpenCode run mode"
    command: "bash scripts/test-opencode-entrypoint-prompt.sh"
    timeout_ms: 10000
    expected_behavior: "ok: opencode entrypoint prompt routing"

observability:
  traces:
    - "@trace spec:forge-opencode-onboarding"
  expected_log: "OpenCode onboarding bundle, bootstrap, and prompted run path remain visible in the forge launch path"
  log_fields:
    spec: "forge-opencode-onboarding"
    test: "forge-opencode-onboarding-shape"

rollback:
  on_failure: "inspect images/default/config-overlay/opencode/config.json, images/default/config-overlay/opencode/instructions/methodology.md, and images/default/entrypoint-forge-opencode.sh for onboarding drift"
  command: "mf_literal images/default/config-overlay/opencode/config.json instructions/methodology.md && mf_literal images/default/entrypoint-forge-opencode.sh 'run /startup' && mf_literal images/default/entrypoint-forge-opencode.sh 'launching prompted opencode run'"

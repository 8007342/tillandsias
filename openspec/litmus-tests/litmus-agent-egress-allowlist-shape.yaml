# @trace spec:proxy-container
name: litmus:agent-egress-allowlist-shape
spec: proxy-container
phase: pre-build
description: >
  Verifies that required domains for agent auth and telemetry are allowlisted
  while the sole exact-host bump ACL excludes them and the terminal splice
  fallback preserves end-to-end TLS.
severity: medium
size: instant

preconditions:
  - workspace contains images/proxy/allowlist.txt
  - workspace contains images/proxy/squid.conf
  - shell utilities (grep) are available in PATH

critical_path:
  - step: "Verify Claude, ChatGPT, and the exact Antigravity updater host are allowlisted"
    command: "grep -Fq '.chatgpt.com' images/proxy/allowlist.txt && grep -Fq '.claude.com' images/proxy/allowlist.txt && grep -Fq 'antigravity-cli-auto-updater-974169037036.us-central1.run.app' images/proxy/allowlist.txt && ! grep -Fxq '.us-central1.run.app' images/proxy/allowlist.txt && echo \"ok: allowlisted\""
    timeout_ms: 3000
    expected_behavior: "ok: allowlisted"

  - step: "Verify agent domains cannot enter the sole bump ACL and fall through to splice"
    command: "grep -Fxq 'acl github_release_assets ssl::server_name --client-requested release-assets.githubusercontent.com' images/proxy/squid.conf && ! grep -Eq '^acl github_release_assets .*([.]chatgpt[.]com|[.]claude[.]com|antigravity-cli-auto-updater-974169037036[.]us-central1[.]run[.]app)' images/proxy/squid.conf && grep -Fxq 'ssl_bump splice all' images/proxy/squid.conf && echo \"ok: exact bump ACL excludes agent domains; splice-all fallback active\""
    timeout_ms: 3000
    expected_behavior: "ok: exact bump ACL excludes agent domains; splice-all fallback active"

observability:
  traces:
    - "@trace spec:proxy-container"
  expected_log: "agent egress allowlist shape verified"
  log_fields:
    spec: "proxy-container"
    test: "agent-egress-allowlist-shape"
    artifact: "images/proxy/{allowlist.txt,squid.conf}"

rollback:
  on_failure: "Restore .chatgpt.com, .claude.com, and the exact Antigravity updater host to allowlist.txt; keep the bump ACL exact-host-only and the terminal splice-all fallback."
  command: "echo rollback"

# @trace spec:environment-runtime, spec:forge-launch
# freshness: auditor=linux-tlatoani-opencode-20260717T0920Z date=2026-07-17 verdict=updated scope=env allowlist re-validated against image change 6b299368 (NODE_USE_SYSTEM_CA) after stale-allowlist gate flake fixed 8578e283
# Verify the forge container sees ONLY a minimal environment — no host env
# leakage (session/display vars, DOCKER_HOST, XDG_*). Rewritten for order
# 267: the previous revision was not valid YAML (mirror-gate incompatible),
# its 5s per-step timeouts raced cold container starts under post-build
# host load (empty-output flake, gate run 20260710T062934Z), and its
# assertions relied on the runner's behavior heuristics instead of
# explicit in-command verdicts.
name: litmus:environment-isolation
spec: environment-runtime
description: >
  Forge env isolation: 3-10 env vars inside the forge, zero host
  session/display vars, toolchain PATH intact. Explicit fail-loud verdicts;
  image presence pre-warmed so container start latency cannot masquerade as
  an isolation failure.
severity: high
size: e2e
phase: post-build

preconditions:
  - forge image is built (tillandsias-forge)
  - podman is available

critical_path:
  - step: "resolve forge image and pre-warm one container start"
    command: "FORGE_IMAGE=\"${TILLANDSIAS_FORGE_IMAGE:-$(podman images --format '{{.Repository}}:{{.Tag}}' | grep -E '(^|/)tillandsias-forge:' | head -1)}\"; test -n \"$FORGE_IMAGE\" || { echo 'FAIL: no tillandsias-forge image present'; exit 1; }; podman run --rm --entrypoint /bin/true \"$FORGE_IMAGE\" >/dev/null 2>&1 && echo \"ok: image warm ($FORGE_IMAGE)\" || { echo \"FAIL: forge container did not start\"; exit 1; }"
    timeout_ms: 60000
    expected_behavior: "ok: image warm"

  # The historic "3-10 vars" band was a stale proxy for "minimal": today's
  # legitimate surface is 9 image-baked toolchain/identity vars + podman's
  # HOSTNAME + the 6 enclave proxy vars injected host-wide by the
  # tillandsias containers.conf. An explicit key allowlist is strictly
  # stronger than any count band — anything unexpected fails loud by name.
  - step: "every forge env key is on the explicit allowlist (no unexpected vars)"
    command: "FORGE_IMAGE=\"${TILLANDSIAS_FORGE_IMAGE:-$(podman images --format '{{.Repository}}:{{.Tag}}' | grep -E '(^|/)tillandsias-forge:' | head -1)}\"; unexpected=$(podman run --rm --entrypoint /usr/bin/env \"$FORGE_IMAGE\" | cut -d= -f1 | grep -vxE 'CARGO_HOME|container|DART_ROOT|FLUTTER_ROOT|HOME|LANG|NODE_USE_SYSTEM_CA|PATH|TILLANDSIAS_CHEATSHEETS|USER|HOSTNAME|https?_proxy|HTTPS?_PROXY|no_proxy|NO_PROXY' || true); [ -z \"$unexpected\" ] && echo 'ok: forge env keys all allowlisted' || { echo \"FAIL: unexpected forge env keys: $unexpected\"; exit 1; }"
    timeout_ms: 30000
    expected_behavior: "ok: forge env keys all allowlisted"

  - step: "no host session/display vars leak into the forge"
    command: "FORGE_IMAGE=\"${TILLANDSIAS_FORGE_IMAGE:-$(podman images --format '{{.Repository}}:{{.Tag}}' | grep -E '(^|/)tillandsias-forge:' | head -1)}\"; leaks=$(podman run --rm --entrypoint /usr/bin/env \"$FORGE_IMAGE\" | grep -cE 'DOCKER_HOST|SESSION_MANAGER|DBUS_SESSION_BUS_ADDRESS|XDG_' || true); [ \"$leaks\" = 0 ] && echo 'ok: zero host session vars' || { echo \"FAIL: $leaks host session/display vars leaked\"; exit 1; }"
    timeout_ms: 30000
    expected_behavior: "ok: zero host session vars"

  - step: "toolchain PATH resolves cargo inside the forge"
    command: "FORGE_IMAGE=\"${TILLANDSIAS_FORGE_IMAGE:-$(podman images --format '{{.Repository}}:{{.Tag}}' | grep -E '(^|/)tillandsias-forge:' | head -1)}\"; p=$(podman run --rm --entrypoint /usr/bin/which \"$FORGE_IMAGE\" cargo); case \"$p\" in */cargo) echo \"ok: cargo at $p\" ;; *) echo \"FAIL: cargo not resolvable ($p)\"; exit 1 ;; esac"
    timeout_ms: 30000
    expected_behavior: "ok: cargo at"

observability:
  traces:
    - "@trace spec:environment-runtime"
    - "@trace spec:forge-launch"
  expected_log: "Environment isolation verified: minimal env vars, zero leaks, toolchain PATH intact"
  log_fields:
    spec: "environment-runtime"
    test: "environment-isolation"
    forge_env_count: "3-10"

rollback:
  on_failure: >
    Forge environment drifted. Compare `podman run --rm tillandsias-forge:...
    env | sort` against the launch profile's explicit env allowlist; host
    session vars appearing here means a launch path stopped scrubbing the
    environment (idiomatic-podman ContainerSpec hardening defaults).
  command: "podman inspect tillandsias-forge 2>/dev/null | grep -A 20 'Env' | head -20"

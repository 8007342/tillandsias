# @trace spec:environment-runtime, spec:forge-launch
# Verify the forge container sees ONLY a minimal environment — no host env
# leakage (session/display vars, DOCKER_HOST, XDG_*). Rewritten for order
# 267: the previous revision was not valid YAML (mirror-gate incompatible),
# its 5s per-step timeouts raced cold container starts under post-build
# host load (empty-output flake, gate run 20260710T062934Z), and its
# assertions relied on the runner's behavior heuristics instead of
# explicit in-command verdicts.
name: litmus:environment-isolation
spec: environment-runtime
description: >
  Forge env isolation: 3-10 env vars inside the forge, zero host
  session/display vars, toolchain PATH intact. Explicit fail-loud verdicts;
  image presence pre-warmed so container start latency cannot masquerade as
  an isolation failure.
severity: high
size: e2e

preconditions:
  - forge image is built (tillandsias-forge)
  - podman is available

critical_path:
  - step: "resolve forge image and pre-warm one container start"
    command: "FORGE_IMAGE=\"${TILLANDSIAS_FORGE_IMAGE:-$(podman images --format '{{.Repository}}:{{.Tag}}' | grep '^tillandsias-forge:' | head -1)}\"; test -n \"$FORGE_IMAGE\" || { echo 'FAIL: no tillandsias-forge image present'; exit 1; }; podman run --rm \"$FORGE_IMAGE\" true >/dev/null 2>&1 && echo \"ok: image warm ($FORGE_IMAGE)\" || { echo \"FAIL: forge container did not start\"; exit 1; }"
    timeout_ms: 60000
    expected_behavior: "ok: image warm"

  - step: "forge env var count is within the minimal band (3-10)"
    command: "FORGE_IMAGE=\"${TILLANDSIAS_FORGE_IMAGE:-$(podman images --format '{{.Repository}}:{{.Tag}}' | grep '^tillandsias-forge:' | head -1)}\"; n=$(podman run --rm \"$FORGE_IMAGE\" env | wc -l); [ \"$n\" -ge 3 ] && [ \"$n\" -le 10 ] && echo \"ok: forge env count $n in band\" || { echo \"FAIL: forge env count $n outside 3-10\"; podman run --rm \"$FORGE_IMAGE\" env | sort; exit 1; }"
    timeout_ms: 30000
    expected_behavior: "ok: forge env count"

  - step: "no host session/display vars leak into the forge"
    command: "FORGE_IMAGE=\"${TILLANDSIAS_FORGE_IMAGE:-$(podman images --format '{{.Repository}}:{{.Tag}}' | grep '^tillandsias-forge:' | head -1)}\"; leaks=$(podman run --rm \"$FORGE_IMAGE\" env | grep -cE 'DOCKER_HOST|SESSION_MANAGER|DBUS_SESSION_BUS_ADDRESS|XDG_' || true); [ \"$leaks\" = 0 ] && echo 'ok: zero host session vars' || { echo \"FAIL: $leaks host session/display vars leaked\"; exit 1; }"
    timeout_ms: 30000
    expected_behavior: "ok: zero host session vars"

  - step: "toolchain PATH resolves cargo inside the forge"
    command: "FORGE_IMAGE=\"${TILLANDSIAS_FORGE_IMAGE:-$(podman images --format '{{.Repository}}:{{.Tag}}' | grep '^tillandsias-forge:' | head -1)}\"; p=$(podman run --rm \"$FORGE_IMAGE\" which cargo); case \"$p\" in */cargo) echo \"ok: cargo at $p\" ;; *) echo \"FAIL: cargo not resolvable ($p)\"; exit 1 ;; esac"
    timeout_ms: 30000
    expected_behavior: "ok: cargo at"

observability:
  traces:
    - "@trace spec:environment-runtime"
    - "@trace spec:forge-launch"
  expected_log: "Environment isolation verified: minimal env vars, zero leaks, toolchain PATH intact"
  log_fields:
    spec: "environment-runtime"
    test: "environment-isolation"
    forge_env_count: "3-10"

rollback:
  on_failure: >
    Forge environment drifted. Compare `podman run --rm tillandsias-forge:...
    env | sort` against the launch profile's explicit env allowlist; host
    session vars appearing here means a launch path stopped scrubbing the
    environment (idiomatic-podman ContainerSpec hardening defaults).
  command: "podman inspect tillandsias-forge 2>/dev/null | grep -A 20 'Env' | head -20"

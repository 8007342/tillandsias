# @trace spec:inference-container
#
# Drift-protection for the inference container AS-LAUNCHED via
# `build_inference_run_args` + entrypoint.sh. spec:inference-
# container has 6 reqs spanning local LLM inference + model cache
# + lifecycle + NO_PROXY enclave peers + tier-tagged tool-capable
# pulls + tier classification log.
#
# Existing bindings (`litmus:enclave-isolation` + `litmus:
# inference-readiness-probe-shape` + `litmus:inference-deferred-
# model-pulls`) covered enclave isolation + readiness probe + the
# zen-default routing (via the parallel zen-default litmus binding
# pinning T0/T1 pulls + ollama provider). What was NOT trapped:
# the actual `build_inference_run_args` env-var inventory, the
# entrypoint tier-classification line, T0/T1 cached-skip branch,
# pull-failure-non-fatal handling, and the orphan inference_profile()
# vs launch-site env-var divergence.
#
# 7th SPEC/IMPL DIVERGENCE was resolved 2026-05-31: build_
# inference_run_args now sets HTTP_PROXY/HTTPS_PROXY/http_proxy/
# https_proxy pointing at the Squid proxy + NO_PROXY/no_proxy
# using the same enclave_no_proxy() helper forge containers use.
# The inference_profile() env_vars in container_profile.rs remain
# declared but unconsumed (the args path is canonical).
name: litmus:inference-container-implementation-shape
spec: inference-container
phase: pre-build
description: >
  Pin the inference container's AS-LAUNCHED args + entrypoint
  surfaces: detached/rm flags, security flags (cap-drop=ALL,
  no-new-privileges, userns=keep-id), pids-limit=128, OLLAMA_*
  env vars, model cache volume, CA cert mount, tier classification
  log line, T0/T1 pull-or-cached branches, pull-failure-non-fatal
  log shape, the orphan inference_profile() in container_profile.
  rs declaring (currently unconsumed) proxy env vars.
severity: medium
size: instant

preconditions:
  - workspace contains crates/tillandsias-headless/src/main.rs
  - workspace contains crates/tillandsias-core/src/container_profile.rs
  - workspace contains images/inference/entrypoint.sh
  - shell utilities (grep) are available in PATH

critical_path:
  - step: "Req trace: @trace spec:inference-container on entrypoint.sh"
    # Spec § Purpose names entrypoint.sh as the lifecycle owner.
    command: "grep -F 'spec:inference-container' images/inference/entrypoint.sh"
    timeout_ms: 3000
    expected_behavior: "spec:inference-container"

  - step: "Req 1 + Req 3 launch: build_inference_run_args sets canonical container identity"
    # Spec § Req 1 mandates `inference` hostname on enclave network.
    # build_inference_run_args is the single launch site (no other
    # path observed). Pin name=tillandsias-inference, hostname=
    # inference, network-alias=inference so a refactor breaking
    # enclave discovery surfaces.
    command: "grep -A 30 'fn build_inference_run_args' crates/tillandsias-headless/src/main.rs | grep -F 'tillandsias-inference' && grep -A 30 'fn build_inference_run_args' crates/tillandsias-headless/src/main.rs | grep -F '\"inference\".into()' | head -1"
    timeout_ms: 3000
    expected_behavior: "inference"

  - step: "Req inference security: --cap-drop=ALL + --security-opt=no-new-privileges + --userns=keep-id + --pids-limit=128"
    # Container security flags are non-negotiable per the work-loop
    # guardrails. Pin all 4 on the inference launch path.
    command: "B=$(grep -A 30 'fn build_inference_run_args' crates/tillandsias-headless/src/main.rs); for p in 'cap-drop=ALL' 'security-opt=no-new-privileges' 'userns=keep-id' 'pids-limit=128'; do echo \"$B\" | grep -Fq \"$p\" || { echo \"FAIL: $p missing\"; exit 1; }; done && echo \"ok: 4 security flags pinned\""
    timeout_ms: 3000
    expected_behavior: "ok:"

  - step: "Req 2 cache: model cache volume mount + CA cert bind-mount"
    # Spec § Req 2 mandates `~/.cache/tillandsias/models` → `/home/
    # ollama/.ollama/models` rw. The CA cert mount enables HTTPS
    # trust for proxy bumping.
    command: "grep -A 60 'fn build_inference_run_args' crates/tillandsias-headless/src/main.rs | grep -F '/home/ollama/.ollama/models:rw' && grep -A 60 'fn build_inference_run_args' crates/tillandsias-headless/src/main.rs | grep -F '/etc/tillandsias/ca.crt' | head -1"
    timeout_ms: 3000
    expected_behavior: "/etc/tillandsias/ca.crt"

  - step: "Req 5 tier classification log: entrypoint emits single `tier=` line at boot"
    # Spec § Req 5 mandates one `tier=` line summarizing the
    # selected pull tier. Entrypoint line 106 is the impl site.
    command: "grep -F '[inference] tier=' images/inference/entrypoint.sh"
    timeout_ms: 3000
    expected_behavior: "[inference] tier="

  - step: "Req 5 tier table: entrypoint maps RAM/VRAM thresholds to T2/T3/T4/T5"
    # Spec § Req 5 tier table mandates the GPU/RAM thresholds.
    # Pin each branch literal so a regression silently lowering a
    # threshold (e.g. T3 at GPU 4GB instead of 8GB) surfaces.
    command: "COUNT=$(grep -cE 'TIER=\"T[2-5]\"' images/inference/entrypoint.sh); if [ \"$COUNT\" -ge 4 ]; then echo \"ok: $COUNT TIER=T[2-5] branches\"; else echo \"FAIL: $COUNT branches (expected >=4)\"; exit 1; fi"
    timeout_ms: 3000
    expected_behavior: "ok:"

  - step: "Req 4 pull-failure-non-fatal: entrypoint logs a non-fatal pull FAILED then continues (Squid EOF tolerance)"
    # Spec § Req 4 § Scenario `Squid manifest-pull EOF is non-fatal` mandates pull
    # failures log + continue, not abort. The default small-model set (order 183)
    # is now pulled in a loop (`if ollama pull "$_model"; then ok; else "pull
    # FAILED … non-fatal" >&2; fi`) instead of hardcoded T0/T1 blocks — pin the
    # non-fatal FAILED handler in that (or the tier) loop rather than a specific
    # T0/T1 label count.
    # @trace plan/issues/inference-firstrun-small-models-impl-2026-07-04.md
    command: "grep -qF 'pull FAILED' images/inference/entrypoint.sh && grep -qF 'non-fatal' images/inference/entrypoint.sh && echo 'ok: non-fatal pull-failure handler present' || { echo 'FAIL: no non-fatal pull-failure handler'; exit 1; }"
    timeout_ms: 3000
    expected_behavior: "ok:"

  - step: "Req 1 + Req 4 proxy: build_inference_run_args sets HTTP_PROXY/HTTPS_PROXY + NO_PROXY"
    # Spec § Req 1 mandates proxy for model downloads; Req 4
    # mandates NO_PROXY covering loopback + enclave peers. The
    # 7th divergence (2026-05-30) was that build_inference_run_args
    # set NEITHER. Fixed 2026-05-31: both proxy + NO_PROXY env vars
    # are now set. inference_profile() in container_profile.rs also
    # declares them (unconsumed — args path is canonical).
    command: "B=$(grep -A 60 'fn build_inference_run_args' crates/tillandsias-headless/src/main.rs); echo \"$B\" | grep -Fq 'HTTP_PROXY=http://proxy:3128' || exit 1; echo \"$B\" | grep -Fq 'HTTPS_PROXY=http://proxy:3128' || exit 1; echo \"$B\" | grep -Fq 'NO_PROXY=' || exit 1; echo \"$B\" | grep -Fq 'no_proxy=' || exit 1; echo 'ok: proxy + NO_PROXY env vars present'"
    timeout_ms: 3000
    expected_behavior: "ok: proxy + NO_PROXY env vars present"

observability:
  traces:
    - "@trace spec:inference-container"
    - "@trace spec:podman-orchestration"
    - "@trace spec:zen-default-with-ollama-analysis-pool"
  expected_log: "inference container as-launched (build_inference_run_args identity + security flags + model cache + CA mount) + entrypoint tier classification + T0/T1 non-fatal failure handling + proxy env vars (HTTP_PROXY/HTTPS_PROXY/NO_PROXY) all pinned"
  log_fields:
    spec: "inference-container"
    test: "inference-container-implementation-shape"
    artifact: "crates/tillandsias-headless/src/main.rs + crates/tillandsias-core/src/container_profile.rs + images/inference/entrypoint.sh"

rollback:
  on_failure: >
    A `spec:inference-container` source surface drifted. Restore:
    `@trace spec:inference-container` on entrypoint.sh; build_
    inference_run_args identity (name=tillandsias-inference,
    hostname=inference, network-alias=inference) + security flags
    (--cap-drop=ALL, --security-opt=no-new-privileges, --userns=
    keep-id, --pids-limit=128); model cache volume mount + CA
    cert bind-mount; entrypoint `[inference] tier=` log line;
    4-tier ladder (T2/T3/T4/T5 branches with the spec § Req 5
    RAM/VRAM thresholds); >=2 pull-FAILED non-fatal sites (T0 +
    T1); HTTP_PROXY/http_proxy/HTTPS_PROXY/https_proxy env vars
    pointing at proxy:3128 + NO_PROXY/no_proxy using the derived
    enclave_no_proxy() helper. NEVER drop the proxy env vars without also keeping
    NO_PROXY (ollama loopback probes would otherwise hairpin
    through Squid and stall model loads).
  command: "grep -nE 'fn build_inference_run_args|tier=|TIER=|inference_profile|HTTP_PROXY|NO_PROXY' crates/tillandsias-headless/src/main.rs crates/tillandsias-core/src/container_profile.rs images/inference/entrypoint.sh 2>/dev/null | head -20"

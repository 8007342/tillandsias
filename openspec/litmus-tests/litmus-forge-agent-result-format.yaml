# @trace spec:forge-as-only-runtime, spec:codex-tray-launcher
name: litmus:forge-agent-result-format
spec: forge-as-only-runtime
phase: pre-build
size: quick
severity: critical
description: >
  Delegated agent invariants (order 429).

  1. The OpenCode lane must pass a permission flag that ACTUALLY EXISTS. It
  passed `--dangerously-skip-permissions` for a long time — verified absent from
  `opencode run --help` on the installed opencode 1.18.3, and silently swallowed
  because yargs is non-strict. The lane's permissive behaviour was coming
  entirely from `"permission": "allow"` in the config overlay, so the flag was
  decorative. The real flag is `--auto`. A phantom flag is the worst kind of
  configuration: it reads as deliberate, it never errors, and it does nothing.
  Note Claude and Antigravity DO document --dangerously-skip-permissions; this
  invariant is specific to the OpenCode lane.

  2. Structured output must be OPT-IN. Delegated runs need machine-readable
  JSONL so a dispatcher can distinguish success from failure from timeout, but
  interactive and human-facing runs must keep the formatted default. Flipping
  every run to JSON to serve automation would degrade the human path.

  3. Host classification must consume stdout from the current exact worker,
  retain the real exit status, understand the actual nested Codex/OpenCode
  schemas, reject stale or overflowed evidence, and bound exact-name timeout
  cleanup without touching a sibling. Detached OpenCode Web serve has no such
  capture path and must not inherit the result-format request.

preconditions:
  - workspace contains images/default/entrypoint-forge-opencode.sh
  - workspace contains images/default/entrypoint-forge-codex.sh
  - workspace contains crates/tillandsias-headless/src/agent_result.rs
  - workspace contains crates/tillandsias-podman/src/client.rs

critical_path:
  - step: "the OpenCode lane never passes the phantom --dangerously-skip-permissions flag"
    command: "! grep -qE '^[^#]*\\$OC_BIN.*dangerously-skip-permissions' images/default/entrypoint-forge-opencode.sh && echo 'ok: no phantom flag'"
    timeout_ms: 5000
    expected_behavior: "ok: no phantom flag"

  - step: "the OpenCode lane passes the real --auto permission flag"
    command: "grep -Fq 'oc_auto_args=(--auto)' images/default/entrypoint-forge-opencode.sh && echo 'ok: real flag'"
    timeout_ms: 5000
    expected_behavior: "ok: real flag"

  - step: "structured output is opt-in on both lanes, never unconditional"
    command: "grep -Fq 'TILLANDSIAS_AGENT_RESULT_FORMAT' images/default/entrypoint-forge-opencode.sh && grep -Fq 'TILLANDSIAS_AGENT_RESULT_FORMAT' images/default/entrypoint-forge-codex.sh && echo 'ok: opt-in on both lanes'"
    timeout_ms: 5000
    expected_behavior: "ok: opt-in on both lanes"

  - step: "the prompted Codex command consumes an appended --json result argument"
    command: "E=images/default/entrypoint-forge-codex.sh; grep -Fq 'codex_result_args+=(--json)' \"$E\" && grep -Fq 'codex exec \"${codex_forge_args[@]}\" \"${codex_result_args[@]}\" \"$TILLANDSIAS_CODEX_PROMPT\"' \"$E\" && echo 'ok: codex --json reaches exec'"
    timeout_ms: 5000
    expected_behavior: "ok: codex --json reaches exec"

  - step: "the entrypoint prompt-routing fixture covers default and json shapes"
    command: "scripts/test-opencode-entrypoint-prompt.sh"
    timeout_ms: 120000
    expected_behavior: "ok: opencode entrypoint prompt routing"

  - step: "container entrypoints do not consume a host result-file path"
    command: "! grep -q 'TILLANDSIAS_AGENT_RESULT_FILE' images/default/entrypoint-forge-codex.sh && ! grep -q 'TILLANDSIAS_AGENT_RESULT_FILE' images/default/entrypoint-forge-opencode.sh && echo 'ok: result path remains host-only'"
    timeout_ms: 5000
    expected_behavior: "ok: result path remains host-only"

  - step: "both CLI builders, Web omission, both real JSON schemas, fresh capture, nonzero status, and exact timeout cleanup pass without Podman"
    command: "cargo test -q -p tillandsias-headless delegated_result_"
    timeout_ms: 120000
    expected_behavior: "all delegated_result_ fixtures pass"

  - step: "captured stdout retains a fixed bound while the source continues draining"
    command: "cargo test -q -p tillandsias-podman bounded_attached_capture_drains_but_never_retains_over_limit"
    timeout_ms: 120000
    expected_behavior: "bounded capture overflow fixture passes"

observability:
  traces:
    - "@trace spec:forge-as-only-runtime"
    - "@trace spec:codex-tray-launcher"
  expected_log: "forge agent lanes emit and classify current-run structured output conservatively"
  log_fields:
    spec: "forge-as-only-runtime"
    test: "forge-agent-result-format"

rollback:
  on_failure: >
    Do NOT reintroduce --dangerously-skip-permissions on the OpenCode lane to
    make this pass; confirm against `opencode run --help` for the pinned version
    first. If opencode genuinely renamed --auto, update this litmus in the same
    change as the entrypoint, citing the help output. Never restore result-file
    reads or timeout-by-dropping-the-run-future.
  command: "grep -n 'auto\\|dangerously\\|RESULT_FORMAT\\|run_delegated_agent_container' images/default/entrypoint-forge-opencode.sh crates/tillandsias-headless/src/main.rs"

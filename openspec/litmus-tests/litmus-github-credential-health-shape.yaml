# @trace spec:github-credential-health
#
# Drift-protection for the partial github-credential-health
# implementation. spec:github-credential-health mandates a 4-state
# classifier (Authenticated / CredentialMissing / CredentialInvalid /
# GithubUnreachable) that distinguishes "down" from
# "unauthenticated", driving downstream UI gating.
#
# **Implementation reality (flagged spec gap)**: today's code uses
# a binary `gh_auth_check() -> bool` plus a `github_healthy: bool`
# field on TrayState — no enum classifier, no down-vs-unauthenticated
# distinction. The retry-with-backoff scaffolding (`github_retry_
# count`, `github_next_retry`) is in place but feeds the same
# boolean. The full 4-state classifier is a real implementation gap
# that the spec text waits for. This litmus pins what exists; a
# follow-on slice should implement the enum.
#
# Combined with the existing `litmus:credential-isolation` (e2e),
# raises github-credential-health coverage_ratio 33 → 67. Full 75+
# coverage waits on the 4-state classifier.
name: litmus:github-credential-health-shape
spec: github-credential-health
phase: pre-build
description: >
  Pin the partial github-credential-health implementation:
  `gh_auth_check` 5s-timeout helper, `check_github_token_health`
  1s-timeout async refresher, `TrayState` exponential-backoff
  fields (`github_healthy`, `github_last_check`, `github_retry_
  count`, `github_next_retry`), and the @trace markers.
severity: medium
size: instant

preconditions:
  - workspace contains crates/tillandsias-headless/src/tray/mod.rs
  - workspace contains crates/tillandsias-headless/src/main.rs
  - workspace contains crates/tillandsias-core/src/state.rs
  - shell utilities (grep) are available in PATH

critical_path:
  - step: "TrayState declares the 4 retry-with-backoff fields under @trace spec:github-credential-health"
    # Spec § "Credential health probe" carries an implicit
    # retry/backoff scaffold per scenario "Offline laptop keeps
    # working" — the tray must survive connectivity blips without
    # flipping back to unauthenticated. The 4 fields pin the
    # exponential-backoff data shape; pinning them as a group
    # catches a refactor that drops the retry-count + next-retry
    # pair that drives the backoff.
    command: "grep -cE 'pub (github_healthy|github_last_check|github_retry_count|github_next_retry):' crates/tillandsias-core/src/state.rs | awk '{ if ($1+0 >= 4) print \"ok:\", $1, \"TrayState github_* fields\"; else { print \"FAIL: only\", $1, \"of >=4\"; exit 1 } }'"
    timeout_ms: 3000
    expected_behavior: "ok:"

  - step: "TrayState fields reference spec:github-credential-health (>=4 mentions, mixed standalone + comma-list)"
    # The 4 fields each have a `spec:github-credential-health`
    # reference; one is in a comma-separated `@trace` list with
    # `simplified-tray-ux` and three are standalone. Quirk #9
    # family — match just the spec-id substring rather than the
    # full `@trace spec:foo` prefix.
    command: "grep -cF 'spec:github-credential-health' crates/tillandsias-core/src/state.rs | awk '{ if ($1+0 >= 4) print \"ok:\", $1, \"spec mentions in state.rs\"; else { print \"FAIL: only\", $1, \"of >=4\"; exit 1 } }'"
    timeout_ms: 3000
    expected_behavior: "ok:"

  - step: "gh_auth_check helper: 5s wall-clock timeout via Instant deadline"
    # Spec § Authentication state mandates `gh auth status` exit 0
    # → Authenticated. Today's binary `bool` impl uses a 5s deadline
    # with try_wait+sleep polling. Pin the 5-second literal so a
    # regression to a longer timeout (which would block startup
    # signal handling) surfaces fast.
    command: "grep -F 'fn gh_auth_check() -> bool' crates/tillandsias-headless/src/tray/mod.rs && grep -F 'Duration::from_secs(5)' crates/tillandsias-headless/src/tray/mod.rs"
    timeout_ms: 3000
    expected_behavior: "from_secs(5)"

  - step: "gh_auth_check spawns `gh auth status` with null stdio"
    # Spec § State classification mandates `gh auth status` as the
    # canonical probe. The null-stdio configuration is the
    # invariant that prevents user-visible output during the probe
    # (one of the no-flicker requirements from spec:no-terminal-
    # flicker).
    command: "grep -F '\"auth\", \"status\"' crates/tillandsias-headless/src/tray/mod.rs && grep -F 'Stdio::null()' crates/tillandsias-headless/src/tray/mod.rs"
    timeout_ms: 3000
    expected_behavior: "auth"

  - step: "check_github_token_health async refresher with 1s timeout (non-blocking)"
    # Spec § "Offline laptop keeps working" mandates the probe MUST
    # NOT block startup signal handling. The 1-second timeout is
    # the non-blocking guard; a regression to a longer timeout would
    # silently turn the probe into a startup hang.
    command: "grep -F 'async fn check_github_token_health()' crates/tillandsias-headless/src/main.rs && grep -F 'Duration::from_secs(1)' crates/tillandsias-headless/src/main.rs"
    timeout_ms: 3000
    expected_behavior: "check_github_token_health"

  - step: "gh_auth_check doc-comment trace references spec:tray-minimal-ux + spec:gh-auth-script"
    # The doc block names both the UX-side spec (tray-minimal-ux —
    # which says the GitHubLogin menu entry is shown when not
    # authenticated) AND spec:gh-auth-script — the canonical
    # gh-auth-flow spec. A regression dropping either marker would
    # silently demote the function out of its spec graph.
    command: "grep -F '@trace spec:tray-minimal-ux, spec:gh-auth-script' crates/tillandsias-headless/src/tray/mod.rs"
    timeout_ms: 3000
    expected_behavior: "spec:gh-auth-script"

observability:
  traces:
    - "@trace spec:github-credential-health"
    - "@trace spec:tray-minimal-ux"
    - "@trace spec:gh-auth-script"
    - "@trace spec:secret-rotation"
  expected_log: "TrayState retry-with-backoff fields + gh_auth_check 5s deadline + check_github_token_health 1s non-blocking refresher pinned"
  log_fields:
    spec: "github-credential-health"
    test: "github-credential-health-shape"
    artifact: "crates/tillandsias-core/src/state.rs + crates/tillandsias-headless/src/{main.rs, tray/mod.rs}"

rollback:
  on_failure: >
    A `spec:github-credential-health` source surface drifted. Restore
    the 4 `TrayState.github_{healthy, last_check, retry_count,
    next_retry}` fields with their `@trace spec:github-credential-
    health` doc-comments; `fn gh_auth_check() -> bool` with the 5s
    `Duration::from_secs(5)` deadline + null Stdio + `"auth"
    "status"` args + `@trace spec:tray-minimal-ux, spec:gh-auth-
    script`; `async fn check_github_token_health()` with the 1s
    `Duration::from_secs(1)` non-blocking timeout.
  command: "grep -nE 'github_(healthy|last_check|retry_count|next_retry)|fn gh_auth_check|fn check_github_token_health|from_secs\\((1|5)\\)' crates/tillandsias-core/src/state.rs crates/tillandsias-headless/src/main.rs crates/tillandsias-headless/src/tray/mod.rs | head -25"

# @trace spec:default-image, spec:forge-as-only-runtime, spec:forge-offline, spec:forge-hot-cold-split, spec:forge-environment-discoverability, spec:forge-cache-dual, spec:forge-shell-tools, spec:forge-welcome, spec:forge-opencode-onboarding
# Forge Diagnostics E2E — Non-blocking completeness probe.
#
# NOTE: This test runs the forge agent with a diagnostic prompt and captures
# structured output. The gating points ONLY verify that the forge launched,
# the agent responded, and the output is parseable JSON. Individual
# capability checks are non-gating — they are recorded in the diagnostics
# log for offline analysis.
#
# See plan/issues/forge-diagnostics-automation-2026-05-27.md for the
# methodology context and the request to the orchestrator to formalize
# this as an official litmus signal type.
name: litmus:forge-diagnostics-e2e
spec: default-image
phase: post-build
description: >
  Launch forge with diagnostic prompt, capture structured agent-output log,
  and verify the forge is alive and responding. Capability assertions are
  NON-GATING — failures become forge-completeness signals, not CI blocks.
severity: low
size: e2e

preconditions:
  - tillandsias binary is installed and on PATH
  - forge image is built and available locally
  - plan/diagnostics/forge-diagnostics-prompt.txt exists and is non-empty

critical_path:
  # e2e_token_budget (2026-07-11): the diagnostics capture is a live
  # provider call. Unthrottled, it stacked onto the other gate launches and
  # tripped provider rate limits (empty diagnostics JSON, two red gates in
  # a row on agent-layer throttling). Fresh captures are limited to one per
  # 4h (limiter class `diagnostics`); rate-limited runs assert on the most
  # recent VALID capture (<24h) instead of hammering the provider again.
  - step: "reset the cycle dedupe marker ONLY when a fresh capture is allowed"
    command: "if scripts/forge-e2e-rate-limit.sh check diagnostics >/dev/null 2>&1; then scripts/forge-diagnostics-annex.sh --reset && echo 'ok: fresh capture allowed'; else echo 'ok: rate-limited — will assert on cached capture'; fi"
    timeout_ms: 8000
    expected_behavior: "ok:"

  - step: "run the non-blocking diagnostics annex (one forge launch + dedup + distill; rate-limited)"
    # Replaces the two prior inline `tillandsias --opencode --diagnostics`
    # invocations (which launched the forge TWICE). The annex launches once,
    # writes target/forge-diagnostics/diagnostics_<UTC>.log, records the dedupe
    # marker, and distills into plan/diagnostics/. Non-blocking by contract
    # (exits 0); the JSON-validity gate below is what decides this test's
    # verdict per the agent_diagnostic annex signal rule. When rate-limited,
    # the dedupe marker was NOT reset above, so the annex dedup-skips —
    # no live agent launch, no provider tokens.
    command: "if scripts/forge-e2e-rate-limit.sh check diagnostics >/dev/null 2>&1; then scripts/forge-e2e-rate-limit.sh record diagnostics >/dev/null; fi; scripts/forge-diagnostics-annex.sh"
    timeout_ms: 600000

  - step: "validate output is parseable JSON with diagnostics_timestamp field (newest VALID capture, <24h)"
    # A throttled/crashed agent can leave an EMPTY newest artifact; the
    # verdict is on the newest capture that validates, provided it is
    # fresh (mtime < 24h). No valid fresh capture at all = FAIL.
    command: "found=\"\"; for LOG in $(ls -t target/forge-diagnostics/diagnostics_*.log 2>/dev/null | grep -v '\\.stderr\\.log$' | head -5); do [ -n \"$(find \"$LOG\" -mtime -1 2>/dev/null)\" ] || continue; if cargo run --quiet -p tillandsias-policy -- validate-forge-diagnostics-json \"$LOG\" >/dev/null 2>&1; then found=\"$LOG\"; break; fi; done; [ -n \"$found\" ] && echo \"ok: valid capture $found\" || { echo 'FAIL: no valid diagnostics capture under 24h'; exit 1; }"
    timeout_ms: 30000
    expected_behavior: "ok: valid capture"

  - step: "container-start health: the idiomatic layer emitted at least one running event"
    # The annex now captures stderr to a `.stderr.log` companion next to
    # the stdout JSON. The launch-event stream (emit_launch_event,
    # spec:runtime-diagnostics-stream, ISO-8601 prefixed) lives there. A
    # single `state=running container=…` line is structural proof that
    # the shared PodmanClient layer ran — a raw `Command::new("podman")`
    # bypass would NOT produce these. Field order is pinned by the unit
    # test `launch_event_line_shape_is_stable`; keep this grep in lockstep.
    # @trace spec:runtime-diagnostics-stream, spec:podman-idiomatic-patterns
    command: "STDERR=$(ls -t target/forge-diagnostics/diagnostics_*.stderr.log 2>/dev/null | head -1) && [ -n \"$STDERR\" ] && [ -s \"$STDERR\" ] && grep -Eq 'event:container_launch stage=[^ ]+ state=running container=' \"$STDERR\" && echo \"ok: idiomatic layer reported >=1 container running via diagnostics annex\""
    timeout_ms: 10000
    expected_behavior: "ok: idiomatic layer reported >=1 container running via diagnostics annex"

  - step: "container-start health: NO INFRA container failed during the annex capture (agent-process exits excluded)"
    # A failed INFRA launch surfaces the failing stage + container straight
    # from the stream and invalidates the structured report. An attached
    # AGENT process exiting nonzero ("attached command exited with status")
    # is an agent-layer condition (2026-07-11: provider throttling), judged
    # by the JSON-validity step — the same infra/agent split as
    # litmus:container-start-health.
    command: "STDERR=$(ls -t target/forge-diagnostics/diagnostics_*.stderr.log 2>/dev/null | head -1) && [ -n \"$STDERR\" ] && if grep -E 'event:container_launch .* state=failed' \"$STDERR\" | grep -Ev 'attached command exited with status'; then echo \"FAIL: an infra container launch failed during the annex capture (see lines above)\"; exit 1; else echo \"ok: no infra container_launch state=failed in annex stderr\"; fi"
    timeout_ms: 10000
    expected_behavior: "ok: no infra container_launch state=failed in annex stderr"

  - step: "container-start health: the forge-agent stage launched (running OR exited)"
    # The annex prompt activates --opencode → must launch the agent
    # container. spec:runtime-diagnostics-stream "Launch stage event"
    # allows TWO terminal states for the agent stage: `state=running` for
    # detached containers, OR `state=exited` for a completed attached
    # foreground forge (which is what `--diagnostics --prompt …` produces:
    # the agent runs to completion, then exits cleanly).
    #
    # Stage label is per-agent (`opencode`, `claude`, `codex`, or the
    # generic `forge`) — accept any of them so this litmus stays correct
    # across agent choices.
    #
    # Verified shape from the first production distill
    # (plan/diagnostics/diagnostics_20260528T111351Z-summary.md):
    #   `event:container_launch stage=opencode state=exited container=…`
    #
    # A capture without an agent-stage line means the agent JSON came
    # from somewhere unexpected (cached run, mocked call, ...) and the
    # structured report can't be trusted. Gating.
    command: "STDERR=$(ls -t target/forge-diagnostics/diagnostics_*.stderr.log 2>/dev/null | head -1) && [ -n \"$STDERR\" ] && grep -Eq 'event:container_launch stage=(opencode|claude|codex|forge) (state=(running|exited) |state=failed .*attached command exited with status)' \"$STDERR\" && echo \"ok: forge-agent stage launched via idiomatic layer\""
    timeout_ms: 10000
    expected_behavior: "ok: forge-agent stage launched via idiomatic layer"

observability:
  traces:
    - "@trace spec:default-image"
    - "@trace spec:forge-as-only-runtime"
    - "@trace spec:forge-offline"
    - "@trace spec:forge-hot-cold-split"
  expected_log: "Forge diagnostics E2E captured structured capability report + idiomatic-layer launch-event stream"
  log_fields:
    spec: "forge-diagnostics"
    test: "forge-diagnostics-e2e"
    artifact: "target/forge-diagnostics/diagnostics_*.log"
    stderr_artifact: "target/forge-diagnostics/diagnostics_*.stderr.log"

rollback:
  on_failure: >
    Ensure tillandsias binary is on PATH and forge image is built
    (scripts/build-image.sh forge). If the binary is stale, rebuild
    with ./build.sh --release --install. If the prompt file changed
    without updating the JSON schema in step 3, update the validation.
  command: "ls -la target/forge-diagnostics/ && cat target/forge-diagnostics/diagnostics_*.log 2>/dev/null | head -100"

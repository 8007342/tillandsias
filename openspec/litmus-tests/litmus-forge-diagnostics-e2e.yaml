# @trace spec:default-image, spec:forge-as-only-runtime, spec:forge-offline, spec:forge-hot-cold-split, spec:forge-environment-discoverability, spec:forge-cache-dual, spec:forge-shell-tools, spec:forge-welcome, spec:forge-opencode-onboarding
# Forge Diagnostics E2E — Non-blocking completeness probe.
#
# NOTE: This test runs the forge agent with a diagnostic prompt and captures
# structured output. The gating points ONLY verify that the forge launched,
# the agent responded, and the output is parseable JSON. Individual
# capability checks are non-gating — they are recorded in the diagnostics
# log for offline analysis.
#
# See plan/issues/forge-diagnostics-automation-2026-05-27.md for the
# methodology context and the request to the orchestrator to formalize
# this as an official litmus signal type.
name: litmus:forge-diagnostics-e2e
spec: default-image
phase: post-build
description: >
  Launch forge with diagnostic prompt, capture structured agent-output log,
  and verify the forge is alive and responding. Capability assertions are
  NON-GATING — failures become forge-completeness signals, not CI blocks.
severity: low
size: e2e

preconditions:
  - tillandsias binary is installed and on PATH
  - forge image is built and available locally
  - plan/diagnostics/forge-diagnostics-prompt.txt exists and is non-empty

critical_path:
  - step: "reset the cycle dedupe marker so this standalone run captures"
    # Other slow E2E forge tests call the annex WITHOUT --reset, so the first
    # eligible run captures and the rest dedup-skip (piggyback_protocol). This
    # standalone diagnostics test owns its own cycle, so it resets first to
    # guarantee a fresh capture.
    command: "scripts/forge-diagnostics-annex.sh --reset"
    timeout_ms: 5000

  - step: "run the non-blocking diagnostics annex (one forge launch + dedup + distill)"
    # Replaces the two prior inline `tillandsias --opencode --diagnostics`
    # invocations (which launched the forge TWICE). The annex launches once,
    # writes target/forge-diagnostics/diagnostics_<UTC>.log, records the dedupe
    # marker, and distills into plan/diagnostics/. Non-blocking by contract
    # (exits 0); the JSON-validity gate below is what decides this test's
    # verdict per the agent_diagnostic annex signal rule.
    command: "scripts/forge-diagnostics-annex.sh"
    timeout_ms: 600000

  - step: "validate output is parseable JSON with diagnostics_timestamp field"
    command: >
      LOG=$(ls -t target/forge-diagnostics/diagnostics_*.log 2>/dev/null | head -1)
      && [ -n "$LOG" ]
      && cat "$LOG" | python3 -c "
import json, sys
data = json.load(sys.stdin)
assert 'diagnostics_timestamp' in data, 'missing diagnostics_timestamp'
assert 'capabilities' in data, 'missing capabilities'
caps = data['capabilities']
assert 'agent_available' in caps, 'missing agent_available'
# Structural (methodology forge-diagnostics response_shape): the three
# actionable arrays must be present + lists. Their CONTENTS are non-gating
# (agent_diagnostic annex), but absence is an invalid-structure failure.
for field in ('missing_tools', 'proposed_enhancements', 'isolation_or_privacy_risks'):
    assert field in data, f'missing {field}'
    assert isinstance(data[field], list), f'{field} must be a list'
print('PASS: forge diagnostics JSON valid')
print(f'  timestamp: {data[\"diagnostics_timestamp\"]}')
# Non-gating: report capability status without failing
for section, values in caps.items():
    if isinstance(values, dict):
        for key, val in values.items():
            status = 'OK' if val not in ('unset', 'N/A', 'BLOCKED', 'NOT_FOUND', 'NONE') else 'MISSING'
            print(f'  [{status}] {section}.{key} = {val}')
    else:
        print(f'  [INFO] {section} = {values}')
# Surface the actionable analysis (non-gating) so a CI run shows gaps.
print(f'  missing_tools: {len(data[\"missing_tools\"])}; '
      f'proposed_enhancements: {len(data[\"proposed_enhancements\"])}; '
      f'isolation_risks: {len(data[\"isolation_or_privacy_risks\"])}')
"
    timeout_ms: 15000

observability:
  traces:
    - "@trace spec:default-image"
    - "@trace spec:forge-as-only-runtime"
    - "@trace spec:forge-offline"
    - "@trace spec:forge-hot-cold-split"
  expected_log: "Forge diagnostics E2E captured structured capability report"
  log_fields:
    spec: "forge-diagnostics"
    test: "forge-diagnostics-e2e"
    artifact: "target/forge-diagnostics/diagnostics_*.log"

rollback:
  on_failure: >
    Ensure tillandsias binary is on PATH and forge image is built
    (scripts/build-image.sh forge). If the binary is stale, rebuild
    with ./build.sh --release --install. If the prompt file changed
    without updating the JSON schema in step 3, update the validation.
  command: "ls -la target/forge-diagnostics/ && cat target/forge-diagnostics/diagnostics_*.log 2>/dev/null | head -100"

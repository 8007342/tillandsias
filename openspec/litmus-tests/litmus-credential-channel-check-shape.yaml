# @trace spec:meta-orchestration
#
# Pins the executable Credential Channel Guard (plan order 61). The
# meta-orchestration Start-Of-Cycle guard must consult a structured verdict
# (`ok:<reason>` | `missing:no-credential-channel`) emitted by an executable that
# returns a pass/fail exit code, instead of advisory prose that only an attentive
# agent honors (philosophy.yaml requires falsifiable verification claims; a guard
# nothing enforces is a suggestion, not a constraint). This test falsifies drift
# in the probe's grammar, its no-channel branch, and the skill's wiring to it.
name: litmus:credential-channel-check-shape
spec: meta-orchestration
phase: pre-build
description: >
  Pin scripts/check-credential-channel.sh's credential_channel_verdict probe:
  the standalone verdict mode, the falsifiable verdict grammar
  ^(ok:[a-z0-9-]+|missing:no-credential-channel)$, the deterministic
  no-channel branch under a scrubbed environment, and the meta-orchestration
  skill's consultation of the probe in its Credential Channel Guard.
severity: high
size: instant

preconditions:
  - workspace contains scripts/check-credential-channel.sh
  - workspace contains skills/meta-orchestration/SKILL.md
  - shell utilities (grep, bash, env, mktemp) are available in PATH

critical_path:
  - step: "probe defines credential_channel_verdict and is executable"
    command: "grep -q 'credential_channel_verdict()' scripts/check-credential-channel.sh && test -x scripts/check-credential-channel.sh && echo 'ok: probe-defined'"
    timeout_ms: 3000
    expected_behavior: "ok: probe-defined"

  - step: "a scrubbed environment (no git dir, no tokens, gh suppressed) yields the deterministic no-channel verdict and a non-zero exit"
    command: "d=$(mktemp -d); cp scripts/check-credential-channel.sh \"$d/\"; out=$( cd \"$d\" && env -i PATH=/usr/bin:/bin TILLANDSIAS_CRED_SKIP_GH=1 bash check-credential-channel.sh ); rc=$?; rm -rf \"$d\"; [ \"$rc\" = 1 ] && [ \"$out\" = 'missing:no-credential-channel' ] && echo 'ok: no-channel-fails-closed' || { echo \"FAIL: rc=$rc out=$out\"; exit 1; }"
    timeout_ms: 5000
    expected_behavior: "ok: no-channel-fails-closed"

  - step: "a seeded GH_TOKEN yields an ok verdict and a zero exit"
    command: "d=$(mktemp -d); cp scripts/check-credential-channel.sh \"$d/\"; out=$( cd \"$d\" && env -i PATH=/usr/bin:/bin TILLANDSIAS_CRED_SKIP_GH=1 GH_TOKEN=fixture bash check-credential-channel.sh ); rc=$?; rm -rf \"$d\"; [ \"$rc\" = 0 ] && [ \"$out\" = 'ok:gh-token-env' ] && echo 'ok: token-passes-open' || { echo \"FAIL: rc=$rc out=$out\"; exit 1; }"
    timeout_ms: 5000
    expected_behavior: "ok: token-passes-open"

  - step: "the probe emits exactly one well-formed verdict line"
    command: "d=$(mktemp -d); cp scripts/check-credential-channel.sh \"$d/\"; n=$( cd \"$d\" && env -i PATH=/usr/bin:/bin TILLANDSIAS_CRED_SKIP_GH=1 bash check-credential-channel.sh | grep -cE '^(ok:[a-z0-9-]+|missing:no-credential-channel)$' ); rm -rf \"$d\"; [ \"$n\" = \"1\" ] && echo \"ok: well-formed verdict ($n line)\" || { echo \"FAIL: $n lines\"; exit 1; }"
    timeout_ms: 5000
    expected_behavior: "ok: well-formed verdict"

  - step: "the meta-orchestration skill Credential Channel Guard consults the probe"
    command: "grep -q 'check-credential-channel.sh' skills/meta-orchestration/SKILL.md && echo 'ok: skill-consults-probe'"
    timeout_ms: 3000
    expected_behavior: "ok: skill-consults-probe"

  - step: "forge with an UNREACHABLE mirror fails closed (no false-positive ok:forge-git-mirror)"
    # Regression guard for the Codex shared-host-checkout failure: HOST_KIND=forge
    # being set must NOT yield ok when the mirror cannot answer for `origin`. A
    # temp repo with a bogus local origin makes `git ls-remote origin` fail fast.
    # @trace plan/issues/forge-shared-host-checkout-mirror-alias-2026-07-04.md
    command: "d=$(mktemp -d); git init -q \"$d/repo\"; git -C \"$d/repo\" remote add origin /nonexistent/mirror/repo; cp scripts/check-credential-channel.sh \"$d/repo/\"; out=$( cd \"$d/repo\" && env PATH=/usr/bin:/bin TILLANDSIAS_CRED_SKIP_GH=1 TILLANDSIAS_HOST_KIND=forge bash check-credential-channel.sh 2>/dev/null ); rc=$?; rm -rf \"$d\"; [ \"$rc\" = 1 ] && [ \"$out\" = 'missing:no-credential-channel' ] && echo 'ok: forge-unreachable-fails-closed' || { echo \"FAIL: rc=$rc out=$out\"; exit 1; }"
    timeout_ms: 8000
    expected_behavior: "ok: forge-unreachable-fails-closed"

  - step: "forge with a plain GitHub origin fails closed even when anonymous ls-remote would succeed"
    # HOST_KIND=forge may only pass when Git's effective URL resolution routes
    # origin to the enclave mirror. A public GitHub HTTPS origin proves only
    # anonymous read access, not a push credential channel.
    # @trace plan/issues/forge-git-mirror-agent-affordance-2026-07-07.md
    command: "d=$(mktemp -d); git init -q \"$d/repo\"; git -C \"$d/repo\" remote add origin https://github.com/8007342/tillandsias.git; cp scripts/check-credential-channel.sh \"$d/repo/\"; out=$( cd \"$d/repo\" && env PATH=/usr/bin:/bin TILLANDSIAS_CRED_SKIP_GH=1 TILLANDSIAS_HOST_KIND=forge bash check-credential-channel.sh 2>/dev/null ); rc=$?; rm -rf \"$d\"; [ \"$rc\" = 1 ] && [ \"$out\" = 'missing:no-credential-channel' ] && echo 'ok: forge-github-origin-fails-closed' || { echo \"FAIL: rc=$rc out=$out\"; exit 1; }"
    timeout_ms: 8000
    expected_behavior: "ok: forge-github-origin-fails-closed"

  - step: "forge with a mirror-resolved origin passes through the fixture seam"
    command: "d=$(mktemp -d); git init -q \"$d/repo\"; git -C \"$d/repo\" remote add origin https://github.com/8007342/tillandsias.git; git -C \"$d/repo\" config url.git://tillandsias-git/tillandsias.insteadOf https://github.com/8007342/tillandsias.git; cp scripts/check-credential-channel.sh \"$d/repo/\"; out=$( cd \"$d/repo\" && env PATH=/usr/bin:/bin TILLANDSIAS_CRED_SKIP_GH=1 TILLANDSIAS_HOST_KIND=forge TILLANDSIAS_CRED_SKIP_MIRROR_PROBE=1 bash check-credential-channel.sh 2>/dev/null ); rc=$?; rm -rf \"$d\"; [ \"$rc\" = 0 ] && [ \"$out\" = 'ok:forge-git-mirror' ] && echo 'ok: forge-mirror-origin-passes' || { echo \"FAIL: rc=$rc out=$out\"; exit 1; }"
    timeout_ms: 12000
    expected_behavior: "ok: forge-mirror-origin-passes"

  - step: "forge mirror-probe fixture seam still requires mirror URL resolution"
    command: "d=$(mktemp -d); git init -q \"$d/repo\"; git -C \"$d/repo\" remote add origin https://github.com/8007342/tillandsias.git; cp scripts/check-credential-channel.sh \"$d/repo/\"; out=$( cd \"$d/repo\" && env PATH=/usr/bin:/bin TILLANDSIAS_CRED_SKIP_GH=1 TILLANDSIAS_HOST_KIND=forge TILLANDSIAS_CRED_SKIP_MIRROR_PROBE=1 bash check-credential-channel.sh 2>/dev/null ); rc=$?; rm -rf \"$d\"; [ \"$rc\" = 1 ] && [ \"$out\" = 'missing:no-credential-channel' ] && echo 'ok: forge-seam-requires-mirror-url' || { echo \"FAIL: rc=$rc out=$out\"; exit 1; }"
    timeout_ms: 5000
    expected_behavior: "ok: forge-seam-requires-mirror-url"

observability:
  traces:
    - "@trace spec:meta-orchestration"
  expected_log: "credential-channel verdict probe pinned (grammar + no-channel branch + skill wiring)"
  log_fields:
    spec: "meta-orchestration"
    test: "credential-channel-check-shape"
    artifact: "scripts/check-credential-channel.sh + skills/meta-orchestration/SKILL.md"

rollback:
  on_failure: >
    The credential-channel probe drifted. Restore credential_channel_verdict()
    in scripts/check-credential-channel.sh emitting exactly one line matching
    ^(ok:[a-z0-9-]+|missing:no-credential-channel)$ (reasons:
    gh-credentials-store, gh-token-env, github-token-env, gh-keyring) with a
    pass/fail exit code, keep the file executable, and restore the Credential
    Channel Guard consultation of `scripts/check-credential-channel.sh` in
    skills/meta-orchestration/SKILL.md.
  command: "grep -nE 'credential_channel_verdict|ok:(gh-credentials-store|gh-token-env|github-token-env|gh-keyring)|missing:no-credential-channel' scripts/check-credential-channel.sh | head -20"

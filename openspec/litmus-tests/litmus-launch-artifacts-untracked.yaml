# @trace spec:forge-as-only-runtime
name: litmus:launch-artifacts-untracked
spec: forge-as-only-runtime
phase: pre-build
size: instant
severity: medium
description: >
  Order 444: no agent-harness launch write may land on a TRACKED checkout
  path. OpenCode's npm install regenerated the tracked
  .opencode/package-lock.json on every launch, dirtying the shared checkout
  (cross-forge dirt, 2026-07-20). scripts/check-launch-artifacts-untracked.sh
  makes the invariant executable: every known launch artifact must be
  untracked AND gitignored, and entrypoint write idioms into per-harness
  checkout dirs must resolve to manifested-or-ignored paths.
preconditions:
  - workspace contains scripts/check-launch-artifacts-untracked.sh

critical_path:
  - step: "launch artifacts are untracked+ignored and entrypoint writes are manifested"
    command: "scripts/check-launch-artifacts-untracked.sh"
    success_pattern: "ok:launch-artifacts-untracked"
    timeout_ms: 10000

observability:
  traces:
    - "@trace spec:forge-as-only-runtime"
  expected_log: "launch artifacts untracked and gitignored; no unmanifested entrypoint writes"
  log_fields:
    spec: "forge-as-only-runtime"
    test: "launch-artifacts-untracked"

rollback:
  on_failure: >
    Do NOT delete the artifact from the entrypoint to silence the check if
    the harness genuinely needs it — declare it: add the path to
    LAUNCH_ARTIFACTS in scripts/check-launch-artifacts-untracked.sh AND to
    .gitignore. Only a write that should never happen gets removed at the
    source.
  command: "scripts/check-launch-artifacts-untracked.sh"

# @trace spec:podman-idiomatic-patterns
name: litmus:podman-idiomatic-storage-isolation-runtime
spec: podman-idiomatic-patterns
phase: integration
description: Verify per-project storage isolation with read-only /src, read-write /workspace, and ephemeral /tmp in actual forge containers
severity: critical
size: e2e

preconditions:
  - podman is installed and running in rootless mode
  - forge image is available (tillandsias-forge:*)
  - jq is available for JSON parsing
  - /tmp has write access for test ephemeral containers
  - test workspace directory can be created at ~/.cache/tillandsias/test-*

critical_path:
  - step: "baseline: verify forge image exists"
    command: "scripts/litmus-helper-storage-isolation.sh check-image"
    timeout_ms: 10000
    expected_behavior: "FORGE_IMAGE_OK"

  - step: "create test project directories: project-a and project-b"
    command: "scripts/litmus-helper-storage-isolation.sh create-dirs"
    timeout_ms: 5000
    expected_behavior: "TEST_DIRS_CREATED"

  - step: "launch project-a forge container with volumes: src RO, workspace RW"
    command: "scripts/litmus-helper-storage-isolation.sh launch-project-a"
    timeout_ms: 15000
    expected_behavior: "PROJECT_A_LAUNCHED"

  - step: "launch project-b forge container with separate volumes"
    command: "scripts/litmus-helper-storage-isolation.sh launch-project-b"
    timeout_ms: 15000
    expected_behavior: "PROJECT_B_LAUNCHED"

  - step: "test project-a: verify /src is read-only (EROFS on write)"
    command: "scripts/litmus-helper-storage-isolation.sh verify-src-readonly"
    timeout_ms: 10000
    expected_behavior: "SRC_READONLY_VERIFIED"

  - step: "test project-a: verify /workspace is read-write"
    command: "scripts/litmus-helper-storage-isolation.sh verify-workspace-rw"
    timeout_ms: 10000
    expected_behavior: "WORKSPACE_RW_VERIFIED"

  - step: "test project-b: verify /workspace is isolated (no project-a files)"
    command: "scripts/litmus-helper-storage-isolation.sh verify-workspace-isolation"
    timeout_ms: 10000
    expected_behavior: "WORKSPACE_ISOLATION_VERIFIED"

  - step: "test project-a: verify /tmp is ephemeral (new tmpfs on container start)"
    command: "scripts/litmus-helper-storage-isolation.sh verify-tmp-ephemeral"
    timeout_ms: 10000
    expected_behavior: "TMP_EPHEMERAL_VERIFIED"

  - step: "relaunch project-a and verify /tmp is clean (ephemeral)"
    command: "scripts/litmus-helper-storage-isolation.sh verify-tmp-clean-relaunch"
    timeout_ms: 15000
    expected_behavior: "TMP_EPHEMERAL_CONFIRMED"

  - step: "verify project-a workspace persists across container restarts"
    command: "scripts/litmus-helper-storage-isolation.sh verify-workspace-persistence"
    timeout_ms: 5000
    expected_behavior: "WORKSPACE_PERSISTENCE_VERIFIED"

  - step: "cleanup: remove test containers and directories"
    command: "scripts/litmus-helper-storage-isolation.sh cleanup"
    timeout_ms: 15000

observability:
  traces:
    - "@trace spec:podman-idiomatic-patterns"
  expected_log: "Storage isolation verified: /src read-only, /workspace read-write per-project, /tmp ephemeral"
  log_fields:
    spec: "podman-idiomatic-patterns"
    test: "podman-idiomatic-storage-isolation-runtime"
    mount_configuration: "src_ro,workspace_rw,tmp_ephemeral"
    isolation_level: "per-project-containers"
    cross_project_isolation: "verified"

rollback:
  on_failure: "verify podman mount and volume configuration, check TILLANDSIAS_PODMAN_GRAPHROOT and per-project storage paths"
  command: "podman ps -a --format '{{.Names}}|{{.Mounts}}' && echo '---' && podman volume ls && echo '---' && podman inspect $(podman ps -q 2>/dev/null | head -1) 2>/dev/null | jq '.Mounts' || true"

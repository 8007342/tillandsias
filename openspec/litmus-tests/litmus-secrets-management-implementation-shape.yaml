# @trace spec:secrets-management
#
# Drift-protection for the legacy-keyring secrets-management
# implementation surfaces. spec:secrets-management is `superseded` by
# tillandsias-vault (Phase 6) but remains active for one release
# behind the `--legacy-keyring-secrets` flag. The implementation
# spans:
#
#   crates/tillandsias-headless/src/main.rs
#     run_github_login()           — Req 1 entry point (keyring owns
#                                    the GH token; gh CLI inside
#                                    ephemeral git-image container
#                                    captures the token)
#     create_github_podman_secret() — Req 2 delivery (creates
#                                    `tillandsias-github-token` via
#                                    `podman secret create --driver=
#                                    file`)
#   crates/tillandsias-core/src/container_profile.rs
#     git_author_name / git_author_email — Req 3 (git identity from
#     ~/.cache/tillandsias/secrets/git/.gitconfig)
#   crates/tillandsias-headless/src/vault_bootstrap.rs
#     `podman secret rm tillandsias-github-token` — Req 4 cleanup
#
# Accountability logging in main.rs uses
# `accountability = true, category = "secrets", secret_name =
# "tillandsias-github-token", operation = "rotation_complete"` —
# Req 4 § "No secret values in logs" + § "Lifecycle logged".
#
# Combined with the existing `litmus:credential-isolation` (Req 1
# partial) and `litmus:gh-auth-script-shape` (Req 1 entry point +
# CLI flag), raises secrets-management coverage_ratio 33 → 75.
name: litmus:secrets-management-implementation-shape
spec: secrets-management
phase: pre-build
description: >
  Pin the legacy-keyring secrets-management implementation surfaces:
  run_github_login + create_github_podman_secret entry points,
  --legacy-keyring-secrets transition flag, `tillandsias-github-token`
  podman secret name, `/run/secrets/tillandsias-github-token` read
  path, git-identity cache literal, podman secret rm cleanup, and
  accountability logging shape.
severity: medium
size: instant

preconditions:
  - workspace contains crates/tillandsias-headless/src/main.rs
  - workspace contains crates/tillandsias-headless/src/vault_bootstrap.rs
  - workspace contains crates/tillandsias-core/src/container_profile.rs
  - shell utilities (grep) are available in PATH

critical_path:
  - step: "Req 1 entry: fn run_github_login(debug, legacy_keyring_secrets) present"
    # Spec § "Native keyring owns the GitHub token". The signature
    # `(debug: bool, legacy_keyring_secrets: bool)` is the Phase 6
    # transition gate — the flag is what keeps the legacy keyring
    # path alive for one release post-vault promotion. A refactor
    # dropping the flag would silently shrink the spec's deprecation
    # window.
    command: "grep -F 'fn run_github_login(debug: bool, legacy_keyring_secrets: bool)' crates/tillandsias-headless/src/main.rs"
    timeout_ms: 3000
    expected_behavior: "fn run_github_login"

  - step: "Req 1 transition gate: --legacy-keyring-secrets CLI flag parsed"
    # The user-arg parser checks for the literal flag string. A
    # rename (e.g. `--keyring-legacy`) would silently break the
    # spec's documented escape hatch.
    command: "grep -F 'a == \"--legacy-keyring-secrets\"' crates/tillandsias-headless/src/main.rs"
    timeout_ms: 3000
    expected_behavior: "legacy-keyring-secrets"

  - step: "Req 2 delivery: fn create_github_podman_secret(token, debug) present"
    # Spec § "GitHub token is delivered as a podman secret". The
    # function is the single source of truth that converts the
    # keyring token into the `tillandsias-github-token` podman
    # secret consumed by the git service. Pin the exact signature so
    # a refactor renaming the entry point fails fast.
    command: "grep -F 'fn create_github_podman_secret(token: &str, debug: bool)' crates/tillandsias-headless/src/main.rs"
    timeout_ms: 3000
    expected_behavior: "fn create_github_podman_secret"

  - step: "Req 2 invocation: `podman secret create --driver=file tillandsias-github-token` literal"
    # Spec mandates `tillandsias-github-token` as the canonical
    # secret name. The driver=file form is the host-keyring →
    # podman-secret bridge. A change to driver or secret name would
    # silently break the read path in the git service.
    command: "grep -F 'podman secret create --driver=file tillandsias-github-token' crates/tillandsias-headless/src/main.rs"
    timeout_ms: 3000
    expected_behavior: "tillandsias-github-token"

  - step: "Req 2 read path: /run/secrets/tillandsias-github-token literal present"
    # Spec § "The git service SHALL read the token from
    # /run/secrets/tillandsias-github-token". A path drift would
    # silently break authenticated pushes. Pin literal appearance
    # in the implementation files.
    command: "grep -cF '/run/secrets/tillandsias-github-token' crates/tillandsias-headless/src/main.rs crates/tillandsias-headless/src/vsock_server.rs crates/tillandsias-headless/src/remote_projects.rs | awk -F: '{ sum += $2 } END { if (sum >= 4) print \"ok:\", sum, \"read-path sites\"; else { print \"FAIL: only\", sum, \"of >=4\"; exit 1 } }'"
    timeout_ms: 3000
    expected_behavior: "ok:"

  - step: "Req 3 git-identity cache: ~/.cache/tillandsias/secrets/git/.gitconfig literal"
    # Spec § "Git identity is cached as local metadata" — the file
    # holds name/email only, NO tokens. The literal path is the
    # contract surface; a regression to a different cache location
    # would silently desync the launcher's GIT_AUTHOR_NAME injection.
    command: "grep -cF '.cache/tillandsias/secrets/git/.gitconfig' crates/tillandsias-core/src/container_profile.rs | awk '{ if ($1+0 >= 1) print \"ok:\", $1, \"git-identity cache literal sites\"; else { print \"FAIL: 0 of >=1\"; exit 1 } }'"
    timeout_ms: 3000
    expected_behavior: "ok:"

  - step: "Req 4 cleanup: `podman secret rm tillandsias-github-token` on tray shutdown"
    # Spec § "Secret cleanup on shutdown" — vault_bootstrap.rs is
    # the secret-rotation owner and the cleanup site. A regression
    # removing the rm call would leave the podman secret leaked
    # across tray restarts.
    command: "grep -F '\"secret\", \"rm\", \"tillandsias-github-token\"' crates/tillandsias-headless/src/vault_bootstrap.rs"
    timeout_ms: 3000
    expected_behavior: "tillandsias-github-token"

  - step: "Req 4 accountability logging: category=secrets, operation=rotation_complete (no token value)"
    # Spec § "No secret values in logs" + § "Lifecycle logged". The
    # accountability fields are how an auditor proves the lifecycle
    # was observed without exposing the token. Pin both the category
    # and the operation literal; absence of any token-value template
    # is enforced by the absence of `token = %` patterns near these
    # log sites (covered indirectly by the secret-rotation litmus).
    command: "grep -F 'category = \"secrets\"' crates/tillandsias-headless/src/main.rs && grep -F 'operation = \"rotation_complete\"' crates/tillandsias-headless/src/main.rs"
    timeout_ms: 3000
    expected_behavior: "rotation_complete"

observability:
  traces:
    - "@trace spec:secrets-management"
    - "@trace spec:secret-rotation"
    - "@trace spec:native-secrets-store"
  expected_log: "secrets-management entry points + secret name + read path + cleanup + accountability all pinned across Reqs 1-4"
  log_fields:
    spec: "secrets-management"
    test: "secrets-management-implementation-shape"
    artifact: "crates/tillandsias-headless/src/main.rs + vault_bootstrap.rs + crates/tillandsias-core/src/container_profile.rs"

rollback:
  on_failure: >
    A `spec:secrets-management` surface drifted. Restore:
    `fn run_github_login(debug: bool, legacy_keyring_secrets: bool)`
    + `--legacy-keyring-secrets` CLI flag in main.rs (Req 1);
    `fn create_github_podman_secret(token: &str, debug: bool)` +
    `podman secret create --driver=file tillandsias-github-token`
    literal (Req 2); `/run/secrets/tillandsias-github-token` read
    path across main.rs / vsock_server.rs / remote_projects.rs
    (Req 2); `~/.cache/tillandsias/secrets/git/.gitconfig` literal
    in container_profile.rs (Req 3); `podman secret rm
    tillandsias-github-token` cleanup in vault_bootstrap.rs (Req 4);
    `category = "secrets", operation = "rotation_complete"`
    accountability log fields (Req 4).
  command: "grep -nE 'run_github_login|create_github_podman_secret|--legacy-keyring-secrets|tillandsias-github-token|rotation_complete' crates/tillandsias-headless/src/main.rs crates/tillandsias-headless/src/vault_bootstrap.rs | head -20"

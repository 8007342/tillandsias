<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Cantarell", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #2d2d2d;
      color: #eeeeec;
      font-size: 13px;
      line-height: 1;
      -webkit-user-select: none;
      user-select: none;
      overflow: hidden;
    }

    .menu {
      padding: 4px 0;
    }

    .menu-item {
      display: flex;
      align-items: center;
      padding: 6px 12px;
      cursor: default;
      white-space: nowrap;
    }

    .menu-item:hover {
      background: #4a90d9;
      color: #ffffff;
    }

    .menu-item.disabled {
      color: #888a85;
      cursor: default;
    }

    .menu-item.disabled:hover {
      background: transparent;
      color: #888a85;
    }

    .menu-item .arrow {
      margin-left: auto;
      padding-left: 16px;
      font-size: 10px;
      color: #babdb6;
    }

    .menu-item:hover .arrow {
      color: #ffffff;
    }

    .menu-item.disabled .arrow {
      color: #888a85;
    }

    .separator {
      height: 1px;
      background: #464646;
      margin: 4px 0;
    }

    .submenu {
      display: none;
      padding-left: 0;
      background: #353535;
    }

    .submenu.open {
      display: block;
    }

    .submenu .menu-item {
      padding-left: 24px;
    }

    .submenu .submenu .menu-item {
      padding-left: 36px;
    }
  </style>
</head>
<body>

  <div class="menu">
    <!-- GitHub -->
    <div class="menu-item" data-submenu="github">
      <span>GitHub</span>
      <span class="arrow">&#9656;</span>
    </div>
    <div class="submenu" id="github">
      <div class="menu-item" data-action="github-login">
        <span id="github-login-label">&#128273; GitHub Login</span>
      </div>
      <div class="separator"></div>
      <div class="menu-item" data-submenu="remote-projects">
        <span>Remote Projects</span>
        <span class="arrow">&#9656;</span>
      </div>
      <div class="submenu" id="remote-projects">
        <div class="menu-item disabled">
          <span>Loading...</span>
        </div>
      </div>
    </div>

    <!-- Seedlings -->
    <div class="menu-item" data-submenu="seedlings">
      <span>&#127793; Seedlings</span>
      <span class="arrow">&#9656;</span>
    </div>
    <div class="submenu" id="seedlings">
      <div class="menu-item" data-action="select-agent:opencode" id="agent-opencode">
        <span>&#128204; OpenCode</span>
      </div>
      <div class="menu-item" data-action="select-agent:claude" id="agent-claude">
        <span>Claude</span>
      </div>
    </div>

    <div class="separator"></div>

    <!-- Version -->
    <div class="menu-item disabled">
      <span>Tillandsias v0.1.72.42</span>
    </div>

    <!-- Credit -->
    <div class="menu-item disabled">
      <span>by Tlatoani</span>
    </div>
  </div>

  <script>
    // Toggle submenus on click
    document.querySelectorAll('[data-submenu]').forEach(function(item) {
      item.addEventListener('click', function(e) {
        e.stopPropagation();
        var id = item.getAttribute('data-submenu');
        var submenu = document.getElementById(id);
        if (submenu) {
          submenu.classList.toggle('open');
        }
      });
    });

    // Clickable actions (placeholder — will call Tauri IPC later)
    document.querySelectorAll('[data-action]').forEach(function(item) {
      item.addEventListener('click', function(e) {
        e.stopPropagation();
        var action = item.getAttribute('data-action');
        console.log('action:', action);
        // TODO: invoke Tauri IPC command
        // window.__TAURI__.invoke(action);
      });
    });
  </script>
</body>
</html>

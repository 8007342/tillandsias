<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Tectorum bloom: fuzzy ball with purple flower emerging -->
  <g transform="translate(32,54)">
    <circle cx="0" cy="-10" r="12" fill="#5a9a5a" stroke="#3a7a3a" stroke-width="1"/>
    <!-- Trichome texture -->
    <line x1="-8" y1="-16" x2="-12" y2="-20" stroke="#7cbc7c" stroke-width="1" stroke-linecap="round"/>
    <line x1="8" y1="-16" x2="12" y2="-20" stroke="#7cbc7c" stroke-width="1" stroke-linecap="round"/>
    <line x1="-10" y1="-8" x2="-14" y2="-8" stroke="#7cbc7c" stroke-width="1" stroke-linecap="round"/>
    <line x1="10" y1="-8" x2="14" y2="-8" stroke="#7cbc7c" stroke-width="1" stroke-linecap="round"/>
    <line x1="-6" y1="-2" x2="-8" y2="2" stroke="#7cbc7c" stroke-width="1" stroke-linecap="round"/>
    <line x1="6" y1="-2" x2="8" y2="2" stroke="#7cbc7c" stroke-width="1" stroke-linecap="round"/>
    <!-- Bloom -->
    <line x1="0" y1="-22" x2="0" y2="-34" stroke="#8855aa" stroke-width="2"/>
    <ellipse cx="-2" cy="-36" rx="3" ry="4" fill="#9966bb"/>
    <ellipse cx="2" cy="-38" rx="3" ry="3" fill="#aa77cc"/>
